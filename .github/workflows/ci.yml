name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: MCP protocol tests (zero-dependency)
        run: node test/mcp-test.js
      - name: Fusion module tests (no network — error paths only)
        run: node test/fusion-test.js
      - name: Install / uninstall lifecycle tests (sandboxed HOME)
        run: bash test/install-test.sh
      - name: Codex CLI native install (sandboxed HOME/CODEX_HOME — reversibility + no token reads)
        run: node test/codex-install-test.mjs
      - name: Codex Agent Skills install (discovery dir, opt-out, marker-free reversibility, honest frontmatter)
        run: node test/codex-skills-test.mjs
      - name: Measurement core (race-invariant assignment + HMAC privacy + metadata-only ledger)
        run: node test/measurement-assignment-test.mjs
      - name: Codex holdout campaign lifecycle (start/log/status/stop, reversible, metadata-only)
        run: node test/codex-campaign-test.mjs
      - name: Measurement read-out statistics (seeded bootstrap CI / permutation / Cliff's δ / Holm + analyze)
        run: node test/measurement-stats-test.mjs
      - name: Codex-native A/B harness (offline fake-codex — dry-run purity, safe env, scorers, event parse)
        run: node test/codex-ab-runner-test.mjs
      - name: Codex-native A/B scorer + frozen oracle (McNemar contrasts, Holm, park-until-proven)
        run: node test/codex-ab-score-test.mjs
      - name: Unsupported-claim lint-rule regression (deterministic, offline)
        run: node eval/unsupported-claim-regression/run.mjs
      - name: Scripts are valid and fail-safe
        run: |
          node --check claude-code/hooks/fable-subagent.js
          bash -n claude-code/hooks/fable-reinject.sh
          bash -n install.sh
          node --check install.mjs
          node --check mcp/src/server.js
          node --check fusion/fusion-server.js
          node --check claude-code/lib/settings-merge.js
          node --check codex/lib/paths.mjs
          node --check codex/lib/markers.mjs
          node --check codex/lib/codex-install.mjs
          node --check codex/hooks/fable-session.js
          node --check codex/hooks/fable-subagent.js
          node --check codex/hooks/fable-reinject.js
          node --check measurement/status.mjs
          node --check tools/fable-doctor.mjs
          node --check tools/fable-report.mjs
          node --check test/codex-skills-test.mjs
          node --check measurement/runtime/assign.cjs
          node --check measurement/runtime/privacy.cjs
          node --check measurement/runtime/holdout.cjs
          node --check measurement/hooks/codex-measure.js
          node --check measurement/codex-campaign.mjs
          node --check measurement/lib/stats.mjs
          node --check measurement/runtime/holdout.cjs
          node --check eval/codex-native-ab/run.mjs
          node --check eval/codex-native-ab/lib/arms.mjs
          node --check eval/codex-native-ab/lib/safe-env.mjs
          node --check eval/codex-native-ab/lib/codex-events.mjs
          node --check eval/codex-native-ab/score.mjs
          node --check eval/codex-native-ab/oracle/fable-lint-frozen.cjs
          node --check test/codex-ab-score-test.mjs
          node --check test/measurement-assignment-test.mjs
          node --check test/codex-campaign-test.mjs
          node --check test/measurement-stats-test.mjs
          node --check test/codex-ab-runner-test.mjs
          node --check test/fixtures/fake-codex.js
          node --check test/fixtures/fake-codex-eager.js
