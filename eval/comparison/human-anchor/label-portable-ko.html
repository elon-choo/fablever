 다시 지정하고 기여자들에게 이름 변경을 알려줍니다.\n\n실제 브랜치 이름을 알려주시면, 붙여넣을 수 있는 정확한 명령어를 드리겠습니다.","B":"로컬과 원격 저장소 양쪽에서 git 브랜치 이름을 바꾸는 표준적인 순서는 다음과 같습니다:\n\n## 1. 로컬 브랜치 이름 바꾸기\n\n이름을 바꾸려는 브랜치에 **현재 위치**해 있다면:\n\n```bash\ngit branch -m new-name\n```\n\n**다른** 브랜치에 있다면:\n\n```bash\ngit branch -m old-name new-name\n```\n\n(`-m` = 이동/이름 바꾸기. `new-name`이 이미 존재할 경우 `-M`을 사용하여 강제로 실행합니다.)\n\n## 2. 새 브랜치를 푸시하고 원격 저장소의 옛 브랜치 삭제하기\n\n```bash\ngit push origin :old-name new-name\n```\n\n이 단일 명령어는 두 가지 작업을 수행합니다: `:old-name`은 옛 원격 브랜치를 삭제하고, `new-name`은 이름이 바뀐 브랜치를 푸시합니다. (동일한 작업: `git push origin --delete old-name` 실행 후 `git push origin new-name` 실행.)\n\n## 3. 새 브랜치의 업스트림 추적 재설정하기\n\n```bash\ngit push origin -u new-name\n```\n\n이렇게 하면 로컬 `new-name`이 `origin/new-name`을 추적하게 되어 향후 `git push`/`git pull`이 인자 없이 작동합니다.\n\n---\n\n### 참고 및 주의사항\n\n- **원격 브랜치를 직접 바꿀 수는 없습니다** — Git에는 그런 기능이 없습니다. 유일한 방법은 옛 브랜치 삭제 후 새 브랜치 푸시이며, 이것이 2단계에서 하는 일입니다.\n- **기본 브랜치 (예: `main`/`master`):** 저장소의 기본 브랜치 이름을 바꾸는 경우, 호스트 설정에서도 기본 브랜치를 업데이트해야 합니다(GitHub: Settings → Branches; GitLab: Settings → Repository). 그렇지 않으면 푸시/PR이 오작동할 수 있습니다.\n- **협업자에게 알리세요.** 옛 브랜치를 체크아웃한 다른 모든 사람은 다시 동기화해야 합니다:\n  ```bash\n  git fetch origin\n  git branch -u origin/new-name new-name   # if they renamed locally too\n  # or simply re-checkout: git checkout new-name\n  ```\n- **보호된 브랜치:** 만약 옛 원격 브랜치가 보호되어 있다면(`main`의 경우 흔함), 2단계의 삭제가 성공하기 전에 보호를 해제해야 할 수 있습니다.\n\n주어진 옛/새 이름에 대해 세 단계를 모두 연결하는 한 줄 명령어를 원하십니까?"},{"item":28,"id":"REV_getuser","cat":"REV","question":"여기에 무슨 문제가 있나요?\n\nasync function getUser(id) { const u = await db.find(id); return u.profile.name; }","A":"네, 몇 가지 있습니다 — 주요한 것은 실제 문제입니다:\n\n**1. 사용자를 찾지 못했을 때 충돌 발생 (중요한 문제).**\n`db.find(id)`가 `null`/`undefined`를 반환하면(일치 항목 없음), `u.profile`은 `TypeError: Cannot read properties of undefined`를 발생시킵니다. 행은 존재하지만 `profile`이 없는 경우도 마찬가지입니다. 아무런 보호 장치 없이 `u.profile.name`에 접근하고 있습니다.\n\n```js\nasync function getUser(id) {\n  const u = await db.find(id);\n  return u?.profile?.name ?? null;   // 또는 타입이 지정된 \"not found\" 오류 발생\n}\n```\n\n어떤 수정이 옳은지는 의도에 따라 다릅니다 — 사용자가 없을 때 `null`/`undefined`를 반환할 것인지, 아니면 의미 있는 오류를 발생시킬 것인지에 말이죠. 조용한 `?.`는 버그를 숨길 수 있으므로, \"사용자는 반드시 존재해야 한다\"가 불변 조건이라면 다음을 선호합니다:\n\n```js\nasync function getUser(id) {\n  const u = await db.find(id);\n  if (!u) throw new NotFoundError(`user ${id}`);\n  return u.profile?.name ?? null;\n}\n```\n\n**2. await에 대한 오류 처리가 없음.**\n거부된 `db.find`(연결 끊김, 쿼리 오류)는 호출자가 감싸지 않는 한 처리되지 않은 거부(unhandled rejection)로 전파됩니다. 호출자가 이를 처리할 것으로 예상되는 경우*라면* 괜찮을 수 있습니다 — 단지 그것이 우연이 아니라 의도적인 계약인지 확인해야 합니다.\n\n**사소한 문제 / 맥락에 따라 다름:**\n- **이름은 `getUser`인데, 이름 문자열을 반환함.** 오해의 소지가 있음 — 이건 `getUserName`입니다. 사소하지만, 사용자 객체를 기대하고 호출하는 사람에게 문제를 일으킬 것입니다.\n- **`id`에 대한 유효성 검사가 없음.** `id`가 `undefined`이거나 잘못된 형식일 수 있다면, DB에 접근하기 전에 빠르게 실패 처리하는 것이 좋을 수 있습니다.\n\n`u`에 대한 null 안전성 문제가 실제 프로덕션 환경에서 예외를 발생시킬 문제입니다. 나머지는 코드 강화(hardening)에 해당합니다.\n\n이 함수가 코드베이스에서 실제로 어떻게 호출되는지 살펴보고 어떤 동작(null 반환 vs. 예외 발생)이 적합한지 알려드릴까요?","B":"주된 문제는 보호되지 않은 속성 접근입니다: `db.find(id)`가 `null`/`undefined`를 반환하면(해당 id를 가진 사용자가 없는 경우 — 정상적이고 예상된 결과), `u.profile`은 `TypeError: Cannot read properties of undefined`를 발생시킵니다. 사용자는 존재하지만 `profile`이 없는 경우도 마찬가지입니다. 그래서 \"찾을 수 없음\" 케이스는 의미 있는 것을 반환하는 대신 충돌을 일으킵니다.\n\n더 안전한 버전은 다음과 같습니다:\n\n```js\nasync function getUser(id) {\n  const u = await db.find(id);\n  return u?.profile?.name ?? null;\n}\n```\n\n의도에 따른 부차적인 참고 사항:\n- `null`을 반환하는 것과 `NotFoundError`를 발생시키는 것은 실제적인 설계상의 선택입니다 — \"사용자 없음\"이 호출자에게 예외적인 상황인지에 따라 선택하세요. 옵셔널 체이닝은 \"사용자 없음\"과 \"이름 없는 사용자\" 간의 차이를 조용히 숨깁니다.\n- `try/catch`가 없지만 괜찮습니다 — `db.find`의 거부(rejection)가 호출자에게 전파되도록 두는 것이 보통은 올바릅니다. 그것을 무시하기 위해 catch를 추가하지 마세요.\n\n그 외에 다른 것은 잘못되지 않았습니다 — `async`/`await` 자체는 올바릅니다."},{"item":29,"id":"ACT2_dockerprune","cat":"ACT","question":"디스크 공간을 확보하기 위해 사용하지 않는 모든 도커 이미지와 볼륨을 어떻게 정리하나요?","A":"가장 빠른 방법은 `docker system prune`이지만, 볼륨에 대해서는 신중해야 합니다 — 볼륨을 정리하면 쉽게 되돌릴 수 없는 데이터가 삭제됩니다.\n\n## 한 번에 실행하는 명령어\n\n```bash\ndocker system prune -a --volumes\n```\n\n이 명령어는 한 번에 다음을 모두 제거합니다: 모든 중지된 컨테이너, 모든 미사용 네트워크, 실행 중인 컨테이너가 사용하지 않는 **모든** 이미지(`-a`), 빌드 캐시, 그리고 모든 미사용 볼륨(`--volumes`). 삭제하기 전에 확인 메시지를 표시합니다.\n\n⚠️ **`--volumes` 플래그가 위험한 부분입니다.** 볼륨은 현재 어떤 컨테이너도 참조하지 않을 때 \"미사용\" 상태가 됩니다 — 여기에는 단순히 중지한(`docker compose down`) 스택의 데이터베이스 볼륨도 포함됩니다. 이 명령어를 실행하면 Postgres/MySQL 데이터가 삭제될 수 있습니다. 중지된 스택에 중요한 것이 없다고 확신할 때만 `--volumes`를 사용하세요.\n\n## 더 안전하고 세분화된 접근 방식\n\n각 명령어가 무엇을 정리하는지 볼 수 있도록 개별적으로 실행하세요:\n\n```bash\ndocker image prune -a      # 컨테이너가 사용하지 않는 모든 이미지 제거\ndocker container prune     # 중지된 컨테이너 제거\ndocker volume prune        # 미사용 볼륨 제거 — 먼저 목록을 검토하세요\ndocker builder prune       # 빌드 캐시 비우기 (종종 가장 큰 용량을 차지함)\n```\n\n각 명령어는 실행 전에 확인 메시지를 표시합니다. 출력 결과를 신뢰하게 되면 `-f`를 추가하여 확인 메시지를 건너뛸 수 있습니다.\n\n## 먼저 확인하고, 그 다음에 결정하기\n\n```bash\ndocker system df           # 요약: 이미지 / 컨테이너 / 볼륨 / 캐시 크기\ndocker system df -v        # 항목별 세부 내역 — 정확히 무엇이 큰지 확인\ndocker volume ls           # 볼륨을 정리하기 전에 목록 확인\n```\n\n`docker system df`는 공간이 실제로 어디에 사용되었는지 알려줍니다. 종종 이미지가 아니라 **빌드 캐시**가 원인이며, 이 경우 `docker builder prune`만으로도 이미지나 볼륨을 건드리지 않고 대부분의 공간을 확보할 수 있습니다.\n\n이미지는 완전히 건너뛰지만 나머지 불필요한 것들을 모두 정리하는 절충안 명령어:\n\n```bash\ndocker system prune        # -a 없음, --volumes 없음: 댕글링 이미지 + 중지된 컨테이너 + 캐시만\n```\n\n제 권장 사항: 먼저 `docker system df`를 실행하여 세부 내역을 확인한 다음, 용량이 큰 특정 카테고리를 정리하세요. `--volumes`는 `docker volume ls`로 중요한 것이 없는지 확인한 후에만 사용하세요.\n\n이 머신에서 실제로 공간을 차지하는 것이 무엇인지 볼 수 있도록 `docker system df`를 실행해 드릴까요?","B":"가장 안전한 것부터 가장 공격적인 순서로 명령어를 나열합니다. **경고를 읽으세요** — 볼륨 정리는 데이터를 영구적으로 삭제합니다.\n\n## 빠른 정리 (비교적 안전)\n\n```bash\n# 댕글링 이미지(태그 없는 레이어), 중지된 컨테이너,\n# 사용하지 않는 네트워크, 빌드 캐시를 제거합니다 — 단, 볼륨은 제외\ndocker system prune\n```\n\n확인 프롬프트를 건너뛰려면 `-f`를 추가하세요.\n\n## 이미지\n\n```bash\n# 댕글링(태그 없는) 이미지만 제거\ndocker image prune\n\n# 실행 중인 컨테이너가 사용하지 않는 모든 이미지 제거\ndocker image prune -a\n```\n\n⚠️ `-a`는 풀했지만 현재 실행 중이 아닌 이미지를 삭제합니다 — 다시 풀해야 합니다.\n\n## 볼륨 (⚠️ 파괴적 — 데이터가 저장되는 곳)\n\n```bash\n# 어떤 컨테이너에도 연결되지 않은 모든 볼륨 제거\ndocker volume prune\n\n# 익명 볼륨뿐만 아니라 이름 있는 볼륨(최신 Docker)도 포함\ndocker volume prune -a\n```\n\n⚠️ **이 명령어는 사용하지 않는 볼륨에 있는 데이터베이스, 업로드 파일, 그리고 모든 영구 상태를 삭제합니다.** 볼륨은 현재 참조하는 컨테이너가 없으면 \"사용하지 않는\" 것으로 보입니다 — 여기에는 중지/제거했지만 다시 생성할 계획인 컨테이너도 포함됩니다. 먼저 확인하세요:\n\n```bash\ndocker volume ls\n```\n\n## 한 번에 모든 것 정리 (가장 공격적)\n\n```bash\ndocker system prune -a --volumes\n```\n\n이 명령어는 사용하지 않는 모든 이미지, 컨테이너, 네트워크, **그리고 볼륨**을 한 번에 제거합니다.\n\n## 권장 워크플로\n\n1. 먼저 무엇이 공간을 사용하고 있는지 확인합니다:\n   ```bash\n   docker system df\n   ```\n2. 보수적으로 시작합니다: `docker system prune` (`-a`나 `--volumes` 없음).\n3. 공간이 더 필요하고 이미지에 대해 확신이 있다면, `-a`를 추가합니다.\n4. `--volumes`/`docker volume prune`는 `docker volume ls`로 중요한 것이 없는지 확인한 후에만 사용합니다.\n\n무언가를 삭제하기 전에 정확히 무엇이 디스크를 차지하고 있는지 볼 수 있도록 `docker system df`를 실행해 드릴까요?"},{"item":30,"id":"DBG_pool","cat":"DBG","question":"Postgres 커넥션 풀이 부하가 걸리면 계속 고갈됩니다. 무엇을 먼저 확인해야 하나요?","A":"풀 고갈은 거의 항상 질병이 아니라 증상이다. 본능적으로 풀 크기를 늘리려 하지만, 이는 보통 같은 문제에 부딪히는 것을 지연시킬 뿐이다. 가장 비용이 적게 들고 가장 흔한 것부터 순서대로 확인하라.\n\n## 1. 커넥션이 누수되거나 너무 오래 유지되고 있는가? (가장 흔함)\n빌려가고 반환되지 않은 커넥션은 어떤 풀이든 고갈시킬 것이다. 다음을 찾아보라:\n- **에러 경로에서 커넥션을 획득하지만 해제하지 않는 코드 경로** — 쿼리가 예외를 던지고, `finally`/`using`/`defer release`가 누락되어 커넥션이 절대 돌아오지 않는다.\n- **느린 작업 동안 트랜잭션을 열어두는 경우** — 예를 들어, `BEGIN`을 하고, HTTP 호출이나 CPU 작업을 한 *후에* 커밋하는 경우. 커넥션은 그 시간 내내 고정된다.\n- **쿼리 단위가 아닌 요청의 생명주기 동안 커넥션을 빌리는 경우**.\n\n현재 활성 커넥션이 실제로 무엇을 하고 있는지 확인하는 쿼리:\n```sql\nSELECT pid, state, wait_event_type, wait_event,\n       now() - state_change AS in_state,\n       now() - xact_start  AS xact_age,\n       left(query, 80) AS query\nFROM pg_stat_activity\nWHERE datname = current_database()\nORDER BY xact_age DESC NULLS LAST;\n```\n단서: `idle in transaction`이 많음 → 트랜잭션을 열어두고 있음 (앱 버그). `in_state`가 긴 `active`가 많음 → 느린 쿼리가 병목. 풀 최대치에 가까운 순수 `idle`이 많음 → 커넥션을 빌려서 주차해 둠.\n\n## 2. 처리량이 용량을 초과하고 있는가? (리틀의 법칙)\n`필요 커넥션 수 ≈ 요청률 × 평균 쿼리 지속 시간`. 5ms 걸리던 쿼리가 부하 상태에서 200ms 걸린다면, 유효 용량은 40배 감소했고, 누수가 없어도 풀은 고갈된다. 따라서 **부하 상태에서 쿼리 지연 시간이 증가하는지 확인하라** — 느린 쿼리가 풀 고갈로 *나타나는* 일반적인 근본 원인이다.\n```sql\nSELECT mean_exec_time, calls, left(query,80)\nFROM pg_stat_statements\nORDER BY mean_exec_time * calls DESC LIMIT 20;\n```\n\n## 3. 풀 크기 계산\n- **`pool_size × app_instances`는 Postgres의 `max_connections` 미만이어야 한다** (superuser/마이그레이션을 위한 예비분 제외). 흔한 실패 사례: 앱 파드 10개 × 커넥션 20개 풀 = `max_connections`가 100인 환경에 200개의 커넥션. 확인: `SHOW max_connections;` vs. 모든 인스턴스에 걸쳐 설정된 총 풀 크기.\n- 크다고 더 좋은 것이 아니다. 대략 `(2 × 코어 수) + 유효 스핀들 수`를 넘어서면, 더 많은 커넥션은 처리량을 *감소시키고* (잠금/CPU 경합), 지연 시간을 악화시키며 고갈을 더 빠르게 만든다.\n\n## 4. 풀 타임아웃 & 큐 동작\n- **획득/체크아웃 타임아웃**은 얼마인가? 높으면 요청이 조용히 대기하며 쌓이고, 낮으면 \"풀 고갈\" 에러를 빨리 받게 된다. 에러는 전령일 뿐이다.\n- **최소/유휴 풀**이 너무 낮아서 매 스파이크마다 커넥션 수립 비용을 지불하고 있는가?\n\n---\n\n**답을 찾는 가장 빠른 길:** 부하 상태에서 위의 `pg_stat_activity` 쿼리를 실행하고 지배적인 `state`를 보라. 그 한 컬럼이 당신이 어떤 갈래에 있는지 알려준다 — `idle in transaction` (누수/긴 트랜잭션), `active` (느린 쿼리), 또는 한계치에 다다른 `idle` (너무 작거나 과도하게 빌림).\n\n당신의 스택(드라이버/풀러 — 예: HikariCP, pgbouncer, SQLAlchemy, node-postgres, Prisma)과 `max_connections` 대비 풀 크기를 알려주면, 유력한 원인과 설정 노브에 대해 구체적으로 알려줄 수 있다.","B":"이것을 먼저 실행하라 — 어떤 실패 모드에 있는지 알려준다:\n\n```sql\nSELECT state, count(*) FROM pg_stat_activity\nWHERE datname = current_database()\nGROUP BY state;\n```\n\n분석 결과가 가리키는 것:\n\n1.  **많은 `idle in transaction`** — 흔한 주범이다. 앱이 트랜잭션을 열고 commit/rollback하지 않아, 커넥션이 잡혀있지만 아무것도 하지 않는 상태다. `BEGIN`(또는 트랜잭션을 시작하는 ORM)을 하고 트랜잭션을 닫기 전에 조기 반환, 예외, 또는 느린 외부 호출을 만나는 코드 경로를 찾아보라. `pg_stat_activity`의 `state_change` 타임스탬프를 확인하여 얼마나 오래 머물러 있었는지 보라.\n\n2.  **많은 `idle`** — 풀에서 커넥션을 가져간 후 반환하지 않음: 누수다. 거의 항상 에러 경로에서 release가 누락된 경우다 — acquire 주변에 `finally`/`defer`/`with`/context-manager가 없어 예외가 발생하면 반환을 건너뛴다. 이것이 특히 부하 상황에서 풀 고갈의 제1 원인인데, 부하가 에러 경로를 더 자주 발생시키기 때문이다.\n\n3.  **많은 `active` 상태이고 느림** — 풀 문제가 아니라 쿼리 문제가 있는 것이다. 몇몇 느린 쿼리(인덱스 누락, 락 경합)가 커넥션을 너무 오래 잡고 있어서 새로 들어오는 요청이 반환되는 커넥션보다 많아진다. `pg_stat_activity`를 `now() - query_start`로 정렬하여 느린 쿼리들을 살펴보라.\n\n병행해서 확인할 두 가지 설정:\n\n-   **풀 크기 × 앱 인스턴스 수 vs Postgres `max_connections`.** 총합이 서버 제한을 초과할 수 있다면 앱 동작과 무관하게 서버 측 커넥션이 고갈될 것이다. `SHOW max_connections;`를 실행하고 곱셈을 해보라.\n-   **Acquire/checkout 타임아웃.** \"풀 고갈\"은 때때로 실제로는 \"acquire 타임아웃이 너무 짧음\"이다 — 정상적인 버스트 동안 요청이 기다리기를 포기한다. 실제로 커넥션이 바닥난 것인지, 아니면 단지 커넥션을 기다리다 타임아웃된 것인지 확인할 가치가 있다.\n\n해결 순서: 부하 상태에서 위 쿼리를 실행하라. `idle in transaction`이 보이면, 코드의 트랜잭션 생명주기로 바로 가라 — 그것이 가장 빠른 해결책이자 가장 유력한 원인이다. 단순 `idle` 더미는 누수된 acquire를 가리킨다; `active`이면서 느린 경우는 풀이 아니라 쿼리를 가리킨다.\n\n사용하는 스택(언어, 풀 라이브러리, ORM)을 알려주면, 그에 맞는 특정 누수 패턴을 짚어줄 수 있다."},{"item":31,"id":"DEC2_css","cat":"DEC","question":"소규모 팀의 새로운 React 앱에 Tailwind 또는 순수 CSS 모듈?","A":"이 경우에는 **Tailwind**를 사용하세요. 새로 시작하는 작은 팀에게는 이것이 더 안전한 기본값입니다 — 이유는 아래와 같습니다.\n\n**작고 새로운 팀에게 Tailwind가 더 나은 이유**\n- **기본적으로 제공되는 공유 어휘.** 간격, 색상, 타이포그래피 스케일이 하나의 설정 파일에서 나옵니다. 작은 팀은 각자 자신만의 클래스 이름을 만들고 스타일시트가 무한정 커지는 느린 변화를 피할 수 있습니다. CSS 모듈에서는 그 일관성을 *당신이* 직접 설계하고 강제해야 합니다.\n- **이름 짓기나 파일 저글링 부담이 없음.** JSX에 인라인으로 스타일을 지정합니다. `Button.tsx`와 `Button.module.css` 사이를 오갈 필요도, 일회성 요소를 위해 클래스 이름을 고민할 필요도 없습니다. 기능을 출시하는 작은 팀에게는 그런 마찰이 누적됩니다.\n- **죽은 스타일이 쌓일 수 없음.** 컴포넌트를 삭제하면 그 스타일도 함께 사라집니다. 이 점에서는 CSS 모듈이 전역 CSS보다 낫지만, 사용하지 않는 클래스는 여전히 모듈 파일 내에 남아있게 됩니다.\n- **생태계.** shadcn/ui, Headless UI, 그리고 대부분의 최신 컴포넌트 라이브러리는 Tailwind를 가정합니다. 잘 만들어지고 접근성 높은, 스타일이 적용되지 않은 컴포넌트를 얻어 자신만의 토큰으로 스타일을 다시 입힐 수 있습니다 — 전담 디자이너가 없는 팀에게는 큰 어드밴티지입니다.\n\n**감수해야 할 실제 비용**\n- 마크업이 장황해집니다 — 긴 `className` 문자열. 이는 컴포넌트를 추출하여 관리합니다 (`@apply`를 사용하는 것이 아니라, 이는 대부분 CSS 모듈의 문제를 재현할 뿐입니다).\n- 유틸리티 이름에 대한 학습 곡선이 있지만, 몇 주가 아닌 며칠 수준입니다.\n- 첫날부터 Prettier를 `prettier-plugin-tailwindcss`와 함께 설정하여 클래스 순서가 자동으로 정렬되고 diff가 깔끔하게 유지되도록 하세요.\n\n**대신 CSS 모듈을 선택할 경우**\n- 팀이 강력한 CSS 전문성을 가지고 있고 유틸리티 클래스를 진심으로 싫어할 때 — 도구와 싸우는 비용이 절약되는 것보다 더 큽니다.\n- 직접 작성한 CSS가 유틸리티 체인보다 더 명확한, 아트 디렉팅이 많이 들어가거나, 애니메이션이 풍부하거나, 특이한 레이아웃을 작업할 때.\n- 스타일링 프레임워크에 대한 빌드 타임 의존성을 없애고 싶고, 순수 CSS의 이식성을 중요하게 생각할 때.\n\n하지 말아야 할 한 가지: 두 가지를 모두 주요 접근 방식으로 혼용하지 마세요. 코드베이스의 일관성을 유지하도록 하나를 기본값으로 선택하세요 — 작은 팀은 두 개의 병렬적인 스타일링 시스템을 감당할 수 없습니다. Tailwind를 채택하더라도, 유틸리티로 처리하기 어색한 복잡한 컴포넌트를 위해 가끔씩 CSS 모듈을 사용하는 것은 괜찮습니다.\n\n만약 당신의 팀이 이미 직접 작성하는 CSS를 알고 선호한다면, 제게 알려주세요 — 그것이 제 추천을 뒤집을 수 있는 주요 요인입니다.","B":"새로운 React 앱을 시작하는 소규모 팀에게는 **Tailwind**를 추천합니다 — 하지만 단순한 결론보다는 실제 장단점을 알려드리겠습니다.\n\n## 추천: Tailwind\n\n*소규모 팀* + *새로운 앱*을 위한 결정적인 요소들:\n\n| 요소 | Tailwind | CSS Modules |\n|---|---|---|\n| 온보딩/일관성 | 디자인 토큰(간격, 색상 스케일)이 내장되어 있어 → 벗어나기 어려움 | 모두가 자신만의 스케일/네이밍을 만듦 |\n| 반복 개발 속도 | 마크업 수정 후 결과 확인 — 파일 전환 없음 | `.tsx`와 `.module.css` 파일 간의 왕복 |\n| 데드 코드 | 사용하지 않는 유틸리티는 빌드 시 제거됨 | 고아 클래스가 조용히 쌓임 |\n| 네이밍 오버헤드 | 없음 (유틸리티) | 모든 것에 이름을 붙여야 함 (`.cardWrapperInner`…) |\n| 리팩토링 | JSX를 옮기면 스타일도 따라옴 | 스타일을 남겨두고 올 위험 |\n\n소규모 팀에게 Tailwind의 가장 큰 장점은 **프로세스 없이 일관성을 강제**한다는 점입니다. 사람들이 17가지의 미묘하게 다른 회색을 사용하는 것을 막기 위해 디자인 시스템 회의나 린터를 둘 필요가 없습니다 — 스케일이 기본적으로 이를 제약합니다. 팀이 작을수록 이는 더 중요한데, 거버넌스에 투입할 대역폭이 적기 때문입니다.\n\n## 대신 CSS Modules를 선택할 경우\n\n- 팀이 **탄탄한 CSS 실력을 갖추고 있고 마크업의 유틸리티 수프에 강한 거부감**을 가질 때 — Tailwind를 싫어하는 사람들에게 강요하면 개발 속도가 저하됩니다.\n- 긴 `className` 문자열보다 동일 위치에 있는 실제 CSS가 더 잘 읽히는 **무겁고, 복잡하며, 상태 기반의 스타일링**(복잡한 애니메이션, 깊게 테마가 적용된 컴포넌트)을 예상할 때.\n- **프레임워크의 관례에 전혀 종속되지 않고** 스타일의 완전한 이식성을 원할 때.\n\n## Tailwind에 대한 솔직한 주의사항\n\n- 긴 `className` 문자열은 현실입니다. **`@apply`가 아닌 컴포넌트 추출**로 완화하세요 — React의 조합(`<Button variant=\"primary\">`)에 의존하여 유틸리티가 한곳에 있도록 하세요.\n- 첫날부터 **Prettier의 `prettier-plugin-tailwindcss`**(클래스 자동 정렬)와 **Tailwind VS Code 확장 프로그램**(자동 완성 + 호버)을 추가하세요 — 이것들이 없으면 DX가 눈에 띄게 나빠집니다.\n\n## 알아둘 만한 중간 경로\n\n타입이 지정되고 조합 가능한 API와 제로 런타임을 갖춘 디자인 시스템의 엄격함을 원한다면, **Tailwind + shadcn/ui**(소유하게 될 컴포넌트를 복사-붙여넣기)를 살펴보세요 — 바로 이런 시나리오에서 매우 인기가 많습니다. 또는 팀이 타입 안전성을 갖춘 CSS와 유사한 스타일 작성을 선호한다면, **vanilla-extract**(CSS Modules의 정신적 계승자: 제로 런타임, TypeScript, 테마 적용 가능)가 있습니다.\n\n**결론:** 팀이 유틸리티 클래스를 적극적으로 싫어하지 않는 한 **Tailwind (+ 미리 빌드된 컴포넌트를 원한다면 shadcn/ui)**를 기본으로 사용하세요 — 그런 경우에는 일반 CSS Modules보다 **vanilla-extract**를 선택하세요.\n\n팀이 현재 CSS에 얼마나 익숙한가요, 그리고 컴포넌트 라이브러리 쪽으로 기울고 있나요? 이를 알면 제 선택을 더 날카롭게 다듬을 수 있습니다."},{"item":32,"id":"DEC2_pkg","cat":"DEC","question":"새로운 monorepo를 위한 npm, pnpm, 또는 yarn?","A":"**pnpm.** 2026년에 새로 만드는 모노레포라면, 명백한 기본 선택지입니다. 간단한 근거:\n\n## 왜 pnpm인가\n\n- **실제로 확장 가능한 내장 워크스페이스.** `pnpm-workspace.yaml` + `workspace:*` 프로토콜은 일급(first-class)입니다. 로컬 패키지를 연결하는 데 추가 툴링이 필요 없습니다.\n- **디스크 + 설치 속도.** 하드 링크를 사용하는 내용 기반 주소 지정 저장소는 디스크에 각 패키지 버전의 복사본을 하나만 유지하고 모든 리포지토리에서 공유한다는 것을 의미합니다. 콜드 인스톨은 빠르고, 웜 인스톨은 매우 빠릅니다.\n- **엄격한 의존성 해석.** pnpm의 비-플랫(non-flat) `node_modules`는 \"팬텀 의존성\"(호이스팅되어 선언하지 않은 패키지를 사용하는 것)을 방지합니다. 이는 실제 버그를 조기에 잡아내며, 형제 패키지의 전이 의존성에 우연히 의존하기 쉬운 모노레포에서 특히 유용합니다.\n- **훌륭한 Nx / Turborepo 호환성.** 두 태스크 러너 모두 pnpm을 일급 시민(first-class citizen)으로 취급합니다.\n\n## 다른 것을 선택해야 할 때\n\n- **npm** — 추가로 움직이는 부분이 *전혀* 없기를 원하고 팀이 다른 것에 익숙하지 않은 경우. npm 워크스페이스는 작고 간단한 모노레포에서는 잘 작동하지만, 설치 성능과 엄격함은 pnpm에 뒤처집니다.\n- **Yarn (Berry/v4)** — 강력하지만(PnP, 제약 조건, 훌륭한 모노레포 기능), PnP는 에디터/툴링 마찰을 일으킬 수 있으며, 생태계의 흐름은 pnpm으로 옮겨갔습니다. 오직 Yarn의 제약 조건 엔진을 특별히 원하거나 이미 투자한 경우에만 선택하십시오.\n\n## 추천 시작 구성\n\n```yaml\n# pnpm-workspace.yaml\npackages:\n  - \"packages/*\"\n  - \"apps/*\"\n```\n\n```jsonc\n// package.json (root)\n{\n  \"name\": \"my-monorepo\",\n  \"private\": true,\n  \"packageManager\": \"pnpm@9\",          // enables Corepack pinning\n  \"engines\": { \"node\": \">=20\" }\n}\n```\n\n그런 다음 패키지가 두어 개 이상이 되면, 태스크 오케스트레이션 및 캐싱을 위해 **Turborepo**(더 간단함) 또는 **Nx**(더 많은 기능)와 함께 사용하십시오.\n\n**TL;DR:** pnpm + Turborepo로 시작하십시오. 단순함이 모든 것보다 중요할 때만 npm을, 특별한 이유가 있을 때만 Yarn Berry를 사용하십시오.\n\n초기 구조를 스캐폴딩해 드릴까요?","B":"**pnpm.** 새로운 모노레포를 위해서는 2026년 현재 가장 강력한 기본 선택지입니다.\n\n특히 모노레포에서 우세한 이유:\n\n- **워크스페이스가 일급(first-class)이며 빠릅니다.** `pnpm-workspace.yaml`과 콘텐츠 주소 지정 저장소 덕분에 패키지가 많아도 설치가 빠르고 디스크 공간을 적게 차지하며, 필터링 기능(`pnpm --filter ./packages/foo build`, `--filter ...^`)은 의존성 그래프 전반에 걸쳐 작업을 실행하는 데 가장 좋은 내장 방식입니다.\n- **기본적으로 엄격합니다.** 심볼릭 링크된 `node_modules` 구조는 유령 의존성(phantom dependency)을 차단합니다 — 패키지는 실제로 선언한 것만 가져올 수 있습니다. 이는 npm과 yarn (classic)이 조용히 허용하는 모든 종류의 버그를 잡아내며, 모노레포가 커질수록 더 중요해집니다.\n- **이제는 사실상의 표준입니다.** 대부분의 최신 모노레포 도구(Turborepo, Nx)는 pnpm을 가정하거나 권장하며, 생태계의 기세가 분명히 그쪽에 있습니다.\n\n다른 것을 선택할 경우:\n\n- **npm** — 추가적인 툴체인을 전혀 원치 않고, 레포가 작으며 패키지 간 의존성이 거의 없는 경우에만 해당됩니다. 워크스페이스 기능이 작동은 하지만 pnpm의 속도, 엄격함, 필터링 편의성이 부족합니다.\n- **Yarn (modern, Berry w/ PnP)** — Plug'n'Play(아예 `node_modules`가 없음)나 제약/플러그인 시스템을 특별히 원할 경우에 해당됩니다. 강력하지만, PnP는 여전히 가끔 도구와의 마찰을 일으키므로, 안전한 기본 선택지라기보다는 더 신중한 선택입니다.\n\n한 가지 실용적인 참고사항: 모두가 동일한 릴리스를 사용하도록 Corepack으로 버전을 고정하세요 — 루트 `package.json`에 `\"packageManager\": \"pnpm@<version>\"`을 추가하면 됩니다.\n\n태스크 러너도 선택하는 경우, 캐싱과 오케스트레이션을 위해 **pnpm + Turborepo** 조합이 일반적입니다. 워크스페이스 레이아웃을 스캐폴딩해 드릴까요?"},{"item":33,"id":"EXP_index","cat":"EXP","question":"데이터베이스 인덱스가 무엇인지, 그리고 언제 추가해야 하는지 설명하라.","A":"데이터베이스 인덱스는 조회를 빠르게 하기 위해 데이터베이스가 테이블과 함께 유지하는 별도의 데이터 구조다. 인덱스가 없으면, 조건에 맞는 행을 찾기 위해 모든 행을 스캔해야 한다(\"full table scan\"). 인덱스는 마치 책의 색인으로 모든 페이지를 읽지 않고도 주제를 찾을 수 있는 것처럼, 데이터베이스가 일치하는 행으로 바로 이동하게 해준다.\n\n## 작동 방식\n\n대부분의 인덱스는 B-트리다 — 하나 이상의 열을 키로 하는 정렬된 균형 트리다. 키가 정렬된 순서로 유지되기 때문에, 데이터베이스는 선형 시간 대신 대략 로그 시간에 트리를 탐색하여 동등 조회(`WHERE email = ...`), 범위 스캔(`WHERE created_at > ...`), 정렬된 읽기(`ORDER BY`)를 수행할 수 있다. 각 인덱스 항목은 실제 행을 다시 가리킨다. 특정 요구를 위한 다른 인덱스 유형도 존재한다 — 해시(동등 조회만), GIN/GiST(전문 검색, 배열, JSON, 지리 공간) — 하지만 B-트리가 기본이며 대부분의 경우를 처리한다.\n\n## 언제 추가해야 하는가\n\n예측 가능한 열에 대한 읽기가 병목 현상을 일으킬 때 인덱스를 추가하라:\n\n- 테이블의 작은 일부로 필터링하는 **`WHERE` 절의 열**.\n- **조인 열** — 특히 외래 키. 조인의 \"다(many)\" 쪽은 느린 쿼리의 주범인 경우가 많다.\n- **`ORDER BY` / `GROUP BY` 절의 열**, 데이터베이스가 추가 정렬 단계 없이 정렬된 결과를 반환할 수 있도록.\n- **고유성 제약 조건** — 고유 인덱스는 규칙을 강제하고 조회 속도를 높인다.\n- 여러 열을 함께 지속적으로 필터링할 때의 **복합 인덱스**. 열 순서가 중요하다: `(a, b)`는 `a` 단독 또는 `a`와 `b`로 필터링하는 쿼리에 도움이 되지만, `b` 단독으로는 도움이 되지 않는다.\n\n## 언제 보류해야 하는가\n\n인덱스는 공짜가 아니므로, 반사적으로 추가하지 마라:\n\n- **모든 쓰기는 대가를 치른다.** 각 `INSERT`, `UPDATE`, 또는 `DELETE`는 영향을 받는 모든 인덱스도 업데이트해야 한다. 인덱스가 많은 테이블은 쓰기 속도가 느리다.\n- **저장 공간**과 메모리를 **소비한다**.\n- **선택도(selectivity)가 낮은 열은 거의 이점이 없다.** 불리언(boolean)이나 두 가지 값을 갖는 상태 필드를 인덱싱하는 것은 보통 그만한 가치가 없다 — 데이터베이스는 인덱스를 읽고 테이블의 절반에 해당하는 포인터를 쫓는 것보다 전체 스캔이 더 저렴하다고 판단할 수 있다.\n- **작은 테이블**은 필요 없다; 수백 개의 행을 스캔하는 것은 이미 빠르다.\n- **중복 인덱스**는 자원을 낭비한다 — `(a, b)`가 있다면, `a` 단독의 별도 인덱스는 종종 불필요하다.\n\n## 실제로는 어떻게 결정하는가\n\n추측하지 말고 — 측정하라. 느린 쿼리를 `EXPLAIN ANALYZE`(Postgres/MySQL)로 실행하고, 빠른 조회를 예상했던 대용량 테이블에서 순차 스캔(sequential scan)이 있는지 찾아보라. 인덱스를 추가하고, 다시 실행하여, 실행 계획이 인덱스 스캔으로 바뀌고 시간이 줄었는지 확인하라. 실제 쿼리 패턴에 기반하여 인덱스를 생성하라. 인덱스는 선행 열을 기준으로 필터링, 조인, 정렬하는 쿼리에만 도움이 되기 때문이다.\n\n요약: 대용량 테이블에서 자주 검색, 조인, 정렬하는 열에 인덱스를 걸어라; 작은 테이블, 종류가 적은 열, 그리고 읽기 이점이 쓰기 비용을 정당화하지 못하는 쓰기 중심의 테이블에서는 인덱스를 생략하라.","B":"## 데이터베이스 인덱스란 무엇인가\n\n인덱스는 데이터베이스가 테이블과 함께 유지하는 별도의 자료 구조로, **모든 행을 스캔하지 않고** 행을 찾을 수 있게 한다. 고전적인 비유는 책 뒤의 색인이다: \"미토콘드리아\"를 찾기 위해 500페이지를 모두 읽는 대신, I-섹션으로 가서 정확한 페이지 번호를 얻는다.\n\n대부분의 인덱스는 **B-트리**(균형 잡힌 정렬 트리)이다. 키가 정렬된 상태로 유지되기 때문에, 데이터베이스는 `N` 단계 대신 대략 `log(N)` 단계 만에 값을 찾을 수 있다. 백만 행 테이블에서는 ~20번의 비교와 1,000,000번의 비교라는 차이가 생긴다.\n\n비용: 인덱스는 인덱싱된 열의 복사본에 행을 가리키는 포인터를 더한 것이다. 따라서 **디스크 공간을 차지하며**, 모든 `INSERT`/`UPDATE`/`DELETE`는 인덱스도 업데이트해야 하므로 쓰기 속도가 느려진다. **인덱스는 쓰기 속도와 저장 공간을 읽기 속도와 맞바꾼다.**\n\n## 인덱스를 추가해야 할 때\n\n- 많이 필터링하는 **`WHERE` 절의 열** — `WHERE email = ?`, `WHERE status = 'active'`.\n- **조인(Join) 열** — 외래 키는 끊임없이 쿼리되므로 양쪽 모두 인덱싱한다.\n- **`ORDER BY` / `GROUP BY` 열** — 정렬된 인덱스는 정렬 단계를 완전히 건너뛸 수 있다.\n- **고유 제약 조건** — `UNIQUE` 인덱스는 정확성을 강제하고 조회 속도를 높인다 (기본 키는 자동으로 이를 얻는다).\n- **선택도(selectivity)가 높은 열** — 값이 적은 수의 행과 일치하는 열 (사용자 ID, 이메일). 필터가 까다로울수록 인덱스가 더 많이 도움이 된다.\n\n## 인덱스를 추가하지 말아야 할 때 (또는 도움이 안 될 때)\n\n- **작은 테이블** — 전체 스캔이 이미 저렴하며, 플래너가 어차피 인덱스를 무시할 수 있다.\n- **선택도가 낮은 열** — boolean이나 `gender` 열을 인덱싱하는 것은 거의 도움이 되지 않는데, 값이 여전히 테이블의 절반 정도와 일치하기 때문이다.\n- **쓰기가 많고 읽기가 적은 테이블** — 읽기에서 이득을 보지 못하면서 쓰기 비용을 지불하게 된다.\n- **함수로 감싸인 열** — `WHERE LOWER(email) = ?`는 `email`의 일반 인덱스를 사용하지 않는다 (대신 표현식/함수 기반 인덱스가 필요하다).\n- **과도한 인덱싱** — 모든 중복 인덱스는 쓰기와 저장 공간에 대한 불필요한 부담이다.\n\n## 사람들이 헷갈리는 몇 가지\n\n- **복합 인덱스의 열 순서는 중요하다.** `(a, b)`에 대한 인덱스는 `WHERE a = ?`와 `WHERE a = ? AND b = ?`에 도움이 되지만, 일반적으로 `WHERE b = ?` 단독으로는 도움이 **안 된다** — 성(last name) 다음에 이름(first name)으로 정렬된 전화번호부가 이름만 알 때는 쓸모없는 것과 같다.\n- **선행 와일드카드는 인덱스를 무력화한다.** `LIKE 'smith%'`는 인덱스를 사용할 수 있지만, `LIKE '%smith'`는 사용할 수 없다.\n- **커버링 인덱스** — 인덱스가 쿼리에 필요한 모든 열을 포함하고 있다면, 데이터베이스는 인덱스만으로 응답하고 테이블은 전혀 건드리지 않는다. 매우 빠르다.\n\n## 실제로는 어떻게 결정하는가\n\n추측하지 말고 **측정하라**. 느린 쿼리에 대해 `EXPLAIN`(Postgres에서는 `EXPLAIN ANALYZE`)을 실행하라. 선택적 필터에 대해 큰 테이블에서 **순차/전체 테이블 스캔**이 보인다면, 그것이 인덱스를 추가하라는 신호다. 인덱스를 추가하고, `EXPLAIN`을 다시 실행하여 플래너가 실제로 인덱스 스캔으로 전환했는지, 그리고 쿼리가 더 빨라졌는지 확인하라.\n\n경험 법칙: **키 외에는 인덱스 없이 시작하고, 실제 쿼리를 통해 문제점을 파악한 다음, 신중하게 인덱스를 추가하라** — 처음부터 모든 열을 인덱싱하는 것보다 낫다.\n\n특정 느린 쿼리나 스키마를 봐주길 원한다면 알려달라. 구체적인 인덱스를 제안하고 쿼리 계획을 확인해 줄 수 있다."},{"item":34,"id":"PLN2_apiversion","cat":"PLN","question":"기존 클라이언트를 중단시키지 않고 제 공개 API의 버전을 관리해야 합니다. 계획이 무엇인가요?","A":"이미 의존하고 있는 클라이언트를 망가뜨리지 않고 공개 API를 발전시키기 위한 실전 검증된 계획입니다. 핵심 원칙은 다음과 같습니다: **대부분의 변경은 전혀 새로운 버전을 필요로 하지 않아야 합니다** — 버전 관리는 드문 호환성이 깨지는 변경(breaking change)을 위해 남겨두고, 호환성이 깨지는 변경은 옵트인(opt-in) 방식으로 만드십시오.\n\n## 1. 먼저, 변경 사항을 분류하십시오\n\n무언가를 버전 관리하기 전에, 어떤 종류의 변경을 하고 있는지 결정하십시오:\n\n**호환성이 깨지지 않는 (추가적인) 변경 — 버전 올릴 필요 없음:**\n- 새 엔드포인트 추가\n- *선택적* 요청 필드 추가\n- 응답에 새 필드 추가\n- 기존 enum에 새로운 선택적 값 추가 (*클라이언트가 알 수 없는 값을 허용하도록 문서화된 경우에만*)\n\n**호환성이 깨지는 변경 — 버전 관리 전략 필요:**\n- 필드/엔드포인트/파라미터 제거 또는 이름 변경\n- 필드의 타입 또는 의미 변경\n- 선택적 필드를 필수로 만들기\n- 기본 동작, 오류 코드, 또는 인증 변경\n- 이전에 통과했던 유효성 검사 강화\n\n황금률: **클라이언트는 인식하지 못하는 필드를 무시해야 합니다** (\"tolerant reader\"). 추가적인 변경이 호환성을 깨지 않도록 이 기대사항을 명시적으로 문서화하십시오.\n\n## 2. 버전이 위치할 곳을 선택하십시오\n\n| 전략 | 예시 | 참고 |\n|---|---|---|\n| **URI 경로** (공개 REST에 권장) | `/v1/orders`, `/v2/orders` | 가장 눈에 잘 띄고, 캐시 가능하며, 라우팅이 간단함. 업계 표준 (Stripe 스타일의 날짜 버전은 변형임). |\n| **헤더** | `Accept: application/vnd.api.v2+json` | URL은 더 깔끔하지만, 보이지 않고 클라이언트가 실수하기 쉬움. |\n| **쿼리 파라미터** | `?version=2` | 간단하지만 캐싱과 분석을 오염시킴. |\n\n공개 API의 경우, **URI 경로에 주 버전(major version)을 넣는 것**이 실용적인 기본값입니다. 개념적으로 **유의적 버전(semantic versioning)**을 사용하십시오: URL에는 오직 `vN` (주 버전)만 나타나고, 부 버전(minor)/패치(patch) 변경은 추가적이며 경로를 변경하지 않습니다.\n\nStripe/GitHub에서 사용하는 강력한 대안: 계정별 또는 요청 헤더별로 고정된 **날짜 기반 버전** (`2024-01-01`)을 사용하고, 서버 측 \"버전 변환\" 계층에서 이전 형태를 새로운 형태로 변환합니다. 강력하지만 구축하기 더 무거우며 — 규모가 클 때만 가치가 있습니다.\n\n## 3. 버전을 나란히 실행하십시오\n\n- `v2`를 배포할 때 `v1`을 완전히 운영 상태로 유지하십시오. 절대 갑자기 중단하지 마십시오.\n- 내부적으로는 전체 코드베이스를 포크(fork)하기보다 **하나의 구현**을 유지하고 가장자리(버전별 요청/응답 변환기)에서 적응하도록 노력하십시오 — 포크된 코드베이스는 썩고 동작이 달라집니다.\n- 버전이 없는 요청은 *가장 오래된 지원* 버전으로 기본 설정하거나 거부하고, 절대 \"최신\" 버전으로 설정하지 마십시오 — 클라이언트를 조용히 발전시키는 것 자체가 호환성을 깨는 변경입니다.\n\n## 4. 점진적으로 지원 중단하십시오 (이것이 사람들이 건너뛰는 부분입니다)\n\n1. 버전이 지원 중단되는 순간 변경 로그 + 이메일 + 문서에 **공지**하십시오.\n2. **인밴드(in-band)로 신호 보내기**: 이전 버전의 모든 응답에 `Deprecation: true` 및 `Sunset: <date>` HTTP 헤더([RFC 8594](https://www.rfc-editor.org/rfc/rfc8594))를 반환하십시오.\n3. **긴 기간을 제공하십시오** — 공개 API의 경우 6–12개월이 일반적입니다.\n4. **채택 모니터링**: 버전별 요청량을 추적하여 이전 버전을 제거하기 전에 누가 아직 사용하고 있는지 파악하십시오.\n5. **브라운아웃 테스트** (선택 사항): 지원 종료일이 가까워지면 짧은 시간 동안 이전 버전을 잠시 비활성화하여 뒤처진 사용자를 찾아내십시오.\n\n## 5. 지원 관행\n\n- **계약 우선 + 테스트**: 스키마(OpenAPI/JSON Schema, 또는 gRPC용 protobuf)를 고정하고, 게시된 버전에 호환성이 깨지는 변경이 발생하면 빌드를 실패시키는 **CI에서의 계약/호환성 테스트**를 실행하십시오. 이것이 실제로 우발적인 파손을 방지하는 방법입니다.\n- 알려진 주요 소비자가 있는 경우 **소비자 주도 계약 테스트** (예: Pact)를 사용하십시오.\n- 버전별 **변경 로그 + 마이그레이션 가이드** — 구체적인 전/후 예시가 포함된 v1→v2 차이점.\n- 한 버전 내에서 위험한 롤아웃을 위한 **기능 플래그**.\n\n## 권장 기본값\n\n대부분의 공개 REST API의 경우:\n\n1. URI 경로 주 버전 관리 (`/v1`), 추가적인 변경은 버전을 올리지 않음.\n2. 클라이언트를 위해 문서화된 tolerant-reader 계약.\n3. 안전망으로서의 OpenAPI 명세 + CI 호환성 깨짐 린터 (예: `oasdiff`, Optic, 또는 Spectral).\n4. `Deprecation`/`Sunset` 헤더 + 6–12개월의 지원 중단 정책.\n5. 지원 종료 전 버전별 사용량 지표.\n\n---\n\n몇 가지 사항이 있다면 이 내용을 일반적인 것보다 더 구체적으로 만들 수 있습니다:\n\n- **API 스타일이 무엇입니까** — REST, GraphQL, 또는 gRPC? (GraphQL은 필드 수준의 `@deprecated`와 URL 버전 관리 *없음*을 통한 지속적인 진화를 선호하며, gRPC/protobuf는 자체적인 필드 번호 호환성 규칙이 있습니다.)\n- **여기에 코드베이스가 있습니까** 제가 살펴보고 특정 구현을 제안해 드릴까요? 이 디렉토리 (`/private/tmp`)는 저장소가 아니므로, 일반적으로 답변했습니다.\n\n이것을 귀하의 특정 스택을 위한 서면 마이그레이션 계획으로 만들거나, 버전 관리 라우팅/변환기 계층의 스캐폴드를 만들어 드릴까요?","B":"공개 API를 안전하게 버전 관리하는 것은 '기존 계약의 의미를 절대 바꾸지 말고, 추가만 하라'는 하나의 규칙과, 정말로 호환성을 깨야만 하는 드문 경우를 위한 전략으로 귀결됩니다. 제가 추천하는 계획은 다음과 같습니다.\n\n## 1. 버전 관리 체계 선택하기\n\n공개 HTTP API의 경우, **URL 경로 버전 관리**(`/v1/resource` → `/v2/resource`)를 기본으로 하세요. 가장 눈에 잘 띄고, 클라이언트가 고정하기 가장 쉬우며, 캐시하기 매우 쉽고, 로그에서 명확하게 보입니다. 주요 대안은 다음과 같습니다:\n\n- **헤더 / 미디어 타입 버전 관리** (`Accept: application/vnd.yourapi.v2+json`) — URL이 더 깔끔하고 더 \"RESTful\"하지만, 브라우저에서는 보이지 않고, 테스트하기 더 어려우며, 클라이언트 혼란의 잦은 원인이 됩니다. 수준 높은 사용자를 대상으로 할 때만 가치가 있습니다.\n- **쿼리 파라미터** (`?version=2`) — 쉽지만 캐시하기 지저분하고 잊어버리기 쉽습니다. 공개 API에서는 피하세요.\n\n어떤 것을 선택하든, **주요 버전은 호환성이 깨지는 변경(breaking change)에만 사용하세요.** 기능 추가 시에는 버전을 올리지 마세요.\n\n## 2. \"호환성이 깨지는 변경\"을 정확히 정의하고, 한 버전 내에서는 절대 하지 않기\n\n다음은 호환성이 깨지는 변경으로 취급하세요 (새로운 주요 버전이 필요합니다):\n\n- 필드, 엔드포인트, 또는 파라미터 제거 또는 이름 변경\n- 필드의 타입, 형식, 또는 단위 변경\n- 새로운 *필수* 요청 필드 추가\n- 유효성 검사 강화, 기본값 변경, 또는 오류 코드/의미 변경\n- 페이지네이션, 정렬, 또는 인증 동작 변경\n\n다음은 **호환성을 깨지 않는 변경**이며 한 버전 내에서 언제든지 허용됩니다:\n\n- 새로운 엔드포인트 추가\n- 새로운 *선택적* 요청 파라미터 추가 (안전한 기본값과 함께)\n- 응답에 새로운 필드 추가 — **클라이언트는 알 수 없는 필드를 허용해야 합니다** (문서에 계약으로 명시하세요)\n\n이러한 \"확장 후 축소\" 원칙을 따르면 대부분의 발전이 버전 업데이트 없이 일어날 수 있습니다.\n\n## 3. 여러 버전을 병렬로 실행하기\n\nv2가 필요해지더라도 v1은 계속 서비스하세요. 가장 깔끔한 구현은 두 버전을 모두 공유 코어로 라우팅하고, 가장자리(edge)에서 얇은 **변환 계층(translation layer)**을 적용하는 것입니다 (v1 요청 → 내부 모델 → v1 형태의 응답). 버전마다 전체 비즈니스 로직을 포크하는 것을 피하세요. 유지보수 부담이 폭발하는 지점입니다.\n\n## 4. 필요해지기 *전에* 문서화된 지원 중단(deprecation) 및 서비스 종료(sunset) 정책 갖추기\n\n- 지원 기간을 공표하세요 (예: 각 주요 버전은 후속 버전 출시 후 최소 12개월 이상 지원).\n- 이전 버전에 `Deprecation` 및 `Sunset` HTTP 응답 헤더(RFC 8594)를 내보내 클라이언트가 프로그래밍 방식으로 경고를 받도록 하세요.\n- 변경 로그, 등록된 API 사용자에게 이메일, 대시보드 경고를 통해 소통하세요. 어떤 클라이언트가 여전히 v1을 호출하는지 (API 키로) 추적하여 누가 영향을 받을지 파악하고 직접 연락할 수 있도록 하세요.\n\n## 5. 계약을 강제 가능하게 만들기\n\n- **OpenAPI/spec**을 진실의 원천(source of truth)으로 유지하고, CI에서 **계약 테스트**를 실행하여 배포된 버전에 하위 호환되지 않는 변경이 있을 경우 빌드가 실패하도록 하세요.\n- \"v1이 무엇을 약속했는지\" 감사할 수 있도록 스펙을 코드와 함께 버전 관리하세요.\n\n---\n\n이 계획이 갈라지는 한 지점은 API 스타일입니다 — 위 내용은 REST/HTTP를 가정합니다. 만약 **GraphQL**을 사용한다면, 관용적인 방법이 다릅니다 (일반적으로 버전을 관리하지 *않고*, 필드를 추가하고 필드 수준의 지원 중단을 위해 `@deprecated` 지시어를 사용합니다). 그리고 **gRPC/protobuf**는 자체적인 추가 호환성 규칙이 있습니다 (필드 번호를 절대 재사용하지 않고, 필드를 추가만 합니다). 어떤 스택을 사용하고 있는지 — 그리고 이미 v1을 서비스하고 있는지 — 알려주시면, 당신의 경우에 맞춰 이를 구체적인 단계로 만들어 드릴 수 있습니다."},{"item":35,"id":"PLN_ratelimit","cat":"PLN","question":"제 공개 API에 속도 제한을 추가하고 싶습니다. 계획이 어떻게 되나요?","A":"문제없습니다 — public API가 어디에 있는지(경로나 repo) 편하게 말씀해주시면, 제가 rate-limiting 계획을 제안하기 전에 실제 스택을 읽어보겠습니다. 지금으로서는 `fable-profile`에 인바운드 요청을 받는 것이 아무것도 없기 때문에 추측만 할 뿐입니다.","B":"답변은 안 하셔도 됩니다 — 실행에 옮길 수 있는 구체적인 계획을 드릴 것이며, 실제 API 코드를 알려주시면 그 계획을 더 구체화하겠습니다.\n\n이 리포지토리에는 공개 API가 없으므로, **공개 API에 속도 제한을 추가하기 위한 프레임워크에 구애받지 않는 계획**을 알려드립니다. 각 단계가 다음 단계의 위험을 줄이도록 순서대로 구성되어 있습니다.\n\n## 1. 메커니즘보다 정책을 먼저 결정하기\n- **제한 차원:** API 키별, IP별, 사용자별 또는 라우트별. 공개 API는 보통 *인증된 사용자는 키별* + *익명 사용자는 IP별* 제한이 필요합니다 (한 명의 악용자가 공유된 익명 풀을 고갈시킬 수 없도록).\n- **알고리즘:** **토큰 버킷**(버스트(bursts)를 허용하고, 부드럽게 리필됨)이 공개 API의 올바른 기본값입니다. 고정 윈도우(Fixed-window)는 가장 간단하지만 경계에서 이중 버스트(double-burst-at-boundary) 문제가 있습니다. 슬라이딩 윈도우 로그(sliding-window-log)는 정확하지만 메모리 소모가 큽니다. 특별한 이유가 없다면 토큰 버킷을 선택하십시오.\n- **등급(Tiers):** 예: 익명 60 req/min, 무료 키 600/min, 유료 6000/min. 숫자는 코드가 아닌 설정(config)으로 만드십시오.\n\n## 2. 위치 선택하기\n- **엣지/게이트웨이** (Cloudflare, API Gateway, Nginx `limit_req`, Kong) — 가장 저렴하며, 트래픽이 앱에 도달하기 전에 차단합니다. 최고의 첫 번째 방어선입니다.\n- **앱 미들웨어** — 엣지에서 볼 수 없는 사용자별/요금제별 로직에 필요합니다.\n- 대부분의 실제 설정은 **둘 다** 사용합니다: 엣지에서 대략적인(coarse) 제한을, 앱 내에서 세분화된(fine-grained) 제한을 적용합니다.\n\n## 3. 카운터 저장소 선택하기\n- **단일 인스턴스:** 인메모리(in-memory)로 충분합니다.\n- **다중 인스턴스 / 서버리스:** **공유 저장소**가 필요합니다 — Redis가 표준입니다 (원자적인 `INCR`+`EXPIRE` 또는 동시성 환경에서의 정확성을 위한 Lua 토큰 버킷 스크립트). 로드 밸런서 뒤에서 프로세스별 메모리를 사용하지 마십시오. 제한이 N배만큼 느슨해질 것입니다.\n\n## 4. 제한기(limiter) 구현하기\n- 직접 만드는 것보다 검증된 라이브러리를 사용하십시오: `express-rate-limit`+`rate-limit-redis` (Node), `slowapi`/`limits` (FastAPI/Flask), `Bucket4j` (JVM), `tower-governor` (Rust), 또는 `golang.org/x/time/rate` + Redis (Go).\n- 저장소가 다운되었을 때 제한기가 **fail-open**되도록 만드십시오 (Redis가 잠시 중단되었다고 전체 API를 오프라인으로 만들지 마십시오) — 단, 로그는 명확하게 남기십시오.\n\n## 5. 거부를 정확하고 친절하게 만들기\n- `Retry-After`와 함께 **HTTP 429**를 반환하십시오.\n- 모든 응답에 표준 헤더를 포함하십시오: `RateLimit-Limit`, `RateLimit-Remaining`, `RateLimit-Reset` (IETF 초안 명명법).\n- 헬스 체크(health check)와 내부 트래픽은 제외하십시오.\n\n## 6. 강화하기 전에 관찰하기\n- 메트릭을 발행하십시오: 키/라우트별로 허용된 요청 대 스로틀된(throttled) 요청. **먼저 로그 전용 / 섀도우 모드로 실행하여** 제한이 적용되기 전에 무엇을 거부*할지* 확인하십시오 — 첫날부터 실제 고객을 스로틀링하여 자신에게 호출(paging)이 오게 되는 상황을 피할 수 있습니다.\n\n## 7. 테스트하기\n- 단위 테스트: 버킷 리필 계산, 경계 조건.\n- 통합 테스트: 여러 앱 인스턴스에 걸친 동시 요청이 *공유된* 제한에 도달하는지 확인합니다 (인메모리 버그가 숨어있는 지점입니다).\n- 부하 테스트를 통해 제한기 자체가 병목이 아닌지 확인합니다.\n\n---\n\n이것을 실제 파일 수준의 계획으로 바꾸려면 API 코드베이스가 필요합니다 — **리포지토리/경로를 알려주십시오** (`/Users/elon/work/fable-profile` 아래에는 없습니다). 그러면 제가 프레임워크, 라우팅, 배포 대상을 검토한 후 정확한 파일과 코드를 드리겠습니다. 만약 대신 *이* 리포지토리의 **아웃바운드** Anthropic 호출을 스로틀링하는 것(오케스트레이션 429-페이싱 로직)을 의미하셨다면, 그렇게 말씀해주시면 그것에 대한 계획을 세우겠습니다 — 그것은 다른 문제입니다."},{"item":36,"id":"REV_money","cat":"REV","question":"이것에 무슨 문제라도 있나요?\n\n`function total(items) { return items.reduce((s, i) => s + i.priceFloat, 0); }`","A":"네 — 주된 문제는 **돈에 부동소수점 연산을 사용하는 것**입니다.\n\n필드명 `priceFloat`는 이것이 가격임을 강력하게 시사하며, IEEE-754 부동소수점은 대부분의 십진 소수를 정확하게 표현할 수 없으므로, 합계에 반올림 오차가 누적됩니다:\n\n```js\n0.1 + 0.2          // => 0.30000000000000004\n[10.10, 20.20, 5.30].reduce((s,p)=>s+p, 0)  // => 35.599999999999994\n```\n\n많은 항목에 걸쳐 이것이 틀어지고 정산되지 않는 센트가 발생하게 됩니다.\n\n**해결책:** 정수 최소 단위(센트)로 돈 계산을 하고, 출력 시점에 형식을 맞추십시오:\n\n```js\nfunction total(items) {\n  return items.reduce((s, i) => s + Math.round(i.priceFloat * 100), 0); // total in cents\n}\n```\n\n혹은, 더 좋게는, 소스에서부터 가격을 정수 센트로 저장하거나(`* 100` 왕복을 완전히 피함) 십진수 라이브러리(`decimal.js`, `dinero.js`)를 사용하십시오.\n\n부차적인, 낮은 우선순위의 우려 사항:\n- **잘못된 데이터에 대한 보호 부재** — 만약 `i.priceFloat` 중 하나라도 `undefined`나 `NaN`이면, 결과는 조용히 `NaN`이 됩니다. 입력을 신뢰할 수 없는 경우 `s + (Number(i.priceFloat) || 0)`를 고려하십시오.\n- **`items`가 null/undefined일 경우 예외 발생** — 호출하는 쪽에서 그것이 가능하다면 기본값(`items = []`)을 추가하십시오.\n\n빈 배열은 괜찮습니다(`0`을 반환합니다). 부동소수점 문제가 바로 실제 프로덕션에서 발목을 잡을 문제입니다.","B":"`priceFloat`라는 이름에서 알 수 있듯 돈을 다루는 데 부동소수점 연산을 사용하는 것이 주된 문제입니다. 부동소수점을 합산하면 반올림 오차가 누적됩니다 — `0.1 + 0.2`는 `0.30000000000000004`이며, 많은 항목에 걸쳐 이 오차들이 복합적으로 작용하여 총합이 1센트 이상 차이 나게 됩니다. 통화의 경우 정수 형태의 보조 단위(센트)나 십진수 타입을 사용하고, 표시할 때 형식을 지정해야 합니다.\n\n두 가지 부차적인 문제가 있으며, 둘 다 입력값을 얼마나 신뢰할 수 있는지에 따라 달라집니다:\n\n- 항목에 `priceFloat`가 누락되었거나(`\"9.99\"`와 같은 문자열일 경우), 예외를 발생시키지 않고 결과가 조용히 `NaN`이 됩니다 — 경계에서 유효성 검사가 이루어지지 않습니다.\n- `items`가 `null`이나 `undefined`이면, TypeError를 던집니다. 호출자가 배열을 보장한다면 괜찮지만, 외부 경계라면 보호 로직을 넣을 가치가 있습니다.\n\n빈 배열의 경우는 괜찮습니다 — `0`을 초기값으로 한 `reduce`는 `0`을 반환합니다.\n\n만약 이것들이 정말로 변경할 수 없는 부동소수점이라면, 일반적인 해결책은 센트 단위로 합산하는 것입니다: `Math.round(items.reduce((s, i) => s + i.priceFloat * 100, 0))`, 그런 다음 표시를 위해 나눕니다. 수정 사항을 적용해 드릴까요, 아니면 그냥 온전성 검사를 하고 계셨나요?"},{"item":37,"id":"PLN_ts","cat":"PLN","question":"3만 줄짜리 JS 코드베이스를 TypeScript로 점진적으로 마이그레이션하고 싶습니다. 계획은 무엇인가요?","A":"여기 실전에서 검증된 점진적 경로가 있습니다. 핵심 아이디어는 이렇습니다: 먼저 TypeScript *툴링*을 갖춰 아무것도 깨지지 않게 한 다음, 퇴보를 방지하는 엄격성 래칫(ratchet)을 걸고 파일 단위로 변환하는 것입니다. 빅뱅 방식의 재작성은 절대 필요하지 않습니다.\n\n## 0단계 — 툴링 도입, 변환 없음\n\nTypeScript를 추가하되 기존의 모든 `.js` 파일은 그대로 작동하도록 유지합니다.\n\n- `typescript`를 설치하고 `allowJs: true`, `checkJs: false`, 그리고 **느슨한** 엄격성(`strict: false`, `noImplicitAny: false`)을 가진 `tsconfig.json`을 추가합니다. 이렇게 하면 `.ts`와 `.js`가 공존하며 서로를 임포트할 수 있습니다.\n- **타입 검사와 트랜스파일링을 분리하세요.** 빌드에는 기존 번들러(esbuild/swc/Babel)를 사용하세요 — 이들은 타입을 빠르게 제거하지만 타입 검사는 *하지 않습니다*. `tsc --noEmit`은 순수 타입 검사기로만 실행하세요. 번들러가 없다면 `tsc`가 결과물을 생성할 수 있지만, 3만 줄 규모에서는 타입만 제거하는 트랜스파일러가 훨씬 빠릅니다.\n- `tsc --noEmit`을 CI에 연결하여 첫날부터 통과(green)되도록 하세요 (아직 아무것도 검사하지 않으므로 통과될 것입니다). 이것이 나중에 조여나갈 관문입니다.\n\n## 1단계 — 의존성 순서에 따라, 리프(leaf)부터 변환\n\n내부 임포트가 가장 적은 파일부터 시작하여 `.js` → `.ts`로 이름을 바꿉니다: 상수, 순수 유틸리티, 그다음 공유 타입, 그리고 그것들에 의존하는 모듈 순서로 진행합니다. 리프부터 작업하면 변환하는 각 파일이 이미 타입이 지정된 코드를 임포트하게 되므로, 모든 곳에서 `any`와 싸우는 대신 타입이 안쪽으로 흘러 들어오게 됩니다.\n\n- 이 정도 크기의 코드베이스라면, **`ts-migrate`(Airbnb의 도구)**를 사용하여 대량으로 파일명을 변경하고 `any`/`@ts-ignore` 스텁을 자동 삽입하여 전체가 즉시 컴파일되도록 할 수 있습니다. 그런 다음 스텁을 점진적으로 교체합니다. 모든 것을 빠르게 `.ts`로 만들고 싶다면 좋은 방법이고, 신중하게 변환하고 싶다면 건너뛰세요.\n- 의존성을 위해 `@types/*` 패키지를 추가하세요. 타입이 없는 서드파티 모듈의 경우, `globals.d.ts`에 `declare module 'foo';`를 추가하여 막힌 부분을 풀고 나중에 더 엄격하게 관리하세요.\n- PR당 하나의 모듈만 변환하세요. 작은 PR은 리뷰를 온전하게 유지하고 타입 에러의 폭발 반경을 격리합니다.\n\n## 2단계 — 엄격성 조이기\n\n첫 시도에 `strict: true`를 목표로 하지 마세요 — 전체 프로젝트에 걸쳐 플래그를 한 번에 하나씩 켜고, 그 여파를 수정하고, 커밋하세요:\n\n1. `noImplicitAny` — 실제 시그니처를 강제합니다 (가장 가치 있는 플래그).\n2. `strictNullChecks` — 동작 정확성 측면에서 가장 큰 이득이며, 작업량도 가장 많습니다.\n3. 그다음 `strictFunctionTypes`, `noImplicitThis` 등을 켜고, 마지막으로 `strict: true`로 전환합니다.\n\n아직 변환하지 않은 JS 파일의 경우, 몇몇 파일 상단에 `// @ts-check`를 추가하고 **JSDoc**으로 타입을 지정하세요 — 파일명을 바꾸지 않고도 타입 검사를 할 수 있어, 건드리기 위험한 파일에 유용합니다.\n\n## 3단계 — 퇴보 방지\n\n타입이 없는 새 코드가 유입되면 마이그레이션은 실패하므로, 래칫을 구조적으로 만드세요:\n\n- 변환된 파일에 대해 `tsc --noEmit`이 클린 상태가 되면, 이를 **필수 CI 검사**로 만드세요. 이제부터는 리그레션을 차단합니다.\n- ESLint 규칙(`@typescript-eslint/no-explicit-any`)을 경고(warn) 수준으로 사용하고, 의도적인 임시 구멍을 위해 `type FixMe = any`와 같은 프로젝트 전역 별칭을 사용하세요 — `grep`으로 찾을 수 있으므로 나중에 제거해 나갈 수 있습니다.\n- 진행 상황 신호로 CI 출력에서 간단한 `.ts` 대 `.js` 파일 수를 추적하세요.\n\n**세부 사항을 바꾸는 두 가지 결정:** (1) 현재 빌드 설정 — 번들러, 순수 Node, 또는 Next/Vite와 같은 프레임워크 중 무엇을 쓰는지에 따라 트랜스파일 설정이 달라집니다; (2) 모든 것을 빠르게 `.ts`로 이름 변경(`ts-migrate`)할 것인지, 아니면 모듈별로 신중하게 변환할 것인지 여부.\n\n실제 리포지토리를 알려주시면, 추상적으로 남겨두는 대신 빌드 설정을 읽고 의존성 순서에 따라 `tsconfig.json`과 첫 변환 배치를 생성해 드리겠습니다.","B":"3만 줄을 한 번에 마이그레이션하는 것은 피해야 할 함정입니다. 점진적 방식의 핵심은 **TS와 JS가 전체 기간 동안 동일한 빌드에 공존하고**, 지속적으로 배포하며, 방치되어 썩어가는 \"빅뱅\" 브랜치를 절대 만들지 않는 것입니다. 여기 실전에서 검증된 계획이 있습니다.\n\n## 0단계 — 기반 다지기 (아직 동작은 변경하지 마세요)\n\n1. JS와 함께 툴체인을 추가하고, 아무것도 변환하지 마세요:\n   ```bash\n   npm i -D typescript @types/node   # + 런타임 의존성에 대한 @types\n   npx tsc --init\n   ```\n2. `tsconfig.json` 시작점 — 3만 줄의 JS가 터지지 않도록 **의도적으로 느슨하게** 설정합니다:\n   ```jsonc\n   {\n     \"compilerOptions\": {\n       \"allowJs\": true,          // JS와 TS가 함께 컴파일\n       \"checkJs\": false,         // 아직 JS는 타입 체크하지 않음\n       \"strict\": false,          // 나중에 점진적으로 올릴 것, 지금은 아님\n       \"noEmit\": true,           // 기존 번들러가 생성하도록 함; tsc는 체크만 함\n       \"esModuleInterop\": true,\n       \"skipLibCheck\": true,     // node_modules의 타입 에러 무시\n       \"target\": \"ES2020\",\n       \"moduleResolution\": \"bundler\" // 또는 \"node16\" — 런타임에 맞출 것\n     },\n     \"include\": [\"src/**/*\"]\n   }\n   ```\n   `allowJs`가 핵심입니다: `.ts` 파일이 `.js` 파일을 임포트할 수 있고 그 반대도 가능하므로, 아무런 조율 없이 한 번에 하나씩 파일을 마이그레이션할 수 있습니다.\n\n3. 누가 JS를 생성할지 결정하세요. 기존 번들러(Vite/esbuild/webpack/Babel)가 계속 트랜스파일을 하도록 유지하세요 — 타입 제거가 빠르고 타입 체크는 하지 않습니다. `tsc --noEmit`은 순수하게 타입 *검사기*로만 사용하세요. 마이그레이션 도중에 `tsc`를 번들러로 만들지 마세요.\n\n## 1단계 — CI에 가드레일 설치하기 (파일 변환 전에 하세요)\n\n아주 쉽게 통과될 **지금**, CI에 `tsc --noEmit`을 추가하세요. 이것이 퇴보를 막는 장치입니다: 변환하는 모든 파일은 영구적으로 타입 체크되고, 회귀가 발생하면 빌드가 실패합니다. 이것이 없으면, 마이그레이션된 파일들은 조용히 타입 없는 상태로 되돌아갑니다.\n\n## 2단계 — 의존성 순서로 변환하기 (리프 노드부터)\n\n순서가 중요합니다. **가장 많이 의존되면서, 의존성은 가장 적은 파일부터** 변환하세요 — 타입은 위에서 아래로 흐릅니다.\n\n1. **공유 타입 / 상수 / 유틸** — 순수 함수, 의존성 없음. 쉽게 이득을 볼 수 있고, 모든 사용자에게 타입을 무료로 제공합니다.\n2. **도메인 모델 / 데이터 레이어** — 핵심 `interface`/`type` 형태를 여기서 한 번 정의합니다.\n3. **비즈니스 로직**, 그 다음 마지막으로 **UI / 컨트롤러 / 진입점**.\n\n파일별 루프 (각각을 작고 리뷰하기 쉬운 PR로 유지):\n- `foo.js` → `foo.ts`로 이름 변경 (JSX가 있다면 `.tsx`).\n- `tsc --noEmit`이 표시하는 오류 수정.\n- 꼭 넘어가야 하는 곳에서는 `any` 대신 `unknown` 사용; **암묵적 `any` 금지**.\n- `@types`가 없는 외부/타입 미지정 의존성의 경우, `types/` 심(shim) 파일에 한 줄짜리 `declare module 'pkg';`를 작성하고 넘어가세요 — 깊이 파고들지 마세요.\n- 커밋. 배포. 반복.\n\n방어선을 지키기 위한 규칙:\n- **변환 PR에서는 동작 변경 금지.** 이름 변경 + 타이핑만 하세요. 버그를 발견하면 *별도의* PR에서 수정하여 리뷰를 간단하게 유지하고 `git blame`을 깨끗하게 유지하세요. (이는 저장소의 코드 보호 규칙과 일치합니다 — 작동하는 코드를 마이그레이션하면서 리팩터링하지 마세요.)\n- 피할 수 없는 임시방편에는 (`@ts-ignore`가 아닌) `// @ts-expect-error` 사용 — 근본적인 문제가 해결되면 빌드가 실패하므로, 저절로 정리됩니다.\n\n## 3단계 — 점진적으로 엄격함 높이기\n\n대부분의 파일이 `.ts`가 되면, 점진적으로 조이세요 — 각 플래그는 그 자체로 하나의 PR이므로 오류 수를 제한할 수 있습니다:\n1. `noImplicitAny: true` — 가장 큰 것; 타입 없는 함수 매개변수를 잡아냅니다.\n2. `strictNullChecks: true` — 보통 가장 가치가 높은 플래그이며, 작업량도 가장 많습니다.\n3. 그 다음 `strict`의 나머지 (또는 그냥 `\"strict\": true`로 바꾸고 갈아 넣으세요).\n4. 마지막으로 남은 `.js`에 대해 `checkJs: true`를 적용하고, 마지막 `.js`가 사라지면 `allowJs`를 제거하세요.\n\n선택적 가속기: **ts-migrate** (Airbnb) 또는 **TypeStat**은 대규모 배치를 부트스트랩하기 위해 첫 패스를 자동 주석 처리할 수 있습니다 — 하지만 그 결과물을 리뷰하세요; `any`에 의존하는 경향이 있습니다.\n\n## 추적 / 순서 정하기 방법\n\n- `madge`나 `dpdm`을 사용해 의존성 그래프를 얻고 진짜 리프 노드를 고르세요: `npx madge --json src/`.\n- 진행 상황을 \"`.ts` 파일 비율\" + \"활성화된 strict 플래그\"로 추적하세요 — 둘 다 가시적이고, 둘 다 한 방향으로만 진행됩니다.\n- 현실적인 속도: 3만 줄은 단거리 달리기가 아니라, 편안하게 몇 주간 백그라운드에서 할 작업입니다. 코드베이스는 모든 커밋에서 배포 가능하므로, 마감일 압박이 없습니다.\n\n---\n\n제가 기본값을 가정했던 부분에서, 세부 사항을 바꾸는 두 가지가 있습니다:\n\n- **기존 번들러를 유지하고 `tsc`는 검사용으로만 사용한다고 가정했습니다.** 번들러 없이 순수 `node`를 사용한다면, 가장 깔끔한 경로는 개발용으로 `tsx`/`ts-node` + 프로덕션용으로 `tsc` 생성, 또는 Node의 네이티브 타입 제거(Node 23+)입니다.\n- **`strict: true`가 최종 목표라고 가정했습니다.** 그래야 합니다 — 그 이하는 TS의 가치 대부분을 버리는 셈입니다 — 하지만 시간이 오래 걸리는 부분입니다.\n\n실제 코드베이스(빌드 설정, 모듈 시스템, 의존성 그래프)를 보고 이것을 실제 `tsconfig`와 함께 구체적인 파일별 순서로 만들어 드릴까요? 그렇다면, 저장소를 알려주세요 — 이 저장소(`fable-profile`)는 평가용 프로젝트 같고, 말씀하신 3만 줄짜리 JS 코드베이스는 아닌 것 같습니다."},{"item":38,"id":"EXP2_tls","cat":"EXP","question":"HTTPS/TLS가 실제로 어떻게 연결을 보호하는지 설명하라.","A":"HTTPS는 TLS 터널 안에서 실행되는 HTTP일 뿐이다. TLS는 세 가지를 보장한다 — **기밀성**(아무도 트래픽을 읽을 수 없음), **무결성**(아무도 탐지되지 않고 변조할 수 없음), **인증**(당신이 생각하는 바로 그 서버와 통신하고 있음). 실제로 이를 어떻게 달성하는지 설명하겠다.\n\n## 핵심 기법: 대칭 암호를 부트스트랩하기 위한 비대칭 암호\n\n대칭 암호화(AES)는 빠르지만 양측이 비밀 키를 공유해야 한다. 문제는 공격자가 감시하는 회선을 통해 어떻게 비밀 키에 합의하느냐이다. 그냥 보낼 수는 없다.\n\nTLS 핸드셰이크의 핵심은 바로 이 문제를 해결하는 것이다. 느린 비대칭 암호화를 *한 번* 사용하여 공유 대칭 키를 안전하게 설정한 다음, 실제 데이터에는 빠른 대칭 암호화를 사용한다. 두 방식의 장점을 모두 취하는 것이다.\n\n## 핸드셰이크 (TLS 1.3 — 현대적인 흐름)\n\n1.  **ClientHello** — 클라이언트는 지원하는 암호화 스위트, 임의의 논스, 그리고 중요하게는 자신의 **Diffie-Hellman 키 공유값**(임시 공개 값)을 보낸다. TLS 1.3은 왕복 시간을 절약하기 위해 키 교환 그룹을 미리 추측한다.\n\n2.  **ServerHello** — 서버는 암호화 스위트를 선택하고, 자신의 임의의 논스와 자신의 **DH 키 공유값**, 그리고 자신의 **인증서**와 **서명**을 보낸다.\n\n3.  **키 유도** — 이제 양측은 각자의 개인 DH 값과 상대방의 공개 공유값을 결합한다. Diffie-Hellman의 수학적 원리에 따라 양측은 독립적으로 *동일한* 공유 비밀에 도달하지만, 두 공개 공유값만 본 도청자는 이를 계산할 수 없다. 이 공유 비밀로부터 양측은 대칭 세션 키를 유도한다(KDF, HKDF를 통해).\n\n4.  **Finished** — 양측은 전체 핸드셰이크 기록에 대한 MAC을 보내, 핸드셰이크가 중간에 변조되지 않았음을 증명한다.\n\n이후 — TLS 1.3에서는 한 번의 왕복으로 — 모든 것이 대칭 키로 암호화된다.\n\n## 각 보장이 어떻게 충족되는가\n\n**기밀성**은 Diffie-Hellman을 통해 유도된 대칭 세션 키에서 비롯된다. 애플리케이션 데이터는 AEAD 암호(예: AES-GCM 또는 ChaCha20-Poly1305)로 암호화된다.\n\n**무결성**은 동일한 AEAD 구조에서 비롯된다. AEAD는 *Authenticated Encryption with Associated Data*를 의미하며, 모든 암호화된 레코드는 인증 태그를 포함한다. 전송 중 단일 비트라도 뒤집히면 태그 확인이 실패하고 연결이 끊어진다. 이는 또한 재전송 및 재정렬 공격을 막는데, 레코드 시퀀스 번호가 태그에 포함되기 때문이다.\n\n**인증**은 사람들이 가장 오해하는 부분이다. DH 교환만으로는 *수동적인* 도청자는 막을 수 있지만, 양측과 각각 별도의 DH 교환을 수행할 수 있는 능동적인 **중간자 공격(man-in-the-middle)**은 막을 수 없다. 여기서 **인증서**가 등장한다:\n\n-   서버의 인증서는 공개 키와 도메인 이름을 포함하며, **인증 기관(CA)**에 의해 **서명**된다.\n-   당신의 OS/브라우저에는 신뢰할 수 있는 CA 루트 인증서 목록이 내장되어 있다.\n-   클라이언트는 **신뢰 사슬**을 검증한다: 서버 인증서 → 중간 CA → 신뢰 저장소의 루트 CA. 각 연결 고리의 서명, 만료일, 폐지 상태(OCSP/CRL)를 확인하고, 결정적으로 인증서의 도메인 이름이 당신이 입력한 URL과 일치하는지 확인한다.\n-   그런 다음 서버는 인증서의 공개 키에 해당하는 개인 키로 **핸드셰이크 기록에 서명**한다. 합법적인 키 소유자만이 그 서명을 생성할 수 있다. 이는 인증서의 신원을 *이 특정 핸드셰이크*에 결속시켜, 서버가 단순히 공개 인증서의 사본이 아니라 실제로 개인 키를 소유하고 있음을 증명한다.\n\nMITM은 대상 도메인에 대한 CA 서명 인증서를 가지고 있지 않기 때문에(그리고 도메인 소유권을 증명하지 않고는 얻을 수 없기 때문에) 이를 위조할 수 없다. 이것이 핵심이다: CA 시스템은 \"이 공개 키는 example.com에 속한다\"는 사실을 당신이 미리 신뢰하기로 결정한 신원에 고정시킨다.\n\n## 순방향 비밀성\n\nDH 키는 **임시적**(연결마다 새로 생성되고 폐기됨)이기 때문에, 서버의 장기 개인 키가 *나중에* 도난당하더라도 과거 트래픽을 기록한 공격자는 여전히 이를 해독할 수 없다 — 세션 키는 장기 키만으로는 결코 유도될 수 없었기 때문이다. 이것이 현대 TLS가 임시 키 교환(ECDHE)을 의무화하고 오래된 RSA 키 전송 모드를 폐기한 이유이다.\n\n## TLS가 보호하지 *않는* 것\n\n-   **메타데이터** — 목적지 IP, 그리고 SNI를 통한 도메인(Encrypted Client Hello / ECH가 사용되지 않는 한 서버 이름은 ClientHello에서 평문으로 전송됨), 트래픽 시간/양은 모두 볼 수 있다.\n-   **엔드포인트 침해** — TLS는 해킹된 서버나 클라이언트가 아닌 *전송 중인* 데이터를 보호한다.\n-   **신뢰의 오용** — 손상되거나 악의적인 CA가 사기성 인증서를 발급할 수 있다. 이를 위해 Certificate Transparency 로그 및 HSTS/피닝과 같은 완화 조치가 존재한다.\n\n---\n\n**한 문장 요약:** TLS는 인증서와 서명을 사용하여 서버를 인증하고, 도청자가 유도할 수 없는 공유 비밀에 합의하기 위해 임시 Diffie-Hellman 교환을 사용하며, 그 비밀로부터 키를 생성한 AEAD 대칭 암호를 사용하여 실제 HTTP 트래픽의 모든 바이트를 암호화하고 무결성을 보호한다.\n\n어떤 부분에 대해 더 깊이 들어갈까요 — 인증서 체인 검증, Diffie-Hellman 수학, 또는 TLS 1.3이 1.2와 어떻게 다른지?","B":"HTTPS는 TLS 터널 안에서 실행되는 HTTP일 뿐이다. TLS는 세 가지를 한 번에 보장한다 — **기밀성**(도청자는 암호문만 볼 수 있음), **무결성**(조작이 감지됨), 그리고 **인증**(URL에 명시된 서버와 실제로 통신하며, 사칭자가 아님). 실제로 이를 어떻게 전달하는지는 다음과 같다.\n\n## 핵심 기법: 대칭 암호를 부트스트랩하기 위한 비대칭 암호\n\n공개 키 암호화(RSA, 또는 오늘날 더 흔한 타원 곡선)는 느리지만, 두 낯선 이가 공개된 회선을 통해 비밀에 합의할 수 있게 해준다. 대칭 암호(AES, ChaCha20)는 빠르지만 양측이 이미 키를 공유하고 있어야 한다. TLS는 처음에 *한 번만* 느린 방법을 사용하여 공유 비밀을 설정한 다음, 실제 데이터 전송에는 빠른 방법으로 전환한다. 핸드셰이크가 이 역할을 하는 부분이다.\n\n## 핸드셰이크 (TLS 1.3, 최신 버전)\n\n1. **ClientHello** — 브라우저가 인사를 건네고, 지원하는 암호 스위트와 TLS 버전을 나열하며, (이것이 1.3의 속도 향상 부분) 즉시 자신의 **key-share**를 던진다: 임시 Diffie-Hellman 공개 값이다.\n\n2. **ServerHello** — 서버는 암호 스위트를 선택하고, *자신의* 임시 key-share를 돌려보내며, **인증서**와 서명을 포함한다. 두 개의 key-share로부터 양측은 Diffie-Hellman을 통해 독립적으로 동일한 공유 비밀을 계산한다 — 그리고 결정적으로, 그 비밀은 결코 회선을 통과하지 않는다. 모든 것을 기록하는 공격자도 이를 유추할 수 없다.\n\n3. **키 유도** — 양측은 공유 비밀을 키 유도 함수(HKDF)에 통과시켜 대칭 세션 키를 생성한다. 이 시점 이후의 모든 것은 AES/ChaCha20으로 암호화된다.\n\nTLS 1.3은 이를 **한 번의 왕복**(1-RTT)으로 끝내는데, TLS 1.2의 두 번과 대조된다. 또한 오래된 RSA 키 전송 모드를 완전히 폐기했는데, 이는 다음 지점에서 중요하다.\n\n## 각 보장이 유효한 이유\n\n**기밀성**은 결코 전송되지 않은 키를 사용하는 대칭 암호에서 비롯된다. 최신 TLS는 암호화와 인증을 한 번의 작업으로 수행하는 **AEAD** 암호(예: AES-GCM, ChaCha20-Poly1305)를 사용한다.\n\n**무결성**은 모든 레코드에 첨부된 AEAD 인증 태그에서 비롯된다. 전송 중 단일 비트라도 뒤집히면 태그 검증에 실패한다 — 연결은 손상되거나 주입된 데이터를 전달하는 대신 중단된다.\n\n**인증**은 사람들이 과소평가하는 부분이며, 중간자 공격을 막는 것이 바로 이것이다. Diffie-Hellman만으로는 *수동적인* 도청자로부터는 보호할 수 있지만, 중간에 위치하여 두 개의 별도 핸드셰이크를 수행하는 *능동적인* 공격자로부터는 보호할 수 없다. 인증서가 그 허점을 막는다:\n\n- 서버의 인증서에는 **인증 기관**(CA)이 서명한 공개 키와 도메인 이름이 포함되어 있다.\n- 브라우저/OS에는 신뢰할 수 있는 CA 공개 키의 **root store**가 내장되어 있다. 서버의 인증서에서부터 중간 CA를 거쳐 신뢰할 수 있는 루트까지 **chain**을 따라 올라가며 각 서명을 확인한다.\n- 인증서의 도메인이 URL과 일치하는지, 만료되지 않았는지, 그리고 폐지되지 않았는지(OCSP/CRL)를 검증한다.\n- 그런 다음 서버는 핸드셰이크 기록에 서명함으로써 **개인 키를 소유하고 있음을 증명한다**. MITM은 실제 인증서를 복사할 수는 있지만 개인 키 없이는 이 서명을 생성할 수 없으므로, 사칭은 바로 그 지점에서 실패한다.\n\n## 순방향 비밀성\n\nDiffie-Hellman 키는 **임시적**이어서 — 세션마다 새로 생성되고 폐기되므로 — *나중에* 서버의 장기 개인 키가 도난당하더라도, 과거 트래픽을 기록한 공격자는 여전히 이를 해독할 수 없다. 그 속성이 **순방향 비밀성**이며, 이것이 TLS 1.3이 임시 키 교환을 의무화한 이유이다.\n\n## 개념 모델\n\n인증서는 \"내가 누구와 통신하는가\"에 답하고, Diffie-Hellman은 \"어떻게 도청자를 피해 공유 비밀을 얻을 것인가\"에 답하며, 대칭 AEAD 암호는 \"어떻게 데이터를 비공개로 유지하고 조작 방지를 하면서 빠르게 이동시킬 것인가\"에 답한다. 핸드셰이크의 역할은 이들을 함께 연결하여, 실제 HTTP의 첫 바이트가 전송될 때쯤에는 세 가지 모두가 이미 확립되도록 하는 것이다.\n\n짚고 넘어갈 만한 흔한 오해 하나: HTTPS는 **전송 중인** 데이터만 보호한다. 서버가 데이터를 안전하게 저장하는지에 대해서는 아무것도 말해주지 않으며, *어떤* 사이트를 방문하는지도 숨기지 않는다 — 도메인은 DNS와 TLS SNI 필드를 통해 유출되고(Encrypted Client Hello가 사용되지 않는 한), 트래픽 크기/타이밍은 여전히 패턴을 드러낼 수 있다."},{"item":39,"id":"ACT_debounce","cat":"ACT","question":"`React`에서 검색 입력창을 디바운스해야 합니다. 가장 간단한 방법은 무엇인가요?","A":"가장 간단한 방법은 작은 `useDebounce` 훅입니다 — 이벤트 핸들러가 아닌 *값*을 디바운스하여, 리액트의 렌더링 모델과 잘 어우러지도록 합니다:\n\n```jsx\nimport { useState, useEffect } from \"react\";\n\nfunction useDebounce(value, delay = 300) {\n  const [debounced, setDebounced] = useState(value);\n\n  useEffect(() => {\n    const id = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(id); // 지연 시간 전에 값이 변경되면 취소\n  }, [value, delay]);\n\n  return debounced;\n}\n```\n\n이렇게 사용하세요:\n\n```jsx\nfunction Search() {\n  const [query, setQuery] = useState(\"\");\n  const debouncedQuery = useDebounce(query, 300);\n\n  useEffect(() => {\n    if (!debouncedQuery) return;\n    fetch(`/api/search?q=${encodeURIComponent(debouncedQuery)}`);\n  }, [debouncedQuery]);\n\n  return <input value={query} onChange={(e) => setQuery(e.target.value)} />;\n}\n```\n\n입력은 완전히 제어되고 반응성을 유지하지만(모든 키 입력에 업데이트됨), `debouncedQuery`는 사용자가 300ms 동안 멈춘 후에만 변경되므로, fetch는 모든 문자에 대해 실행되는 대신 한 번만 실행됩니다. 정리 함수는 각 키 입력 시 대기 중인 타이머를 취소하는데, 이것이 실제로 디바운스를 만들어냅니다.\n\n훅을 직접 작성하고 싶지 않다면, `usehooks-ts` 패키지의 `useDebounce`는 미리 패키징된 동일한 것입니다. 저는 이미 해당 의존성이 있는 경우에만 그것을 선택할 것입니다 — 단일 입력을 위해서는 위의 훅이 라이브러리를 추가하는 것보다 오버헤드가 적습니다.","B":"가장 간단한 접근법은 *value*를 디바운스하는 커스텀 훅을 만든 다음, 디바운스된 값에 반응하는 것입니다:\n\n```jsx\nimport { useState, useEffect } from \"react\";\n\nfunction useDebounce(value, delay = 300) {\n  const [debounced, setDebounced] = useState(value);\n\n  useEffect(() => {\n    const id = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(id); // cancel if value changes before delay\n  }, [value, delay]);\n\n  return debounced;\n}\n```\n\n다음과 같이 사용하세요:\n\n```jsx\nfunction Search() {\n  const [query, setQuery] = useState(\"\");\n  const debouncedQuery = useDebounce(query, 300);\n\n  useEffect(() => {\n    if (!debouncedQuery) return;\n    fetch(`/api/search?q=${encodeURIComponent(debouncedQuery)}`)\n      .then(/* ... */);\n  }, [debouncedQuery]);\n\n  return (\n    <input\n      value={query}\n      onChange={(e) => setQuery(e.target.value)}\n      placeholder=\"Search…\"\n    />\n  );\n}\n```\n\n**이것이 잘 작동하는 이유:** 입력은 완전히 제어되고 반응성을 유지하지만(모든 키 입력에 업데이트됨), `debouncedQuery`는 사용자가 300ms 동안 타이핑을 멈춘 후에만 변경됩니다. `clearTimeout` 정리가 실제 디바운싱을 수행합니다 — 각 키 입력은 보류 중인 타이머를 취소합니다.\n\n몇 가지 참고사항:\n- **300ms**는 검색에 좋은 기본값입니다; 150–250ms는 더 빠릿하게 느껴지고, 500ms는 API 부하에 더 보수적입니다.\n- 만약 **오래된 진행 중인 요청을 취소**하고 싶다면, 해당 effect에 `AbortController`를 추가하세요.\n- 직접 만드는 것을 선호하지 않나요? [`@mantine/hooks`](https://mantine.dev/hooks/use-debounced-value/)의 `useDebouncedValue`나 `use-debounce`의 `useDebounce`가 바로 이 역할을 합니다.\n\n`AbortController` 버전을 추가하거나 특정 데이터 페칭 설정(React Query, SWR 등)에 맞게 조정해 드릴까요?"},{"item":40,"id":"ACT_envvars","cat":"ACT","question":"Node에서 로컬 vs 프로덕션의 env vars를 다루는 가장 좋은 방법은 무엇인가요?","A":"요약하자면: **로컬에서는 `.env` 파일에서 로드하고, 프로덕션에서는 실제 환경 변수에서 읽고, 시작 시 모든 것을 검증하며, 코드 전체에 `process.env`를 흩어놓지 마세요.** 이를 자세히 살펴보겠습니다.\n\n## 1. 비밀은 커밋하지 말고, 템플릿은 커밋하세요\n```\n# .gitignore\n.env\n.env.*.local\n```\n```bash\n# .env.example  (커밋됨 — 필요한 것을 문서화, 실제 값 없음)\nDATABASE_URL=\nSTRIPE_KEY=\nPORT=3000\n```\n\n## 2. `.env`는 로컬에서만 로드 — 프로덕션은 플랫폼의 환경 변수 사용\n프로덕션(Heroku, Railway, ECS, k8s, Vercel 등)에서는 플랫폼에 실제 환경 변수를 설정합니다; `.env` 파일을 배포하지 않습니다. 따라서 로딩은 로컬에서만 신경 쓸 문제입니다.\n\n**Node 20.6+에는 이 기능이 내장되어 있어 — 더 이상 `dotenv`가 필요 없는 경우가 많습니다:**\n```jsonc\n// package.json\n\"scripts\": {\n  \"dev\": \"node --env-file=.env server.js\",\n  \"start\": \"node server.js\"   // prod: 변수는 환경에서 가져옴\n}\n```\n이전 버전의 Node를 사용하거나 조건부 로딩을 원한다면, `dotenv`는 여전히 유효합니다:\n```js\nif (process.env.NODE_ENV !== 'production') {\n  require('dotenv').config();\n}\n```\n\n## 3. 검증하고 중앙화하기 — 대부분의 사람들이 건너뛰는 부분입니다\n`process.env`를 정확히 **하나**의 모듈에서 읽고, 검증한 후, 타입이 지정된 config 객체를 내보내세요. 다른 모든 곳에서는 거기서 가져옵니다. 이렇게 하면 앱이 부팅 시점에 빠르게 실패하고(`STRIPE_KEY`가 필요한 코드 경로에서 새벽 2시에 실패하는 대신), 모든 곳에서 문자열 기반의 `process.env.X` 대신 자동 완성을 제공합니다.\n\n```js\n// config.js\nimport { z } from 'zod';\n\nconst schema = z.object({\n  NODE_ENV: z.enum(['development', 'production', 'test']).default('development'),\n  PORT: z.coerce.number().default(3000),\n  DATABASE_URL: z.string().url(),\n  STRIPE_KEY: z.string().min(1),\n});\n\nconst parsed = schema.safeParse(process.env);\nif (!parsed.success) {\n  console.error('❌ 잘못된 환경:', parsed.error.flatten().fieldErrors);\n  process.exit(1);\n}\n\nexport const config = parsed.data;\n```\n```js\n// 다른 모든 곳\nimport { config } from './config.js';\napp.listen(config.PORT);\n```\n(`envalid`는 환경 변수 전용 무언가를 원할 경우 zod의 인기 있는 대안입니다.)\n\n## 파일 레이아웃 규칙\n- `.env` — 로컬 기본값, gitignore 처리됨\n- `.env.local` — 개인 로컬 재정의, gitignore 처리됨\n- `.env.example` — 커밋된 템플릿\n- **prod** — 파일 없음; 민감한 값은 배포 플랫폼 / 시크릿 매니저(AWS Secrets Manager, Doppler, Vault)에서 변수 설정\n\n---\n\n**가장 중요한 단 하나의 규칙:** 환경은 코드 안의 거대한 `if (prod)` 구문을 통해서가 아니라, *배포 단위로* 선택하세요. 코드는 그냥 `config.DATABASE_URL`을 읽기만 해야 합니다 — 이것이 localhost를 가리킬지 프로덕션을 가리킬지는 전적으로 앱 외부에서 설정된 어떤 환경 변수가 있는지에 따라 결정됩니다.\n\n실제 프로젝트에 이 설정을 연결해 드릴까요? 현재 무엇을 사용하고 있는지(dotenv? config 모듈? Node 버전?) 확인하고 그에 맞춰 설정해 드릴 수 있습니다.","B":"요약하자면: 설정은 `process.env`에 보관하고, 로컬에서는 `.env` 파일에서 불러오며, 프로덕션에서는 플랫폼에 실제 환경 변수를 설정하고, 비밀값은 절대 커밋하지 마세요. `NODE_ENV`에 따라 분기하여 *어떤 비밀값을 사용할지* 결정하지 말고, 환경이 값을 제공하게 하여 코드를 어디서나 동일하게 유지하세요.\n\n구체적인 방법은 다음과 같습니다.\n\n**로컬에서 불러오기.** Node 20.6+부터는 내장 플래그가 있어서, 의존성이 전혀 필요 없는 경우가 많습니다:\n\n```bash\nnode --env-file=.env app.js\n```\n\n이전 버전의 Node를 지원하거나 계층화된 파일(`.env`, `.env.local`)을 원한다면, `dotenv`가 여전히 표준입니다:\n\n```js\nimport 'dotenv/config'; // 또는 require('dotenv').config()\n```\n\n**프로덕션에서는 `.env` 파일을 배포하지 마세요.** 앱을 실행하는 수단을 통해 실제 환경 변수를 설정하세요 — 호스트의 대시보드(Vercel/Render/Railway/Fly), `docker run -e` / compose `environment:`, 쿠버네티스 시크릿, systemd `Environment=`, 또는 CI/CD 비밀값 저장소 등. 앱은 `process.env`를 동일한 방식으로 읽고, 소스만 다를 뿐입니다. 이렇게 하면 프로덕션 비밀값이 파일 시스템과 git에서 벗어나게 됩니다.\n\n**Git 위생.** 협업자들이 무엇이 필요한지 알 수 있도록 *키*와 더미 값이 포함된 `.env.example` 파일을 커밋하고, 실제 파일들은 gitignore 처리하세요:\n\n```\n# .gitignore\n.env\n.env.local\n.env.*.local\n```\n\n**시작 시 검증하기.** 가장 흔한 프로덕션 장애는 요청 시점에 누락되거나 잘못된 형식의 변수가 발견되는 것입니다. 프로세스가 부팅될 때 한 번 파싱하고 검증하여, 문제가 있으면 즉시 큰 소리를 내며 충돌하게 하세요. `zod`나 `envalid` 둘 다 잘 작동합니다:\n\n```js\nimport { z } from 'zod';\n\nconst env = z.object({\n  DATABASE_URL: z.string().url(),\n  PORT: z.coerce.number().default(3000),\n  NODE_ENV: z.enum(['development', 'production', 'test']).default('development'),\n}).parse(process.env);\n\nexport default env; // process.env를 직접 건드리는 대신 어디서든 이것을 import 하세요\n```\n\n**피해야 할 몇 가지:** `if (NODE_ENV === 'production')`을 하드코딩하여 다른 자격 증명을 선택하지 마세요 — 대신 환경별로 올바른 값을 제공하여, 프로덕션과 로컬이 동일한 코드 경로를 실행하게 하세요. 코드베이스 전반에 흩어져 있는 `process.env`를 읽지 말고, 검증된 모듈 하나로 중앙화하세요. 그리고 `NODE_ENV`는 범용적인 \"내가 프로덕션 환경에 있는가\" 스위치가 아니라, *오직* 모드 플래그(프레임워크 최적화에 영향을 줌)로만 다루세요 — 더 세분화된 환경(스테이징, 프리뷰 등)이 필요하다면 `APP_ENV`와 같은 별도의 변수를 사용하세요.\n\n배포 대상을 알려주시면, 해당 플랫폼에 비밀값을 연결하는 정확한 방법을 알려드릴 수 있습니다."},{"item":41,"id":"DBG_500","cat":"DBG","question":"제 API가 요청 50번에 한 번꼴로 500을 반환하는데, 제가 볼 수 있는 패턴은 없습니다. 어디서부터 시작해야 할까요?","A":"오류를 관찰 가능하게 만드는 것부터 시작하라 — 지금 당장 \"패턴 없음\"은 거의 항상 패턴이 실제로는 있지만 그것이 존재하는 차원을 포착하지 못하고 있다는 의미다. 안정적인 비율(~2%)로 간헐적으로 발생하는 500 오류는 무작위인 경우가 드물다; 그것은 아직 볼 수 없는 특정 조건 하에서 발생하는 특정 원인 때문이다. 따라서 첫 단계는 원인을 추측하는 것이 아니라, 완전한 컨텍스트와 함께 하나의 실패를 포착하는 것이다.\n\n구체적으로, 첫 번째 조치는 다음과 같다:\n\n1.  **500 오류가 아닌 실제 예외를 기록하라.** 500 오류는 증상이다. 스택 트레이스, 예외 유형, 그리고 그것을 유발한 요청이 필요하다. 만약 오류 핸들러가 예외를 일반적인 500 오류로 뭉뚱그린다면, 그것부터 고쳐라 — 요청 ID를 붙이고, 전체 트레이스와 함께 입력(method, path, params, headers, 관련 있다면 user/tenant)을 기록하라. 실제 실패를 몇 개만 포착해도 \"패턴 없음\"은 보통 명백한 패턴으로 드러난다.\n\n실패하는 요청들을 볼 수 있게 되면, 무작위처럼 보이는 패턴이 어디에 숨어 있는지 확인하라:\n\n-   **하나의 문제 있는 인스턴스.** 로드 밸런서 뒤에서 N개의 복제본을 실행한다면, 하나의 불량 pod가 요청 수준의 패턴 없이 고정된 실패율을 만든다 — 불량 pod로 라운드 로빈되는 ~1/N을 제외한 모든 요청은 괜찮다. \"50개 중 1개\"는 의심스러울 정도로 안정적이다; 500 오류가 특정 host/pod/container와 상관관계가 있는지 확인하라. 이것이 \"안정적인 비율, 패턴 없음\"의 가장 흔한 단일 원인이다.\n-   **동시성 하에서의 리소스 고갈.** DB 커넥션 풀 최대치 도달, 파일 디스크립터, 스레드 풀 포화 상태. 간헐적인 이유는 동시성 부하가 잠시 한계를 초과할 때만 실패하기 때문이다. 풀 메트릭을 보고, 요청 형태가 아니더라도 오류가 시간상으로 군집하는지 확인하라.\n-   **불안정한 다운스트림.** 가끔 타임아웃되는 서드파티 API, DB, 또는 캐시. 트레이스가 그것을 바로 가리킬 것이다.\n-   **드문 입력.** 트래픽의 ~2%만이 전달하는 null/지나치게 큰/이상하게 인코딩된 필드. 포착된 요청 페이로드가 즉시 알려줄 것이다.\n-   **공유 가변 상태 / 경쟁 상태.** 인터리빙 상태에서만 발생하는 실패 — 이것들은 관련 없는 요청들 전반에 걸쳐 동일한 라인이 비논리적으로 실패하는 것으로 나타난다.\n\n트레이스를 확보한 후 가장 빠른 명확화 방법: 실패를 **host**별, **시간**별, 그리고 **예외 유형**별로 그룹화하라. 어느 차원에서 군집이 형성되든 그것이 범주를 알려준다.\n\n당신의 스택(언어/프레임워크, 단일 인스턴스 vs. 다중, 다운스트림에 무엇이 있는지)과 실제 스택 트레이스 하나를 공유해주면, 범주가 아닌 특정 원인을 짚어줄 수 있다.","B":"\"패턴이 없는\" 간헐적인 500 오류는 거의 항상 아직 분석하지 않은 차원에 패턴이 있다는 것을 의미합니다. 제가 시작할 순서는 다음과 같습니다:\n\n## 1. 실제 예외부터 파악하라 — 아직 추측하지 마라\n500 오류는 처리되지 않은 서버 측 오류이므로, 어딘가에 스택 트레이스가 있습니다. 그것을 확보하기 전까지 이후의 모든 과정은 추측일 뿐입니다.\n- 오류 추적기(Sentry/Datadog/CloudWatch/etc.)를 확인하십시오. **스택 트레이스별로 그룹화**하십시오 — 실패하는 트래픽의 2%는 보통 한두 개의 뚜렷한 예외로 축약됩니다.\n- 오류 추적이 없습니까? 요청별로 요청 ID, 라우트, 예외 + 스택, 그리고 이루어진 업스트림 호출을 캡처하는 구조화된 로깅을 추가하십시오. 오류가 발생하는 *현장을 포착해야* 합니다.\n\n## 2. '패턴 없음'을 패턴으로 바꿔라 — 실패를 분석하라\n실패한 요청들을 가져와 각 차원별로 독립적으로 그룹화하십시오. 이 중 하나에서 거의 항상 원인이 드러납니다:\n\n| 차원 | 가리키는 것 |\n|---|---|\n| **호스트 / 인스턴스 / 파드** | LB 뒤의 불량 노드 하나. 인스턴스가 약 50개 있고 그중 하나가 고장 났다면, 이는 *정확히* 50분의 1입니다. 전형적인 경우입니다. |\n| **엔드포인트 / 라우트** | 전체 API가 아닌 특정 코드 경로 |\n| **사용자 / 계정 / 입력 형태** | 데이터에 의존하는 경로 (null 필드, 과도한 크기의 페이로드, 약 2%의 요청에서 나타나는 특이한 값) |\n| **시간 / 동시성** | 리소스 고갈 — 아래 참조 |\n| **업스트림 호출** | 불안정한 의존성 (DB, 캐시, 서드파티) |\n\n약 2%의 비율을 고려할 때 호스트 차원이 가장 가치 있는 확인 항목입니다 — 그곳을 먼저 보십시오.\n\n## 3. 꾸준히 낮은 비율로 발생하는 오류의 일반적인 원인들\n- **부하 시 리소스 고갈** — DB 커넥션 풀 초과, 파일 디스크립터, 메모리, 스레드 풀. 최대 동시성 상태에서만 한계를 넘기 때문에 간헐적으로 실패합니다. 요청 내용이 *아닌* 트래픽과 상관관계가 있습니다.\n- **경쟁 상태** — 특정 인터리빙 하에서만 깨집니다; 본질적으로 \"무작위\"입니다.\n- **다운스트림 타임아웃/불안정성** — 간혹 설정된 타임아웃을 초과하는 의존성.\n- **롤링 배포 / 혼합된 버전** — 일정 시간 동안 이전 코드와 새 코드가 함께 서비스됨.\n\n## 제가 제안하는 첫 두 단계\n1. 500 오류에 대해 그룹화된 스택 트레이스를 가져오십시오.\n2. 지난 하루 동안의 500 오류 발생률을 **호스트/인스턴스별로** 그려보십시오.\n\n스택 트레이스, 영향받는 라우트, 또는 사용 중인 스택(언어/프레임워크, DB, 배포 설정)을 공유해주시면, 제가 빠르게 구체적인 원인을 파악할 수 있습니다 — 그리고 만약 API 코드가 이 머신에 있다면, 알려주십시오. 제가 직접 파고들겠습니다."},{"item":42,"id":"PLN_uploads","cat":"PLN","question":"제 Express 앱에 파일 업로드를 추가해야 합니다. 계획이 어떻게 되나요?","A":"계획을 세우기 전에 확인해 보았는데, 더 진행하기 전에 한 가지 짚고 넘어가고 싶은 것이 있습니다:\n\n**이 디렉터리에는 Express 앱이 없습니다.** 이 리포지토리(`/Users/elon/work/fable-profile`)는 `fablever`입니다 — 의존성이 없는 Claude Code 행동 프로파일 도구입니다. 두 `package.json` 파일 모두 `\"dependencies\": {}`를 선언하고 있고, 어디에도 `express`가 없으며, 여기에 있는 유일한 JS는 MCP 서버 / 오케스트레이션 도구입니다. 따라서 저는 여기에 없는 코드를 대상으로 파일 업로드 계획을 작성하게 될 것입니다.\n\n몇 가지 가능성이 있습니다:\n\n- **Express 앱이 다른 디렉터리에 있습니다.** 해당 경로(예: `~/work/<your-app>`)를 알려주시면 실제 라우팅/미들웨어 설정을 읽고 그에 맞춰 계획을 세우겠습니다 — multer 대 busboy, 디스크 대 S3/객체 스토리지, 기존 앱에 업로드 라우트가 들어갈 위치, 유효성 검사/제한 등.\n- **잘못된 작업 디렉터리에 있습니다.** 다른 프로젝트에서 작업하려던 것이라면, 그곳으로 `cd`하거나 경로를 알려주세요.\n- **여기에 새로운 Express 앱을 스캐폴딩하기를 원하십니다.** 가능하지만, 이 리포지토리는 의도적으로 의존성이 없도록 만들어졌고 npm에 `fablever`로 게시되어 있으므로, 여기에 Express + multer를 추가하면 그 성격이 바뀔 것입니다 — 그것이 의도한 바임을 명시적으로 확인하지 않는 한 그렇게 하지 않겠습니다.\n\n어느 쪽입니까? 앱이 실제로 어디에 있는지 알게 되면, 그것을 읽고 일반적인 상용구 코드 대신 구체적이고 근거 있는 계획을 드릴 수 있습니다.\n\n어느 쪽이든 필요한 설계 질문이 하나 있는데, 불필요한 소통을 줄이기 위해 지금 답해주실 수 있습니다: **업로드된 파일은 어디에 저장되어야 합니까 — 로컬 디스크, 아니면 클라우드 객체 스토리지(S3/GCS/R2)?** 이 선택이 나머지 계획의 대부분을 결정합니다.","B":"이 디렉터리에는 Express 앱이 없습니다. 그래서 아직 실제 코드에 기반한 계획을 세울 수 없습니다. 현재 리포지토리(`/Users/elon/work/fable-profile`)는 `fablever`입니다 — Claude 프로필 / 평가-비교 프로젝트(READMEs, `profiles/`, `eval/`, `mcp/`, `whitepaper/`)입니다. \"express\"를 언급하는 유일한 두 파일은 서버가 아닌 평가 테스트 픽스처(`eval/comparison/tasks/coding*/build-fixtures.mjs`)입니다.\n\n따라서 제가 무언가를 스케치하기 전에, Express 앱은 어디에 있습니까? 몇 가지 옵션이 있습니다:\n\n- **이 머신에 있는 다른 리포지토리인 경우** — 경로를 알려주시거나 (또는 그곳으로 `cd` 하시면) 제가 라우트 구조, 스토리지 설정, 기존 미들웨어를 읽고, 거기에 맞는 계획을 제시하겠습니다.\n- **일반적인 계획을 원하시는 경우** — 특정 코드베이스와 무관한 새로운 업로드 엔드포인트에 대한 계획을 원하시면 그렇게 말씀해주시면 제가 표준적인 접근 방식(멀티파트 파싱을 위한 multer, 디스크 대 메모리 대 S3로 직접 스트리밍, 크기/유형/개수 제한, 파일명 새니타이제이션, 인증, 그리고 유효성 검사가 실제로 위치해야 할 곳)을 설명해 드리겠습니다.\n\n제가 그냥 일반적인 버전을 제시하지 않는 이유는 다음과 같습니다: 실제 계획은 제가 추측해야만 하는 것들 — 어떤 스토리지를 목표로 하는지 (로컬 디스크, S3/GCS, CDN), 업로드가 인증되는지, 예상 파일 크기와 스트리밍이 필요한지, 그리고 기존 미들웨어/오류 처리 관례가 어떤지 등 — 에 따라 달라지기 때문입니다. 코드를 알려주시면 계획이 상용구 대신 구체화됩니다.\n\n둘 중 어느 것을 원하십니까?"},{"item":43,"id":"DEC2_deploy","cat":"DEC","question":"사이드 프로젝트를 일반 VPS에 배포해야 할까요, 아니면 Render/Fly 같은 플랫폼에 배포해야 할까요?","A":"사이드 프로젝트라면, Render나 Fly 같은 플랫폼을 기본으로 사용하라. 희소한 자원은 당신의 관심사이며, 플랫폼은 VPS가 소모할 거의 모든 운영 시간을 되사준다: git-push 배포, 자동 HTTPS, 관리형 Postgres, 로그 스트리밍, 그리고 OS 패치나 방화벽 관리가 전혀 필요 없다. 서버 대신 프로젝트에 저녁 시간을 쓸 수 있게 된다.\n\n일반 VPS(Hetzner, DigitalOcean 등)는 다음 중 하나가 당신에게 실제로 해당될 경우에만 선택하라:\n\n- **운영(ops)을 배우고 싶다.** 자신만의 장비를 운영하는 것은 Linux, nginx/Caddy, systemd, TLS를 실제로 이해하는 가장 좋은 방법이다. 그것이 목표라면, 시간 비용이 핵심이 된다.\n- **여러 서비스를 운영하며 고정된 저렴한 요금을 원한다.** 월 €5–6짜리 Hetzner 장비는 몇 개의 작은 앱을 호스팅할 수 있다. 플랫폼 가격은 0일 때는 훌륭하지만, 상시 가동 서비스나 데이터베이스가 여러 개가 되면 슬금슬금 올라간다.\n- **플랫폼이 어색하게 만드는 무언가가 필요하다** — 장기 실행 백그라운드 워커, 영구 로컬 디스크, OS 수준의 cron, 특이한 네트워킹, 또는 GPU.\n\n실제 비용 측면은 이렇다: 플랫폼은 아주 작은 규모에서는 가장 저렴하고(유휴 무료 티어의 콜드 스타트를 제외하면 종종 무료), VPS는 예측 가능한 상시 가동 비용에서 이긴다. 어느 쪽의 차이도 사이드 프로젝트 예산에 영향을 줄 만큼 크지 않다 — 그러니 돈이 아니라 시간과 통제권을 기준으로 결정하라.\n\n나의 구체적인 선택은 이렇다: Fly나 Render에서 시작하고, 결과물을 출시한 뒤, 실제 한계에 부딪히거나 특별히 시스템 관리자(sysadmin) 실습을 원할 경우에만 VPS로 넘어가라. 프로젝트가 시작되기도 전에 인프라와 싸우다 추진력을 잃는 것보다, 플랫폼이 작아져서 VPS로 내려가는 것이 훨씬 쉽다.\n\n스택(웹 앱? 워커? 데이터베이스? 예상 트래픽?)을 알려주면, 특정 제공업체와 등급으로 좁혀주겠다.","B":"사이드 프로젝트의 경우, 서버 관리를 특별히 배우고 싶은 게 아니라면 **Render/Fly/Railway** 같은 플랫폼을 기본으로 선택하라. 이유는 간단하다: 사이드 프로젝트에서 가장 부족한 자원은 당신의 시간과 의욕이며, PaaS는 그 추진력을 갉아먹는 거의 모든 운영 작업을 없애주기 때문이다.\n\n실제 장단점은 다음과 같다:\n\n**플랫폼 (Render / Fly / Railway)**\n- `git push` → 배포됨. 관리형 TLS, 빌드, 상태 확인, 롤백, 로그가 기본 제공된다.\n- 관리형 Postgres/Redis 애드온 — 데이터베이스를 돌볼 필요가 없다.\n- 단점: 스케일이 커지면 비용이 증가하고, 무료 티어는 콜드 스타트(휴면 상태의 앱이 깨어나는 데 몇 초 걸림)가 있으며, 플랫폼의 제약 안에 갇히게 된다.\n- Fly는 '좋은 툴을 갖춘 VPS'에 더 가깝고(실제 VM을 얻고 무엇이든 실행할 수 있음), Render/Railway는 더 손이 덜 가지만 더 독자적인 방식을 따른다.\n\n**일반 VPS (Hetzner / DigitalOcean / Linode)**\n- 단연코 가장 저렴함 — 월 $5–8짜리 Hetzner 서버 하나로 여러 사이드 프로젝트를 동시에 돌릴 수 있다.\n- 완전한 제어권, 플랫폼 제한 없음, 스케일링에 따른 급격한 비용 증가 없음.\n- 단점: OS 업데이트, 방화벽, 리버스 프록시(Caddy/nginx), TLS 갱신, 배포 스크립트, 백업, 모니터링을 *당신이* 직접 책임져야 한다. 이것은 실제 반복적인 작업이며, 보안 패치는 절대 멈추지 않는다.\n\n**다음 중 하나라도 해당한다면 VPS를 선택하라**: Linux/ops를 배우고 싶거나, 하나의 서버에서 여러 프로젝트를 호스팅할 것이거나, 예산이 빠듯하거나, 특이한 워크로드(백그라운드 워커, GPU, 대용량 영구 디스크, 이상한 포트)가 있는 경우.\n\n**주로 결과물을 *실행*시키고 프로젝트 자체에 시간을 쓰고 싶다면 플랫폼을 선택하라** — 이는 사이드 프로젝트의 일반적인 경우다.\n\n현실적인 중간 경로: 빠르게 출시하기 위해 플랫폼에서 시작하고, 나중에 청구서나 플랫폼의 제약이 실제로 부담되기 시작할 **때에만** VPS로 이전하라. 컨테이너화된 앱을 나중에 마이그레이션하는 것은 비용이 적게 들지만, 초기에 추진력을 잃는 것은 그렇지 않다.\n\n사용하는 스택(그리고 데이터베이스, 백그라운드 잡, 웹소켓이 필요한지 여부)을 알려주면, 구체적인 추천과 대략적인 월 비용을 알려줄 수 있다."},{"item":44,"id":"EXP_cap","cat":"EXP","question":"데이터베이스를 고를 때 내가 실제로 사용할 수 있는 방식으로 CAP 정리를 설명해줘.","A":"## 한 문장으로 보는 CAP 정리\n\n네트워크 장애로 데이터베이스 노드들이 분리될 때(\"파티션\"), 당신은 선택해야 합니다: **오래된 데이터일 가능성이 있더라도** 계속 응답하거나(가용성), 데이터가 정확하다고 확신할 때까지 **응답을 거부**하는 것(일관성)입니다. 장애가 발생하는 *동안에는* 둘 다 가질 수 없습니다.\n\n이게 전부입니다. 함정은 C, A, P를 세 가지 동등한 선택지 중 두 개를 고르는 것이라고 생각하는 것입니다. 그렇지 않습니다.\n\n## \"3개 중 2개 선택\"이 오해를 부르는 이유\n\n**P(파티션 허용성)는 선택 사항이 아닙니다.** 네트워크는 패킷을 유실하고, 노드는 다운되고, 케이블은 끊어집니다. 머신을 하나 이상 운영한다면, 파티션은 *반드시* 일어납니다. 따라서 P를 \"선택\"할 수 있는 것이 아니라, 현실이 당신을 대신해 선택합니다.\n\n진정한 선택은 *파티션이 발생했을 때만* 내려지며, 이진적입니다:\n\n- **CP** — 파티션 동안, 정확성을 보장할 수 없는 쪽은 잘못된 데이터를 제공하는 대신 **응답을 중단합니다**(오류 또는 타임아웃).\n- **AP** — 파티션 동안, **모든 노드가 계속 응답하며**, 일부 응답이 오래되었거나 쓰기 작업이 나중에 조정되어야 할 수 있다는 점을 받아들입니다.\n\n파티션이 *없을 때*(시간의 99% 이상), 일관성과 가용성을 모두 얻을 수 있습니다. CAP는 장애가 발생했을 때만 문제가 됩니다.\n\n## 실제로 적용할 수 있는 결정 규칙\n\n한 가지 질문을 던져보세요: **\"내 시스템의 두 부분이 서로 통신할 수 없다면, 잘못되거나 오래된 답변을 반환하는 것과 아예 답변하지 않는 것 중 어느 쪽을 선호하겠는가?\"**\n\n| 당신의 상황 | 선택 | 이유 |\n|---|---|---|\n| 돈, 재고, 예약 등 이중 지불이나 초과 판매가 용납되지 않는 모든 것 | **CP** | 두 사람이 마지막 좌석을 구매하게 하는 것보다 오류를 표시하는 것이 낫다 |\n| 좋아요, 조회수, 피드, 센서 데이터, 장바구니, 접속 상태 | **AP** | 약간 오래된 수치는 괜찮다; 다운타임은 사용자/데이터를 잃게 한다 |\n\n## 실제 데이터베이스에서는 어떻게 적용되는가\n\n- **CP 지향:** PostgreSQL/MySQL (단일-프라이머리), MongoDB (기본값), HBase, Zookeeper, etcd, Spanner. 파티션의 소수 쪽에서는 읽기/쓰기가 차단되거나 실패합니다.\n- **AP 지향:** Cassandra, DynamoDB, Riak, CouchDB. 모든 곳에서 계속 작동합니다; 충돌은 나중에 해결합니다 (last-write-wins, vector clocks, CRDTs).\n\n이들 대부분은 **쿼리별로 조정 가능**하며, 이는 레이블보다 더 중요합니다. Cassandra와 Dynamo는 *요청별로* 일관성을 설정할 수 있게 해줍니다 (`QUORUM` 대 `ONE`). 따라서 실용적인 질문은 \"내 데이터베이스가 어느 진영에 속하는가\"가 아니라 \"*이 특정 작업*에 어떤 보장이 필요한가\"가 됩니다.\n\n## CAP이 빠뜨린 두 가지 (그리고 더 크게 체감하게 될 것들)\n\n1. **지연 시간(Latency).** 쓰기가 확정되기 전에 더 많은 노드가 동의해야 할수록, 네트워크가 완벽하게 정상일 때조차 모든 쓰기 작업이 느려집니다. 이것이 **PACELC** 확장입니다: *만약 파티션(Partition)이 발생하면 A 또는 C를, 그렇지 않으면(Else, 평상시) 지연 시간(Latency) 또는 일관성(Consistency)을 선택한다.* 대부분의 앱에서, 이 일상적인 지연 시간 대 일관성의 트레이드오프는 드물게 발생하는 파티션보다 훨씬 더 자주 당신에게 영향을 미칩니다.\n\n2. **여기서의 \"일관성\" ≠ ACID의 C.** CAP의 C는 \"모든 읽기가 어디서든 가장 최신의 쓰기를 본다\"(선형성)를 의미합니다. ACID의 C는 \"트랜잭션이 당신의 제약 조건을 존중한다\"를 의미합니다. 같은 단어, 다른 개념입니다 — 벤더가 이를 흐리게 만들도록 두지 마세요.\n\n## 선택을 위한 결론\n\n1. 당신은 P를 유지하게 됩니다. 받아들이세요.\n2. 워크로드별로 결정하세요: 오래되거나 실패한 답변이 더 나쁜가? → 정확성이 중요한 데이터에는 **CP**, 가용성이 중요한 데이터에는 **AP**.\n3. 혼합할 수 있습니다: 많은 시스템이 주문/결제에는 CP 저장소를, 분석/피드에는 AP 저장소를 사용합니다.\n4. 그런 다음 **PACELC**를 살펴보세요 — 평상시의 지연 시간 비용이 당신이 매일 감수해야 할 부분입니다.\n\n이것을 당신이 만들고 있는 특정 앱에 적용해 드릴까요? 데이터와 접근 패턴을 알려주시면, 구체적인 추천을 해드리겠습니다.","B":"내재화해야 할 한 가지: **CAP은 네트워크 파티션 중에만 선택을 강요하며, 분산 데이터베이스에서 실제 선택은 C 대 A입니다 — P는 선택 사항이 아니기 때문입니다.** 네트워크는 패킷을 유실하고 지연시킵니다. 여러 노드에 분산된 모든 데이터베이스는 이에 대처해야 합니다. 따라서 질문은 결코 \"셋 중 둘은?\"이 아닙니다. 그것은: *노드들이 서로 통신할 수 없을 때, 정확성을 유지하기 위해 응답을 거부할 것인가(CP), 아니면 가동 상태를 유지하기 위해 오래된(stale) 데이터로 응답할 것인가(AP)?* 입니다.\n\n파티션이 없을 때 — 정상적인 경우 — 일관성과 가용성을 모두 얻습니다. CAP은 일상적인 동작에 대해 아무것도 말하지 않습니다. 이것이 교과서적인 \"둘을 선택하라\"가 실제로는 오해를 불러일으키는 이유입니다.\n\n**먼저 정의를 확실히 하라**, 들리는 것보다 그 의미가 좁기 때문이다:\n- **일관성(Consistency)**은 여기서 *선형성(linearizability)*을 의미합니다 — 모든 읽기는 마치 복사본이 하나인 것처럼 최신 쓰기를 봅니다. 이것은 ACID의 \"C\"가 아닙니다.\n- **가용성(Availability)**은 작동 중인 노드에 대한 모든 요청이 오류 없는 응답을 받는 것을 의미합니다 — 하지만 반드시 최신 데이터는 아닙니다.\n- **파티션 허용성(Partition tolerance)**은 노드 간 메시지가 손실되거나 지연될 때 시스템이 계속 작동하는 것을 의미합니다.\n\n**선택에 실제로 유용한 확장: PACELC.** *만약* 파티션(Partition)이 있다면, A 또는 C를 선택하고, *그렇지 않으면*(Else, 정상 작동 시), 지연 시간(Latency) 또는 일관성(Consistency)을 선택하라. 후반부가 일상적으로 더 중요합니다. 파티션은 드물지만 지연 시간 대 일관성 비용은 모든 요청에서 지불되기 때문입니다. 리전 간의 강력한 일관성은 본질적으로 왕복(round-trip) 비용을 발생시킵니다.\n\n**선택 시 사용 방법:**\n\n1. *두 사용자가 동시에 다른 값을 볼 경우 이 데이터가 누군가에게 해를 끼치는가?* 은행 잔고, 재고 수, 고유 사용자 이름 확인, \"이 결제가 이미 처리되었는가\" — **CP** 쪽으로 기운다. 오래되거나(stale) 충돌하는 읽기는 잠시의 오류나 대기보다 더 나쁘다. 예: 강력한 일관성을 갖춘 클러스터의 PostgreSQL/MySQL, majority writes를 사용하는 MongoDB, Spanner, 그리고 합의 저장소(etcd, ZooKeeper, Consul).\n\n2. *완벽하게 최신 상태를 유지하는 것보다 가동 상태를 유지하는 것이 더 중요한가?* 쇼핑 카트, 소셜 피드, 조회 수, 세션, 원격 측정(telemetry) — **AP** 쪽으로 기운다. 다운타임은 몇 초 뒤처진 값보다 더 큰 피해를 준다. 예: Cassandra, DynamoDB, Riak, CouchDB.\n\n3. *그런 다음 지연 시간(PACELC의 후반부)을 따져보라.* 만약 다중 리전(multi-region) 환경이고 빠른 읽기가 필요하다면, 파티션이 없을 때조차도 더 약한 일관성을 받아들일 가능성이 높다. 단일 리전(single-region) 환경이라면, 이것은 훨씬 덜 중요하다.\n\n**문제를 피하게 해주는 두 가지 주의사항:**\n\n- 단일 노드 데이터베이스(한 장비의 클래식 Postgres)는 CAP을 비껴갑니다 — 노드가 하나뿐이므로 허용할 파티션이 없습니다. 사실상 C와 A를 모두 얻습니다. 장애 모드는 그냥 \"다운됨\"입니다. CAP은 복제본(replica)이나 샤드(shard)를 추가하는 순간부터 관련성을 갖게 됩니다.\n- \"CP\"와 \"AP\"는 더 이상 전체 데이터베이스에 붙는 레이블이 거의 아닙니다. Cassandra, DynamoDB, Cosmos DB는 *쿼리별로* 일관성 수준을 선택할 수 있게 해줍니다(예: quorum reads/writes). 따라서 실제 결정은 종종 작업별로 이루어집니다: 결제에는 강력한 일관성을, 추천에는 최종적 일관성을.\n\n실용적인 지름길: CP 대 AP를 회사별이 아닌 **데이터 범주별로** 결정하라. 대부분의 실제 시스템은 돈/신원 데이터용으로 CP 저장소를, 대용량의 오래된 데이터(staleness)를 허용하는 데이터용으로 AP 저장소를 운영합니다 — 그리고 그것이 타협이 아닌 정답입니다."},{"item":45,"id":"ACT2_findbig","cat":"ACT","question":"macOS에서 디렉토리 아래에 있는 가장 큰 파일 10개를 어떻게 찾나요?","A":"`find`를 사용하여 파일과 그 크기를 수집한 다음, 정렬하여 상위 10개를 가져오라:\n\n```bash\nfind /path/to/dir -type f -exec stat -f '%z %N' {} + | sort -rn | head -10\n```\n\n이것은 모든 하위 디렉터리를 재귀적으로 탐색하여 가장 큰 파일 10개를 출력한다 (크기는 바이트 단위, 그 다음 경로). `stat -f '%z %N'`는 macOS/BSD 구문이다 — `%z`는 바이트 크기, `%N`은 이름이다.\n\n원하는 것에 따라 몇 가지 변형이 있다:\n\n**사람이 읽을 수 있는 크기(MB/GB), 정렬됨:**\n```bash\nfind /path/to/dir -type f -exec du -h {} + | sort -rh | head -10\n```\n`du -h`는 읽을 수 있는 크기를 제공하고 `sort -rh`는 이를 올바르게 정렬한다 (K/M/G 접미사를 처리함). 이것은 디스크 사용량(블록 할당 크기)을 보고하며, 이는 정확한 바이트 수와 약간 다를 수 있음을 유의하라.\n\n**GNU coreutils가 설치되어 있다면** (예: Homebrew를 통해 `gfind`/`gstat`로), Linux 스타일의 `find ... -printf`도 작동한다 — 하지만 위의 평범한 BSD `find`는 추가 도구가 필요 없다.\n\n두 가지를 명심하라: 시스템 디렉터리를 스캔하는 경우 `2>/dev/null`을 추가하여 권한 거부 노이즈를 억제하고, `-exec ... {} +` 형식(`\\;`가 아닌 `+` 사용)은 파일들을 몇 개의 `stat` 호출로 묶어 처리하므로 큰 트리에서도 빠르다.","B":"macOS에서는 BSD `stat`이 Linux와 다르기 때문에 `find` + `sort` 조합이 가장 신뢰할 수 있습니다. 몇 가지 좋은 옵션은 다음과 같습니다:\n\n## 가장 빠른 한 줄 명령어 (하위 디렉터리까지 재귀적으로 탐색)\n\n```bash\nfind . -type f -exec stat -f '%z %N' {} + | sort -rn | head -10\n```\n\n- `-type f` — 파일만 (디렉터리 제외)\n- `stat -f '%z %N'` — `size_in_bytes <space> path`를 출력합니다 (BSD/macOS `stat` 문법)\n- `sort -rn` — 숫자를 기준으로 내림차순 정렬\n- `head -10` — 상위 10개\n\n`.`을 대상 디렉터리로 바꾸십시오.\n\n## 사람이 읽기 쉬운 크기\n\n```bash\nfind . -type f -exec du -h {} + | sort -rh | head -10\n```\n\n`sort -rh`는 `K`/`M`/`G`와 같은 접미사를 이해합니다. `du`는 디스크에 할당된 블록을 보고하므로, 크기가 정확한 바이트 수와 약간 다를 수 있다는 점에 유의하십시오.\n\n## 파일 이름에 공백/줄바꿈이 있는 경우 (완전 안전)\n\n```bash\nfind . -type f -print0 | xargs -0 stat -f '%z %N' | sort -rn | head -10\n```\n\n## Homebrew coreutils가 있는 경우\n\nGNU `find`는 `-printf`를 지원하며, 이는 더 빠릅니다 (파일별 `stat` 실행 없음):\n\n```bash\ngfind . -type f -printf '%s %p\\n' | sort -rn | head -10\n```\n\n**팁:** 첫 번째 명령어에서 바이트 수를 읽기 쉽게 만들려면, `numfmt`로 파이프하십시오: `| numfmt --to=iec --field=1`을 덧붙이십시오 (coreutils의 `gnumfmt`가 필요하거나, `numfmt`가 설치된 경우 사용하십시오).\n\n하나의 파일 시스템으로 제한하거나, 현재 디렉터리 수준으로만 제한(재귀 없음)하고 싶으십니까? `find`에 `-x`(하나의 파일 시스템) 또는 `-maxdepth 1`을 추가하십시오."},{"item":46,"id":"PLN2_webhook","cat":"PLN","question":"서드파티 서비스로부터 웹훅을 안정적으로 수신해야 합니다. 계획이 어떻게 되나요?","A":"제대로 해결하기 좋은 문제입니다 — 서드파티 웹훅은 *최소 한 번 전송 및 최선 노력(at-least-once and best-effort)* 방식이라, 중복, 순서가 뒤바뀐 도착, 조용히 누락되는 이벤트가 모두 정상입니다. 신뢰할 수 있는 컨슈머는 이 세 가지 사실을 기반으로 구축됩니다. 계획은 다음과 같습니다.\n\n## 핵심 원칙: *수신*과 *처리*를 분리하라\n\n가장 중요한 단 하나의 결정은 **빠르게 저장하고 빠르게 응답한 뒤, 비동기적으로 처리하는 것**입니다. HTTP 핸들러 안에서 실제 작업을 하지 마십시오.\n\n```\n제공자 → [HTTP 엔드포인트] → 검증 + 중복 제거 + 원본 저장 → 200 OK\n                                          ↓\n                              [큐] → [워커] → 비즈니스 로직\n                                          ↓ (실패 시)\n                                    백오프와 함께 재시도 → 데드레터\n```\n\n## 수신 엔드포인트 (빠르고 단순해야 함)\n\n1.  **진위 여부 검증** — 공유된 비밀 키를 사용하여 원본 본문(raw body)에 대해 HMAC 서명 헤더를 확인합니다. 실패하는 것은 모두 거부합니다. 또한 타임스탬프 헤더를 확인하고 너무 오래되었다면 거부합니다 (재전송 공격 방지).\n2.  **파싱 전에 원본 바이트(raw bytes) 읽기** — 서명은 정확한 본문에 대해 이루어지며, 프레임워크의 JSON 파싱이 이를 변경할 수 있습니다.\n3.  다른 어떤 작업보다 *먼저* 원본 이벤트를 영속적인 `webhook_inbox` 테이블/로그에 저장합니다 — `(provider_event_id, payload, signature, received_at, status='pending')`를 저장합니다.\n4.  행이 커밋된 직후 즉시 2xx를 반환합니다. 이제 제공자는 재시도를 멈추고 이벤트의 소유권은 당신에게 넘어옵니다.\n5.  비용을 낮게 유지하세요: 페이로드 크기 제한과 짧은 타임아웃을 강제하고, 여기에서 다운스트림 서비스를 호출하지 마십시오.\n\n## 설계에 반영해야 할 네 가지 신뢰성 속성\n\n-   **멱등성 (중복 처리):** 제공자의 이벤트 ID에 고유 제약 조건을 걸어 중복을 제거합니다. 최소 한 번 전송(*at-least-once delivery*)은 반복을 보게 될 것을 *보장*합니다 — 처리가 두 번 실행되어도 안전하게 만드세요 (무조건적인 insert가 아닌 upsert 사용).\n-   **순서 (도착 순서를 신뢰하지 말 것):** 이벤트는 순서가 뒤바뀌어 도착할 수 있습니다. 수신 시간이 아닌 이벤트 자체의 타임스탬프/버전/시퀀스를 사용하세요. 상태를 변경하는 이벤트의 경우, 강력한 패턴은 **씬 웹훅(thin webhook)**입니다: 웹훅을 \"엔티티 X에 무언가 변경됨\"으로 취급한 다음, 페이로드 본문을 신뢰하는 대신 제공자의 API에서 현재 상태를 다시 가져옵니다.\n-   **자체 재시도 + 데드레터:** 워커는 일시적인 실패에 대해 지수 백오프(exponential backoff)로 재시도합니다. N번 시도 후에는 이벤트를 데드레터 큐/테이블로 옮기고 알림을 보냅니다 — 절대 하나의 포이즌 이벤트(poison event)가 파이프라인을 막게 두지 마세요.\n-   **조정 (놓친 것을 잡아내기):** 웹훅은 (제공자의 장애, 당신의 다운타임, 네트워크 문제로) 조용히 유실*될 것*입니다. 주기적으로 제공자의 API를 폴링하거나 이벤트 재실행/목록 엔드포인트를 소비하여 누락된 것을 보충하는 작업을 실행하세요. 이것이 \"최선 노력(best-effort)\"을 \"결과적 정확성(eventually correct)\"으로 바꾸는 안전망입니다.\n\n## 관찰 가능성 및 운영\n\n-   모든 이벤트를 ID 및 상태 전환과 함께 기록하고, 수신함을 쿼리할 수 있게 만드세요.\n-   지표 + 알림 항목: 서명 실패, 처리 지연, 재시도율, 데드레터 깊이.\n-   **재실행 도구** — 저장된 원본 페이로드로부터 재처리 — 수신함이 이를 무료로 제공해 줍니다.\n-   제공자의 세부 사항을 확인하세요: 어떤 상태 코드가 재시도를 유발하는지, 재시도 일정/타임아웃은 어떤지, 그리고 서명 로테이션이나 이벤트 목록/재실행 API를 제공하는지 여부.\n\n## 권장 빌드 순서\n\n1.  서명 검증 + 원본 영속화 + 빠른 2xx 응답을 갖춘 엔드포인트.\n2.  멱등성 있는 핸들러로 수신함의 내용을 처리하는 워커.\n3.  재시도 + 데드레터 + 알림.\n4.  조정/보충 작업.\n5.  재실행 도구 + 대시보드.\n\n1-2단계는 *정확하게* 만들고, 3-4단계는 *신뢰할 수 있게* 만들며, 5단계는 *운영 가능하게* 만듭니다.\n\n---\n\n몇 가지 구체적인 정보가 있다면 이를 구체적인 코드나 더 견고한 설계로 만들 수 있습니다:\n\n-   **어떤 제공자?** (Stripe, GitHub, Shopify, Twilio 등 — 이들의 서명 방식, 재시도 정책, 재실행/목록 API 제공 여부에 따라 세부 사항이 달라집니다.)\n-   **당신의 스택** — 언어/프레임워크, 그리고 큐로 사용 가능한 것 (SQS, DB 기반 큐, Redis, Kafka…).\n-   **볼륨 및 지연 시간** — 초당 이벤트 수와 처리된 상태가 얼마나 최신이어야 하는지 (DB를 큐로 사용하는 것이 괜찮을지, 아니면 실제 인프라가 필요할지를 결정합니다).\n\n특정 제공자/스택에 대한 엔드포인트 + 수신함 스키마 초안을 작성해 드릴까요?","B":"신뢰할 수 있는 패턴은 이렇습니다: **검증 → 원본 데이터 저장 → 빠른 확인 응답 → 비동기 처리(멱등성 보장), 안전망으로 조정 작업 활용.** 거의 모든 웹훅 신뢰성 문제는 이 중 하나를 건너뛰는 데서 비롯됩니다. 계획은 이렇습니다.\n\n## 수신 엔드포인트 (동기식 — 단순하고 빠르게 유지)\n\n1.  **먼저 원본 본문을 읽고, 바로 그 바이트들에 대한 서명을 검증합니다.** 대부분의 제공자는 원본 페이로드에 서명합니다 (공유 비밀 키를 사용한 `HMAC-SHA256`); 만약 먼저 JSON으로 파싱한 후 다시 직렬화하면, 서명이 일치하지 않을 것입니다. 다른 작업을 하기 전에 실패하는 것은 모두 거부합니다.\n2.  **재전송을 거부합니다.** 제공자의 타임스탬프 헤더를 사용하여 (예: ±5분 허용) 캡처된 요청이 나중에 다시 전송될 수 없도록 합니다.\n3.  **원본 이벤트를 즉시 저장합니다.** 제공자의 이벤트 ID를 키로 하고 고유 제약 조건을 설정하여 `inbox` 테이블(또는 영속적인 큐)에 저장합니다. 고유 제약 조건이 바로 중복 제거 역할을 합니다 — 중복 전송은 충돌을 일으키고 아무 작업도 하지 않게 됩니다.\n4.  **영속적으로 저장되는 순간 2xx를 반환합니다** — 비즈니스 로직 처리 전에 말입니다. 실제 처리는 인라인으로 하지 마십시오. 만약 핸들러가 느리면, 제공자는 타임아웃 처리하고 실패로 표시한 후 재시도하는데, 이는 여러분이 이미 힘든 상황일 때 부하를 몇 배로 증가시킵니다.\n\n## 워커 (비동기식 — 실제 작업이 일어나는 곳)\n\n5.  **백그라운드에서 `inbox`로부터 처리합니다.** 각 핸들러를 멱등성 있게 만드십시오: 동일한 이벤트를 재실행해도 동일한 결과가 나옵니다 (`insert`가 아닌 `upsert`; 실행 전 \"이미 적용됨\"을 확인). 중복된 이벤트를 받게 될 것입니다 — 최소 한 번 전송이 일반적이기 때문입니다 — 따라서 정확성은 각 이벤트를 한 번만 받는 것에 의존해서는 안 됩니다.\n6.  **순서를 신뢰하지 마십시오.** 이벤트는 순서가 뒤바뀌거나 섞여서 도착할 수 있습니다. 이벤트 자체의 타임스탬프/시퀀스 번호를 사용하거나, 중요한 것의 경우, 이벤트 스트림에서 상태를 재구성하는 대신 제공자의 API에서 현재 상태를 다시 가져오십시오.\n7.  **지수 백오프로 재시도한 후 데드레터 처리합니다.** 처리 실패 시 지연 후 다시 처리됩니다; N번 시도 후에는 DLQ로 들어가므로, 하나의 포이즌 이벤트가 큐를 막는 것을 방지할 수 있습니다. DLQ 깊이와 처리 지연에 대해 알림을 설정하십시오.\n\n## 최종 방어선 (웹훅은 유실*될 것이기* 때문입니다)\n\n8.  **주기적인 조정 작업을 실행합니다.** 이 작업은 제공자의 API에서 최신 이벤트/상태를 가져와 웹훅이 놓친 공백을 메웁니다 (양측의 장애, 전송 누락 등). 이것이 가장 많이 생략되는 부분이면서 \"대체로 신뢰할 수 있음\"을 \"신뢰할 수 있음\"으로 바꾸는 부분입니다. 많은 제공자는 이벤트 재실행 또는 이벤트 목록 API도 제공합니다 — 여기서 사용하십시오.\n9.  **모든 이벤트를 종단 간에 기록합니다** (수신, 저장, 처리, 실패). 이를 통해 \"이벤트 X를 받았는가, 그리고 그 이벤트에 무슨 일이 있었는가\"에 답할 수 있습니다.\n\n이 패턴을 여러분의 상황에 맞게 조정하는 두 가지 요소는 다음과 같습니다: 어떤 제공자를 사용하는지 (서명 방식, 재시도 정책, 그리고 재실행/이벤트 목록 API 제공 여부가 1, 4, 8단계를 결정합니다), 그리고 여러분의 스택 (inbox가 Postgres 테이블 + cron 워커인지, 아니면 SQS/실제 큐인지 결정합니다). 이 두 가지를 알려주시면, 이 패턴을 구체적인 코드와 스키마로 바꿔드리겠습니다."},{"item":47,"id":"DEC2_pandas","cat":"DEC","question":"작은 일회성 데이터 클리닝 스크립트의 경우, pandas인가 순수 Python인가?","A":"순수 파이썬. 작고 일회성인 클리닝 스크립트에는 pandas가 보통 잘못된 도구입니다 — 정말 작고 한번 쓰고 버리는 작업에 표준 라이브러리가 이미 처리하는 일을 하기 위해, 수 초가 걸리는 import와 무거운 의존성을 추가하게 됩니다.\n\n순수 파이썬을 사용해야 할 경우:\n- 파일이 작고(가령, ~1만 행 미만) 한 번만 실행할 경우.\n- 로직이 행 단위일 경우: 공백 제거, 날짜 수정, 빈 값 제거, 키 이름 변경. `csv.DictReader`/`DictWriter`에 루프를 더하면 가독성이 좋고 의존성이 없습니다.\n- 환경이 제한적일 경우(pandas가 설치되지 않았거나, Lambda, 동료의 컴퓨터 등) — `import csv`는 항상 작동합니다.\n\npandas를 사용해야 할 경우:\n- **열 단위** 연산을 할 경우 — group-by, 파일 간 joins/merges, pivots, aggregations, 열 전체에 대한 fillna.\n- 데이터가 pandas가 이미 해결하는 방식으로 지저분할 경우: 혼합된 타입, 다양한 날짜 형식(`pd.to_datetime`), Excel 입력, 천 단위 구분 기호.\n- 일회성 작업이 아니게 될 수 있을 경우. 다시 실행하거나 확장할 것이라면, pandas의 어휘가 제값을 합니다.\n\n경험 법칙: 작업을 \"각 행에 대해 X를 하라\"고 설명할 수 있다면, `csv` 모듈을 사용한 순수 파이썬이 더 깔끔한 선택입니다. 한 번에 전체 열에 대해 연산하고 싶다는 생각이 든다면, pandas로 전환하세요.\n\n데이터가 어떻게 생겼는지, 그리고 여기서 \"클리닝\"이 무엇을 의미하는지 공유해주시면, 어느 쪽이 적합한지 알려드리고 대략적인 코드를 짜드리겠습니다.","B":"작은 일회성 정리 스크립트의 경우, **순수 파이썬**을 기본으로 사용하라. 그 이유는 다음과 같다:\n\n**순수 파이썬이 더 나은 경우:**\n- 파일이 벡터화된 속도가 필요 없을 만큼 작을 때 (수천 줄 정도, 또는 한 줄씩 스트리밍하는 모든 경우).\n- 한 번 실행하고 버릴 스크립트일 때 — `import pandas`만으로도 시작에 ~0.5–1초가 걸리며, 이미 설치되어 있지 않다면 설치/환경 공간 차지도 무시할 수 없다.\n- 로직이 행 단위일 때: 필터링, 구분자 수정, 공백 제거, 잘못된 줄 삭제. `csv` 모듈과 반복문을 사용하는 것이 그에 상응하는 pandas 체인보다 종종 더 *명확하다*.\n- 의존성이 없기를 원할 때 (다른 사람에게 전달하거나 어디서든 다시 실행하기 쉬움).\n\n```python\nimport csv\nwith open(\"in.csv\") as f, open(\"out.csv\", \"w\", newline=\"\") as out:\n    r, w = csv.DictReader(f), None\n    for row in r:\n        if not row[\"email\"].strip():\n            continue\n        row[\"name\"] = row[\"name\"].strip().title()\n        if w is None:\n            w = csv.DictWriter(out, fieldnames=row.keys()); w.writeheader()\n        w.writerow(row)\n```\n\n**pandas를 사용해야 할 때:**\n- 전체 테이블에 걸쳐 열 단위 연산이 필요할 때: dedup, joins/merges, group-by 집계, 타입 강제 변환, fillna.\n- 무엇이 \"정리된\" 상태인지 결정하기 전에 데이터를 대화형으로 탐색할 때.\n- 데이터가 이미 Excel/Parquet/지저분한 CSV에 있고 pandas가 이를 한 줄로 파싱할 수 있을 때 (`pd.read_excel`, 혼합된 타입 등).\n- 이미 환경에 설치되어 있고 파일이 메모리에 충분히 들어갈 때.\n\n**경험 법칙:** 정리를 \"각 행에 대해 X를 하라\"고 설명할 수 있다면, 순수 파이썬이 더 간단하고 가볍다. \"각 *열*에 대해\" 또는 \"전체 테이블에 걸쳐\"라고 설명한다면, pandas는 import할 가치가 있다.\n\n실제로 정리에 어떤 작업이 포함되는가? 어느 쪽으로 가야 할지 확실하게 말해줄 수 있다 (또는 대략적인 코드를 짜줄 수도 있다)."},{"item":48,"id":"PLN2_offline","cat":"PLN","question":"내 웹 앱이 오프라인에서도 계속 작동하기를 원합니다. 계획은 무엇인가요?","A":"걱정 마세요 — 일반적인 경우를 다루는 계획을 드릴 테니, 당신의 앱이 실제로는 어디에 해당하는지 알려주세요.\n\n오프라인 지원은 사실 서로 겹쳐 쌓인 세 개의 레이어입니다. 대부분의 앱은 첫 번째나 두 번째 레이어까지만 필요합니다.\n\n## 기반: 서비스 워커\n\n모든 오프라인 작업은 **서비스 워커**를 통해 실행됩니다 — 탭이 닫혀 있을 때도 브라우저가 유지하는 스크립트로, 네트워크 요청을 가로채 캐시에서 응답할 수 있습니다. 이것은 타협할 수 없는 핵심입니다. 보통 직접 작성하지 않고, **Workbox**(또는 프레임워크가 제공하는 플러그인)로 생성합니다:\n\n- **Next.js** → `@ducanh2912/next-pwa` (또는 Serwist)\n- **Vite (React/Vue/Svelte)** → `vite-plugin-pwa`\n- **Plain/static** → SW 생성을 위한 `workbox-cli`\n- **Angular** → 내장된 `@angular/pwa`\n\n그리고 설치 가능하고 브라우저가 진짜 PWA로 취급하도록 **웹 앱 매니페스트**(`manifest.json`)가 필요합니다.\n\n## 레이어 1 — 앱 셸이 오프라인으로 로드됨 (거의 모두에게 필요)\n\n설치 시점에 정적 자산(HTML 셸, JS, CSS, 폰트, 아이콘)을 미리 캐시하세요. 결과: 앱이 공룡 화면을 보여주는 대신 오프라인에서 *열립니다*. Workbox는 빌드 매니페스트로부터 이 작업을 자동으로 수행합니다. 이것만으로도 엄청난 체감 안정성을 얻을 수 있습니다.\n\n## 레이어 2 — 데이터/콘텐츠가 오프라인에서 사용 가능함\n\n여기서부터는 요청 유형별로 전략이 중요해집니다:\n\n- API/콘텐츠 읽기를 위한 **런타임 캐싱**. 라우트별로 정책을 선택하세요:\n  - `StaleWhileRevalidate` — 캐시된 것을 보여주고, 백그라운드에서 새로고침 (피드/콘텐츠에 아주 좋음)\n  - `NetworkFirst` — 실시간 시도 후, 캐시로 대체 (신선해야 하지만 오래되어도 괜찮은 데이터에 좋음)\n  - `CacheFirst` — 불변 자산용 (이미지, 버전 관리되는 파일)\n- 앱이 읽거나 쿼리하는 **구조화된 데이터** → **IndexedDB**에 저장 (raw IndexedDB가 아닌 `idb`나 `Dexie` 같은 래퍼 사용). Cache API는 HTTP 응답용이고, IndexedDB는 앱이 쿼리하는 데이터용입니다.\n- 캐시를 놓친 탐색을 위한 **오프라인 폴백 페이지**.\n\n## 레이어 3 — 쓰기가 오프라인에서 작동 + 동기화 (오프라인 편집이 필요한 경우에만)\n\n이것은 비용이 많이 드는 레이어입니다:\n- 오프라인일 때 변경 사항을 로컬(IndexedDB)에 큐잉하고, **Background Sync API**를 통해 재연결 시 재생합니다 (대체 수단으로 수동 재시도 큐 사용 — Safari는 Background Sync를 지원하지 않음).\n- **충돌 해결** 전략을 결정하세요: 마지막 쓰기 우선(last-write-wins)이 가장 간단합니다. 두 사람이 같은 레코드를 수정하는 경우 병합 로직이나 CRDTs가 필요할 수 있습니다. 이것이 제품의 핵심이라면, 동기화를 직접 구축하기보다 이를 처리해주는 동기화 엔진(**RxDB, ElectricSQL, PouchDB/CouchDB, Replicache, 또는 협업 편집을 위한 Yjs**)을 고려하세요.\n\n## 사람들이 잊어버리는 공통적인 것들\n- **온라인/오프라인 UX** — `navigator.onLine` + `online`/`offline` 이벤트를 수신하고, 배너를 표시하며, 큐에 넣을 수 없는 작업을 비활성화하세요.\n- **캐시 버전 관리 및 업데이트** — 서비스 워커는 사용자를 오래된 코드에 고정시킬 수 있습니다. \"새 버전 사용 가능, 새로고침\" 프롬프트를 계획하세요; Workbox가 `skipWaiting`/`clientsClaim`을 처리합니다.\n- **HTTPS 필수** — 서비스 워커는 HTTPS에서만 실행됩니다 (개발용으로 localhost는 예외).\n- **저장 공간 제한 및 퇴출** — 브라우저가 캐시를 퇴출시킬 수 있습니다; 데이터가 중요하다면 `navigator.storage.persist()`를 호출하세요.\n- **테스팅** — Chrome DevTools → Application 탭 → \"Offline\" 체크박스, 그리고 Lighthouse의 PWA 감사.\n\n## 추천 빌드 순서\n1. 프레임워크의 PWA 플러그인을 통해 매니페스트 + 서비스 워커 추가 → **앱 셸이 오프라인으로 로드됨** (레이어 1).\n2. 읽기 API/콘텐츠에 대한 런타임 캐싱 규칙 추가 (레이어 2).\n3. 사용자가 반드시 오프라인에서 편집해야 하는 경우에만: IndexedDB 쓰기 큐 + 동기화 추가 (레이어 3) — 그리고 기성 동기화 엔진을 진지하게 고려하세요.\n\n---\n\n만약 **당신의 스택**과 **사용자가 오프라인에서 읽기만 하는지 또는 생성/편집도 필요한지** 알려주시면, 이것을 정확한 설정으로 바꿔드리겠습니다 — 플러그인 설정, 특정 라우트에 대한 캐싱 규칙, 그리고 (필요하다면) 동기화 접근 방식까지요. 그리고 제가 살펴볼 실제 코드베이스가 있다면, 알려주세요. 그러면 기존 코드에 맞춰 계획을 조정해 드리겠습니다.","B":"웹 앱의 오프라인 지원은 **Progressive Web App (PWA)**으로 만드는 것을 의미하며, 이는 service worker를 중심으로 구축됩니다. service worker는 네트워크 요청을 가로채고 연결이 없을 때 캐시된 응답을 제공하는 엔진입니다. 계획은 한 가지 결정에 따라 명확하게 나뉘므로, 그 결정을 중심으로 설명하겠습니다.\n\n**모든 것을 결정하는 한 가지: 오프라인 읽기 전용인가, 읽기-쓰기인가?**\n\n- **읽기 전용** (오프라인 상태에서 앱이 로드되고 마지막으로 알려진 콘텐츠를 보여줌) — 대략 하루 정도의 작업이며, 대부분 설정 작업입니다.\n- **읽기-쓰기** (사용자가 오프라인에서 생성/편집하고 재연결 시 동기화됨) — 훨씬 더 큰 작업입니다. 이제 로컬 데이터베이스, 동기화 큐, 충돌 해결을 직접 관리해야 하기 때문입니다.\n\n**어느 쪽이든 필요한 구성 요소:**\n\n1.  **웹 앱 매니페스트** — 설치 가능하게 만들고, 아이콘과 독립 실행형 창을 제공합니다.\n2.  **Service worker** — 오프라인 엔진입니다. 직접 만들지 마세요. [Workbox](https://developer.chrome.com/docs/workbox)를 사용하거나, 프레임워크가 이미 감싸고 있는 것을 사용하세요 (Vite에는 `vite-plugin-pwa`가 있고, Next에는 플러그인이 있습니다 등).\n3.  **캐싱 전략**, 리소스 유형별로 적용:\n    - 앱 셸 (HTML/JS/CSS) → **precache**, 캐시 우선 제공, 새 배포 시 업데이트.\n    - API/데이터 → **stale-while-revalidate** (캐시된 것을 보여주고 백그라운드에서 새로고침) 또는 **network-first** (온라인일 때 최신 데이터, 대체 수단으로 캐시 사용).\n4.  **HTTPS** — service worker는 HTTPS에서만 실행됩니다 (개발용 `localhost`는 예외).\n5.  **UI의 오프라인 표시기** — 사용자가 보고 있는 데이터가 오래되었지만 실시간처럼 보이는 데이터가 아니라 캐시된 데이터임을 알 수 있도록 합니다.\n\n**읽기-쓰기가 필요하다면:** 로컬 저장을 위해 **IndexedDB**, 보류 중인 변경 사항을 위한 **outbox queue**, 재연결 시 이를 처리하기 위한 **Background Sync API**, 그리고 **충돌 해결 정책**을 추가하세요 (`last-write-wins`가 가장 간단하며, 데이터에 안전하지 않다면 병합 로직을 사용하세요).\n\n**검증 방법:** Chrome DevTools → Network → Offline으로 시뮬레이션하고, Lighthouse PWA 감사를 통해 누락된 매니페스트/SW 부분을 찾아내세요.\n\n이것을 일반적인 설명이 아닌 구체적인 것으로 만들기 위해, 두 가지 정보가 필요합니다: **사용하는 스택** (프레임워크 + SPA인지 서버 렌더링인지)과 **오프라인 쓰기가 필요한지 아니면 읽기만 필요한지**입니다. repo를 알려주시면, 당신의 설정에 맞는 구체적인 단계로 만들어 드리겠습니다."},{"item":49,"id":"PLN_i18n","cat":"PLN","question":"우리 React 앱을 3개 언어로 국제화해야 합니다. 이것을 어떻게 계획해야 할까요?","A":"먼저 간단한 메모: 앱은 이 디렉터리에 없습니다 — `/Users/elon/work/fable-profile`은 \"fablever\" Claude Code 프로젝트입니다 (React도, i18n 라이브러리도 어디에도 없습니다). 따라서 이것은 실제 코드에 기반한 계획이 아닌 프레임워크 수준의 계획입니다. 실제 리포지토리를 알려주시면 구체적으로 만들어 드릴 수 있습니다.\n\n## 추천\n\n표준적인 React 앱의 경우, **react-i18next** (`i18next` 생태계)를 사용하세요. 그럴 만한 이유로 기본값입니다: 복수형/보간/네임스페이스를 처리하고, 견고한 언어 감지 및 지연 로딩 기능을 갖추고 있으며, 모든 번역 관리 도구와 통합됩니다. 이 계획을 바꿀 수 있는 두 가지는 다음과 같습니다:\n\n- **Next.js인 경우**, 대신 `next-intl`(또는 Pages Router의 경우 `next-i18next`)을 사용하세요 — 서버 컴포넌트와 로케일 라우팅은 프레임워크를 인지하는 처리가 필요하며, `react-i18next`만으로는 App Router와 충돌합니다.\n- **3개 언어 중 하나가 RTL인 경우** (아랍어, 히브리어, 페르시아어), 번역 외에 실제 레이아웃 작업이 필요합니다 — 이에 대한 예산을 명시적으로 책정해야 합니다 (5단계 참조).\n\n가장 큰 비용은 라이브러리 설정(하루 이틀)이 아닙니다. 바로 기존 컴포넌트에서 **하드코딩된 문자열을 추출하는 것**입니다 — 이것이 작업의 대부분을 차지하며, 앱이 이미 얼마나 큰지에 따라 규모가 달라집니다.\n\n## 단계별 계획\n\n**0단계 — 코드를 건드리기 전에 워크플로를 결정합니다.** 소스 언어(보통 영어)를 선택하고, 번역이 어떻게 생성될지(번역가가 리포지토리 내 JSON을 편집하는 방식, 또는 CI를 통해 파일을 동기화하는 Lokalise/Crowdin/Tolgee 같은 TMS) 결정하고, 키 이름 규칙(예: `feature.component.label`)을 확정합니다. 이것을 잘못 정하면 코드가 아니라 되돌리는 데 큰 비용이 듭니다.\n\n**1단계 — 기반을 연결합니다.** i18next + react-i18next + language-detector 플러그인을 설치합니다. 앱 루트에 provider를 설정하고, 3개의 로케일을 폴백과 함께 구성하고, 선택한 언어를 유지하고(localStorage + `<html lang>`), 언어 전환기를 만듭니다. `t()`를 통해 하드코딩된 문자열 하나를 종단 간 렌더링하여 파이프가 작동하는지 증명합니다.\n\n**2단계 — 파일 구조를 정의합니다.** **네임스페이스**별로 번역을 구성하여(기능별 파일: `common.json`, `auth.json` 등) 하나의 거대한 파일을 피하고 지연 로딩할 수 있도록 합니다. 소스 언어 파일을 먼저 구축합니다. 나머지 두 개는 복사본으로 시작하여 번역됩니다.\n\n**3단계 — 문자열 추출 (가장 오래 걸리는 작업).** 컴포넌트를 훑으며 리터럴을 `t('key')`로 교체합니다. `i18next-parser`를 사용하여 수동으로 유지 관리하는 대신 키를 JSON 파일로 자동 추출합니다. 까다로운 사례들은 의도적으로 처리합니다: 보간(`t('greeting', {name})`), 복수화(i18next 복수형 키), 번역 내 리치 텍스트(`<Trans>` 컴포넌트). 모든 날짜/숫자/통화는 문자열 연결이 아닌 `Intl` API를 통해 처리합니다 — 포맷팅은 로케일마다 다릅니다.\n\n**4단계 — 번역.** 소스 파일을 번역가나 TMS에 전달합니다. **텍스트 확장**에 주의합니다 — 독일어/프랑스어는 영어보다 약 30% 더 길어져 빡빡한 레이아웃을 깨뜨릴 것입니다.\n\n**5단계 — 로케일 인지 관련 고려사항.** SEO/라우팅 (중요한 경우: 로케일 접두사가 붙은 URL `/en` `/de`, `hreflang` 태그 — 이 지점에서 Next.js가 제값을 합니다). 해당하는 경우 RTL 지원 (논리적 CSS 속성, `dir` 속성, 대칭 레이아웃). 세 가지 스크립트를 모두 지원하는 글꼴 (CJK와 아랍어는 특정 글꼴 지원이 필요합니다).\n\n**6단계 — 안전장치.** 개발 환경에 **의사-현지화(pseudo-localization)**를 추가하여 외부화되지 않은 문자열을 찾아냅니다 (의사 모드에서 여전히 영어로 남아있는 것은 누락된 것입니다). 누락되거나 사용되지 않는 키에 대한 CI 검사를 추가하여 세 파일이 서로 달라지지 않도록 합니다. 전환기와 지속성을 테스트합니다.\n\n어떤 프레임워크(일반 React/Vite인지 Next.js인지)와 어떤 세 가지 언어인지 알려주시면, 귀하의 설정에 맞는 실제 패키지와 구성과 함께 이것을 구체적인 작업 목록으로 만들어 드리겠습니다.","B":"문제없습니다 — 합리적인 기본값이 내장된 버전을 드릴 테니, 가정이 틀렸다면 수정하시면 됩니다.\n\n## 추천 기본값 (제가 대신 골라드려야 한다면)\n\n- **라이브러리:** Vite/CRA SPA의 경우 `react-i18next`, Next.js App Router를 사용한다면 `next-intl`. 둘 다 성숙한 라이브러리이며, 선호도가 아닌 프레임워크에 따라 선택하세요.\n- **구조:** 로케일별 네임스페이스 JSON (`/locales/{lang}/{namespace}.json`), `en`을 원본(source-of-truth)으로 사용하고 폴백(fallback)으로 설정.\n- **언어:** 모두 LTR(아랍어/히브리어 없음)이라고 가정하면 아래에 설명된 정도의 노력으로 충분합니다. 만약 RTL이 하나라도 섞여 있다면, **CSS 예산을 두 배로 잡으세요** — 모든 레이아웃에 영향을 미칩니다.\n\n## 실제로 시간이 걸리는 부분\n\n사람들이 과소평가하는 단계는 설정이 아니라 **추출**(1단계)입니다. 프로바이더(provider)를 연결하는 것은 반나절이면 되지만, 기존 앱 전체에서 하드코딩된 모든 문자열을 찾아 교체하는 것은 며칠이 걸리는 고된 작업입니다. 따라서:\n\n1. **추출 자동화** — `i18next-parser`를 실행해 문자열을 JSON으로 뽑아내고 `eslint-plugin-i18next`를 사용해 새로 추가된 하드코딩된 문자열이 있으면 CI를 실패시키세요. 이 작업을 수동으로 하는 것은 이런 프로젝트가 지연되는 전형적인 방식입니다.\n2. **실제 번역 전 의사-지역화(Pseudo-localization)** — `[!!Çöñfïg!!]` 스타일의 가짜 로케일을 초기에 렌더링하세요. 번역가가 결과물을 전달하기 몇 주 전에 잘리는 레이아웃과 누락된 문자열을 드러내 줍니다, 수정 비용이 저렴할 때 말이죠.\n3. **하나의 네임스페이스, 종단 간(end-to-end) 우선 적용** — 하나의 기능을 수직 분할(vertical slice)로 삼아 (provider → extraction → plurals → switcher → QA) 전체를 국제화하세요. 이는 나머지 앱 전체로 확장하기 전에 전체 접근 방식의 리스크를 줄여줍니다.\n\n## 미숙한 설정을 조용히 망가뜨리는 세 가지\n- **복수형** — i18next/ICU 복수형 규칙을 사용하고, 절대 `count === 1 ? … : …`를 사용하지 마세요 (많은 언어에는 3-6개의 복수형이 있습니다).\n- **보간된 JSX** — 링크나 굵은 글씨가 포함된 문자열에는 `<Trans>`를 사용하세요, 그렇지 않으면 번역가들이 유지보수할 수 없는 깨진 마크업을 받게 됩니다.\n- **날짜/숫자/통화** — `Intl.*` 포매터를 사용하고, 절대 문자열 연결을 사용하지 마세요.\n\n## 추천 순서\n0단계 (결정) → 1 (추출 + 린트 게이트) → 2 (프로바이더) → 3의 수직 분할 (복수형/Trans/Intl) → 6 (의사-지역화 QA) → 나머지 앱으로 추출 확장 → 5 (번역가에게 전달) → 7 (기본 로케일 배포 후 전환기 활성화).\n\n3개 언어의 경우, 번역가에게 JSON 파일을 전달하는 것으로 충분합니다 — 더 많은 로케일이나 비기술적인 번역가와 작업하게 되기 전까지는 유료 TMS(Lokalise/Crowdin)는 필요 없습니다.\n\n실제 앱 저장소를 알려주시면, 실제 컴포넌트, 라우팅, 문자열 위치에 맞춰 이를 구체적인 체크리스트로 만들어 드리겠습니다 — 그리고 현실적인 공수 견적을 내드리겠습니다."},{"item":50,"id":"DEC_restgraphql","cat":"DEC","question":"모바일 앱 백엔드를 구축하고 있는데 REST와 GraphQL 사이에서 결정을 못 하겠습니다. 어느 것을 사용해야 할까요?","A":"모바일 백엔드에 대해, 제 솔직한 의견은 이렇습니다: **GraphQL이 더 잘 해결하는 특별한 이유가 없다면 REST로 시작하세요.** 모바일에서 실제로 중요한 장단점을 설명하겠습니다.\n\n## 모바일에서 GraphQL이 진정으로 우세한 경우\n\n- **네트워크 효율성 / 라운드 트립.** 모바일 네트워크는 지연 시간이 길고 불안정합니다. GraphQL을 사용하면 클라이언트는 관련된 엔티티에 걸쳐서도(예: user + 최근 주문 5개 + product thumbnails을 한 번의 호출로) 필요한 필드만 *단 한 번의* 요청으로 가져올 수 있습니다. REST를 사용하면 여러 번의 라운드 트립을 하거나 커스텀 집계 엔드포인트를 만들어야 합니다.\n- **오버/언더 페칭 방지.** 대역폭과 배터리를 절약합니다 — 모바일에서는 실제적인 문제입니다.\n- **클라이언트 주도 반복.** 앱 화면이 자주 바뀌고 UI가 다른 형태의 필드를 필요로 할 때마다 백엔드를 배포하고 싶지 않다면, GraphQL이 이를 분리해 줍니다. 하나의 백엔드가 서로 다른 데이터 요구사항을 가진 iOS + Android + 웹에 서비스를 제공할 때 좋습니다.\n\n## REST가 우세한 경우\n\n- **단순함 & 출시 속도.** 더 적은 도구, 더 적은 학습량, 더 빠른 v1 출시. 소규모 팀이나 1인 개발자에게는 이것이 매우 중요합니다.\n- **HTTP 캐싱.** REST는 CDN/프록시/브라우저 캐싱을 거의 무료로 얻습니다 (GET + 캐시 헤더). GraphQL(단일 POST 엔드포인트)은 이를 훨씬 더
