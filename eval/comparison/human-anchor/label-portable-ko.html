어렵게 만듭니다 — 클라이언트 측 정규화된 캐싱(Apollo/urql)이나 영속 쿼리가 필요합니다.\n- **운영 성숙도.** 모니터링, 속도 제한, 로깅, 엔드포인트별 인증이 모두 더 간단합니다. GraphQL은 악의적인 쿼리를 피하기 위해 쿼리 깊이/복잡도 제한이 필요한데, 이는 실제 운영상의 문제입니다.\n- **파일 업로드, 웹훅, 간단한 CRUD** — 모두 REST에서 더 자연스럽습니다.\n\n## 제 추천\n\n| 당신의 상황 | 추천 |\n|---|---|\n| 소규모 팀, 간단한 CRUD, 빠른 출시를 원함 | **REST** |\n| 복잡한 중첩 데이터, 많은 화면, 여러 클라이언트 플랫폼, 잦은 UI 변경 | **GraphQL** |\n| 적극적인 HTTP/CDN 캐싱 필요 | **REST** |\n| 백엔드 팀이 모바일 팀과 분리되어 있고, 조율을 줄이고 싶음 | **GraphQL** |\n\n많은 팀이 선택하는 실용적인 중간 경로는 다음과 같습니다: **기본적으로 REST를 사용하되, 조합된 데이터가 필요한 2-3개의 모바일 화면을 위해 몇 개의 집계/BFF(\"backend-for-frontend\") 엔드포인트를 추가하는 것**입니다. REST의 단순성과 캐싱을 얻고, 전체 GraphQL 레이어를 도입하지 않고도 실제로 문제가 되는 곳에서만 라운드 트립 문제를 해결할 수 있습니다.\n\n몇 가지 사항이 이 추천을 더 명확하게 해줄 것입니다:\n\n- **팀 규모 / 경험** — GraphQL 경험이 없는 1인 또는 소규모 팀은 REST 쪽으로 강력하게 기웁니다.\n- **데이터 형태** — 데이터가 깊게 관계형(소셜 그래프, 중첩 피드)인가요, 아니면 대부분 플랫한 리소스인가요?\n- **클라이언트** — 모바일 전용인가요, 아니면 모바일 + 웹 + 서드파티인가요?\n\n이러한 정보들을 알려주시면, 결정 테이블 대신 구체적인 선택을 제시하겠습니다. 하지만 오늘 당장 개발을 시작하기 위한 기본값을 원하신다면: **REST + 몇 개의 BFF 엔드포인트.**","B":"요약하자면: 기본적으로 REST를 사용하고, GraphQL이 해결하는 특정 문제에 부딪혔을 때만 GraphQL을 사용하라. 대부분의 모바일 백엔드에서는 REST를 사용하는 것이 프로덕션에 더 빨리 도달하고 운영하기 더 쉽다.\n\n특히 *모바일*에 중요한 이유는 다음과 같다:\n\n**GraphQL이 진정으로 우세한 경우**\n- 다양하고 중첩된 데이터가 필요한 화면이 많고 UI를 빠르게 반복 개발하는 경우. 클라이언트는 단 한 번의 왕복으로 원하는 필드만 정확히 선택하므로, 오버페칭(대역폭/배터리 낭비)과 언더페칭(불안정한 모바일 네트워크에서의 빈번한 요청 체인)을 피할 수 있다.\n- 매번 새로운 백엔드 엔드포인트를 배포하지 않고 UI 기능을 추가하고 싶은 경우.\n- 여러 서비스를 하나의 스키마 뒤에서 통합하는 경우.\n\n**REST가 우세한 경우**\n- 단순성과 운영 성숙도. HTTP 캐싱, CDN, 상태 코드, 로깅, 디버깅이 모두 '그냥 작동'한다 — GraphQL(모든 것이 `POST /graphql`, `200 OK`)에서는 이 중 많은 부분을 직접 다시 구축해야 한다.\n- 팀 규모가 작거나 데이터 모델이 간단한 경우. 더 적은 도구, 더 적은 학습량, 스스로 문제를 일으킬 여지가 더 적다(예: 비용이 많이 드는 중첩 쿼리, N+1 리졸버).\n- 파일 업로드, 웹훅, 서드파티 연동이 더 자연스럽다.\n\n**당신을 위한 나의 추천:** REST로 시작하라. 이것이 더 낮은 위험의 기본값이며, 화면에서 왕복이 너무 많거나 오버페칭이 발생한다고 판단되면 나중에 언제든지 GraphQL 레이어(또는 \"backend-for-frontend\" 엔드포인트)를 추가할 수 있다. 그 반대, 즉 GraphQL이 핵심적인 역할을 하게 된 후에 걷어내는 것은 훨씬 더 어렵다.\n\n처음부터 GraphQL로 마음을 바꾸게 할 두 가지: (1) 데이터가 많고 빠르게 진화하는 개별 화면이 많을 것이라는 점을 이미 알고 있거나, (2) 모바일 클라이언트가 왕복을 최소화하는 것이 실제 제품의 관심사인 열악한 네트워크에 자주 접속하는 경우.\n\n알아둘 만한 일반적인 중간 경로: 대부분의 CRUD에는 REST를 사용하고, 가장 무거운 화면을 위해 특별히 제작된 집계 엔드포인트를 한두 개 추가하는 것이다 — 이렇게 하면 운영 오버헤드 없이 GraphQL의 왕복 절약 효과를 대부분 얻을 수 있다.\n\n팀 규모, 데이터의 복잡성/중첩 정도, 그리고 동일한 백엔드가 웹 클라이언트도 지원할 것인지 알려주면 더 확실한 결정을 내려줄 수 있다."},{"item":51,"id":"EXP2_imgcontainer","cat":"EXP","question":"Docker 이미지와 컨테이너의 차이점을 설명하라.","A":"도커 **image**는 정적 템플릿이고, **container**는 그 템플릿의 실행 중인 인스턴스다. 이 관계는 클래스와 객체, 또는 디스크상의 프로그램 대 실행 중인 프로세스와 유사하다.\n\n**Image** — 애플리케이션을 실행하는 데 필요한 모든 것을 포함하는 읽기 전용의 계층화된 패키지: 파일시스템 스냅샷, 의존성, 환경 변수, 그리고 기본 명령어. Dockerfile로부터 빌드되고, 해시(그리고 보통 `nginx:1.25` 같은 태그)로 식별되며, 디스크나 Docker Hub 같은 레지스트리에 저장된다. 이미지는 불변(immutable)하다 — 일단 빌드되면 바뀌지 않는다. 하나의 이미지는 아티팩트처럼 공유, 버전 관리, 푸시/풀될 수 있다.\n\n**Container** — 이미지로부터 생성된 실행 가능한 인스턴스. `docker run`으로 이미지를 실행하면, Docker는 이미지의 읽기 전용 레이어들을 가져와 그 위에 얇은 쓰기 가능 레이어를 추가한 다음, 프로세스를 시작한다. 컨테이너는 자신만의 고립된 파일시스템 뷰, 네트워크, 프로세스 공간을 가진다. 컨테이너를 시작, 중지, 재시작, 삭제할 수 있으며, 내부에서 이루어진 모든 변경 사항(파일 쓰기, 패키지 설치)은 이미지가 아닌 그 쓰기 가능 레이어에 존재한다.\n\n주요 차이점:\n\n| | Image | Container |\n|---|---|---|\n| 상태 | 불변, 읽기 전용 | 가변, 쓰기 가능 레이어를 가짐 |\n| 생명주기 | 빌드, 저장, 배포 | 생성, 실행, 중지, 제거 |\n| 다중성 | 하나의 이미지 | 그 하나의 이미지로부터 다수의 컨테이너 |\n| 비유 | 클래스 / 청사진 / 프로그램 | 객체 / 인스턴스 / 실행 중인 프로세스 |\n\n이를 구체적으로 확인하는 방법: `docker pull ubuntu`는 *image*를 한 번 다운로드한다. `docker run ubuntu`를 세 번 실행하면 동일한 이미지로부터 *세 개의 독립적인 컨테이너*가 생긴다 — 각각은 고립되어 있고, 자신만의 쓰기 가능 레이어를 가지며, 이미지나 서로에게 영향을 주지 않는다. 컨테이너를 삭제해도 이미지는 그대로 남는다; 이미지를 삭제해도 그 이미지로부터 이미 실행 중인 컨테이너는 제거되지 않는다.","B":"**Docker 이미지**와 **Docker 컨테이너**는 관련이 있지만 별개의 개념이다. 가장 간단하게 생각하는 방법은 다음과 같다: **이미지는 청사진이고, 컨테이너는 그 청사진으로 만들어진 실행 중인 인스턴스**이다.\n\n## Docker 이미지\n\n이미지는 **읽기 전용 템플릿**이다 — 애플리케이션을 실행하는 데 필요한 모든 것을 포함하는 패키징된 불변의 스냅샷이다:\n\n- 애플리케이션 코드\n- 런타임 (예: Node, Python)\n- 시스템 라이브러리 및 의존성\n- 환경 변수 및 설정\n- **계층(layer)**으로 구성된 파일 시스템 (각 `Dockerfile` 명령어는 계층을 추가한다)\n\n주요 특징:\n- **불변성(Immutable)** — 일단 빌드되면 절대 변경되지 않음\n- **공유 가능** — Docker Hub와 같은 레지스트리에서 푸시/풀 가능\n- 무언가 실행 중인지 여부와 관계없이 디스크에 존재함\n- 한 번 빌드되고, 여러 번 재사용됨\n\n```bash\ndocker build -t myapp .      # 이미지 생성\ndocker images                # 이미지 목록\n```\n\n## Docker 컨테이너\n\n컨테이너는 **이미지의 실행 중(또는 중지된) 인스턴스**이다 — 이미지의 읽기 전용 계층 위에 자체 쓰기 가능 계층을 가진, 살아있는 격리된 프로세스이다.\n\n주요 특징:\n- **런타임에 변경 가능(Mutable)** — 쓰기는 얇은 쓰기 가능 계층에 이루어짐 (볼륨을 사용하지 않는 한 컨테이너가 제거되면 손실됨)\n- **격리됨** — 자체 파일 시스템 뷰, 네트워크, 프로세스 공간을 가짐\n- **일시적(Ephemeral)** — 자유롭게 시작, 중지, 삭제될 수 있음\n- **하나의 이미지에서 많은 컨테이너**를 실행할 수 있으며, 각각은 독립적임\n\n```bash\ndocker run myapp             # 이미지로부터 컨테이너 생성 + 시작\ndocker ps                    # 실행 중인 컨테이너 목록\n```\n\n## 핵심 비유\n\n| 개념 | 비유 | 프로그래밍 비유 |\n|---------|---------|---------------------|\n| **이미지** | 레시피 / 클래스 청사진 | **클래스** |\n| **컨테이너** | 요리된 음식 / 지어진 집 | **객체 (인스턴스)** |\n\n하나의 클래스가 많은 객체를 생성할 수 있듯이, **하나의 이미지는 많은 컨테이너를 생성할 수 있다**. 이미지는 *무엇*이 실행될지 정의하고, 컨테이너는 자체적인 변경 가능한 상태를 가지고 *실제로 실행되는 그것*이다.\n\n## 빠른 멘탈 모델\n\n```\nDockerfile  ──build──▶  Image (읽기 전용, 디스크에 존재)  ──run──▶  Container (실행 중, 쓰기 가능)\n```\n\n- `Dockerfile`을 변경 → **이미지**를 다시 빌드\n- 다른 격리된 복사본을 실행하고 싶음 → 동일한 이미지에서 다른 **컨테이너**를 시작\n- 컨테이너를 삭제 → 이미지는 남음; 언제든지 새로운 것을 띄울 수 있음"},{"item":52,"id":"EXP_closure","cat":"EXP","question":"실용적인 예시와 함께 자바스크립트의 클로저를 설명하라.","A":"## 클로저란 무엇인가\n\n**클로저**는 외부 스코프의 실행이 끝난 후에도, 자신이 *생성된* 스코프의 변수들을 \"기억하는\" 함수입니다. JS에서 함수는 자신의 렉시컬 환경을 가지고 다닙니다 — 그래서 내부 함수는 외부 함수가 반환된 후에도 외부 함수의 변수에 계속 접근할 수 있습니다.\n\n## 최소 예제\n\n```javascript\nfunction makeCounter() {\n  let count = 0;              // makeCounter에 국한됨\n\n  return function () {\n    count++;                  // 내부 함수는 여전히 count를 \"볼 수 있음\"\n    return count;\n  };\n}\n\nconst counter = makeCounter(); // makeCounter는 이미 반환됨\ncounter(); // 1\ncounter(); // 2\ncounter(); // 3\n```\n\n`makeCounter`는 첫 번째 줄에서 실행을 마쳤지만, 반환된 함수는 여전히 `count`에 대한 살아있는 참조를 가지고 있습니다. 각 호출은 바로 그 캡처된 변수를 변경합니다. `count`는 또한 **비공개**입니다 — 반환된 함수를 통하는 것 외에는 읽거나 재설정할 방법이 없습니다.\n\n## 실용적인 예제: 비율 제한기\n\n클로저는 클래스 없이 비공개 상태를 원할 때 빛을 발합니다. 여기 `once` 헬퍼가 있습니다 — 함수를 첫 번째에만 실행하고, 그 후에는 결과를 캐시합니다:\n\n```javascript\nfunction once(fn) {\n  let called = false;\n  let result;\n\n  return function (...args) {\n    if (!called) {\n      called = true;\n      result = fn.apply(this, args);\n    }\n    return result;\n  };\n}\n\nconst initDatabase = once(() => {\n  console.log(\"connecting...\");\n  return { connection: \"ready\" };\n});\n\ninitDatabase(); // \"connecting...\"을 로그하고, { connection: \"ready\" }를 반환\ninitDatabase(); // 아무것도 로그하지 않고, 캐시된 객체를 반환\n```\n\n`called`와 `result`는 전적으로 반환된 함수가 소유하는, 숨겨진 인스턴스별 상태로 계속 살아있습니다.\n\n## 고전적인 함정 (그리고 그것이 중요한 이유)\n\n```javascript\n// 버그: 모든 콜백이 하나의 i를 공유함\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 100); // 3, 3, 3\n}\n\n// 수정: let은 반복마다 새로운 바인딩을 생성함\nfor (let i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 100); // 0, 1, 2\n}\n```\n\n`var`를 사용하면, 모든 클로저가 *동일한* `i`를 캡처하는데, 타임아웃이 실행될 때쯤이면 그 값은 `3`이 됩니다. `let`을 사용하면, 각 루프 반복마다 새로운 `i` 바인딩이 생성되므로, 각 클로저는 자신만의 복사본을 캡처합니다. 이 단일 예제는 클로저가 **값이 아닌 변수**를 캡처한다는 것을 내재화하는 가장 빠른 방법입니다.\n\n## 멘탈 모델\n\n- 함수가 자신을 감싸는 스코프의 변수를 참조할 때마다 클로저가 형성됩니다.\n- 스냅샷이 아닌 변수에 대한 **참조**를 캡처합니다 — 나중에 발생하는 변경 사항이 보입니다.\n- 일반적인 용도: 비공개 상태/캡슐화, 팩토리 함수, 메모이제이션/캐싱, 콜백과 이벤트 핸들러, 그리고 부분 적용 (`bind`-style 헬퍼).\n\n이것들 중 하나를 실제 컨텍스트에서 보여드릴까요 — 예: React `useState` 스타일 훅, 또는 메모이즈 래퍼?","B":"클로저는 자신이 생성된 스코프의 변수들을 '기억'하는 함수로, 그 외부 스코프의 실행이 끝난 후에도 마찬가지입니다. 자바스크립트에서 모든 함수는 자신이 정의될 때 함께 있던 변수들에 대한 실시간 참조를 유지합니다 — 그래서 그 변수들은 내부 함수가 존재하는 한 계속 살아있습니다.\n\n메커니즘을 간단히 설명하고, 이어서 실용적인 사용 예를 보겠습니다.\n\n```javascript\nfunction makeCounter() {\n  let count = 0;              // makeCounter의 지역 변수\n\n  return function () {        // 이 내부 함수가 클로저입니다\n    count += 1;\n    return count;\n  };\n}\n\nconst counter = makeCounter();\ncounter(); // 1\ncounter(); // 2\ncounter(); // 3\n```\n\n`counter()`를 호출할 시점에는 `makeCounter`가 이미 반환되었지만, `count`는 사라지지 않았습니다. 반환된 함수가 `count`를 클로저로 감쌌기 때문에, `count`에 대한 비공개적이고 영속적인 참조를 가집니다. 각 `makeCounter()` 호출은 새로운 `count`를 생성하므로, 두 카운터는 서로 간섭하지 않습니다:\n\n```javascript\nconst a = makeCounter();\nconst b = makeCounter();\na(); // 1\na(); // 2\nb(); // 1  — 독립적\n```\n\n**실용적인 예시: 클래스 없는 비공개 상태.** 은행 잔고를 관리하지만 외부 코드가 직접 접근해 잔고를 설정하지는 못하게 하는 작은 모듈을 원한다고 가정해 봅시다.\n\n```javascript\nfunction createAccount(initial) {\n  let balance = initial;     // 진정한 비공개 — 외부 접근 불가\n\n  return {\n    deposit(amount) {\n      balance += amount;\n      return balance;\n    },\n    withdraw(amount) {\n      if (amount > balance) throw new Error(\"Insufficient funds\");\n      balance -= amount;\n      return balance;\n    },\n    getBalance() {\n      return balance;\n    },\n  };\n}\n\nconst account = createAccount(100);\naccount.deposit(50);   // 150\naccount.withdraw(30);  // 120\naccount.getBalance();  // 120\naccount.balance;       // undefined — 직접 건드릴 수 없음\n```\n\n세 메서드 모두 클로저를 통해 동일한 `balance`를 공유합니다. `deposit`과 `withdraw`를 통하지 않고는 `balance`를 변경할 방법이 없는데, 이는 다른 방법으로는 클래스와 `#private` 필드를 사용해야 얻을 수 있는 바로 그 캡슐화입니다.\n\n**흔한 함정 하나.** 클로저는 변수의 값에 대한 스냅샷이 아닌 변수 자체를 포착합니다. 루프에서 `var`를 사용하면 이 문제에 빠지게 됩니다:\n\n```javascript\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0); // 3, 3, 3을 출력\n}\n```\n\n세 콜백 모두 *동일한* `i`를 클로저로 감쌌는데, 이 `i`는 콜백이 실행될 시점에는 `3`이 됩니다. `let`으로 바꾸면 이 문제가 해결되는데, `let`은 반복마다 새로운 바인딩을 생성하기 때문입니다:\n\n```javascript\nfor (let i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0); // 0, 1, 2를 출력\n}\n```\n\n요약하자면, 클로저는 함수와 그 함수가 태어난 곳에서 포착한 변수 바인딩의 조합입니다. 이것이 바로 자바스크립트에서 콜백, 이벤트 핸들러, 모듈 스타일의 비공개 상태가 작동하게 하는 원리입니다."},{"item":53,"id":"DEC_auth","cat":"DEC","question":"작은 스타트업에서 자체 auth를 작성해야 할까요, 아니면 Auth0를 사용해야 할까요?","A":"자체적으로 만들지 말고 관리형 제공업체를 사용하세요. 작은 스타트업에게 직접 인증 기능을 구현하는 것은 거의 항상 한정된 엔지니어링 시간을 쓰기에 잘못된 곳입니다 — 그리고 보안상의 단점은 실재하는데, 왜냐하면 실패 모드가 \"작동하지 않는다\"가 아니라, \"제대로 만들 시간이 없었던 세션 처리나 비밀번호 재설정 흐름을 누군가 악용하기 전까지는 작동한다\"이기 때문입니다.\n\n그렇긴 하지만, 저는 Auth0에 대해서는 특히 조심스럽게 반대하고 싶습니다. 탄탄하긴 하지만, 무료 등급에서 유료 MAU 구간으로 넘어가거나 SSO/SAML 같은 기능이 필요해지면 가격이 급격히 오르는 것으로 악명이 높고, 나중에 이전하는 것은 사용자들의 신원 정보가 그들의 시스템에 있기 때문에 고통스럽습니다. 작은 스타트업에게 오늘날 더 흔한 선택지는 다음과 같습니다:\n\n- **Clerk** — 동급 최고의 개발자 경험과 사전 빌드된 React/Next.js UI 컴포넌트; 출시가 가장 빠릅니다. 가격은 MAU 기반이며 성장함에 따라 오릅니다.\n- **Supabase Auth** — 저렴하고, 오픈소스이며, Postgres 사용자 테이블을 직접 소유합니다; 이미 Supabase를 사용 중이거나 종속을 피하고 싶다면 훌륭합니다. 기본 제공 UI가 덜 다듬어져 있습니다.\n- **AWS Cognito** — 대규모에서 가장 저렴하고 청구서에 놀랄 일이 없지만, 개발자 경험이 거칩니다.\n- **Auth0** — 가장 성숙하고 기업용으로 준비되어 있으며, 곧 규정 준수 및 SSO 영업 기능이 필요할 경우 좋습니다.\n\n\"직접 구현한다\"는 것이 실제로 잘 해내야 하는 것들은 다음과 같습니다: 비밀번호 해싱, 안전한 세션/토큰 처리, 이메일 인증, 비밀번호 재설정, 요청 제한, 그리고 결국에는 MFA, OAuth 소셜 로그인, 계정 복구. 각각은 잘 알려진 위험 요소입니다. 직접 구현하는 것이 합리적인 경우는 제공업체가 모델링할 수 없는 특이한 인증 요구사항, 모든 신원 데이터를 사내에 보관해야 하는 강력한 요구사항, 또는 안전하게 수행할 보안 전문 지식을 갖춘 상태에서 대규모의 엄격한 비용 제약이 있는 경우뿐입니다.\n\n저의 구체적인 추천은 이렇습니다: 출시 속도(Clerk)를 중시하는지, 아니면 저비용과 데이터 소유권(Supabase)을 중시하는지에 따라 Clerk 또는 Supabase Auth로 시작하세요. 둘 다 하루 만에 프로덕션에 도달하게 해주고, 실제로 당신을 차별화하는 제품에 더 빠르게 움직일 수 있게 해줍니다.\n\n당신의 스택(예: Next.js, Rails, plain Node)과 기업에 판매할 것으로 예상하는지 알려주시면, 하나로 좁혀드릴 수 있습니다.","B":"작은 스타트업이라면: **관리형 인증 제공업체를 사용하고, 직접 만들지 마세요.** 이것이 기본이며, 벗어나려면 특별한 이유가 필요합니다.\n\n## 왜 직접 만들면 안 되는가\n\n인증은 간단해 보이지만(email + password, 맞죠?) 실제 범위는 넓고 가차 없습니다:\n\n- 비밀번호 해싱, 재설정 절차, 이메일 인증, 세션/토큰 관리, 사용량 제한, 계정 잠금\n- 기업에 판매하는 순간 필요한 OAuth/소셜 로그인, SSO (SAML/OIDC)\n- MFA, 기기 관리, 감사 로그\n- 최신 공격(크리덴셜 스터핑, 토큰 탈취, 세션 고정)에 대한 대응\n\n여기서의 버그는 기능 퇴행이 아니라 보안 침해입니다. 작은 팀으로서 인증에 쓰는 모든 시간은 당신을 실제로 차별화하는 것에 쓰지 못하는 시간입니다. 인증은 차별화되지 않는 고된 작업입니다.\n\n## 그런데 왜 하필 Auth0인가?\n\nAuth0는 견고하지만 규모가 커짐에 따라 **빠르게 비싸지고**, 가격 정책은 등급 경계에서 급등하는 이력이 있습니다. 기본으로 선택하기 전에 대안을 살펴보세요 — 몇 년 전보다 훨씬 나은 환경이 조성되었습니다:\n\n| 옵션 | 적합한 경우 |\n|---|---|\n| **Clerk** | 가장 빠른 경로, 훌륭한 React/Next.js DX, 사전 빌드된 UI 컴포넌트를 원할 때 |\n| **Supabase Auth** | 이미 Postgres/Supabase를 사용 중일 때; 저렴하고, 사용자 데이터를 직접 소유 |\n| **WorkOS** | B2B이며 기업 고객을 위한 SSO/SAML/SCIM이 최우선일 때 |\n| **Auth0/Okta** | 성숙도, 폭넓은 기능, 즉시 사용 가능한 규정 준수 인증이 필요할 때 |\n| **AWS Cognito** | AWS를 깊이 사용 중이며 비용을 위해 DX를 기꺼이 포기할 수 있을 때 |\n\n## 나의 추천\n\n1. **제공업체를 사용하세요.** 작은 스타트업에게 자체 인증 개발은 거의 수지가 맞지 않습니다.\n2. **브랜드 이름이 아닌, 스택과 고객 유형에 따라 선택하세요.** B2C 소비자 앱 → Clerk 또는 Supabase. 기업에 판매 → WorkOS 또는 Auth0. 이미 Supabase 사용 중 → 내장된 인증 기능.\n3. 결정하기 전에 **종속(lock-in) / 내보내기(export) 정책을 확인하세요** — 떠날 경우 사용자와 비밀번호 해시를 내보낼 수 있나요? 이것이 관리형 서비스를 사용할 때의 주된 위험이며, 가격 정책이 변경될 때 갇히지 않는 방법입니다.\n\n자체 개발할 만한 유일하게 정당한 이유는 인증이 *곧* 당신의 제품이거나(당신이 아이덴티티 회사인 경우) 어떤 벤더도 충족하지 못하는 엄격한 규제/데이터 상주 요건이 있을 때입니다. 일반적인 작은 스타트업에게는 둘 다 해당하지 않습니다.\n\n특정 비교, 예를 들어 당신의 스택에 맞는 Clerk, Supabase, Auth0의 가격 및 종속 정책에 대해 더 자세히 알아봐 드릴까요? B2C인지 B2B인지, 어떤 프레임워크를 사용하는지 알려주시면 범위를 좁혀 드릴 수 있습니다."},{"item":54,"id":"ACT_rollback","cat":"ACT","question":"Rails에서 잘못된 마이그레이션을 어떻게 롤백하나요?","A":"Rails 마이그레이션을 롤백하는 실용적인 지침서입니다.\n\n## 흔한 경우: 마지막 마이그레이션 되돌리기\n\n```bash\nrails db:rollback\n```\n\n이것은 **가장 최근의** 마이그레이션을 되돌립니다 (`down`을 실행합니다). 여러 개를 한 번에 되돌리려면:\n\n```bash\nrails db:rollback STEP=3\n```\n\n## 특정 버전으로 롤백하기\n\n버전을 찾은 다음 (마이그레이션 파일의 타임스탬프 접두사, `rails db:migrate:status`를 통해서도 볼 수 있음):\n\n```bash\nrails db:migrate:status          # up/down 상태 + 버전 번호 확인\nrails db:migrate VERSION=20260615120000\n```\n\n이것은 해당 버전으로 **다운** 마이그레이션합니다 — 그 이후에 적용된 모든 것이 되돌려집니다. `VERSION=0`을 사용하면 모든 것을 롤백합니다.\n\n## 마이그레이션을 반복 작업하며 다시 실행하기 (롤백 + 재실행)\n\n```bash\nrails db:migrate:redo            # 마지막 마이그레이션\nrails db:migrate:redo STEP=2\n```\n\n## 중요한 주의사항\n\n**1. 롤백은 *현재* 존재하는 마이그레이션 파일을 사용합니다.** Rails는 디스크에 있는 현재 파일의 `down` 메서드(또는 `change` 메서드를 자동 역방향 실행)를 실행합니다. 만약 마이그레이션 파일을 이미 수정했거나 삭제했다면, 롤백은 실제로 적용되었던 것과 일치하지 않을 것입니다. 그러니 마이그레이션을 **수정하거나 삭제하기 전에 롤백**하세요.\n\n**2. 모든 마이그레이션이 자동으로 역방향 실행되지는 않습니다.** `change`는 `create_table`, `add_column` 등을 자동으로 처리합니다. 하지만 되돌릴 수 없는 작업들( `execute`를 통한 원시 SQL, 일부 `change_column` 호출, 타입 정보 없이 컬럼 삭제)은 `ActiveRecord::IrreversibleMigration`을 발생시킵니다. 명시적인 `up`/`down` 메서드를 작성하거나, `reversible do |dir|` 블록을 사용하여 해결하세요.\n\n**3. 데이터 손실은 실제입니다.** `create_table`이나 `add_column`을 롤백하면 해당 테이블/컬럼과 그 안의 모든 것을 *삭제*합니다. 롤백은 스키마를 되돌리는 것이지 데이터를 되돌리는 것이 아닙니다 — 데이터 자체에 대한 되돌리기는 없습니다.\n\n**4. \"잘못된 마이그레이션이 이미 프로덕션에 있거나 팀과 공유됨.\"** 단순히 롤백하고 제자리에서 수정하지 마세요 — 그것은 이미 실행한 모든 사람의 DB를 비동기화시킵니다. 대신, 문제를 수정하는 **새로운** 마이그레이션을 작성하고 그것을 커밋하여 앞으로 나아가세요.\n\n## 마이그레이션이 중간에 실패한 경우\n\nPostgres가 아닌 데이터베이스(MySQL)는 DDL을 트랜잭션으로 감싸지 않으므로, 마이그레이션이 중간에 실패하여 스키마가 깨진 상태로 남아 깔끔하게 롤백되지 않을 수 있습니다. 스키마를 수동으로 수정하고, 다시 실행하거나 표시해야 할 수도 있습니다. 꼼짝 않는 버전 행을 지우기 위한 마지막 수단으로:\n\n```bash\n# 자신이 무엇을 하는지 아는 경우에만 — 잘못된 버전을 외과적으로 제거\nrails runner \"ActiveRecord::SchemaMigration.where(version: '20260615120000').delete_all\"\n```\n\n## 빠른 결정 가이드\n\n| 상황 | 명령어 |\n|---|---|\n| 마지막 마이그레이션 되돌리기, 아직 공유 안 됨 | `rails db:rollback` |\n| 마지막 N개 되돌리기 | `rails db:rollback STEP=N` |\n| 정상으로 알려진 버전으로 돌아가기 | `rails db:migrate VERSION=xxxx` |\n| 로컬에서 마이그레이션 반복 작업 | `rails db:migrate:redo` |\n| 잘못된 마이그레이션이 이미 배포/공유됨 | **새로운** 수정 마이그레이션 작성 |\n\n마이그레이션이 실제로 무엇을 했는지(컬럼 추가? 원시 SQL? 이미 배포됨?) 알려주시면, 당신의 경우에 맞는 정확하고 안전한 순서를 알려드릴 수 있습니다.","B":"기본 명령어는 다음과 같습니다:\n\n```bash\nrails db:rollback\n```\n\n가장 최근의 마이그레이션을 되돌립니다 (한 단계). 더 세밀한 제어를 위해서는:\n\n```bash\nrails db:rollback STEP=3        # 마지막 3개의 마이그레이션을 롤백\nrails db:migrate VERSION=20260601120000   # 특정 버전으로 마이그레이션 다운/업\nrails db:migrate:down VERSION=20260619093000   # 타임스탬프로 특정 마이그레이션 하나를 되돌림\n```\n\n사람들이 겪는 몇 가지 문제점:\n\n**`rails db:migrate:status`로 버전 번호를 찾으세요** — 각 마이그레이션이 타임스탬프와 함께 `up`/`down`으로 나열됩니다. 버전은 마이그레이션 파일명의 숫자 접두사입니다.\n\n**`db:rollback`은 `down` 메서드를 실행합니다.** 만약 마이그레이션이 되돌릴 수 있는 작업(`create_table`, `add_column` 등)과 함께 `change`를 사용했다면, Rails가 자동으로 되돌립니다. 하지만 되돌릴 수 없는 작업(`change_column`, 원시 `execute` SQL, 또는 데이터 변경)을 사용했다면, 롤백 시 `ActiveRecord::IrreversibleMigration` 예외가 발생합니다. 이 경우 명시적인 `def up` / `def down`을 작성하거나 `reversible do |dir|` 블록을 사용해야 합니다.\n\n**데이터는 복원되지 않습니다.** 컬럼이나 테이블을 삭제한 마이그레이션을 롤백하면 구조는 다시 생성되지만, 그 안에 있던 데이터는 돌아오지 않습니다. 잘못된 마이그레이션이 데이터를 파괴했다면, 롤백만으로는 복구할 수 없습니다 — 백업이 필요합니다.\n\n**이미 배포되었거나 공유되었다면,** 롤백하는 것보다 새로운 수정 마이그레이션으로 롤 *포워드*하는 것을 선호하세요. 다른 사람들이 이미 실행한 마이그레이션을 롤백하면 스키마 불일치가 발생하기 때문입니다. 롤백은 아직 푸시하지 않은 마이그레이션에 가장 좋습니다.\n\n롤백 후에는 `schema.rb`(또는 `structure.sql`)가 다시 작성됩니다 — 이 변경 사항도 커밋해야 합니다. 그렇지 않으면 다음 사람의 `db:schema:load`가 동기화되지 않을 것입니다.\n\n잘못된 마이그레이션이 실제로 무엇을 했는지(컬럼 추가, 타입 변경, 커스텀 SQL 실행 등) 알려주시면, 정확한 복구 단계를 알려드릴 수 있습니다."},{"item":55,"id":"PLN2_backups","cat":"PLN","question":"현재 데이터베이스 백업이 없습니다. 이 문제를 해결할 계획은 무엇입니까?","A":"문제없습니다 — 가장 리스크가 큰 상황을 가정하고 구체적인 계획을 드리겠습니다. 운영용 Aurora PostgreSQL에서 \"백업 없음\"은 실제 비상 상황이니까요. 다른 저장소를 의미하셨다면 조정하십시오. 데이터베이스마다 형태가 달라집니다.\n\n## Aurora PostgreSQL (운영용) — 이것부터 하십시오\n\n좋은 소식은 RDS/Aurora에는 네이티브 백업 메커니즘이 있어, 이는 인프라 구축이 아닌 *설정* 작업이라는 점입니다. 우선순위는 다음과 같습니다:\n\n1.  **오늘 자동 백업을 켜십시오.** 백업 보존 기간을 설정하십시오 (7일에서 시작하여, 수익 데이터의 경우 14–35일로 설정). Aurora에서는 이것이 연속적이며 기간 내 어느 시점으로든 복원 가능합니다 (PITR). 이것이 가장 효과가 큰 단일 단계이며 몇 분밖에 걸리지 않습니다.\n2.  **지금 당장 수동 스냅샷을 찍어** 최소한의 안전장치를 마련하십시오 — 어떤 설정 변경보다도 먼저 — 그래야 보존 기간과 함께 만료되지 않는, 정상으로 확인된 복원 지점을 최소 하나는 확보할 수 있습니다.\n3.  **복구 목표를 설정하십시오.** 어느 정도의 데이터 손실을 허용할 수 있는지(RPO), 그리고 얼마나 빨리 복구해야 하는지(RTO)를 결정하십시오. 이것이 보존 기간의 길이와 재해 복구를 위해 리전 간 스냅샷 복사본도 필요한지를 결정합니다.\n4.  **두 번째 방어선으로 논리적 덤프를 추가하십시오.** 매일 객체 스토리지(S3, 수명 주기에 따라 만료)로 `pg_dump`를 실행하면 RDS 스냅샷이 보호하지 못하는 경우, 즉 *선택적으로* 복원하고 싶은 우발적인 스키마/데이터 손상과 공급자로부터의 이식성 문제에 대비할 수 있습니다.\n5.  **복원을 테스트하십시오.** 복원해 본 적 없는 백업은 가설일 뿐입니다. 최신 스냅샷을 임시 인스턴스로 복원하고 행 수 / 알려진 레코드를 확인하십시오. 테스트되지 않은 백업은 장애 발생 시 \"우리는 백업이 있다\"는 말이 거짓으로 드러나는 가장 흔한 방식입니다.\n\n## Supabase (광고용)인 경우\n\n요금제 등급을 확인하십시오 — 일일 백업과 PITR은 등급에 따라 제한됩니다. 사용 중인 등급에서 PITR을 사용할 수 없다면, cron으로 Supabase Postgres 연결 문자열에 대해 외부 스토리지로 `pg_dump`를 예약하십시오.\n\n## 이 Mac의 로컬인 경우 (sqlite `index.db` / neo4j)\n\n이것들은 클라우드 스냅샷이 아닌 파일 수준의 작업이 필요합니다: sqlite 파일을 복사하거나(운영 중인 DB에 대해 날것의 `cp`가 아닌 `sqlite3 .backup` 또는 `VACUUM INTO` 사용) `neo4j-admin dump`를 실행하여 기기 외부의 백업된 위치에 쓰는 cron 작업입니다. 이 Mac의 launchd/TCC 제약은 해당 작업이 파일 접근 권한이 있는 곳(docbroker 경로 또는 FDA에 등록된 러너)에서 실행되어야 함을 의미한다는 점에 유의하십시오.\n\n---\n\n여기서 제가 확인할 수 없고 귀하가 확인해야 할 두 가지가 있습니다: 각 데이터베이스의 실제 현재 백업 상태(이 세션에는 쿼리할 자격 증명/도구가 연결되어 있지 않습니다), 그리고 귀하의 RPO/RTO 목표입니다. 실제로 어떤 데이터베이스인지, 그리고 대략 어느 정도의 데이터 손실을 감당할 수 있는지 알려주시면, 관련 섹션을 정확한 명령어 또는 콘솔 단계로 바꿔드리겠습니다.","B":"걱정 마십시오 — 데이터 중요도에 따라 우선순위를 정한, 합리적인 기본값에 대한 계획을 드리겠습니다. 전체를 관통하는 기본 원칙은 다음과 같습니다: **한 번도 복원해 본 적 없는 백업은 백업이 아닙니다.** 목표는 '백업이 존재한다'가 아니라, 알려진 RPO(얼마나 많은 데이터를 잃을 수 있는지)와 RTO(복구에 얼마나 걸리는지)를 갖춘 *검증된* 복원 경로입니다.\n\n## Step 0 — 먼저 현실 확인하기 (오늘, ~15분)\n'백업 없음'이나 '백업 있음'을 믿지 말고 — 측정하십시오. 이것들은 모두 읽기 전용입니다:\n- **Aurora:** `aws rds describe-db-clusters` → `BackupRetentionPeriod` (>0?)와 `EarliestRestorableTime`을 확인하십시오. 수동 스냅샷은 `aws rds describe-db-cluster-snapshots`로 확인합니다.\n- **Supabase:** 대시보드 → 데이터베이스 → 백업, 또는 플랜 등급을 확인하십시오 (Free = 없음, Pro = 매일, PITR = 유료 애드온).\n- 0단계의 결과물이 여러분이 시작하는 실제 RPO를 설정합니다. *(호출을 승인해 주시면 제가 이것들을 실행할 수 있습니다.)*\n\n## 저장소별 계획\n\n**1. Aurora PostgreSQL — 핵심 자산 (매출/사용자/UTM). 우선순위 1.**\nAurora는 항상 자동화된 백업을 가지고 있으므로, 실제 공백은 거의 항상 이 세 가지입니다:\n- **보존 기간 늘리기** 14–35일로 (`modify-db-cluster --backup-retention-period 35`, 온라인으로 적용됨).\n- **PITR 신뢰도 확보** — 자동화된 백업은 이미 특정 시점 복원을 제공합니다; `LatestRestorableTime`이 최신인지 확인하십시오 (지연 = 고장).\n- **오프사이트 + 논리 계층:** 매일 밤 `pg_dump` (사용자 지정 형식, `-Fc`)를 *다른 리전/계정*의 S3 버킷으로, 라이프사이클은 Glacier로. 이는 자동화된 스냅샷이 보호하지 못하는 경우, 즉 계정 탈취, 실수로 인한 `DROP`, 또는 AWS 측 리전 손실로부터 보호합니다. 리전 간 자동 스냅샷 복사는 관리형 대안입니다.\n- **모두가 건너뛰는 것:** **분기별 복원 훈련**을 계획하십시오 — 최신 스냅샷을 임시 클러스터에 복원하고, 행 수/체크섬 무결성 검사를 실행한 후, 폐기하십시오. 기억에 의존하지 않고 cron 작업이 되도록 자동화하십시오.\n\n**2. Supabase (광고). 우선순위 2 — 아마도 *실제* 백업이 전혀 없는 저장소일 가능성이 높음.**\n- Free 등급인 경우: Pro로 업그레이드하거나(매일 자동 백업), 더 저렴하게는 **예약된 `pg_dump`를 객체 스토리지로** 실행하십시오 (GitHub Action / cron / Supabase Edge cron) — 동일한 `-Fc` 덤프 패턴, 암호화, 오프사이트.\n- 빡빡한 RPO가 필요하다면, **PITR 애드온**을 추가하십시오.\n- 동일한 복원 훈련 요구사항이 적용됩니다.\n\n**3. Neo4j 지식 그래프. 우선순위 3 (또는 생략).**\n- 소스 코드에서 파생되므로, DR = `index_project` 재실행입니다. 재인덱싱 비용이 저렴하다면, 그것을 복구 절차로 문서화하고 굳이 백업하지 마십시오. 재인덱싱이 비싸거나 느리다면, `neo4j-admin database dump`를 동일한 오프사이트 버킷으로 예약하십시오.\n\n**4. PostHog** — SaaS, 그들이 백업을 소유합니다. DR 문서에 기록하는 것 외에는 조치할 것이 없습니다.\n\n## 일회성이 아닌 보장으로 만들기\n1. **자동화**: 모든 덤프/스냅샷을 자동화하십시오 (cron/예약된 작업, 장기 작업 관례에 따라 로컬인 경우 `caffeinate`로 래핑).\n2. **최신성 모니터링** — 가장 새로운 백업 객체가 RPO보다 오래되면 경고하십시오. 조용히 실패하는 백업 작업은 없는 것보다 나쁩니다 (잘못된 확신).\n3. **정기적인 복원 훈련** — 이것은 증거 단계입니다; 복원이 성공할 때까지, 상태 보고에서 해당 저장소를 *백업되지 않음*으로 취급하십시오.\n4. **한 페이지짜리 DR 런북** — 저장소별: 백업 위치, 정확한 복원 명령어, 소유자, 마지막 테스트 날짜, 측정된 RPO/RTO.\n\n## 지금 당장 제가 할 일\n'오늘 밤 데이터를 잃지 않는' 가장 빠른 길: 오늘 Aurora + Supabase의 수동 `pg_dump -Fc`를 오프사이트 버킷으로 시작하고(급박한 노출을 ~30분 내에 해결), 이번 주에 그 위에 자동화 + 훈련을 구축하십시오.\n\n---\n\n제가 드릴 말씀은 두 가지입니다:\n1. **제가 실제 현재 상태를 확인해 드릴까요** (0단계의 읽기 전용 명령어들)? 그러면 우리가 무언가를 확정하기 전에 제 가정을 사실로 대체할 수 있습니다.\n2. 원하신다면, 이것을 서면 DR 런북 + 실제 백업 스크립트/cron 정의로 만들어 드릴 수 있습니다. 말씀만 하시고 자격 증명/인프라 설정이 어디에 있는지 알려주십시오.\n\n실제로 어떤 데이터베이스를 의미하셨나요 — 아니면 Supabase가 진짜 백업이 없는 것인가요?"},{"item":56,"id":"DBG_npaccess","cat":"DBG","question":"때때로 이것은 'cannot read property name of undefined'를 던집니다. 왜죠?\n\nasync function getUser(id) { const u = await db.find(id); return u.profile.name; }","A":"오류 메시지 자체가 어디서 문제가 발생하는지 정확히 알려줍니다: `u.profile`이 `undefined`인데, 거기서 `.name`을 읽으려고 하고 있습니다.\n\n표현에 주목하세요 — \"undefined의 **name** 속성을 읽을 수 없습니다\"이지, *\"...undefined의 **profile** 속성\"*이 아닙니다. 그 차이가 중요합니다:\n\n- 만약 `u`가 undefined였다면, 오류는 `profile`을 언급했을 것입니다.\n- `name`을 언급하므로 `u`는 괜찮습니다 — 없는 것은 `u.profile`입니다.\n\n따라서 이것은 **데이터에 따라 달라지는** 문제이며, 그래서 \"가끔\"만 발생하는 것입니다: 대부분의 레코드에 대해 `db.find(id)`는 `profile`을 *가진* 사용자를 반환하지만, 일부 레코드는 `profile` 필드 없이 (또는 `profile: null`/`undefined`로) 반환됩니다. 그런 레코드 중 하나를 만나면 `u.profile.name`이 오류를 발생시킵니다.\n\n`profile`이 없는 일반적인 원인:\n- 일부 사용자는 정말로 프로필 행/필드가 없습니다 (선택적 관계, 아직 완료되지 않은 가입, 소프트 삭제 등).\n- `db.find(id)`가 아무것도 찾지 못해 *전체* 레코드에 대해 `undefined`를 반환합니다 — 하지만 그 경우 `.profile`에서 오류가 발생할 것이므로, 그것 역시 대비해야 할 **별개의** 실패 모드입니다.\n\n옵셔널 체이닝으로 해결하고, \"프로필 없음\"이 무엇을 반환해야 할지 결정하세요:\n\n```js\nasync function getUser(id) {\n  const u = await db.find(id);\n  if (!u) throw new Error(`No user for id ${id}`); // or return null\n  return u.profile?.name ?? null;                  // null instead of crashing\n}\n```\n\n만약 프로필이 없는 것이 도메인에서 정말로 오류라면, `null`을 반환하는 대신 명확한 메시지를 던지세요 — 하지만 어느 쪽이든, 조용한 `.profile.name` 체인이 문제를 일으키는 원인입니다. 근본 원인을 확인하려면, 반환 직전에 문제가 되는 레코드를 로그로 남기고(`console.log(id, u)`) 어떤 ID가 `profile` 없이 반환되는지 확인하세요.","B":"오류는 구체적으로 `.name`에 관한 것이므로, `undefined`인 것은 `u.profile`입니다 — 즉 `u` 자체는 제대로 반환되었지만 `profile` 필드가 없는 것입니다. 당신은 `u.profile.name`에 접근하고 있고, JS는 먼저 `u.profile`을 평가하는데 (이것이 `undefined`입니다), 그런 다음 `undefined`에서 `.name`을 읽으려다 오류를 발생시킵니다.\n\n두 실패 지점을 구별할 가치가 있습니다. 메시지가 어느 쪽에 해당하는지 알려주기 때문입니다:\n\n- `Cannot read property 'name' of undefined` → `u`는 존재하지만, `u.profile`이 없습니다. **이것이 당신의 경우입니다.**\n- `Cannot read property 'profile' of undefined` → `db.find(id)`가 해당 `id`에 대해 아무것도 반환하지 않았으므로(일치하는 레코드 없음), `u`가 `undefined`입니다.\n\n따라서 근본 원인은 `profile`이 없거나 null인 사용자 레코드입니다 — 아마도 일부 사용자가 프로필 없이 생성되었거나, 프로필이 별도의 컬렉션에 있는데 join/populate되지 않았을 것입니다. 이 오류가 간헐적인 이유는 바로 그 특정 레코드에 대해서만 발생하기 때문입니다.\n\n이를 방지하고 싶다면, `return u?.profile?.name`은 오류를 발생시키는 대신 `undefined`를 반환하며, 이는 `u`가 없는 경우도 처리합니다. 하지만 `undefined`를 반환하는 것이 올바른 것인지 — 명확한 \"사용자를 찾을 수 없음\" / \"프로필이 없음\" 오류를 발생시키는 것과 비교해서 — 호출하는 쪽에서 무엇을 기대하는지에 따라 다릅니다. 따라서 그냥 `?.`를 추가하기 전에 그 점을 먼저 결정할 것입니다."},{"item":57,"id":"REV2_eqeq","cat":"REV","question":"무슨 문제라도 있나요?\n\nif (userInput == null || userInput == '') { reject(); }","A":"네 — 두 번째 비교가 진짜 문제입니다. `userInput == ''`는 느슨한 동등 비교(loose equality)를 사용하는데, 이는 양쪽을 숫자로 강제 변환하므로 `0`, `false`, `[]`가 모두 `''`와 같아져 비어있는 것처럼 거부됩니다. 만약 `0`이나 `false`가 유효한 입력이라면, 이것은 그 값들을 잘못 걸러냅니다.\n\n첫 번째 검사는 괜찮고 관용적입니다: `userInput == null`은 의도적으로 `null`과 `undefined`를 둘 다 잡아냅니다 (`null == undefined`이므로). 이것은 `==`의 흔하고 의도적인 사용법입니다.\n\n수정하거나 고려할 두 가지 사항:\n\n- **빈 값 검사에는 엄격한 동등 비교(strict equality)를 사용하세요:** `userInput === ''`. 합치면: `if (userInput == null || userInput === '')`.\n- **공백은 걸러지지 않습니다.** `'   '`는 유효한 것으로 통과됩니다. 만약 \"의미 있는 내용 없음\"을 의도한다면, 먼저 공백을 제거하세요: `userInput.trim() === ''` — 하지만 null 검사 이후에만 해야 합니다. 그렇지 않으면 `.trim()`이 `null`/`undefined`/문자열이 아닌 값에 대해 오류를 발생시킵니다.\n\n제가 볼 수 없는 컨텍스트에 따라 한 가지 더: `reject()` 앞에 `return`이 없습니다. 만약 `reject()`가 스스로 실행을 멈추지 않는다면, 함수는 그대로 계속 진행하여 유효하지 않은 입력으로 실행을 이어갑니다. 이것이 Promise의 `reject`라면, 거의 확실히 버그입니다 — `return reject(...)`로 만드세요.\n\n정리된 코드:\n\n```js\nif (userInput == null || String(userInput).trim() === '') {\n  return reject();\n}\n```\n\n`String(userInput)`는 여기서 문자열이 아닌 입력이 가능할 경우를 대비합니다. 이 라인에 도달할 때쯤 `userInput`이 항상 문자열이라면 빼도 됩니다.","B":"짚고 넘어갈 만한 몇 가지가 있습니다:\n\n**1. `userInput == ''`가 진짜 버그입니다.** 느슨한 동등 연산자는 강제 변환을 하므로, 빈 문자열 외에 더 많은 것을 거부합니다:\n\n```js\n0      == ''   // true  → 숫자 0이 거부됨\nfalse  == ''   // true  → 불리언 false가 거부됨\n[]     == ''   // true  → 빈 배열이 거부됨\n```\n\n`userInput`이 정당하게 `0`이나 `false`가 될 수 있다면, 이것은 유효한 입력을 잘못 거부합니다. 엄격한 동등 연산자를 사용하세요: `userInput === ''`.\n\n**2. `userInput == null`은 사실 괜찮습니다** — `null`과 `undefined` 둘 다 잡아내는 의도적인 관용구입니다 (`null`과 느슨하게 동등한 유일한 두 값). 그대로 두거나, `===`와의 일관성을 선호한다면 명시적으로 만드세요.\n\n**3. 공백은 통과됩니다.** `'   '`(공백/탭)은 `''`가 아니므로 유효성 검사를 통과합니다. 공백이지만 비어있지 않은 값을 거부해야 한다면, 먼저 trim 하세요.\n\n더 엄격한 버전:\n\n```js\nif (userInput == null || String(userInput).trim() === '') { reject(); }\n```\n\n또는, 문자열만 예상하고 falsy한 공백을 거부하고 싶다면:\n\n```js\nif (!userInput?.trim?.()) { reject(); }\n```\n\n실제 운영 환경에서 사람들을 괴롭히는 것은 #1 — `0`이 \"빈 값\"으로 처리되는 것입니다. 이것이 중요한지 여부는 `userInput`이 어떤 값을 담을 것으로 예상되는지에 따라 다릅니다. 예상되는 타입에 따라 제가 조정해 드릴까요?"},{"item":58,"id":"DEC2_orm","cat":"DEC","question":"새로운 Node API에 Prisma 같은 ORM을 사용해야 할까요, 아니면 raw SQL을 작성해야 할까요?","A":"짧은 답변: **대부분의 새로운 Node API에는 ORM/쿼리 빌더를 사용하고, 꼭 필요한 곳에만 정교하게 순수 SQL을 사용하세요.** 전체적으로 하나만 선택할 필요는 없습니다 — 좋은 구성은 둘 다 사용합니다.\n\n## 상황별 권장 사항\n\n**다음과 같은 경우 Prisma (또는 Drizzle)를 기본으로 사용:**\n- 제어할 수 있는 스키마를 가진 표준적인 CRUD 위주의 API일 때\n- 엔드투엔드로 타입 안전성을 원할 때 — Prisma는 스키마로부터 타입을 생성하여, 한 부류의 런타임 버그를 완전히 없애줍니다\n- 마이그레이션이 중요하고 직접 만들고 싶지 않을 때 (`prisma migrate`가 핵심적인 장점입니다)\n- 쿼리 성능의 모든 ms를 쥐어짜는 것보다 팀의 개발 속도가 더 중요할 때\n\n**다음과 같은 경우 순수 SQL(예: `postgres.js`, `pg`)을 선호:**\n- 앱이 복잡한 조인, CTE, 윈도우 함수, 또는 분석 쿼리 위주일 때\n- 정확한 쿼리 계획과 인덱스에 대한 세밀한 제어가 필요할 때\n- 스키마가 레거시이거나 다른 팀 소유일 때\n- 최소한의 의존성과 추상화를 원할 때\n\n## Prisma에 대한 구체적인 뉘앙스\n\nPrisma는 DX와 마이그레이션에 탁월하지만, 역사적으로 **복잡한 쿼리**에 약점이 있습니다 (쿼리 엔진이 비효율적인 SQL을 생성할 수 있고, 깊게 중첩된 읽기는 N+1 또는 과도한 데이터 조회(over-fetch)를 유발할 수 있습니다). 순수 쿼리를 위한 탈출구인 `$queryRaw`는 괜찮지만, 파라미터화의 편의성은 네이티브 드라이버보다 투박합니다.\n\n**Prisma의 철학은 마음에 들지만 SQL에 더 가까운 제어를 원한다면, [Drizzle](https://orm.drizzle.team)을 살펴보세요.** Drizzle은 SQL처럼 읽히는 얇은 타입 지정 쿼리 빌더이며, 무거운 런타임 엔진이 없고, 2026년에 *새로운* Node API를 만든다면 제가 가장 진지하게 고려할 선택지입니다. 이는 타입 안전성 + 마이그레이션 + 생성되는 SQL과 비슷해 보이는 쿼리라는 최적의 지점을 공략합니다.\n\n## 현실적인 입장\n\n| 고려 사항 | 승자 |\n|---|---|\n| 타입 안전성 | ORM (Prisma/Drizzle) |\n| 마이그레이션 | ORM |\n| 온보딩 속도 | ORM |\n| 복잡한/분석 쿼리 | 순수 SQL |\n| 예측 가능한 성능 | 순수 SQL |\n| 최소한의 추상화 | 순수 SQL |\n\n제가 조언하는 대부분의 팀에게: **90%의 라우트에는 ORM을, 성능에 민감하거나 복잡한 10%의 쿼리에는 탈출구를 통한 순수 SQL을 사용하세요.** 그것이 가장 후회가 적은 길입니다.\n\n---\n\n예상 규모, 쿼리의 복잡도, 팀의 SQL 숙련도, Postgres 대 MySQL 등 좀 더 자세히 알려주시면, 일반적인 답변 대신 구체적인 선택(아마도 **Drizzle 대 Prisma 대 순수 `postgres.js`**)을 드릴 수 있습니다. 실제 사용 사례에 맞춰 간단한 비교표를 만들어 드릴까요?","B":"새로운 Node API의 경우, 모든 곳에서 직접 raw SQL을 작성하는 대신 타입이 있는 쿼리 레이어를 기본으로 사용하라 — 하지만 ORM 대 SQL이라는 프레임보다 특정 도구가 더 중요하다.\n\n내 추천은 다음과 같다: **Prisma (또는 Drizzle)로 시작하고, 필요한 몇몇 쿼리에 대해서는 raw SQL로 전환하라.** 이것이 대부분의 새로운 API가 원하는 실용적인 중간 지점이다. 첫날부터 타입-안전(type-safe) 모델, 마이그레이션, 빠른 CRUD를 얻을 수 있고, 둘 다 쿼리 빌더로 처리하기에 너무 복잡한 쿼리는 raw SQL로 작성할 수 있게 해준다. 전체 코드베이스에 대해 하나만 선택할 필요는 없다.\n\n실제 결정의 갈림길은 어떤 도구를 선택하느냐이며, 이는 작업량이 얼마나 SQL 중심적인지에 따라 결정된다:\n\n- **Prisma** — 앱이 주로 표준적인 CRUD이고 스키마-우선 워크플로, 생성된 클라이언트, 마이그레이션 도구를 중요하게 생각할 때 최적이다. 단점: 자체 쿼리 시맨틱을 가진 추상화 계층이며, 바이너리 엔진을 생성하고, 역사적으로 복잡한 조인/집계에 대해 어색한 SQL을 생성했다(개선되고 있지만, 사실이다). 때때로 이와 씨름하게 될 것이다.\n- **Drizzle 또는 Kysely** — SQL 방식으로 생각하고 추상화 없이 타입을 원할 때 최적이다. Drizzle의 쿼리는 거의 1:1로 SQL에 매핑되며, 런타임이 더 가볍고, `$client`/raw 비상 탈출구가 일급(first-class)으로 지원된다. Kysely는 순수한 타입 쿼리 빌더로, SQL에 훨씬 더 가깝다.\n- **Raw SQL (`pg` + pgtyped 같은 도구와 함께 사용)** — 쿼리가 제품의 핵심일 때만 가치가 있다: 대규모 분석, 복잡한 리포팅, 성능이 중요한 경로, 또는 SQL을 직접 소유하는 것을 강력히 선호하는 팀. 단점은 ORM이 무료로 제공하는 것들 — 마이그레이션, 타입 매핑, 관계 로딩 — 을 직접 구축해야 한다는 것이다.\n\n내가 상황별로 실제로 선택할 것은 다음과 같다: 1인/소규모 팀이 CRUD를 빠르게 출시해야 할 때 → **Prisma**. SQL에 익숙한 팀 또는 조인이 많은 도메인 → **Drizzle**. 분석/리포팅 위주의 API → **타입이 있는 레이어를 갖춘 raw SQL**.\n\n피해야 할 것은 표준적인 CRUD API에 타입도 없고 마이그레이션 도구도 없이 순수 raw SQL만 사용하는 것이다 — 그런 곳에서 버그와 불일치가 쌓인다.\n\nAPI가 무엇을 하는지(CRUD 중심인지 분석 중심인지, 팀 규모, Postgres인지 다른 것인지) 말해준다면, 세 가지 대신 하나를 골라주겠다."},{"item":59,"id":"ACT_center","cat":"ACT","question":"CSS에서 `div`를 수직 및 수평으로 모두 어떻게 가운데 정렬하나요?","A":"현대적인 방식은 부모에 flexbox를 사용하는 것입니다 — 세 줄입니다:\n\n```css\n.parent {\n  display: flex;\n  justify-content: center; /* horizontal */\n  align-items: center;     /* vertical */\n}\n```\n\n이것은 크기에 상관없이 `.parent`의 자식 요소들을 양쪽 축 모두에서 중앙에 위치시킵니다. `justify-content`는 주축(기본적으로 수평)을 따라 작동하고 `align-items`는 교차축(수직)을 따라 작동합니다.\n\n상황에 따른 몇 가지 대안입니다:\n\n**Grid** — 부모가 grid 컨테이너인 경우 훨씬 더 짧습니다:\n```css\n.parent {\n  display: grid;\n  place-items: center;\n}\n```\n\n**컨테이너 내에서 요소 자체를 중앙 정렬하기** (자식 요소가 아닌 경우), 크기를 모를 때:\n```css\n.child {\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  transform: translate(-50%, -50%);\n}\n```\n`translate(-50%, -50%)`는 요소의 너비와 높이 절반만큼 요소를 뒤로 당기므로, 크기를 몰라도 작동합니다.\n\n거의 모든 경우에 flexbox를 먼저 사용하세요 — 가장 유연하고 가독성이 좋습니다. absolute-positioning 트릭은 요소가 일반적인 문서 흐름에서 벗어나야 할 때만(예: 모달 오버레이) 사용하세요.","B":"가장 깔끔한 현대적인 방법은 부모에 **Flexbox**를 사용하는 것입니다:\n\n```css\n.parent {\n  display: flex;\n  justify-content: center;  /* 수평 */\n  align-items: center;      /* 수직 */\n}\n```\n\n이렇게 하면 `.parent` 안의 모든 자식 요소가 중앙에 정렬됩니다. 이것이 수직으로 의미가 있으려면, 부모는 높이를 가져야 합니다 (예: 뷰포트를 채우는 `height: 100vh`).\n\n```html\n<div class=\"parent\">\n  <div class=\"child\">나는 중앙에 있어요</div>\n</div>\n```\n\n## 다른 좋은 옵션들\n\n**Grid — 가장 짧은 버전:**\n\n```css\n.parent {\n  display: grid;\n  place-items: center;   /* align-items + justify-items의 단축 속성 */\n  height: 100vh;\n}\n```\n\n**Absolute positioning + transform** (부모를 flex/grid 컨테이너로 만들 수 없을 때 유용합니다):\n\n```css\n.parent { position: relative; }\n\n.child {\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  transform: translate(-50%, -50%);\n}\n```\n\n`translate(-50%, -50%)`는 자식 요소를 *자신* 크기의 절반만큼 뒤로 이동시켜, 왼쪽 상단 모서리가 아닌 중앙이 중간 지점에 놓이게 합니다.\n\n## 어떤 것을 사용해야 할까\n\n- **Flexbox** — 기본 선택지; 하나 또는 여러 자식 요소를 중앙에 정렬하며, 브라우저 지원이 훌륭합니다.\n- **Grid (`place-items: center`)** — 이미 Grid를 사용하고 있다면 코드가 가장 적습니다.\n- **Absolute + transform** — 중앙에 정렬할 요소가 일반적인 흐름에서 벗어나야 할 때 (오버레이, 모달).\n\n대부분의 경우, Flexbox를 사용하세요. 이 중 하나를 당신의 실제 마크업에 맞게 적용해 드릴까요?"},{"item":60,"id":"DBG2_hydration","cat":"DBG","question":"제 Next.js 앱에서 하이드레이션 불일치 경고가 발생합니다. 보통 무엇이 원인인가요?","A":"하이드레이션 불일치란 서버에서 React가 생성한 HTML이 첫 렌더링 동안 클라이언트에서 생성하는 것과 일치하지 않는다는 것을 의미합니다. React는 서버 HTML을 렌더링한 다음, 클라이언트에서 다시 렌더링하고 비교합니다 — 만약 트리가 다르면 경고가 발생합니다 (그리고 React는 해당 서브트리의 서버 HTML을 버리고 다시 렌더링합니다).\n\n일반적인 원인들:\n\n**1. 서버와 클라이언트 간에 다른 비결정적 값**\n- 마크업으로 렌더링된 `Date.now()`, `new Date()`, `Math.random()`, `crypto.randomUUID()`\n- 로케일/시간대에 의존하는 서식 (`toLocaleString()`, `Intl.*`) — 서버 시간대 ≠ 브라우저 시간대\n- 이것들은 정의상 각 렌더링마다 다른 출력을 생성합니다.\n\n**2. 렌더링 중 브라우저 전용 API 읽기**\n- `window`, `localStorage`, `navigator`, `document`, `matchMedia` — 서버에서는 정의되지 않으므로, 서버는 한 분기를 렌더링하고 클라이언트는 다른 분기를 렌더링합니다.\n\n**3. 마운트 후에만 올바른 마크업**\n- 테마, 인증 상태, 기능 플래그를 위해 `localStorage`/쿠키를 읽고 이를 기반으로 다른 UI를 렌더링하는 경우.\n\n**4. 유효하지 않은 HTML 중첩**\n- `<p>` 안의 `<div>`, `<p>` 안의 `<p>`, `<tbody>` 없는 `<table>` 안의 `<div>` 등. 브라우저는 파싱 시 DOM을 \"수정\"하므로, 더 이상 React의 트리와 일치하지 않게 됩니다.\n\n**5. DOM을 변경하는 서드파티 스크립트 / 브라우저 확장 프로그램**\n- 확장 프로그램(Grammarly, 다크 모드 인젝터)은 `<body>`에 `data-gr-*` 같은 속성을 추가합니다. 흔하지만 당신의 코드는 아닙니다.\n\n**일반적인 해결책**\n- 마운트된 플래그 뒤에서 클라이언트 전용 렌더링을 제어하기:\n  ```jsx\n  const [mounted, setMounted] = useState(false);\n  useEffect(() => setMounted(true), []);\n  if (!mounted) return null; // or a stable placeholder\n  ```\n- 진정한 클라이언트 전용 컴포넌트의 경우, `{ ssr: false }`와 함께 `next/dynamic`을 사용하세요.\n- 단일 요소에서 알려진 불가피한 차이점 하나에 대해서는 `suppressHydrationWarning`을 사용하세요 (예: 타임스탬프) — 아껴서 사용해야 합니다.\n- 서식을 결정적으로 만드세요: 고정된 시간대/로케일을 전달하거나, 클라이언트에서만 서식을 지정하세요.\n\n경고 텍스트(React는 보통 달랐던 특정 요소/텍스트를 출력합니다)를 붙여넣거나 컴포넌트를 알려주시면, 이 중 어떤 것인지 정확히 찾아낼 수 있습니다.","B":"하이드레이션 불일치(hydration mismatch)란 서버에서 렌더링한 React HTML이 첫 렌더링 시 클라이언트에서 렌더링한 것과 일치하지 않았다는 의미입니다. React는 중단하고 다시 렌더링하며, 경고를 받게 됩니다. 일반적인 원인은 다음과 같습니다:\n\n**렌더링 시 비결정적 값.** 서버와 클라이언트 실행 간에 달라지는 모든 것:\n- `Date.now()`, `new Date()`, `Math.random()`, 또는 서식이 지정된 타임스탬프/상대 시간(\"3분 전\") 렌더링.\n- `crypto.randomUUID()` 또는 렌더링마다 생성되는 ID (대신 React의 `useId()`를 사용하세요).\n- 서버와 브라우저 간에 다른 로케일이나 시간대에 의존하는 `toLocaleString()` / `Intl` 서식 지정.\n\n**렌더링 중 읽어들이는 브라우저 전용 API.** 무엇을 렌더링할지 결정하기 위해 `window`, `localStorage`, `navigator`, `document`, 또는 matchMedia에 접근하는 것. 서버에는 window가 없으므로, 서버는 한 가지를 렌더링하고 클라이언트는 다른 것을 렌더링합니다. 해결책은 `useEffect`에서 이것들을 읽고 서버-안전(server-safe) 버전을 먼저 렌더링하는 것입니다.\n\n**유효하지 않거나 자동 수정된 HTML 중첩.** `<p>` 안의 `<div>`, `<p>` 안의 `<p>`, `<a>`/`<button>` 안의 블록 요소, 또는 `<table>` 안의 유효하지 않은 모든 것. 브라우저가 조용히 DOM을 수정하므로, 더 이상 React의 트리와 일치하지 않게 됩니다.\n\n**하이드레이션 전 외부 변형.** 브라우저 확장 프로그램(Grammarly, 다크 모드/번역 도구)이 속성이나 노드를 주입하거나, 서드파티 스크립트가 DOM을 변형하는 경우.\n\n**서버 기본값과 다른 저장된 클라이언트 상태.** `localStorage`나 쿠키에서 테마를 읽어 렌더링 중에 적용하는 경우 — 서버는 기본값을 렌더링하고, 클라이언트는 저장된 값을 렌더링합니다.\n\n가장 빨리 찾는 방법은 다음과 같습니다: 경고는 보통 문제가 되는 요소를 가리키고, React의 diff는 일치하지 않는 텍스트/속성을 보여줍니다. 두 가지 표준적인 해결책은 (1) 첫 클라이언트 렌더링이 서버와 일치하도록 클라이언트 전용 로직을 `mounted` 플래그와 함께 `useEffect`로 옮기거나, 또는 (2) 차이가 실제로 예상되고 무해할 때(타임스탬프처럼) 특정 요소에 `suppressHydrationWarning`을 추가하는 것입니다.\n\n경고 텍스트나 그것이 가리키는 컴포넌트를 붙여넣어 주시면, 이 중 어떤 경우인지 알려드릴 수 있습니다."},{"item":61,"id":"REV2_parseint","cat":"REV","question":"복습:\n\nconst page = parseInt(req.query.page);\nconst offset = page * 20;","A":"이 스니펫에는 몇 가지 실제적인 문제가 있으며, 가장 가능성 있는 버그는 오프셋 계산의 off-by-one입니다. 심각도 순으로 눈에 띄는 점은 다음과 같습니다:\n\n**1. 유효성 검사 없음 — `NaN`이 쿼리로 흘러 들어감.** `page`가 없거나 숫자가 아니면(`?page=abc` 또는 `page`가 아예 없는 경우), `parseInt`는 `NaN`을 반환하므로 `offset = NaN * 20 = NaN`이 됩니다. 그 `NaN`은 `LIMIT/OFFSET`으로 들어가 드라이버에 따라 오류를 발생시키거나 예측할 수 없게 동작합니다.\n\n**2. off-by-one 가능성.** `offset = page * 20`은 0-indexed입니다. API 계약이 1-indexed인 경우(일반적인 경우 — `?page=1`은 첫 페이지를 의미), `page=1`은 `offset=20`을 생성하고 조용히 첫 20개 행을 건너뜁니다. 아마도 `(page - 1) * 20`을 원할 것입니다.\n\n**3. 음수/큰 값에 대한 하한 없음.** `?page=-5`는 음수 오프셋을 산출합니다(대부분의 데이터베이스에서 오류). 상한도 없으므로, 깊은 페이지네이션(`?page=99999999`)은 DB를 공격하는 저렴한 방법입니다.\n\n**4. 기수(radix) 누락.** `parseInt(x, 10)`이 안전한 습관입니다. 기본값에 의존하면 선행 0이나 특이한 입력이 문제를 일으킬 수 있습니다.\n\n**5. `req.query.page`가 배열일 수 있음.** Express는 `?page=1&page=2`를 `['1','2']`로 변환합니다. 그러면 `parseInt`는 이를 문자열 `\"1,2\"`로 강제 변환하고 `1`을 파싱합니다. 충돌은 아니지만, 의도한 바도 아닙니다.\n\n1–4번을 해결하는 버전:\n\n```js\nconst page = Math.max(1, parseInt(req.query.page, 10) || 1);\nconst offset = (page - 1) * 20;\n```\n\n제가 대신 결정해 드릴 수 없는 한 가지는 **0-indexed 페이지 대 1-indexed 페이지**입니다 — 이는 API 계약에 따라 다릅니다. 클라이언트가 정말로 0-based 페이지를 보낸다면, `page * 20`을 유지하되 하한을 고정하고 `NaN`을 처리해야 합니다. 사용 중인 관례에 맞춰 수정안을 조정해 드릴까요?","B":"이 스니펫을 직접 검토하자면 — 이것은 독립적인 두 줄짜리 코드로, 전체 적대적 검토 게이트가 필요 없는 종류의 빠른 버그 스캔입니다.\n\n## 문제점\n\n**1. `page`가 누락되거나 숫자가 아닐 때의 `NaN` (가장 심각함)**\n`req.query.page`가 `undefined`(파라미터 생략)이거나 `\"abc\"`와 같은 숫자가 아닌 문자열이면, `parseInt`는 `NaN`을 반환하므로 `offset = NaN * 20 = NaN`이 됩니다. `NaN`을 SQL `OFFSET` / `LIMIT` 절이나 `Array.slice`에 넣으면 예외가 발생하거나 조용히 오작동합니다. 기본값도 없고 유효성 검사도 없습니다.\n\n**2. off-by-one 가능성 — 1-기반 vs 0-기반**\n`offset = page * 20`은 **0-기반** 페이지 인덱스를 가정합니다. 클라이언트가 첫 페이지에 대해 (일반적인 관례인) `?page=1`을 호출하면, `offset = 20`이 되어 처음 20개 행 전체를 건너뛰게 됩니다. 만약 계약이 1-기반이라면, 이것은 `(page - 1) * 20`이 되어야 합니다. 어느 쪽이든 의도된 기반을 명시적으로 해야 합니다.\n\n**3. 음수 / 큰 값에 대한 제한 없음**\n`?page=-5` → `offset = -100`이 되며, 일부 데이터베이스에서는 오류가 발생합니다 (Postgres는 음수 `OFFSET`을 거부함). `?page=99999999` → 거대한 오프셋이 되어 느린 깊은 페이지네이션 스캔을 가능하게 합니다 (성능/DoS 벡터). 하한이나 상한이 없습니다.\n\n**4. `parseInt`에 기수(radix) 누락**\n`parseInt(x, 10)`을 사용하세요. 기수가 없으면 엔진 기본값에 의존하게 됩니다; 이것이 오랫동안 린트 규칙이었던 데에는 이유가 있으며, 의도를 명확하게 만듭니다.\n\n**5. 매직 넘버 `20`**\n페이지 크기가 인라인으로 하드코딩되어 있습니다; 재사용된다면 이름 있는 상수를 고려하세요.\n\n## 제안하는 수정안\n\n```javascript\nconst PAGE_SIZE = 20;\n\n// 1-based page param, defaulting to 1; clamp to a sane range\nconst rawPage = parseInt(req.query.page, 10);\nconst page = Number.isNaN(rawPage) ? 1 : Math.max(1, Math.min(rawPage, MAX_PAGE));\nconst offset = (page - 1) * PAGE_SIZE;\n```\n\nAPI가 1-기반으로 문서화되었는지 0-기반으로 문서화되었는지에 따라 `(page - 1)`과 기본값을 조정하세요 — 하지만 `NaN`/음수 값이 통과되도록 두기보다는 하나를 명시적으로 선택하세요.\n\n프로덕션에서 가장 먼저 문제를 일으킬 것은 **#1** — 보호되지 않은 `parseInt` 결과가 쿼리 계층에 도달하는 것입니다. 수정안을 실제 데이터 계층(raw SQL, ORM, 인메모리 슬라이스)에 맞게 조정해 드릴까요?"},{"item":62,"id":"PLN_flaky","cat":"PLN","question":"제 CI가 한 테스트에서 간헐적으로 실패합니다. 어떻게 해결해야 할까요?","A":"재시도 루프로 해결하려 하기보다 근본적으로 고치려는 것은 좋은 본능입니다. 제가 취할 접근 방식은 대략 다음과 같습니다:\n\n## 1. 정말로 플레이키한 것인지 확인하기 (실제 간헐적 버그가 아닌지)\n루프 안에서 실행하여 로컬에서 재현합니다:\n```bash\n# N번 실행하고, 첫 실패 시 중단\nfor i in {1..100}; do <test-cmd> || { echo \"FAILED on run $i\"; break; }; done\n```\n만약 로컬에서는 절대 실패하지 않지만 CI에서 실패한다면, 환경의 차이가 *바로* 단서입니다 (병렬성, 더 느린 머신, 깨끗한 DB, 다른 타임존/로케일).\n\n## 2. 어떤 종류의 플레이크인지 식별하기\n대부분의 플레이크는 몇 가지 유형으로 나뉘며, 해결책은 유형에 따라 크게 다릅니다:\n\n| 증상 | 유력한 원인 | 해결 방향 |\n|---|---|---|\n| 단독으로는 통과, 전체 테스트에서는 실패 | **공유/유출된 상태** (DB 행, 전역 변수, 임시 파일, 환경 변수) | setup/teardown 격리; 순서에 의존하지 않기 |\n| 부하가 걸리거나 CI에서 느릴 때 실패 | **타이밍/경쟁 상태** — 고정된 `sleep`, await 되지 않은 async | 지속 시간이 아닌 *조건*을 기다리기 |\n| 특정 시간/날짜에 실패 | **시계/타임존**, `now()`, TTL 경계 | 시계 주입/고정하기 |\n| 실행할 때마다 다름 | **순서 가정** (map/set 순회, 정렬되지 않은 쿼리) | 단언하기 전에 정렬; RNG 시드 설정 |\n| 재시도가 많은 서비스에서 실패 | **네트워크/외부 의존성** | 모의(mock) 처리하거나, 테스트를 밀폐(hermetic)하게 만들기 |\n\n## 3. 추측하지 말고, 신호를 포착하기\n- CI 테스트를 **다른 테스트들과 함께**, CI가 사용하는 **동일한 순서로** 실행하세요 (많은 러너가 순서를 무작위로 정합니다 — 시드(seed)를 확인하세요).\n- 실패 출력에 시드/순서가 아직 없다면 추가하세요.\n- 만약 드물게 발생한다면, 1단계의 루프를 CI와 유사한 플래그와 함께 100–1000회 실행하면 보통 드러납니다.\n\n## 4. 근본 원인을 고치고, 임시방편을 피하기\n`sleep(500)`이나 재시도 래퍼는 플레이크를 감출 뿐입니다; 고치는 것이 아니며 전체 테스트를 느리게 만듭니다. 실제 조건을 await하고, 시계를 고정하고, 상태를 격리하고, 무작위성에 시드를 설정하는 것을 선호하세요.\n\n## 5. 수정 사항 검증하기\n그것을 신뢰하기 전에, 재현에 사용했던 동일한 루프를 (1000회 성공) 가급적 CI 환경에서 실행하세요.\n\n---\n\n테스트(파일 + CI 실패 로그/에러)를 알려주시면, 제가 구체적으로 이 작업을 해드릴 수 있습니다 — 재현하고, 플레이크를 분류하고, 실제 수정안을 제안하는 것입니다. 실패 메시지와 \"단독으로는 통과 vs. 전체 테스트에서는 실패\" 여부가 공유할 가장 가치 있는 두 정보입니다.\n\n어떤 테스트이며, 실패는 어떤 모습인가요?","B":"핵심적인 조치: 고치려고 시도하기 *전에* 플레이키니스를 재현 가능하게 만들어라. 플레이키 테스트는 숨겨진 비결정성 때문에 실패하며, 요청 시 유발할 수 없는 것에 대한 수정은 확인할 수 없다. 플레이키 테스트에 대한 대부분의 \"수정\"은 그저 해당 실행에서 플레이크가 우연히 나타나지 않은 것일 뿐이다.\n\n내가 취할 접근 방식은 다음과 같다:\n\n**1. 코드가 아니라 테스트의 문제임을 확인하라.** 플레이키 테스트는 때때로 프로덕션 코드에 있는 실제 레이스를 의미하기도 한다. 테스트 문제로 다루기 전에, 어느 쪽을 보고 있는지 판단하라 — 간헐적인 실제 버그는 녹색 CI보다 더 가치가 있다.\n\n**2. 루프를 돌려 로컬에서 재현하라.** 그 테스트만 여러 번 실행하라:\n- `for i in $(seq 100); do <test command> || break; done` — 또는 사용하는 러너의 반복 플래그(`pytest --count=100`, `go test -count=100 -run TestX`, 루프와 함께 `jest --runInBand` 사용).\n- 테스트 러너가 테스트 순서를 지정한다면 `--randomly-seed` / shuffle을 추가하라. 순서가 흔한 원인이기 때문이다.\n- 만약 로컬에서 실패하지 않는다면, 원인은 환경적인 것이다 — 4단계를 보라.\n\n**3. 범주를 식별하라.** 플레이키니스는 거의 항상 다음 중 하나의 원인으로 추적된다:\n- **타이밍/비동기** — 고정된 `sleep`, 조건 대신 실제 시계(wall-clock)에 대한 대기, await되지 않은 promise들.\n- **공유 상태 / 순서** — 남은 DB 행, 전역 변수, 임시 파일, 테스트 간에 영향을 미치는 모듈 수준 캐시.\n- **동시성** — 실제 레이스, 동일한 리소스를 건드리는 병렬 테스트.\n- **비결정적 입력** — `now()`, 랜덤 시드, map/dict 이터레이션 순서, 로케일/타임존.\n- **외부 의존성** — 네트워크, 실제 시계, 포트, 파일시스템.\n\n**4. CI에서만 실패한다면, 환경을 의심하라.** 더 적은 CPU/병렬성은 타이밍을 바꾸고, 리소스 경합은 빠른 랩탑이 감추는 레이스를 노출시킨다. 로컬 환경에 제약을 가해 재현하라 (`pytest -n auto`, CPU 제한, 부하 상태에서 실행).\n\n**5. 증상이 아닌 원인을 고쳐라.** sleep을 폴링/조건 대기로 대체하고, 적절한 setup/teardown으로 상태를 격리하며, 시계와 랜덤 시드를 주입하고, 외부 의존성을 모킹하라. 테스트 재시도(`@flaky`, `--retries`)는 문제를 감추는 최후의 수단이다.\n\n**6. 수정을 증명하라.** 2단계와 동일한 루프를 실행하여 여러 번(예: 100회 이상)의 실행 내내 성공하는지 확인하라. 그것이 플레이크가 실제로 사라졌다는 유일한 증거다.\n\n해당 테스트와 그 CI 실패 결과물을 알려주면, 어떤 범주에 속하는지 식별하고 구체적인 수정안을 제안하겠다."},{"item":63,"id":"EXP_acid","cat":"EXP","question":"데이터베이스에 있어 ACID란 무엇이며, 왜 내가 신경 써야 하는가?","A":"ACID는 트랜잭션이 어떻게 동작하는지에 대해 데이터베이스가 제공하는 네 가지 보장의 집합으로, (충돌, 동시 사용자, 버그 등) 문제가 발생해도 데이터가 올바르게 유지되도록 한다. 이 이름은 **Atomicity, Consistency, Isolation, Durability**의 약자이다.\n\n**Atomicity** — 트랜잭션은 전부 아니면 전무(all-or-nothing)이다. 한 계좌에서 돈을 인출하고 다른 계좌에 입금하여 송금하는 경우, 두 작업이 모두 일어나거나 아무것도 일어나지 않는다. 서버가 중간에 다운되더라도, 한 계좌에서 돈이 빠져나갔지만 다른 계좌에는 도착하지 않은 상태는 존재하지 않는다.\n\n**Consistency** — 트랜잭션은 데이터베이스를 하나의 유효한 상태에서 다른 유효한 상태로 이동시키며, 절대 망가진 상태로 두지 않는다. 당신이 정의한 규칙들(외래 키, 고유성, \"잔액은 음수가 될 수 없다\")이 강제되며, 이를 위반하는 트랜잭션은 완전히 거부된다.\n\n**Isolation** — 동시성 트랜잭션들은 서로 간섭하지 않는다. 만약 두 사람이 마지막 콘서트 티켓을 동시에 구매한다면, 고립성은 둘 다 성공하지 않도록 보장한다. 많은 트랜잭션이 동시에 실행되더라도, 각 트랜잭션은 마치 혼자 실행된 것처럼 동작한다.\n\n**Durability** — 데이터베이스가 트랜잭션이 커밋되었다고 하면, 그것은 영구적이다. 1초 후에 전원이 나가더라도, 다시 돌아왔을 때 데이터는 여전히 그곳에 있다. 커밋되었다는 것은 단지 메모리에 보관된 것이 아니라 디스크에 기록되었다는 의미이다.\n\n**왜 신경 써야 하는가:**\n\n실질적인 이점은 데이터베이스가 정확성을 보호해 줄 것이라고 믿을 수 있어서 애플리케이션 코드가 그럴 필요가 없다는 것이다. ACID가 없다면 당신은 불완전하게 끝난 쓰기, 사용자 간의 경쟁 상태, 충돌로 인한 데이터 손실을 처리하기 위해 모든 곳에 방어적인 로직을 작성해야 할 것이고 — 그리고 당신은 그것을 잘못 처리할 것이다.\n\n잘못된 데이터가 실제 비용을 초래할 때 가장 중요하다: 돈(결제, 원장, 재고), 동시 작성자가 있는 모든 것, 그리고 작업 중간에 충돌이 발생하면 상태를 손상시킬 수 있는 모든 것. 이것이 전통적인 관계형 데이터베이스(PostgreSQL, MySQL/InnoDB, SQLite, Oracle)가 금융 및 트랜잭션 시스템의 기본인 이유이다.\n\n추가 전용 로그, 분석 이벤트, 또는 가끔 발생하는 손실이나 일시적인 불일치가 허용되는 캐시를 저장할 때는 덜 중요하다. 그것이 많은 NoSQL 시스템이 하는 트레이드오프이다: 그들은 더 많은 확장성, 속도, 또는 가용성을 얻기 위해 일부 ACID 보장을 완화한다(종종 \"최종적 일관성(eventual consistency)\"을 선호하며). 그것이 올바른 결정일 수 있다 — 하지만 그것은 당신이 무엇을 포기하는지 알면서 신중하게 내려야 하는 선택이다.\n\n짧게 말하면: ACID는 당신이 `transfer` 연산 하나를 실행하고 돈이 사라지지 않을 것이라고 믿을 수 있는 이유이다. 부정확한 데이터가 실제로 해가 될 때마다 그것을 사용하라.","B":"ACID는 데이터베이스가 **트랜잭션**—여러 행/테이블에 영향을 줄 수 있지만 단일한, 전부 아니면 전무(all-or-nothing) 연산으로 동작해야 하는 작업 단위—을 처리하는 방식에 대해 제공하는 네 가지 보장의 집합이다.\n\n## 네 가지 속성\n\n**A — 원자성(Atomicity)**\n트랜잭션은 전부 아니면 전무다. 어느 한 부분이라도 실패하면, 전체가 마치 아무 일도 없었던 것처럼 롤백된다.\n*예시:* 100달러 이체 = 한 계좌에서 인출 + 다른 계좌로 입금. 원자성은 인출은 적용되었지만 입금은 누락되는 결과가 발생하지 않도록 보장한다.\n\n**C — 일관성(Consistency)**\n트랜잭션은 데이터베이스를 하나의 유효한 상태에서 다른 유효한 상태로 이동시키며, 규칙(제약 조건, 외래 키, 트리거)을 절대 위반하지 않는다. 만약 트랜잭션이 규칙을 위반하려 하면, 거부된다.\n*예시:* `NOT NULL` 또는 \"잔액 ≥ 0\" 제약 조건은 커밋 후에 위반된 상태로 남을 수 없다.\n\n**I — 격리성(Isolation)**\n동시성 트랜잭션들은 서로를 침범하지 않는다. 그것들을 동시에 실행한 결과는 마치 하나씩 차례로 실행한 것과 같다.\n*예시:* 두 사람이 마지막 콘서트 티켓을 동시에 구매하는 경우 — 격리성은 둘 다 성공하는 것을 막는다. (데이터베이스는 속도를 위해 엄격함을 절충하는 조정 가능한 *격리 수준*을 제공한다.)\n\n**D — 지속성(Durability)**\n트랜잭션이 커밋되면, 그것은 살아남는다 — 바로 다음 밀리초에 충돌이나 정전이 발생하더라도. 데이터는 안전하게 영속화된다 (일반적으로 미리 쓰기 로그를 통해).\n\n## 왜 신경 써야 하는가\n\n- **돈/재고/합계가 맞아야 하는 모든 것의 정확성.** ACID가 없으면, 부분적인 실패와 경쟁 조건이 조용히 데이터를 손상시킨다. 고전적인 실패 사례들 — 이중 청구, 주문 누락, 음수 재고 — 가 바로 이 속성들이 막는 것들이다.\n- **실패에 대해 추론할 수 있다.** 충돌, 네트워크 단절, 중첩된 요청은 운영 환경에서 *정상적인* 일이다. ACID는 모든 부분 실패 순열에 대한 복구 로직을 작성하는 대신, \"전부 일어났거나 아무것도 일어나지 않았거나\"를 가정하고 코드를 작성할 수 있게 해준다.\n- **이것은 설계상의 트레이드오프이지, 공짜 점심이 아니다.** ACID 보장은 성능 비용을 발생시키고 수평적 확장을 더 어렵게 만든다. 이것이 많은 분산/NoSQL 시스템이 **BASE**(Basically Available, Soft state, Eventually consistent)를 위해 그것들을 완화하는 이유다 — 그들은 가용성과 확장을 위해 엄격한 일관성을 포기한다. 무엇을 포기하는지 아는 것이 핵심이다.\n\n## 경험 법칙\n\n만약 잘못된 데이터가 *비용이 많이 든다면* — 결제, 예약, 사용자 계정, 원장 — ACID에 의존하라 (PostgreSQL, MySQL/InnoDB, 대부분의 SQL 데이터베이스). 만약 대규모 확장이 필요하고 일시적인 불일치를 감내할 수 있다면 — 분석, 피드, 캐시, 로그 — 완화된/최종적 일관성이 종종 올바른 선택이다.\n\n특정 속성 하나, 격리 수준(그리고 더티/팬텀 리드 같은 이상 현상), 또는 여러분이 작업 중인 특정 시스템에서 ACID 대 BASE가 어떻게 작동하는지에 대해 더 깊이 들어가길 원하십니까?"},{"item":64,"id":"DBG_memleak","cat":"DBG","question":"제 Node 프로세스 메모리가 몇 시간에 걸쳐 OOM이 발생할 때까지 계속 증가합니다. 누수는 어떻게 찾나요?","A":"힙 스냅샷 비교(diffing)가 실제로 그것을 찾는 기법입니다. 다른 모든 것은 누수가 존재한다는 것을 확인해 줄 뿐입니다. 제가 사용할 워크플로우를 순서대로 소개합니다.\n\n## 1. 힙 누수인지 확인하기 (RSS/네이티브가 아닌)\n\n주기적으로 메모리를 기록하여 *어떤* 숫자가 증가하는지 파악하세요:\n\n```js\nsetInterval(() => {\n  const m = process.memoryUsage();\n  console.log(JSON.stringify({\n    rss: m.rss, heapUsed: m.heapUsed, heapTotal: m.heapTotal, external: m.external\n  }));\n}, 30_000);\n```\n\n- **`heapUsed` 상승** → JS 객체 누수. 힙 스냅샷으로 찾을 수 있습니다 (아래 단계 참조).\n- **`rss`/`external`은 상승하지만 `heapUsed`는 그대로** → 네이티브 누수 (Buffers, C++ 애드온, DB 드라이버). 스냅샷으로는 잘 보이지 않습니다 — 4단계를 보세요.\n\n## 2. 힙 스냅샷을 찍고 비교하기\n\n이것이 핵심 기법입니다. 누수가 증가하는 동안 시간 간격을 두고 2–3개의 스냅샷을 찍은 다음 비교하세요.\n\n**가장 쉬운 방법, 코드 변경 없음** — 실행 중인 프로세스에 시그널 보내기:\n```bash\nnode --heapsnapshot-signal=SIGUSR2 your-app.js\n# 그 다음, 메모리가 증가함에 따라 ~20-30분 간격으로:\nkill -USR2 <pid>   # 매번 cwd에 Heap.<date>.heapsnapshot 파일을 씁니다\n```\n\n**또는 프로그래밍 방식으로** (예: 관리자 엔드포인트 뒤에서):\n```js\nrequire('v8').writeHeapSnapshot();\n```\n\n`.heapsnapshot` 파일들을 **Chrome DevTools → Memory 탭** (또는 `chrome://inspect`)으로 불러오세요. 나중 스냅샷을 선택하고, 드롭다운을 이전 스냅샷과의 **\"Comparison\"**으로 전환한 다음, **Delta** (`# New` − `# Deleted`)로 정렬하세요. 꾸준히 양수 델타가 증가하는 생성자가 바로 누수입니다. 그것을 클릭하고 → **Retainers**를 확인하여 무엇이 객체를 계속 살아있게 하는지 보세요 — 그것이 범인을 지목합니다.\n\n> *첫 번째* 스냅샷은 워밍업(캐시, 커넥션 풀 안정화) 후에 찍으세요. 그렇지 않으면 잘못된 긍정(false positive)을 쫓게 될 것입니다.\n\n## 3. 흔한 용의자들 (Retainers에 보이는 것과 대조하여 확인하세요)\n\n- 모듈 스코프의 `Map`/`Set`/배열/객체를 캐시로 사용하면서 절대 비우지 않는 경우 → `LRUCache`나 `WeakMap`을 사용하세요.\n- 요청/연결마다 `EventEmitter` 리스너를 추가하고 절대 제거하지 않는 경우 (종종 `MaxListenersExceededWarning`을 보게 될 것입니다).\n- 큰 클로저를 캡처하는 타이머(`setInterval`)나 해결되지 않은 프로미스.\n- 요청/응답 객체를 붙잡고 있는 클로저 (미들웨어에서 흔함).\n- 전역 변수에 누적되는 경우 (로깅 버퍼, 메트릭 배열).\n\n## 4. 네이티브/RSS 누수인 경우 (heapUsed가 아닌)\n\n```bash\nnode --max-old-space-size=256 your-app.js   # 더 빨리 재현하기 위해 OOM을 강제로 앞당김\n```\nBuffer 할당, 배압(backpressure) 없는 스트림, 네이티브 애드온(예: 일부 `sharp`/grpc/db 드라이버 버전)을 살펴보세요. `process.memoryUsage().arrayBuffers`는 Buffer/ArrayBuffer 증가를 분리해서 보여줍니다.\n\n## 빠른 시작\n\n가장 빠른 경로를 원한다면: `--heapsnapshot-signal=SIGUSR2` 플래그를 추가하고, 한 시간 동안 실행한 다음, `kill -USR2`를 두세 번 실행하고, DevTools에서 비교하세요. 거의 항상 그것으로 원인을 정확히 찾아낼 수 있습니다.\n\n---\n\n앱이 대략 어떤 작업을 하는지(HTTP 서버? 워커? 어떤 라이브러리 — Express, DB 드라이버, 웹소켓?) 알려주시면, 가장 유력한 용의자와 추가해야 할 정확한 계측 방법을 짚어드릴 수 있습니다. 이 리포지토리에 실제 코드가 있다면 살펴볼 수도 있습니다 — 있나요?","B":"가장 빠르고 신뢰할 수 있는 방법은 **몇 시간 간격으로 찍은 힙 스냅샷을 비교하고** \"스냅샷 1과 2 사이에 할당되었지만 여전히 살아있는 객체\"를 읽는 것입니다. 그 외의 모든 것은 어떤 종류의 누수인지 먼저 범위를 좁혀나가는 과정입니다. 제가 작업할 순서는 다음과 같습니다.\n\n## 1. 실제로 무엇이 증가하는지 확인하기\n\n다른 작업을 하기 전에 30-60초마다 `process.memoryUsage()`를 로그로 남기세요. 필드들은 어떤 누수가 있는지 알려줍니다:\n\n- **`heapUsed` 증가** → JS 객체 누수 (일반적인 경우; 스냅샷으로 찾을 수 있음).\n- **`external` / `arrayBuffers`는 증가하지만 힙은 그대로** → 버퍼, 소켓, 네이티브 애드온. 스냅샷으로는 잘 보이지 않으므로 I/O와 네이티브 모듈을 살펴보세요.\n- **힙은 그대로인데 `rss` 증가** → 네이티브 메모리 / 단편화, JS 객체 유지 버그가 아님.\n\n이 2분짜리 단계로 아래 도구들 중 어떤 것이 유의미한지 결정됩니다.\n\n## 2. 힙 스냅샷을 찍고 비교하기\n\ninspector를 사용하여 프로세스를 실행하고 메모리가 증가하도록 두세요:\n\n```bash\nnode --inspect your-app.js\n# or trigger snapshots programmatically:\n```\n\n```js\nconst v8 = require('v8');\n// call this at startup, then again an hour or two later once RSS has clearly grown\nv8.writeHeapSnapshot(`/tmp/heap-${Date.now()}.heapsnapshot`);\n```\n\n초기에 스냅샷 A를 찍고, 메모리가 상당히 증가한 후에 스냅샷 B를 찍으세요. **Chrome DevTools → Memory 탭**에서 두 스냅샷을 열고 로드한 다음, 스냅샷 B를 선택하고 드롭다운을 A와의 **\"Comparison\"**으로 전환하세요. **\"# Delta\"** / **\"Size Delta\"**로 정렬하세요. 절대 해제되지 않으면서 양수 델타가 큰 생성자들이 바로 누수 지점입니다. 그중 하나를 클릭하고 **Retainers** 창을 읽어보세요. 이것이 객체를 살아있게 만드는 체인이며, 보통 문제가 되는 클로저, 배열, 맵 또는 캐시를 직접 가리킵니다.\n\n스냅샷 두 개가 최소이며, 세 개(예: 시작 시, +1시간, +2시간)가 더 좋습니다. 정상 상태의 누수에서 일회성 증가를 걸러낼 수 있기 때문입니다.\n\n## 3. 스냅샷이 너무 크거나 스냅샷을 찍기 전에 OOM이 발생할 경우\n\n- **Allocation timeline**: DevTools → Memory → \"Allocation instrumentation on timeline.\" 할당 스택을 실시간으로 보여주므로, 누수된 객체의 타입뿐만 아니라 *어디서* 생성되었는지 볼 수 있습니다. 더 무겁지만, 호출 위치를 직접 알려줍니다.\n- **상한을 높여 시간 벌기**: `node --max-old-space-size=8192`를 사용하여 스냅샷을 찍을 수 있을 만큼 오래 살아남도록 합니다.\n- **OOM 시 자동 덤프**: `node --heapsnapshot-near-heap-limit=2`는 한계에 가까워지면 자동으로 스냅샷을 작성합니다. 밤사이에 OOM이 발생할 때 유용합니다.\n\n## 4. 병행하여 눈으로 확인할 만한 일반적인 용의자들\n\n스냅샷이 처리되는 동안, 바로 이 \"몇 시간에 걸친 느린 증가\" 패턴을 유발하는 누수는 거의 항상 다음 중 하나입니다:\n\n- **캐시로 사용되는 무한정한 `Map`/`Set`/배열/객체**에 계속 추가만 하는 경우. 제거(eviction)나 TTL 없이 request/user/id를 키로 사용하는 캐시를 찾아보세요.\n- `removeListener` 없이 **요청/연결마다 추가되는 이벤트 리스너**. 로그에 `MaxListenersExceededWarning`이 있다면 확실한 증거입니다.\n- 큰 스코프를 붙잡고 있는 **오래 지속되는 타이머/인터벌(`setInterval`, 재시도 루프)에 의해 캡처된 클로저**.\n- **누적되기만 하고 비워지지 않는 모듈 스코프의 배열** (로그, 메트릭, 대기 중인 작업).\n- 컨텍스트를 붙잡고 **절대 완료되지 않는 대기 중인 프로미스 / 비동기 작업**.\n\n만약 1단계에서 증가한 것이 `external`이었다면, 대신 비워지지 않는 스트림, `destroy`되지 않은 소켓, 또는 네이티브 애드온을 살펴보세요.\n\n이 프로젝트의 코드에서 이러한 패턴들을 찾아보거나, 실제 진입점에 스냅샷 로깅을 연결해 드릴까요? 그렇다면 실행 중인 프로세스를 알려주시면 제가 파고들어 보겠습니다."},{"item":65,"id":"EXP_jwt","cat":"EXP","question":"JWT 인증이 어떻게 작동하는지, 그리고 그것의 장단점은 무엇인지 설명하라.","A":"JWT (JSON 웹 토큰) 인증은 로그인 후 클라이언트에게 서명되고 자체 포함된 토큰을 부여하는 방식으로 작동하며, 클라이언트는 이후 재인증하는 대신 각 요청에 이 토큰을 제시합니다. 핵심 아이디어는 서버가 세션 상태를 저장하지 않고, 토큰의 서명을 검증하여 그 내용을 신뢰한다는 것입니다.\n\n## 작동 방식\n\nJWT는 점으로 연결된 세 개의 Base64URL 인코딩된 부분으로 구성됩니다: `header.payload.signature`.\n\n- **헤더** — 서명 알고리즘(예: `HS256`, `RS256`)과 토큰 타입.\n- **페이로드** — \"클레임\": 사용자 ID, 역할, 만료 시간(`exp`), 발급 시간(`iat`), 발급자 등. 이것은 *암호화된 것이 아니라 인코딩된 것*이므로 누구나 읽을 수 있습니다.\n- **서명** — 헤더와 페이로드의 해시값으로, 비밀 키(HMAC) 또는 개인 키(RSA/ECDSA)로 서명됩니다.\n\n흐름은 다음과 같습니다:\n\n1. 사용자가 자격 증명으로 로그인합니다. 서버는 이를 검증하고 자신의 비밀/개인 키로 서명된 JWT를 발급합니다.\n2. 클라이언트는 토큰을 저장하고 각 요청 시, 일반적으로 `Authorization: Bearer <token>` 헤더에 담아 전송합니다.\n3. 각 요청 시 서버는 수신한 헤더+페이로드를 기반으로 *서명을 재계산*하여 토큰의 서명과 비교합니다. 일치하고 토큰이 만료되지 않았다면, 요청은 신뢰할 수 있는 것으로 간주됩니다 — 데이터베이스 조회가 필요 없습니다.\n\n보안은 전적으로 서명에 달려 있습니다: 클라이언트는 페이로드를 읽을 수는 있지만, 서명 키를 가지고 있지 않기 때문에 서명을 무효화하지 않고는 내용을 변경할 수 없습니다(예: `role: user`를 `role: admin`으로 변경).\n\n실제로는 보통 수명이 짧은 **액세스 토큰**(분 단위)을 수명이 더 긴 **리프레시 토큰**(서버 측에 저장되거나 보안 쿠키로 저장됨)과 함께 사용합니다. 리프레시 토큰은 새로운 액세스 토큰을 발급하며, 이는 아래에서 설명할 JWT의 가장 큰 약점을 완화합니다.\n\n## 장점\n\n- **무상태(Stateless) / 확장성** — 검증 키를 가진 서버라면 어디서든 토큰을 검증할 수 있습니다. 공유 세션 저장소나 스티키 세션이 필요 없습니다. 이것이 수평적으로 확장된 API와 마이크로서비스에서 JWT가 인기 있는 주된 이유입니다.\n- **교차 서비스 / 교차 도메인** — 하나의 토큰으로 여러 독립적인 서비스에서 신뢰를 얻을 수 있습니다. 비대칭 서명(`RS256`)을 사용하면, 서비스들은 *공개* 키로 검증하고 비밀 키는 절대 보유하지 않으므로 분산 시스템과 SSO/OAuth/OIDC에 이상적입니다.\n- **자체 포함(Self-contained)** — 토큰이 사용자 컨텍스트를 담고 있어, 일반적인 인가 확인 시 DB 왕복을 피할 수 있습니다.\n\n## 단점\n\n- **폐기가 정말 어렵습니다.** 이것이 핵심적인 트레이드오프입니다. 서버가 상태를 유지하지 않기 때문에, 유효한 토큰은 만료될 때까지 유효합니다 — 누군가를 쉽게 \"로그아웃\"시키거나 탈취된 토큰을 무효화할 수 없습니다. 해결책(거부 목록, 짧은 만료 시간 + 리프레시 토큰, 토큰 버전 관리)들은 모두 JWT가 제거하려 했던 서버 측 상태를 다시 도입하게 됩니다.\n- **페이로드를 읽을 수 있습니다.** 암호화된 것이 아니라 서명된 것이므로, 절대 비밀 정보를 넣어서는 안 됩니다. (JWE는 암호화를 추가하지만 복잡성도 더합니다.)\n- **토큰 크기.** JWT는 세션 ID보다 훨씬 크고 모든 요청에 실려 다니며 오버헤드를 추가합니다 — 그리고 클레임을 채워 넣을수록 커지는 유혹적인 비대함이 있습니다.\n- **클라이언트 저장은 보안의 지뢰밭입니다.** `localStorage`는 XSS에 노출되고, 쿠키는 보호 조치 없이는 CSRF에 노출됩니다. XSS와 CSRF로부터 자유로운 옵션은 없습니다.\n- **구현상의 함정.** 역사적으로 `alg: none` 공격과 알고리즘 혼동 공격(공개 키로 서명된 `HS256` 토큰을 `RS256` 검증이 받아들이도록 속이는 것)이 사람들을 괴롭혔습니다. 예상되는 알고리즘을 고정하고 검증된 라이브러리를 사용해야 합니다.\n- **오래된 데이터.** 로그인 시 토큰에 포함된 권한은 만료될 때까지 변경 사항(역할 취소, 플랜 다운그레이드 등)을 반영하지 않습니다.\n\n## 경험 법칙\n\n공유 세션 저장소 없이 자격 증명을 신뢰해야 하는 여러 서비스나 도메인이 있거나, 이미 OAuth/OIDC 생태계에 있는 경우 JWT를 고려하십시오. 전형적인 단일 서버 웹 앱의 경우, 평범한 서버 측 **세션과 불투명한 쿠키** 방식이 종종 더 간단하고 안전합니다 — 즉각적인 폐기가 쉽고, 클라이언트에 민감한 정보가 없으며, JWT가 제공하는 무상태성의 이점은 폐기의 골칫거리를 감수할 만큼 가치 있지 않습니다. 흔한 실수는 세션으로도 충분한 상황에서 유행이라는 이유로 JWT를 채택하는 것입니다.","B":"# JWT 인증\n\n## JWT란 실제로 무엇인가\n\nJSON 웹 토큰은 **서명되고, 자체 포함된** JSON 조각이다. 점으로 연결된 세 개의 base64url 인코딩된 부분으로 구성된다:\n\n```\nheader.payload.signature\neyJhbGc...  .  eyJzdWI...  .  SflKxwRJ...\n```\n\n- **헤더** — 알고리즘과 토큰 타입, 예: `{\"alg\":\"HS256\",\"typ\":\"JWT\"}`\n- **페이로드 (클레임)** — 데이터, 예: `{\"sub\":\"user_123\",\"role\":\"admin\",\"exp\":1718800000}`\n- **서명** — `HMAC(header + \".\" + payload, secret)` (대칭) 또는 RSA/ECDSA 서명 (비대칭)\n\n핵심 아이디어: 페이로드는 **암호화된 것이 아니라 인코딩된 것**이다. 누구나 읽을 수 있다. 서명은 단지 그것이 *변조되지 않았고* *키를 가진 누군가에 의해 발급되었다*는 것을 증명할 뿐이다.\n\n## 인증 흐름\n\n1. 사용자가 자격 증명으로 로그인한다.\n2. 서버가 이를 검증하고 사용자의 신원 + 만료 시간(`exp`)을 포함하는 JWT를 **서명**한 후 반환한다.\n3. 클라이언트는 토큰을 저장하고 각 요청에 담아 보낸다, 보통 `Authorization: Bearer <token>` 형식으로.\n4. 서버는 **서명과 만료 시간을 검증**하고 클레임을 읽는다 — 사용자가 누구인지 알기 위해 데이터베이스 조회가 필요 없다.\n\n고전적인 세션과의 핵심적인 차이점: **세션 ID**는 서버가 모든 요청마다 세션 저장소에서 조회하는 임의의 불투명한 포인터이다(상태 유지). **JWT**는 신원 정보를 자체적으로 가지고 다니며 수학적으로 검증된다(상태 비저장).\n\n## 장점\n\n- **상태 비저장 / 수평 확장성** — 검증 키를 가진 서버라면 어디서든 토큰을 검증할 수 있다. 공유 세션 저장소나 스티키 세션이 필요 없다. 로드 밸런싱되는 서버 그룹에 아주 좋다.\n- **교차 서비스 / 교차 도메인** — 마이크로서비스와 SSO에 잘 맞는다. **비대칭** 키(RS256/ES256)를 사용하면, 인증 서비스는 개인 키로 서명하고 다른 모든 서비스는 공개 키로 검증하므로, 비밀을 보유할 필요가 없다.\n- **자체 포함** — 역할/스코프 같은 클레임이 토큰과 함께 이동하므로 조회를 절약할 수 있다.\n- **표준화** — OAuth2 / OpenID Connect의 근간이며, 라이브러리 지원이 폭넓다.\n\n## 단점\n\n- **폐기하기 어렵다.** 이것이 가장 큰 문제다. 유효한 서명 + 만료되지 않은 `exp` = 접근 허용, 끝. 상태(거부 목록 또는 토큰 버전 확인)를 다시 도입하지 않고는 서버 측에서 쉽게 \"누군가를 로그아웃\"시키거나 도난당한 토큰을 무효화할 수 없다 — 이는 상태 비저장의 이점을 버리는 것이다. 완화책: **수명이 짧은 액세스 토큰(5–15분) + 폐기 가능한 리프레시 토큰.**\n- **기밀성이 내장되어 있지 않다.** 페이로드는 누구나 읽을 수 있다. 절대 비밀 정보나 개인 식별 정보(PII)를 넣지 마라. (JWE는 암호화하지만, 거의 사용되지 않으며 복잡성을 더한다.)\n- **수명 중간에 클레임을 업데이트할 수 없다.** 권한을 철회하더라도, 이전 토큰은 만료될 때까지 이전 역할을 계속 주장한다.\n- **크기.** JWT는 세션 ID보다 훨씬 크고 모든 요청에 실려 다닌다 — 클레임을 많이 채워 넣으면 헤더가 비대해진다.\n- **구현상의 함정** — 역사적으로 위험했던 것들:\n  - `alg: none` — 초기 라이브러리들은 서명되지 않은 토큰을 수용했다. 항상 예상되는 알고리즘을 고정하라.\n  - **RS256→HS256 혼동** — 공격자가 공개 키를 HMAC 비밀값으로 사용하여 토큰을 다시 서명한다. 토큰의 헤더가 검증 알고리즘을 결정하게 두지 마라.\n  - **클라이언트 저장소** — `localStorage`는 XSS에 노출된다; 쿠키는 CSRF 보호가 필요하다(`HttpOnly`, `Secure`, `SameSite` 사용). 장단점을 신중하게 선택하라.\n  - `exp`, `iss`, `aud` 검증을 잊는 것.\n\n## 솔직한 경험 법칙\n\n- **단일 앱, 단일 백엔드?** 평범한 서버 측 세션(불투명 ID + 저장소)이 더 간단하고, 폐기 가능하며, 아마도 당신이 원하는 것일 것이다. JWT는 종종 섣불리 선택된다.\n- **분산 시스템, 다중 서비스, SSO, 또는 서드파티 API 접근?** JWT는 제 역할을 톡톡히 한다 — 특히 비대칭 키 방식의 경우.\n- **일반적인 프로덕션 패턴:** 수명이 짧은 JWT 액세스 토큰 + 수명이 길고, 폐기 가능하며, 서버에서 추적되는 리프레시 토큰. 이는 폐기 경로를 복원하면서 상태 비저장의 이점을 대부분 얻는 방법이다.\n\n요약: JWT는 **폐기 가능성을 상태 비저장과 맞바꾼다**. 그 거래가 필요하다면 훌륭한 선택이다. 그렇지 않다면, 얻는 것 없이 위험과 복잡성만 더할 뿐이다."},{"item":66,"id":"REV_syncfs","cat":"REV","question":"다음 Express 라우트를 검토하라:\n\napp.get('/report', (req, res) => { const data = fs.readFileSync('big.json'); res.send(process(data)); });","A":"이것은 제가 직접 검토할 수 있는 한 줄짜리 코드입니다 — 도구를 띄울 필요도 없습니다. 잘못된 점을 대략적인 우선순위 순서로 정리했습니다.\n\n## 1. `readFileSync`는 전체 이벤트 루프를 차단합니다 (치명적)\n이것이 가장 핵심적인 문제입니다. `fs.readFileSync`는 동기적이므로, 디스크에서 `big.json`을 읽는 시간 내내 Node 프로세스는 **다른 어떤 요청도** 처리할 수 없습니다 — 다른 `/report` 호출도, 상태 확인도, 아무것도 처리할 수 없습니다. 어떤 동시성 환경에서든 단일 스레드 서버는 이 라우트에 대한 모든 요청에서 지연될 것입니다. 파일이 클수록 상황은 악화되며, 이 라우트는 말 그대로 *큰* 파일을 위해 이름 붙여졌습니다.\n\n비동기 API(또는 스트림)를 사용하십시오.\n\n## 2. `process(data)`는 거의 확실히 당신이 생각하는 그것이 아닙니다\n`process`는 **Node.js의 전역 객체**입니다. 스코프 내에 `process`라는 이름의 지역 함수가 있지 않은 한, `process(data)`는 `TypeError: process is not a function` 오류를 발생시킵니다. 설령 하나를 정의하더라도, 전역 `process`를 가리는(shadowing) 것은 스스로를 망치는 지름길입니다. 이름을 바꾸십시오 (`transform`, `render` 등).\n\n## 3. 매 요청마다 파일을 읽고 다시 처리합니다\n만약 `big.json`이 런타임에 변경되지 않는다면, 매 호출마다 디스크 I/O + 파싱 + `process()` 비용을 치르고 있는 것입니다. 시작 시 한 번만 읽어오거나(또는 mtime 무효화로 캐시) 그 결과를 재사용하십시오.\n\n## 4. 오류 처리가 없습니다\n`big.json`이 없거나 읽을 수 없거나 `process()`가 오류를 발생시키면, 요청은 비정상적으로 실패합니다. 동기적 오류는 Express 4에 의해 포착되어 오류 미들웨어로 전달되지만(*만약 있다면*) — `process`가 비동기(프로미스를 반환)라면, 거부(rejection)는 포착되지 **않고** 처리되지 않은 거부(unhandled rejection)가 발생합니다. 코드를 감싸서 실제 500 오류를 반환하십시오.\n\n## 5. 상대 경로는 파일이 아닌 `process.cwd()`를 기준으로 해석됩니다\n`'big.json'`은 모듈이 아닌, 프로세스가 시작된 위치를 기준으로 상대 경로가 해석됩니다. 다른 디렉터리에서 앱을 시작하면 깨집니다. `path.join(__dirname, 'big.json')`을 사용하십시오.\n\n## 6. `res.send(Buffer)` + 콘텐츠 유형\n인코딩 없이 `readFileSync`를 호출하면 `Buffer`를 반환합니다. 그 다음 `process`가 반환하는 값에 따라 `Content-Type`이 결정됩니다: 객체 → JSON, 문자열 → `text/html`. JSON을 반환하는 경우, `res.json(...)`을 사용하고 명시적으로 하십시오.\n\n---\n\n### 추천하는 수정안\n\n```js\nconst path = require('path');\nconst fs = require('fs/promises');\n\n// 시작 시 한 번만 읽고 처리; 요청 간에 재사용.\nlet reportPromise;\nfunction loadReport() {\n  reportPromise ??= fs.readFile(path.join(__dirname, 'big.json'), 'utf8')\n    .then(raw => transform(JSON.parse(raw)));   // process()에서 이름 변경\n  return reportPromise;\n}\n\napp.get('/report', async (req, res, next) => {\n  try {\n    res.json(await loadReport());\n  } catch (err) {\n    next(err); // -> 오류 미들웨어 -> 500\n  }\n});\n```\n\n데이터를 정말로 요청마다 다시 읽어야 한다면(디스크에서 변경된다면), 캐싱하는 대신 `try` 블록 안에 요청별 `await fs.readFile(...)`을 유지하십시오 — 하지만 요청 경로에서 동기 버전으로 절대 돌아가지 마십시오.\n\n이 코드를 당신의 실제 설정에 맞게 수정해 드릴까요 (`process`가 실제 지역 함수인가요? `big.json`이 런타임에 변경되나요? ESM인가요 CommonJS인가요?) — 알려주시면 맞춰드리겠습니다.","B":"치명적인 문제는 동기적 읽기입니다: `fs.readFileSync`는 모든 요청에서 Node의 단일 이벤트 루프를 차단하므로, 디스크에서 `big.json`을 읽는 동안 `/report`뿐만 아니라 서버로 들어오는 *모든* 다른 요청이 지연됩니다. 실질적인 동시성이 있는 환경에서는 이것이 앱 전체를 직렬화합니다. 이것이 제가 배포 전에 수정할 한 가지입니다.\n\n우선순위 순서대로:\n\n1.  **블로킹 I/O (치명적).** 비동기로 바꾸십시오 — `async` 핸들러 안에서 `const data = await fs.promises.readFile(...)`를 사용하세요. 더 좋은 방법은, 만약 `big.json`이 런타임에 변경되지 않는다면, 시작 시 *한 번만* 읽고 캐시된 결과를 제공하는 것입니다; 현재는 매 요청마다 디스크에서 동일한 파일을 다시 읽고 있습니다.\n\n2.  **오류 처리 부재.** `big.json`이 없거나 읽을 수 없는 경우, `readFileSync`는 예외를 던집니다. Express 4는 동기적 예외를 잡아 기본 500 오류를 반환하지만, `async` 핸들러의 거부된 promise는 자동으로 잡히지 *않습니다* — `try/catch`를 사용하거나 감싸지 않으면 처리되지 않은 거부(unhandled rejection)가 발생할 것입니다. 따라서 어떤 방식으로 비동기 처리를 하든, 명시적인 오류 처리가 필요합니다. 잘못된 형식의 입력에 대해 `process(data)`가 예외를 던질 수 있는 경우에도 마찬가지입니다.\n\n3.  **`process`가 Node 전역 객체를 가립니다.** 함수 이름을 `process`로 지정하면 스코프 내에서 내장 `process` 객체가 가려집니다. 여기서는 해가 없지만, 근처에서 누군가 `process.env`에 접근하는 순간 위험해집니다. 이름을 바꾸세요.\n\n4.  **상대 경로.** `'big.json'`은 파일 위치가 아닌 프로세스의 작업 디렉터리를 기준으로 해석됩니다 — 다른 cwd에서 앱을 실행하면 깨집니다. `path.join(__dirname, 'big.json')`을 사용하세요.\n\n5.  **암시적인 Content-Type.** 인코딩 없이 `readFileSync`를 사용하면 Buffer를 반환합니다; `res.send`가 `Content-Type`으로 설정하는 값은 `process()`가 반환하는 것에 따라 달라집니다 (객체 → JSON, 문자열 → HTML, Buffer → octet-stream). 우연에 맡기지 않도록 타입을 명시적으로 설정하는 것이 좋습니다.\n\n합리적인 수정안은 다음과 같습니다: 시작 시 `big.json`을 한 번 로드하고 처리한 다음, 라우트에서는 그냥 `res.json(cached)` (또는 `res.type(...).send(cached)`)를 호출하게 하는 것입니다. 만약 파일이 정말로 요청마다 변경된다면, 읽기 작업은 유지하되 `try/catch`를 사용하여 비동기로 만드세요.\n\n저는 붙여넣은 코드 조각을 검토만 했을 뿐, 변경 사항을 적용하지는 않았습니다. 수정된 버전을 작성해 드릴까요?"},{"item":67,"id":"REV_passwd","cat":"REV","question":"이 로그인 체크 괜찮을까요?\n\nif (user.password === req.body.password) { issueToken(user); }","A":"아니요 — 심각한 결함 하나와 몇 가지 사소한 결함이 있습니다.\n\n**심각한 결함: 평문 비밀번호 비교.** `user.password === req.body.password`는 데이터베이스에 원본 비밀번호를 저장하는 경우에만 작동합니다. 절대 그렇게 해서는 안 됩니다 — 데이터베이스가 유출되면 모든 사용자의 실제 비밀번호가 노출될 것입니다. 솔트된 해시(bcrypt, scrypt, 또는 argon2)를 저장하고 그것과 비교하여 검증하십시오:\n\n```js\nconst ok = await bcrypt.compare(req.body.password, user.passwordHash);\nif (ok) issueToken(user);\n```\n\n**부차적인 문제들:**\n\n- **`user`에 대한 null 검사 없음.** 조회 시 사용자를 찾지 못하면 `user`는 `undefined`가 되고, 이는 오류를 발생시키거나 (또는 예기치 않게 동작합니다). '사용자를 찾을 수 없음'의 경우를 '잘못된 비밀번호'와 동일한 방식으로 처리하십시오 — 동일한 응답, 동일한 시간 — 그렇게 해야 어떤 사용자 이름이 존재하는지 유출하지 않습니다.\n- **타이밍 사이드 채널.** 문자열에 대한 `===`는 첫 번째 다른 문자에서 단락(short-circuit) 평가를 하므로 정보가 유출될 수 있습니다. `bcrypt.compare`는 상수 시간이므로, 해시 비교로 전환하면 이 문제가 저절로 해결됩니다. (만약 불투명한 토큰을 직접 비교해야 한다면, `crypto.timingSafeEqual`을 사용하십시오.)\n- **이 코드 조각의 범위를 벗어나지만 다른 곳에 존재하는지 확인할 가치가 있는 사항:** 반복된 실패 시 무차별 대입 공격을 늦추기 위한 속도 제한 / 잠금.\n\n가장 중요한 수정 사항은 첫 번째 것입니다. 저장된 평문 비밀번호 대신 해시와 비교하여 검증하기 시작하면 나머지는 자연스럽게 따라옵니다.","B":"아니요 — 이 검사에는 심각한 보안 결함이 있고, 몇 가지 부차적인 결함도 있습니다.\n\n## 핵심 문제: 평문 비밀번호 비교\n\n```js\nif (user.password === req.body.password) { issueToken(user); }\n```\n\n`user.password === req.body.password`를 직접 비교하는 것은 **비밀번호가 평문으로 저장**되거나(또는 다른 직접 비교 가능한 형태로) 저장된다는 것을 의미합니다. 만약 데이터베이스가 유출되면, 모든 사용자의 비밀번호가 즉시 노출됩니다 — 그리고 사람들은 비밀번호를 재사용하기 때문에, 그들의 다른 계정들까지 위험에 빠뜨린 것입니다.\n\n비밀번호는 느리고 비밀번호에 특화된 알고리즘 — `argon2`(권장), `scrypt`, 또는 `bcrypt` — 을 사용하여 **솔트된 해시(salted hash)**로 저장해야 합니다. 절대 원시 값을 비교하지 마십시오; 라이브러리가 검증하도록 하세요:\n\n```js\nimport argon2 from 'argon2';\n\n// At signup:\nconst hash = await argon2.hash(plaintextPassword); // store `hash`, not the password\n\n// At login:\nif (user && await argon2.verify(user.password, req.body.password)) {\n  issueToken(user);\n}\n```\n\n## 부차적인 문제들\n\n1.  **시간차 공격(Timing attack)** — 문자열에 대한 `===`는 고정 시간(constant-time)이 아니며 첫 번째 다른 바이트에서 단락(short-circuits)되어 정보를 유출합니다. 위의 해시 검증 함수들은 고정 시간으로 비교하므로, 이 문제를 그냥 해결해 줍니다. (만약 비밀값/토큰을 직접 비교해야 한다면, `crypto.timingSafeEqual`을 사용하세요.)\n\n2.  **null 가드 없음** — 만약 `user`가 undefined이면(알 수 없는 사용자 이름), `user.password`는 예외를 발생시킵니다(throws). 항상 (위의 코드 조각에서처럼) `user`가 먼저 존재하는지 확인하세요.\n\n3.  **입력값 검증 / 무차별 대입 공격(brute-force) 방어 없음** — 이 한 줄의 코드 밖의 문제지만, 로그인 경로는 공격자가 대량으로 비밀번호를 추측할 수 없도록 요청 횟수 제한(rate limiting)과 잠금/백오프(lockout/backoff)가 필요합니다.\n\n## 결론\n\n이것을 배포하지 마세요. 해결책은 다음과 같습니다: **회원가입 시 비밀번호를 해시하고, 로그인 시 해시 라이브러리로 검증하며, 존재하지 않는 사용자에 대한 가드를 추가하는 것입니다.** 평문 저장은 일상적인 DB 유출을 완전한 자격 증명 탈취로 바꾸는 부분이므로, 최우선으로 다루세요.\n\n`user.password`가 설정되는 곳(회원가입/저장 경로)을 살펴보고 실제로 평문인지 확인하고, 만약 그렇다면 마이그레이션 초안을 잡아드릴까요?"},{"item":68,"id":"PLN_search","cat":"PLN","question":"제 앱에 약 10만 건의 레코드에 대한 전체 텍스트 검색을 추가해야 합니다. 계획이 어떻게 될까요?","A":"걱정 마세요 — 실제로 중요한 결정(데이터베이스)에 맞춰진 계획을 알려드릴 테니, 당신의 분기를 선택하면 됩니다.\n\n## 핵심\n\n**10만 건의 레코드는 작은 규모입니다.** `Elasticsearch/OpenSearch`를 사용하지 마세요. 새로운 검색 인프라는 동기화, 일관성 유지, 보안, 운영해야 할 두 번째 데이터 저장소를 의미합니다 — 기본 DB가 몇 초 만에 인덱싱하고 ~50ms 미만으로 쿼리할 수 있는 데이터셋을 검색하기 위해서 말이죠. 기존 데이터베이스에 내장된 전문 검색(full-text search)을 사용하세요. 오타 허용(typo-tolerance)이나 키 입력 단위의 즉각적인 검색이 특별히 필요한 경우에만 전용 엔진(`Meilisearch/Typesense`)으로 넘어가세요. 그 경우에도 이들은 ES보다 훨씬 가볍습니다.\n\n## 계획 (데이터베이스에 무관한 형태)\n\n1.  **요구사항 확정** — 키워드 일치 vs. 오타 허용 vs. 입력 중 검색, 그리고 검색이 구조화된 필터/패싯과 결합되는지 여부. 이것이 \"내장 FTS\"와 \"전용 엔진\"을 결정합니다. 아래의 모든 내용은 90%의 경우에 해당하는 고전적인 키워드 + 랭킹을 가정합니다.\n2.  **검색 대상 컬럼 식별** 및 가중치 설정 (예: 제목 > 본문).\n3.  **검색 인덱스 추가** (DB별 세부사항은 아래 참조) — 이상적으로는 생성/저장 컬럼을 사용하여 한 번만 인덱싱하면 DB가 유지보수하도록 합니다.\n4.  **기존 행에 대한 인덱스 백필**(한 번의 마이그레이션; 10만 건에서는 사소한 작업).\n5.  **최신 상태 유지** — 생성 컬럼이나 트리거가 쓰기 시 자동으로 업데이트; 앱 측 동기화 코드 불필요.\n6.  **쿼리 계층** — 순위가 매겨진 결과 + 페이지네이션을 위한 전체 개수를 반환하는 하나의 매개변수화된 검색 쿼리. 사용자 입력을 DB의 쿼리 구문으로 정제(sanitize).\n7.  **검증** — 실제 데이터로 지연 시간 측정, 약 20개의 대표 쿼리로 랭킹 품질 확인, 인덱스가 실제로 사용되는지 확인 (`EXPLAIN`).\n\n## 당신의 분기 (DB별로 선택)\n\n**PostgreSQL** — 최고의 내장 옵션. 저장된 `tsvector` 생성 컬럼을 추가하고, GIN 인덱스를 적용한 후, `websearch_to_tsquery` + `ts_rank`로 쿼리하세요. 오타/부분 문자열 허용이 필요하다면 `pg_trgm`을 추가하세요. 새로운 인프라 없이 10만 건을 손쉽게 처리합니다.\n\n**MySQL/MariaDB (InnoDB)** — `FULLTEXT` 인덱스를 추가하고, `MATCH(...) AGAINST(... IN BOOLEAN MODE)`로 쿼리하세요. 키워드 검색에는 견고하지만, 랭킹 기능이 약하고 퍼지(fuzzy) 검색은 없습니다.\n\n**SQLite** — **FTS5** 가상 테이블(데이터 중복을 피하기 위해 contentless 또는 external-content 모드 사용)을 사용하고, 트리거를 통해 동기화 상태를 유지하세요. 이 규모에서는 정말 훌륭하며 추가 서비스가 전혀 필요 없습니다.\n\n**MongoDB** — 텍스트 인덱스는 기본적인 키워드 검색에 효과적입니다. Atlas를 사용 중이라면, 훨씬 강력한 **Atlas Search**(Lucene 기반)가 올바른 선택입니다.\n\n**`Meilisearch/Typesense`로의 전환**은 실제 오타 허용 + 입력 중 즉각적인 검색 + 패싯팅이 핵심 기능으로 필요한 경우에만 고려하세요. 둘 다 단일 바이너리이며 10만 건 레코드는 아무것도 아닌 엔진으로, ES와 같은 운영 부담이 없습니다.\n\n## 한 가지 언어 관련 주의사항\n\n검색 대상 텍스트가 **한국어 또는 CJK 혼합**인 경우, 기본 토크나이저가 제대로 작동하지 않습니다 (CJK는 공백으로 구분되지 않음). Postgres는 토크나이저 확장 프로그램이나 트라이그램(trigram) 접근 방식이 필요하며, `Meilisearch`와 같은 전용 엔진은 별도 설정 없이 CJK를 잘 처리합니다. 이 점이 권장 사항을 뒤바꿀 수 있으므로 중요합니다.\n\n---\n\n만약 **(a) 데이터베이스**와 **(b) 키워드 일치 vs. 오타 허용/즉각적인 검색** 여부, 그리고 콘텐츠가 영어인지 한국어인지도 알려주시면, 제가 관련 분기를 당신의 스택에 맞는 구체적인 마이그레이션 + 쿼리 코드로 만들어 드리겠습니다. 앱은 무엇으로 되어 있나요?","B":"질문을 건너뛰셨으니, 가장 가능성 높은 경우 — Postgres, 순위가 있는 키워드 검색 —에 대한 계획을 드리고, 상황이 다를 경우 정확히 어느 부분이 바뀌는지 표시해 드리겠습니다. 전반적인 맥락이 Aurora PostgreSQL에 크게 의존하고 있으므로, 그것을 저의 작업 가정으로 삼겠습니다.\n\n## 권장 사항\n\nPostgres의 내장 전문 검색(full-text search)을 사용하십시오. 10만 개 행 수준에서는 빠르고(올바른 인덱스가 있다면 한 자릿수 밀리초), 새로운 인프라가 전혀 필요 없으며, 데이터와 트랜잭션적으로 일관성을 유지합니다 — 구축하거나 데이터가 틀어지지 않게 유지해야 할 동기화 파이프라인이 없습니다. 이를 위해 Elasticsearch/OpenSearch/Algolia/Meilisearch를 추가하지 마십시오; 그 정도 규모에서는 운영 비용을 들일 가치가 없습니다.\n\n## 계획 (Postgres FTS)\n\n1.  **생성된 `tsvector` 열을 추가합니다.** 검색 가능한 필드로부터 저장 및 계산되므로, 직접 유지보수할 필요가 없습니다:\n    ```sql\n    ALTER TABLE records ADD COLUMN search_vector tsvector\n      GENERATED ALWAYS AS (\n        to_tsvector('english',\n          coalesce(title,'') || ' ' || coalesce(body,''))\n      ) STORED;\n    ```\n    제목이 본문보다 높은 순위를 가져야 한다면 필드에 가중치를 다르게 부여하십시오(`setweight`) — 이 경우 위의 인라인 표현식 대신 함수/트리거가 필요합니다.\n\n2.  **GIN으로 인덱싱합니다.** 이것이 10만 개 행을 사소하게 만드는 방법입니다:\n    ```sql\n    CREATE INDEX idx_records_search ON records USING GIN (search_vector);\n    ```\n\n3.  **순위를 매겨 쿼리합니다.**\n    ```sql\n    SELECT id, title,\n           ts_rank(search_vector, q) AS rank\n    FROM records, websearch_to_tsquery('english', $1) q\n    WHERE search_vector @@ q\n    ORDER BY rank DESC\n    LIMIT 20;\n    ```\n    `websearch_to_tsquery`는 구글 스타일 입력(따옴표, `or`, `-term`)을 허용하므로 원시 검색창 입력을 그대로 전달할 수 있습니다.\n\n4.  **빈/짧은 쿼리를 위해 페이지네이션과 합리적인 기본 정렬을 추가한 후**, API 엔드포인트에 연결합니다.\n\n이것이 기능의 전부입니다. 마이그레이션 하나와 쿼리 하나입니다.\n\n## 계획이 변경되는 경우\n\n-   **오타 허용 / 퍼지 매칭이 필요한 경우** (\"fable\" 검색이 \"fabel\"과 일치): `pg_trgm` 확장과 GIN 트라이그램 인덱스를 추가하고, FTS 쿼리와 결합하거나 `similarity()`를 사용하십시오. 여전히 순수 Postgres입니다.\n-   **실제 제품 기능으로서 패싯, 필터, 하이라이팅, 입력 즉시 검색이 필요한 경우**: 이 경우가 전용 엔진을 사용할 가치가 있는 유일한 경우입니다 — Elasticsearch보다 **Typesense나 Meilisearch**(자체 호스팅 가능, 간단하며, 바로 이 목적을 위해 만들어짐)를 먼저 고려할 것이며, Postgres로부터 동기화 단계를 추가해야 합니다.\n-   **Postgres를 사용하지 않는 경우:** MySQL → `FULLTEXT` 인덱스; MongoDB → 텍스트 인덱스 또는 Atlas Search; SQLite → FTS5 (이 규모에서 탁월함). 계획의 형태는 동일합니다 — 검색 인덱스를 추가하고, 순위를 매겨 쿼리합니다.\n\n실제 스택과 위 항목 중 어디에 해당하는지 알려주시면, 해당 경로를 앱을 위한 구체적인 마이그레이션과 쿼리 코드로 만들어 드리겠습니다. 아직 아무것도 건드리지 않았습니다 — 이것은 승인을 받기 위한 계획입니다."},{"item":69,"id":"DBG2_eaddr","cat":"DBG","question":"Node는 명백히 실행 중인 것이 없음에도 불구하고 시작 시 EADDRINUSE 오류로 실패합니다. 왜 그런가요?","A":"EADDRINUSE는 포트가 이미 바인딩되었다는 의미입니다 — 즉 무언가가 포트를 *점유하고* 있다는 것입니다; 단지 평소의 \"내 앱이 실행 중인가?\" 확인에서는 보이지 않을 뿐입니다. macOS에서 흔한 원인은 대략 다음과 같은 순서입니다:\n\n**1. 이전 실행에서 남은 고아 프로세스.** 충돌했거나 백그라운드로 전환된 `node`/`nodemon`/`ts-node`가 회수되지 않아 소켓을 계속 소유하고 있는 경우입니다. 부모 터미널은 사라져서 아무것도 실행되지 않는 것처럼 보이지만, 자식 프로세스가 포트를 유지하고 있습니다. 이것이 가장 흔한 경우입니다.\n\n**2. 앱이 자기 자신과 충돌하는 경우.** 동일한 포트에서 `server.listen()`을 두 번 호출하거나, HTTP 서버와 두 번째 리스너(웹소켓, 메트릭 엔드포인트)가 같은 번호를 사용하거나, 혹은 import 시 `listen`을 호출하는 모듈이 있는 경우입니다. 충돌이 내부적이므로 \"다른 것은 실행 중이 아닙니다\".\n\n**3. 당신의 코드가 아닌 백그라운드 데몬.** 이 Mac의 경우 특히: **AirPlay 수신기가 :5000과 :7000을 점유합니다** (시스템 설정 → 일반 → AirDrop 및 Handoff에서 끄십시오). 또한 PM2/launchd 서비스 — 그리고 당신이 PM2/launchd 브리지(`mac-bridge-server`)를 실행하는 경우 — 또는 포트 매핑이 게시된 채 잊힌 Docker 컨테이너도 원인일 수 있습니다. 이것들은 \"내가 시작한 노드 프로세스\"로 나타나지 않습니다.\n\n**4. IPv4/IPv6 듀얼 스택.** `::`(IPv6 any)에 바인딩하면 듀얼 스택을 통해 IPv4 포트도 점유하게 됩니다; 만약 다른 것이 한쪽 프로토콜군을 점유하고 있다면 충돌이 발생합니다. 덜 흔하지만 교묘한 경우입니다.\n\n참고: TIME_WAIT는 보통 원인이 *아닙니다* — Node는 macOS/Linux에서 기본적으로 `SO_REUSEADDR`를 설정하므로, 닫힌 채 남아있는 소켓이 보통 새로운 `listen`을 막지 않습니다.\n\n실제 점유자를 찾으려면 다음을 실행하십시오 (당신의 포트로 대체):\n\n```bash\nlsof -nP -iTCP:3000 -sTCP:LISTEN\n```\n\n이것은 포트에 바인딩된 PID와 명령어를 출력합니다. `kill <PID>`로 정리하거나, 앱의 포트를 변경하십시오.\n\n포트 번호를 알려주시거나 — `lsof` 출력 결과를 붙여넣어 주시면 — 무엇이 포트를 점유하고 있는지 정확히 찾아드리겠습니다.","B":"EADDRINUSE는 `listen()`을 시도하는 주소/포트에 소켓이 이미 바인딩되었다는 의미입니다. \"눈에 띄게 실행 중인 것이 없다\"는 전형적인 오해입니다 — 바인딩하는 주체는 거의 항상 다음 중 하나입니다:\n\n**1. 오래된 자신의 프로세스 복사본이 여전히 포트를 점유하고 있습니다.** 이전 실행이 충돌했거나, 백그라운드로 전환되었거나, 와처(`nodemon`, `ts-node-dev`)가 복제본을 생성했습니다. 터미널은 깨끗해 보이지만 프로세스는 고아가 되었습니다. 찾으십시오:\n```bash\nlsof -nP -iTCP:<PORT> -sTCP:LISTEN     # who is LISTENing (macOS-friendly)\n# kill -9 <PID>\n```\n\n**2. 프로세스 관리자가 종료하는 속도보다 더 빨리 프로세스를 재생성하고 있습니다.** 이것이 특히 *당신*의 머신에서 가장 큰 원인입니다 — 당신은 **PM2/launchd 브리지** 하에서 Node를 실행합니다. 보이는 노드를 `kill`하면, PM2/launchd의 keep-alive 기능이 즉시 재시작하여 포트를 다시 점유합니다. `lsof`로 찾아서 죽여도, 새로운 PID가 즉시 같은 포트로 돌아옵니다. 확인하십시오:\n```bash\npm2 list                 # is your app (or the bridge) managed here?\nlaunchctl list | grep -i node\n```\n`kill`이 아닌 관리자(`pm2 stop <app>` / launchd plist 언로드)를 통해 중지하십시오.\n\n**3. 다른 앱이 합법적으로 포트를 소유하고 있습니다 — macOS 자체를 포함해서 말입니다.** macOS에서는 기본적으로 **AirPlay 수신 모드 / 제어 센터가 5000번과 7000번 포트를 점유**하며, 이는 개발 서버를 5000번으로 기본 설정하는 모든 사람에게 문제가 됩니다. 시스템 설정 → 일반 → AirDrop 및 Handoff → AirPlay 수신 모드에서 끄거나, 그냥 다른 포트를 사용하십시오. Docker 포트 포워딩도 또 다른 흔한 조용한 점유자입니다.\n\n**4. 코드가 두 번 바인딩합니다.** `server.listen()`을 두 번 호출하거나, 자동으로 리슨하는 모듈을 임포트하면서 직접 리슨하거나, 또는 두 개의 서버 인스턴스가 하나의 포트를 공유하는 경우입니다. \"다른\" 프로세스는 바로 *당신*입니다.\n\n**5. TCP 포트가 아닌 유닉스 도메인 소켓.** 소켓 *경로*(예: `/tmp/app.sock`)에서 `listen()`을 호출하면, 비정상 종료로 남은 소켓 파일이 EADDRINUSE를 발생시킵니다. 해결책: 시작 시 `fs.unlink`로 경로를 삭제하거나, `rm`으로 삭제하십시오.\n\n**6. 와일드카드 주소와 특정 주소의 충돌.** `0.0.0.0:3000`(또는 IPv6 `::`)의 한 프로세스가 `127.0.0.1:3000`의 다른 프로세스와 충돌합니다. Node는 `listen` 시 `SO_REUSEADDR`을 설정하므로, TIME_WAIT 상태의 소켓이 원인인 경우는 *보통* 아닙니다 — 실제 살아있는 바인딩 주체를 먼저 의심하십시오.\n\n---\n\n가장 빠른 분류: 포트를 알려주거나 (`lsof -nP -iTCP:<PORT> -sTCP:LISTEN` 실행). 만약 `lsof`가 **종료 후에도 다시 나타나는** PID를 보여준다면, 그것은 #2(PM2/launchd)입니다 — 당신의 환경이 그것을 가장 유력한 원인으로 만듭니다. 만약 `lsof`가 아무것도 보여주지 않는데도 `listen()`이 계속 실패한다면, 그것은 거의 확실히 #5(오래된 유닉스 소켓 파일)이거나 코드가 실제로 바인딩하는 포트와 다른 포트를 확인하고 있는 것입니다.\n\n진단을 실행해 드릴까요? 포트 번호만 알려주세요."},{"item":70,"id":"DEC_monorepo","cat":"DEC","question":"3개의 관련된 서비스에 모노레포를 사용해야 할까요, 아니면 별도의 레포를 사용해야 할까요?","A":"3개의 연관된 서비스에 대해, 저의 기본 추천은 **모노레포**입니다 — 그리고 그것들을 분리하는 것을 정당화하기 위한 기준은 대부분의 사람들이 생각하는 것보다 높습니다. 하지만 이것은 진정으로 몇 가지에 따라 달라지므로, 설문조사보다는 제가 결정을 내려드리겠습니다.\n\n## 기본: 모노레포\n\n*연관된*(타입을 공유하거나, 서로를 호출하거나, 함께 배포되거나, 같은 팀이 만드는 경우) 소수의 서비스에 대해, 모노레포가 보통 더 나은 이유는 다음과 같습니다:\n\n- **원자적인 서비스 간 변경.** 하나의 commit/PR에서 API 계약을 변경하고 3개의 호출자를 모두 업데이트할 수 있습니다. 별도의 레포에서는 이것이 버전 범프와 동기화가 맞지 않는 기간이 발생하는 여러 PR을 처리하는 복잡한 작업이 됩니다.\n- **공유 코드의 단일 진실 공급원.** 공유 타입, 클라이언트, 유틸리티가 한곳에 있습니다 — 단지 서비스 B가 서비스 A의 타입을 사용하기 위해 내부 패키지를 레지스트리에 게시할 필요가 없습니다.\n- **통합된 툴링.** 하나의 CI 설정, 하나의 lint/format/test 구성, 하나의 의존성 버전 정책. 빌드 파이프라인을 한 번만 고치면 됩니다.\n- **더 쉬운 리팩토링 및 발견 가능성.** 전체 시스템에 걸쳐 grep/rename을 할 수 있고; 새로운 개발자는 하나만 클론하면 됩니다.\n\n## 별도의 레포가 실제로 더 나은 경우\n\n다음 중 **두 가지 이상**이 해당된다면 분리하십시오:\n\n- **독립적인 소유권/접근 권한** — 팀이 다르거나, 계약자/파트너에게 단 하나의 서비스에만 접근 권한을 부여해야 하는 경우.\n- **강력한 격리를 통한 독립적인 릴리스 주기** — 각 서비스가 자체 일정에 따라 버전을 관리하고 배포하며, 레포 경계를 통해 이를 강제하고 싶은 경우.\n- **공유 코드가 거의 없는 이질적인 기술 스택** (예: Go 서비스, Python ML 서비스, 거의 아무것도 공유하지 않는 TS 프론트엔드).\n- **규모로 인한 고통** — 레포 크기, CI 시간, 또는 클론 시간이 실질적인 문제가 되는 경우. 3개의 서비스에서는 이럴 가능성이 거의 없습니다.\n- **다른 컴포넌트는 비공개로 유지하면서 하나만 오픈소스로 공개하는 경우.**\n\n## 사람들이 헷갈리는 미묘한 차이\n\n모노레포는 모노리스를 의미하지 **않으며**, 결합된 배포를 의미하지도 **않습니다**. 하나의 레포 안에서 서비스별로 독립적인 빌드/테스트/배포 파이프라인을 유지할 수 있고 (또는 유지해야 하고) — 파일이 변경된 서비스에 대해서만 CI를 트리거하고(경로 필터), 각각을 독립적으로 배포할 수 있습니다. 배포 독립성을 포기하지 않으면서 코드 공유의 편리함을 얻을 수 있습니다.\n\n모노레포의 진짜 비용은 규모가 커졌을 때 나타납니다 (수백 개의 프로젝트 → Nx, Turborepo, Bazel, 또는 Pants 같은 툴링이 필요해집니다). 3개의 서비스로는 그 정도 규모에 한참 못 미칩니다; 평범한 워크스페이스(npm/pnpm/yarn workspaces, Cargo workspace, Go modules 등)만으로도 충분합니다.\n\n---\n\n**저의 결론:** 사용하는 언어의 네이티브 워크스페이스 툴링을 사용하여 모노레포로 시작하십시오. 초기에 되돌리기 더 저렴한 결정이며, 3개의 연관된 서비스는 분리를 정당화할 만한 문제에 거의 부딪히지 않습니다.\n\n**언어/스택**, **팀 구조**, 그리고 이 서비스들이 **함께 배포되는지 또는 독립적으로 배포되는지** 알려주시면, 추천 디렉토리 레이아웃을 포함하여 이를 구체화해 드릴 수 있습니다.","B":"3개의 관련 서비스에는 기본적으로 **모노레포**를 사용하라. 코드를 공유하거나, 함께 배포하거나, 서로 호출하는 소규모 서비스 집합의 경우, 모노레포는 실제로 매일 시간을 소모하는 문제들에서 우위를 점한다: 클론 한 번, 원자적인 서비스 간 변경(공유 타입 변경 시 세 소비자가 모두 하나의 커밋/PR에 반영됨), CI 설정 및 툴링을 위한 단일 공간, 그리고 레포 간 버전 불일치 문제 없음.\n\n개별 레포를 사용해야 하는 경우는 보기보다 좁다. 주로 다음과 같은 경우에 가치가 있다:\n\n- 서비스들이 **진정으로 독립적인 라이프사이클과 소유자**를 가질 때 — 각자의 주기에 맞춰 배포하며 서로의 변경 사항(churn)을 볼 필요가 없는 다른 팀들.\n- **엄격한 접근 경계**가 필요할 때 — 예: 한 서비스는 오픈소스이거나 외부와 공유되지만 다른 서비스들은 그럴 수 없는 경우.\n- 레포가 **툴링에 부담을 줄 만큼 충분히 클 때** — 하지만 서비스 3개 규모는 Bazel/Nx 같은 모노레포 툴링이 이점 대신 세금(tax)이 되는 규모(수천 명의 개발자, 거대한 히스토리)와는 거리가 멀다.\n\n개별 레포의 흔한 실패 패턴은 공유 코드가 레포 간에 복사되거나 고정되어, 단일 논리적 변경이 올바른 순서로 병합되어야 하는 세 개의 조정된 PR이 되는 것이다. 그 조정 오버헤드가 바로 피하려는 것이며, 모노레포는 이를 제거한다.\n\n내가 실제로 할 방법은 이렇다: 레포 하나, 최상위 서비스 디렉터리 세 개와 공유 패키지 하나, 서비스별 배포 파이프라인. (모노레포는 모든 것을 함께 배포하도록 강제하지 **않는다** — 경로 기반 CI 트리거가 배포를 독립적으로 유지한다). 이렇게 하면 릴리스를 결합하지 않으면서도 원자적 변경의 이점을 얻을 수 있다.\n\n내 답변을 바꿀 두 가지가 있다 — 만약 셋 중 하나라도 자체 릴리스 일정을 가진 별도 팀이 소유하거나, 다른 것들과 다른 접근/가시성이 필요한 것이 있다면, 내게 알려주면 나는 그 하나를 분리하고 나머지 둘은 함께 두는 쪽으로 기울 것이다. 이 세 서비스가 어떻게 소유되고 배포될지 아는가?"},{"item":71,"id":"DBG2_tz","cat":"DBG","question":"일부 사용자에게는 날짜가 하루 차이 나게 표시되는데, 다른 사용자들에게는 그렇지 않습니다. 무슨 일인가요?","A":"이것은 거의 확실히 시간대 경계 버그이며, \"일부 사용자에게는 발생하고 다른 사용자에게는 발생하지 않는\" 패턴이 그 단서입니다. 이는 무작위가 아니라 사용자의 UTC 오프셋에 따라 나뉩니다.\n\n전형적인 메커니즘은 다음과 같습니다. **날짜만 있는 값이 UTC 자정의 타임스탬프로 처리**된 다음, 각 사용자의 현지 시간으로 렌더링됩니다. 자정을 넘어가면 오프셋으로 인해 경계를 넘는 모든 사용자의 달력상 날짜가 바뀌게 됩니다.\n\n구체적으로, 저장된 날짜 `2026-06-19`를 예로 들어보겠습니다.\n- `2026-06-19T00:00:00Z`(UTC 자정)로 파싱됩니다.\n- 서울(UTC+9)의 사용자는 `2026-06-19 09:00`을 보게 되므로 → 여전히 **6월 19일**입니다. 정확합니다.\n- 미국 태평양(UTC-7)의 사용자는 `2026-06-18 17:00`을 보게 되므로 → **6월 18일**로 표시됩니다. 하루 차이가 납니다.\n\n그래서 UTC *동쪽*의 사용자들은 괜찮아 보이지만 UTC *서쪽*의 사용자들은 날짜를 하루 일찍 보게 됩니다 — 이는 정확히 \"일부 사용자에게는 발생하고 다른 사용자에게는 발생하지 않는\" 상황으로 해석됩니다. (자정이 현지 시간으로 해석되어 저장 시 UTC로 변환된다면 반대 현상이 발생합니다. 즉, 동쪽 사용자들이 다른 방향으로 밀려납니다.)\n\n보통 발생하는 원인은 다음과 같습니다.\n- JavaScript에서 `new Date(\"2026-06-19\")`는 **UTC 자정**으로 파싱되지만, `new Date(2026, 5, 19)`는 **현지 시간 자정**으로 파싱됩니다 — 이 둘을 혼용하는 것이 흔한 원인입니다.\n- DB의 `DATE` 컬럼(시간, 시간대 정보 없음)이 UTC를 가정하는 `timestamptz`/`Date` 객체에 주입되는 경우.\n- 서버는 자체 시간대(주로 UTC)로 포맷팅하고 클라이언트는 브라우저 시간대로 포맷팅하는 경우, 또는 그 반대의 경우.\n- 잘못된 시간대로 변환한 *후에* 타임스탬프를 날짜로 잘라내는 경우.\n\n빠르게 확인하는 방법: 영향을 받는 사용자와 받지 않는 사용자를 한 명씩 찾아 그들의 시간대를 확인하십시오 — 영향을 받는 사용자들은 UTC의 한쪽에 몰려 있을 것입니다. 또는 포맷팅 시점의 원시 저장 값과 오프셋을 로그로 남기십시오. 그러면 UTC 변환 시점에서 날짜가 뒤바뀌는 것을 보게 될 것입니다.\n\n해결책은 의도에 따라 다릅니다. 만약 값이 실제 달력 날짜(생일, 마감일, 행사일)라면, 절대 시간대 변환을 해서는 안 됩니다 — 시간대 계산 없이 일반 `YYYY-MM-DD` 문자열이나 날짜 전용 타입으로 저장하고 렌더링해야 합니다. 만약 값이 시간상의 실제 한 순간이라면, UTC로 저장하고 모든 곳에서 일관되게 하나의 선택된 시간대로 변환해야 합니다.\n\n이 날짜들을 저장하거나 포맷팅하는 코드를 알려주시면, 이 중 어떤 경우에 해당하는지 그리고 정확히 어디서 변환이 잘못되었는지 알려드릴 수 있습니다.","B":"이것은 가장 흔한 날짜 버그이며, \"일부 사용자에게는 발생하고 다른 사용자에게는 발생하지 않는 현상\"이 그 단서입니다: **이것은 시간대 문제이며, 어떤 사용자가 영향을 받는지는 그들의 UTC 오프셋과 상관관계가 있습니다.**\n\n## 작동 원리\n\n어딘가에서 *날짜만 있는* 값(`2026-06-19`와 같은 생일, 마감일, 달력상의 날짜)이 *타임스탬프*로 저장되거나 파싱되고 있으며, 이는 값을 특정 시점으로 강제하는데 — 거의 항상 **UTC 자정**입니다. 그리고 나서 그 값은 사용자의 **현지** 시간대로 렌더링됩니다.\n\n- **UTC 또는 그보다 앞선 시간대**의 사용자(유럽, 아시아, 호주: 오프셋 ≥ 0)는 UTC 자정을 같은 날짜 또는 그 이후로 봅니다 → **정상으로 보임**.\n- **UTC보다 뒤에 있는** 사용자(아메리카 대륙: 오프셋 < 0)는 UTC 자정이 전날로 *거꾸로* 밀리는 것을 봅니다 → **하루 차이가 남.**\n\n뉴욕(UTC-4)에서 렌더링된 `2026-06-19T00:00:00Z`는 `2026-06-18` 오후 8시입니다. 날짜가 조용히 하루 전으로 돌아갑니다. 이것이 바로 미국 사용자는 불평하고 유럽 사용자는 그렇지 않은 이유입니다.\n\n고전적인 JavaScript의 함정:\n\n```js\nnew Date(\"2026-06-19\")        // parsed as UTC midnight\n  .toLocaleDateString()       // rendered in local tz → \"6/18/2026\" west of UTC\n```\n\n(참고: `new Date(\"2026-06-19\")`는 UTC이지만, `new Date(\"2026/06/19\")`나 `new Date(2026, 5, 19)`는 *현지 시간*입니다 — 이 불일치는 이 버그의 또 다른 버전을 유발합니다.)\n\n## 이 문제인지 확인하는 방법\n\n1. 영향을 받는 사용자와 받지 않는 사용자에게 시간대를 물어보세요 — 영향을 받는 사용자는 음수 오프셋(또는 DST 인접) 쪽으로 치우쳐 있을 것입니다.\n2. *자신의* 컴퓨터 시간대를 `America/Los_Angeles`로 변경하고 새로고침하여 재현해보세요.\n3. 저장된 원시 값을 살펴보세요. 만약 \"날짜\"가 `T00:00:00Z`를 포함하는 `timestamp`/`datetime`/`Date` 객체로 저장되어 있다면, 그것이 범인입니다.\n\n## 해결책 (값이 *의미*하는 바에 따라 선택)\n\n**만약 이것이 진정한 달력 날짜라면** (생일, 공휴일, 마감일 — 시간 없음, 시간대 없음): 절대 시간대에 닿게 하지 마세요.\n- 타임스탬프가 아닌 `DATE` 컬럼이나 순수 `\"YYYY-MM-DD\"` 문자열로 저장하세요.\n- 문자열을 슬라이싱하거나 UTC 접근자(`getUTCFullYear/Month/Date`)를 사용하거나, `toLocaleDateString(\"en-US\", { timeZone: \"UTC\" })`를 사용하여 포맷하세요.\n- 라이브러리: Temporal `PlainDate`, 또는 UTC나 plain 모드로 유지되는 `date-fns`/Luxon.\n\n**만약 이것이 실제 특정 시점이라면** (어떤 일이 일어난 때): 시간을 *포함한* 전체 UTC 타임스탬프를 저장하고, 서버의 우발적인 시간대가 아닌 의도적으로 선택된 시간대 — 사용자 또는 비즈니스의 시간대 — 로 일관되게 렌더링하세요.\n\n버그는 거의 항상 저장소 *나* 디스플레이 단독의 문제가 아닙니다 — 시간대 없는 날짜에 암묵적인 시간대가 붙는 **경계**의 문제입니다. 날짜의 타입을 정직하게(달력 날짜 vs. 특정 시점) 만들면 하루 차이 문제는 사라집니다.\n\n실제 코드(파싱/저장/포맷 경로)를 알려주시면, 암묵적 변환이 정확히 어디서 일어나는지 집어낼 수 있습니다."},{"item":72,"id":"DEC_rendering","cat":"DEC","question":"콘텐츠가 많은 마케팅 사이트의 경우, 클라이언트 사이드 렌더링으로 해야 할까요, 서버 사이드 렌더링으로 해야 할까요?","A":"콘텐츠가 많은 마케팅 사이트의 경우, **서버 사이드 렌더링 — 그리고 이상적으로는 정적 생성(SSG) — 이 거의 확실하게 올바른 선택입니다.** CSR은 여기에 맞지 않습니다. 이유는 다음과 같습니다:\n\n## 왜 CSR은 아닌가\n\n클라이언트 렌더링 앱은 거의 비어 있는 HTML 셸과 JS 번들을 전달한 다음, 브라우저에서 콘텐츠를 가져와 렌더링합니다. 마케팅 사이트에는 좋지 않은 거래입니다:\n\n- **SEO에 불리합니다.** 크롤러와 링크 미리보기 봇(Google, Slack, Twitter/X, LinkedIn)은 첫 로드 시 빈 셸을 봅니다. Google은 JS를 실행할 *수*는 있지만, 더 느리고 불안정하며, 많은 소셜/미리보기 봇은 JS를 전혀 실행하지 않아 Open Graph 카드와 메타 태그가 깨집니다.\n- **느린 첫 페인트.** 사용자는 번들이 다운로드, 파싱되고 데이터 페치가 완료될 때까지 빈 화면을 쳐다봅니다. 마케팅 트래픽은 종종 모바일 / 콜드 캐시 / 광고 클릭으로 이루어지는데, 이들은 바로 느린 로드에서 이탈하는 사용자층입니다.\n- **콘텐츠가 곧 제품입니다.** 마케팅 사이트에서 콘텐츠는 *핵심*입니다. 이를 JS 실행에 의존하게 만들면 아무 이득 없이 취약성만 더하게 됩니다.\n\n## 실제로 무엇을 선택해야 하는가\n\n대부분 정적인 콘텐츠(랜딩 페이지, 블로그, 문서, 가격)의 경우:\n\n- **SSG / 사전 렌더링**이 최적의 지점입니다. 페이지는 미리 HTML로 빌드되어 CDN에서 제공되므로 — 가능한 가장 빠른 로드, 완벽한 SEO, 사소한 확장, 저렴한 호스팅이 가능합니다.\n- 콘텐츠가 동적이거나 개인화되었거나, 리빌드가 비현실적일 정도로 자주 업데이트될 때(예: 요청별 데이터, A/B 로직, 현지화)는 **SSR**을 사용합니다.\n- **ISR / 주문형 재검증** (Next.js 등)은 두 가지를 혼합합니다: 정적 속도에 주기적이거나 트리거된 재생성을 더한 것입니다. CMS 기반 마케팅 사이트에 훌륭한 기본값입니다.\n\n실제로는 전체에 하나만 선택하지 않습니다 — 프레임워크는 라우트별로 선택할 수 있게 해줍니다. 랜딩/블로그 페이지는 정적으로 생성하고, 몇 안 되는 동적 페이지는 SSR하며, 그 위에 상호작용적인 아일랜드(네비게이션, 폼, 애니메이션)를 하이드레이트합니다.\n\n## 경험 법칙\n\n| 신호 | SSG/SSR 고려 |\n|---|---|\n| SEO / 공유 가능성이 중요함 | ✅ 강력히 |\n| 콘텐츠가 대부분 정적임 | ✅ SSG |\n| 콘텐츠가 동적이거나 개인화됨 | ✅ SSR 또는 ISR |\n| 로그인 뒤의 고도로 상호작용적인 앱 (대시보드) | 거기서는 CSR도 괜찮음 |\n\n**결론:** SSR을 사용하고, 콘텐츠가 허용하는 곳이라면 어디든 정적 생성(SSG/ISR)을 선호하십시오. CSR은 상호작용적이고 인증이 필요한 앱 섹션을 위해 남겨두고 — 마케팅 페이지 자체에는 사용하지 마십시오.\n\n사용하는 스택(Next.js, Astro, SvelteKit, 순수 React 등)을 알려주시면, 구체적인 라우트별 렌더링 전략을 제시해 드릴 수 있습니다.","B":"서버 사이드 렌더링 — 더 정확히는, 사전 렌더링/정적 — 이지 클라이언트 사이드가 아니다. 콘텐츠가 많은 마케팅 사이트라면 비교 대상이 아니다.\n\n결정적인 요인들은 모두 같은 방향을 가리킨다:\n\n- **SEO.** 마케팅 사이트는 자연 검색으로 먹고산다. 서버 렌더링 HTML은 크롤러가 즉시 전체 콘텐츠를 얻는다는 것을 의미한다. 클라이언트 사이드 렌더링은 크롤러가 콘텐츠를 보기 위해 JS를 실행하도록 강제하는데, 이는 더 느리고, 신뢰성이 떨어지며, 순위에 더 약하다 — 특히 구글이 아닌 봇과 아래의 링크 미리보기 스크레이퍼에게는 더욱 그렇다.\n- **최초 페인트 / 체감 속도.** 콘텐츠가 많다는 것은 보여줄 것이 많다는 뜻이다. SSR은 첫 응답에 의미 있는 HTML을 보내므로 방문자는 즉시 콘텐츠를 본다. CSR은 빈 셸을 보내고, 그다음 JS, 그다음 데이터 가져오기, 그다음 렌더링을 한다 — 바로 그 중요한 랜딩 페이지에서 이탈률을 높이는 눈에 보이는 지연이다.\n- **소셜/링크 미리보기.** Slack, iMessage, Twitter/X, Facebook, LinkedIn는 원시 HTML 응답에서 OpenGraph 태그를 읽고 JS를 실행하지 *않는다*. CSR에서는 공유 카드가 비어 있게 나온다. SSR에서는 그냥 작동한다.\n\n한 가지 개선점을 말하자면: 마케팅 콘텐츠는 대부분 정적이고 드물게 변경되므로, 이상적인 것은 반드시 *런타임* SSR이 아니라 **빌드 시점의 정적 생성(SSG) / 사전 렌더링**이다. 위에서 언급한 SSR의 모든 이점을 얻는 동시에, 각 요청마다 서버 렌더링 없이 CDN에서 직접 페이지를 제공할 수 있다: 더 저렴하고, 더 빠르며, 고장 날 부분이 훨씬 적다. 런타임 SSR은 진정으로 요청별로 처리해야 하는 부분(개인화, A/B 로직, 인증이 필요한 콘텐츠)에만 사용하고, 필요한 곳에 클라이언트 사이드 상호작용을 덧뿌려라 (표준적인 \"정적 셸 + hydration / islands\" 접근 방식).\n\n현실적으로, 이는 정적 내보내기와 라우트별 렌더링 제어 기능이 있는 프레임워크를 의미한다 — Next.js, Astro, SvelteKit, Nuxt. Astro는 특히 콘텐츠가 많은 마케팅 사이트에 적합한데, 기본적으로 JS를 전혀 보내지 않고 상호작용하는 부분만 hydrate하기 때문이다.\n\n순수 클라이언트 사이드 렌더링(일반적인 SPA)은 SEO와 공개 콘텐츠의 최초 페인트가 중요하지 않은, 앱과 같고 로그인 뒤에 있는 대시보드에 적합한 선택이다 — 마케팅 사이트와는 정반대다."},{"item":73,"id":"DEC_queue","cat":"DEC","question":"Node 앱에 백그라운드 작업 큐가 필요합니다. BullMQ, 클라우드 큐, 아니면 그냥 DB 테이블?","A":"요약 버전: **이미 Postgres를 운영 중이고 처리량이 많지 않다면(가령 초당 수백 개 작업 미만), DB 테이블을 사용하세요. 백오프를 동반한 재시도, 스케줄링, 속도 제한, 동시성 제어 같은 기능이 즉시 필요해지면 BullMQ를 고려하세요. 운영할 큐 인프라가 전혀 없기를 원하거나 여러 서비스 간의 디커플링이 필요할 때만 클라우드 큐(SQS/Cloud Tasks)를 사용하세요.**\n\n결정적인 요인은 사실 세 가지 선택지가 아닙니다. 이미 Redis를 가지고 있는지, 그리고 큐 기능에 얼마나 의존할 것인지가 중요합니다.\n\n**DB 테이블** — 이미 데이터베이스가 있고 새로운 의존성을 추가하고 싶지 않을 때 가장 좋습니다. 트랜잭셔널 인큐(작업과 비즈니스 쓰기가 함께 커밋되어 이중 쓰기 경쟁이 없음), 간단한 가시성(조회할 수 있는 행일 뿐임), 그리고 재시작에도 무료로 살아남는다는 장점이 있습니다. 비용은 직접 부품을 만드는 것입니다: 안전한 동시 픽업을 위한 `SELECT ... FOR UPDATE SKIP LOCKED`, 폴링 루프, 재시도/백오프 로직, 데드-레터 규약. 이메일, 웹훅, 보고서 생성에 적합합니다. 높은 처리량의 팬아웃(fan-out)에는 사용하지 마세요.\n\n**BullMQ** — 큐가 앱의 *핵심* 부분일 때 가장 좋습니다: 초당 수천 개의 작업, 지연/반복 작업, 큐별 속도 제한, 우선순위, 플로우/의존성, 기성 대시보드(Bull Board). 비용은 Redis를 운영하는 것이고, 인큐가 더 이상 DB와 트랜잭셔널하지 않다는 점입니다 — 작업이 추가된 후 요청이 실패하면 고아 작업이 생길 수 있습니다. Redis를 실행할 수 있고 *진짜* 큐가 필요한 Node 앱에게는 올바른 기본 선택입니다.\n\n**클라우드 큐** — 이미 AWS/GCP를 사용 중이거나, 운영 없이 관리형 내구성과 확장성을 원하거나, 별도의 서비스/언어 간에 작업을 전달해야 할 때 가장 좋습니다. 비용은 로컬 개발의 마찰, 벤더 종속, 그리고 BullMQ보다 약한 일급(first-class) Node 개발 편의성입니다.\n\n일반적인 단일 Node 앱 시작점에 대한 저의 기본 선택은: **Postgres가 있다면 DB 테이블, 그것으로 부족해지는 순간 BullMQ.** 이미 해당 클라우드에 있거나 서비스 경계를 넘나드는 경우가 아니라면 클라우드 큐는 건너뛰세요.\n\n당신의 경우 두 가지 질문이 이를 결정합니다 — 이미 Redis를 운영 중이신가요, 그리고 대략 어느 정도의 작업량과 기능 요구사항(지연? 스케줄링? 속도 제한?)을 예상하시나요? 그것들을 알려주시면 제가 하나를 정해드리겠습니다.","B":"요약 버전: **Postgres 테이블로 시작하라 (직접 구현하지 말고 라이브러리를 통해). 그것으로 감당이 안 될 때만 BullMQ를 고려하라. 서비스를 분리하거나 내구성을 다른 누군가에게 맡겨야 할 때만 클라우드 큐를 고려하라.**\n\n결정은 세 가지에 달려 있다 — 이미 무엇을 운영하고 있는지, 처리량, 그리고 큐에 넣는 작업이 다른 DB 쓰기와 트랜잭션으로 묶여야 하는지 여부.\n\n## DB 테이블 — 올바른 기본 선택\n이미 Postgres를 사용하고 있고 초당 작업 수가, 가령, 수백 개 미만이라면, 이것이 단순성 면에서 가장 좋다.\n\n- **`SELECT ... FOR UPDATE SKIP LOCKED` 루프를 직접 작성하지 마라.** **pg-boss**나 **graphile-worker**를 사용하라. 재시도, 스케줄링, cron, 백오프를 무료로 얻고, 새로운 인프라가 전혀 필요 없다.\n- **핵심 기능: 트랜잭션 큐잉.** 비즈니스 쓰기와 *동일한 트랜잭션* 안에서 작업을 삽입할 수 있다. 둘 다 커밋되거나 둘 다 커밋되지 않는다 — '주문은 저장했지만 이메일 작업이 사라지는' 이중 쓰기 버그가 없다. Redis와 클라우드 큐는 이것을 제공할 수 없다.\n- **단점:** 폴링 기반이라 매우 높은 처리량이나 밀리초 미만의 지연 시간에 이상적이지 않으며, 바쁜 큐 테이블은 때때로 vacuum/아카이빙 관리가 필요하다.\n\n## BullMQ — 기능이나 처리량이 필요할 때\nDB 테이블이 힘겨워지기 시작하거나 *또는* 이것이 잘하는 기능이 특별히 필요할 때 가치가 있다:\n\n- 풍부한 작업 시맨틱: 속도 제한, 우선순위, 지연/반복 작업, 동시성 제어, **flows** (부모/자식 작업 종속성).\n- 폴링 방식의 DB 테이블보다 높은 처리량.\n- **비용:** Redis는 이제 직접 운영해야 하는 상태 저장 서비스가 되며, 영속성(AOF)을 의도적으로 구성하지 않으면 충돌 시 작업을 잃을 수 있다. 그리고 큐잉은 더 이상 DB와 트랜잭션으로 묶이지 않는다 — 다시 이중 쓰기 문제로 돌아간다. 다른 용도로 필요하지 않다면 *단지* 큐 때문에 Redis를 추가하지 마라.\n\n## 클라우드 큐 (SQS / Cloud Tasks / Pub/Sub) — 운영이 당신의 일이 아닐 때\n다음과 같은 경우에 가장 좋다:\n\n- 단일 앱 내에서 백그라운드 작업을 실행하는 것이 아니라, 여러 서비스에 걸쳐 **서비스를 분리**하고 있을 때.\n- 관리형 내구성/확장성과 제로 큐 운영을 원하고, 이미 해당 클라우드를 사용하고 있을 때.\n- **비용:** 벤더 종속, 더 나쁜 로컬 개발 환경, 그리고 기본적인 것들(SQS)은 재시도/가시성/DLQ 로직을 직접 구축하게 만든다. HTTP-push 팬아웃을 원한다면 Cloud Tasks가 더 낫다.\n\n## 빠른 규칙\n- 이미 Postgres 사용 중, 단일 앱, 보통 규모 → **pg-boss / graphile-worker**.\n- 속도 제한/flows/cron 위주/높은 처리량이 필요하고 Redis 운영이 괜찮다면 → **BullMQ**.\n- 서비스 경계를 넘나들거나 기존 클라우드에서 완전 관리형을 원한다면 → **클라우드 큐**.\n\n당신의 스택(이미 Postgres나 Redis를 운영하는지?), 대략적인 작업량, 그리고 큐잉이 DB 쓰기와 원자적으로 이루어져야 하는지 알려주면, 하나를 지목하고 설정을 스케치해주겠다."},{"item":74,"id":"DBG_race","cat":"DBG","question":"하나의 통합 테스트가 단독으로는 통과하지만 스위트가 병렬로 실행될 때 실패합니다. 어떻게 추적해야 할까요?","A":"병렬 실행 시에만 발생하는 실패는 거의 항상 **테스트 격리** 문제입니다 — 당신의 테스트가 동시에 실행되는 다른 테스트와 무언가를 공유하고 있다는 뜻입니다.
