 목표는 *무엇이* 공유되는지와 *어떤* 다른 테스트가 원인인지를 찾는 것입니다. 제가 그것을 찾아내는 방법은 다음과 같습니다.\n\n## 1. 먼저 원할 때 실패하게 만드세요\n재현할 수 없는 것은 디버깅할 수 없습니다. 병렬 환경에서의 플레이키함은 보통 부하 또는 인터리빙에 따라 달라지므로:\n- 실패할 때까지 전체 스위트를 루프에서 실행하고, 해당 실행의 **시드 / 워커 수 / 테스트 순서**를 확보하세요 (대부분의 러너는 이를 출력하거나 받습니다: pytest `-p randomly` 시드, Jest `--seed`, Go의 기본 무작위 순서, JUnit 순서 지정).\n- 정확히 그 시드와 동일한 워커 수로 다시 실행하세요. 이제 안정적으로 실패한다면, 재현에 성공한 것입니다. 그렇지 않다면, 원인은 순서가 아니라 타이밍입니다 (§5 참조).\n\n## 2. 영향 반경을 줄이세요 (범인을 이분 탐색하세요)\n전체 스위트가 필요한 경우는 드뭅니다 — 보통 다른 테스트 하나가 공유 상태를 망가뜨립니다.\n- 워커 수를 2로 줄이세요. 여전히 실패하나요? 좋습니다, 이제 한 번에 2개만 실행됩니다.\n- *어떤* 동시 실행 테스트가 이를 유발하는지 이분 탐색하세요: 플레이키한 테스트를 스위트의 전반부와 함께 실행하고, 그 다음 후반부와 함께 실행하며 범위를 좁혀나가세요. 많은 러너는 하위 집합을 한 워커에 고정하고 의심되는 테스트를 다른 워커에 고정할 수 있게 해줍니다.\n- 그 쌍을 찾았다면, 공유 자원을 찾은 것입니다 — 두 테스트가 같은 것을 건드리고 있습니다.\n\n## 3. 단지 \"실패했다\"가 아니라 실제 실패 내용을 읽으세요\n*실제 값 대 기대 값*은 보통 유출의 원인을 알려줍니다:\n- 다른 테스트의 픽스처에 속한 행/레코드를 받았나요? → 공유 DB/테이블, 고정된 ID, 또는 트랜잭션 롤백 누락.\n- 데이터가 있어야 할 때 `null`/빈 값을 받았나요? → 다른 테스트가 삭제/절삭했거나, 이 워커의 뷰에서는 데이터가 커밋되지 않았음.\n- 연결 거부 / 타임아웃 / \"address in use\"? → 포트, 소켓, 또는 커넥션 풀 경합.\n- 잘못된 설정/기능 플래그 값? → 이웃에 의해 변경된 공유 전역 변수, 환경 변수, 또는 싱글턴.\n\n## 4. 흔한 용의자들 (이 순서로 확인하세요)\n1. **공유 데이터베이스** — 하드코딩된 ID로 동일한 스키마/테이블에 접근하는 테스트, 또는 다른 워커의 데이터를 지우는 `TRUNCATE`/정리 작업. 해결책: 워커별 스키마/데이터베이스 사용, 또는 각 테스트를 롤백되는 트랜잭션으로 감싸기.\n2. **고정된 외부 자원** — 동일한 포트, 임시 파일 경로, 로그 파일, Redis 키, S3 접두사. 해결책: 테스트/워커별로 무작위화하기 (임시 포트 `:0`, `tmpdir`, 워커 ID로 키 네임스페이스 지정).\n3. **프로세스-전역 가변 상태** — 싱글턴, 모듈 수준 캐시, 환경 변수, 해제되지 않은 등록된 목/몽키패치. 여기서 병렬은 보통 *한 프로세스 내의 스레드*를 의미합니다 (별도 프로세스가 아님); 스레드 수준 병렬 처리는 전역 변수를 치명적으로 만들기 때문에, 당신의 러너가 어떤 모델을 사용하는지 확인하세요.\n4. **커넥션 풀 고갈** — N개 워커 × 풀 크기 > DB 최대 연결 수 → 간헐적인 \"too many clients\" 오류.\n5. **시간 / 순서 가정** — `ORDER BY`가 없어 부하 시 행 순서가 뒤바뀌거나, 다른 테스트가 동시에 삽입할 때 \"최신 레코드\" 가정이 깨짐.\n\n## 5. 상태 문제가 아니라면 — 너무 빡빡한 타임아웃입니다\n공유 상태를 찾을 수 없고 *높은* 워커 수에서만 실패한다면, 병렬 부하가 단순히 CPU/IO를 고갈시켜 단독 실행 시에는 괜찮았던 타임아웃을 발생시키는 것일 수 있습니다. 그것도 실제 버그이지만 (타임아웃이 비현실적임), 해결책은 다릅니다: 상태를 격리하는 것이 아니라, 타임아웃을 완화하거나 경합을 줄여야 합니다.\n\n## 빠른 분류\n```\n1. 전체 스위트 실패시키기 → 시드 + 워커 수 기록\n2. 해당 시드로 재현하기\n3. 워커 2개로 줄이기; 원인을 유발하는 동시 실행 테스트 하나를 이분 탐색으로 찾기\n4. 실제 값 대 기대 값 읽기 → 공유 자원 식별\n5. 해당 자원을 테스트/워커별로 격리하기 → 해당 쌍을 50번 재실행하여 확인\n```\n\n사용하는 언어/러너(pytest, Jest, Go, JUnit, RSpec…)와 어서션 실패 내용을 붙여넣어 알려주시면, 제가 특정 격리 옵션과 유력한 원인을 짚어드릴 수 있습니다.","B":"이 실패는 거의 확실히 테스트 자체의 버그가 아니라 테스트 격리 문제입니다. 단독으로는 통과하지만 병렬로 실행하면 실패한다는 것은 해당 테스트가 동시에 실행되는 다른 테스트가 변경하는 공유 상태에 의존한다는 의미입니다. 여러분이 할 일은 *무엇이 공유되는지* 그리고 *어떤 다른 테스트가 그것을 건드리는지* 찾는 것입니다. 제가 추적하는 방법은 다음과 같습니다.\n\n**1. 먼저 재현 가능하게 만드세요.** 원할 때 발생시킬 수 없는 플레이크는 디버깅할 수 없습니다. 실패할 때까지 테스트 스위트를 반복 실행하고 시드, 워커 할당, 실패한 단언 등 모든 것을 캡처하세요. 정확한 실패 상황을 재현할 수 있도록 러너가 사용한 테스트 순서/시드를 고정하세요. 만약 20번 실행 중 1번 정도만 실패한다면, 백그라운드에서 50번 실행하고 첫 번째 실패 로그를 저장하세요.\n\n**2. \"실패했다\"는 사실만이 아니라 실제 실패 내용을 읽으세요.** 어떤 값이 잘못되었나요? 행 개수가 하나 틀렸나요, 409 충돌이 났나요, 레코드가 없나요, 포트가 사용 중인가요, 타임아웃이 발생했나요? 그 증상은 문제의 범주를 직접적으로 가리킵니다.\n- 잘못되거나/추가되거나/누락된 데이터 → 공유 데이터베이스 행, 공유 픽스처, 또는 격리되지 않은 트랜잭션\n- 충돌 / \"이미 존재함\" / 포트 사용 중 → 두 테스트가 모두 점유하려는 하드코딩된 ID, 고정 포트, 또는 고정 파일 경로\n- 타임아웃 / 교착 상태 → 커넥션 풀 고갈 또는 잠금 경합\n- 간헐적으로 잘못된 계산 값 → 전역 변수, 싱글톤, 정적 변수, 환경 변수, 시계, 또는 시드가 없는 RNG\n\n**3. 원인이 되는 *쌍*을 찾으세요.** 이것은 여러분의 테스트와 다른 하나의 테스트 간의 상호작용입니다. 이분법으로 찾으세요: 여러분의 테스트를 전체 스위트의 절반과 함께 실행하고, 다른 하나의 테스트가 안정적으로 실패를 유발할 때까지 다시 절반으로 줄여나가세요. 대부분의 러너는 이 기능을 지원하며, 결정적으로 병렬성을 유지하면서 **워커를 2개로** 줄이면 보통 여전히 문제가 재현되면서도 원인이 되는 쌍을 명확하게 보여줍니다.\n\n**4. 공유를 무력화하여 격리 문제임을 확인하세요.** 공유 자원이 의심되면 증명하세요: 각 워커에 자체 데이터베이스/스키마/네임스페이스, 자체 임시 디렉터리, 0번 포트(OS 할당)를 제공하거나, 각 테스트를 롤백되는 트랜잭션으로 감싸세요. 만약 실패가 사라진다면, 원인을 확인한 것이고 아마 해결책도 찾은 것입니다.\n\n그러면 해결책은 다음 중 하나입니다: 워커별로 공유 자원의 범위를 지정하거나(별도 DB/스키마, 워커 인덱스를 통한 고유 ID, `tmpdir`, 임시 포트), 테스트 사이에 상태를 재설정/롤백하거나, 또는 — 테스트를 정말로 격리할 수 없는 경우에만 — 직렬로 실행되도록 표시하는 것입니다.\n\n어떤 테스트 러너를 사용하고 있는지(pytest-xdist, Jest, `go test`, JUnit/Gradle, Vitest…) 알려주시면, 실패 순서를 강제하고, 워커를 고정하고, 워커별 상태를 격리하기 위한 정확한 플래그를 알려드리겠습니다. 실패한 단언문을 붙여넣어 주시면, 아마 공유 자원의 이름을 바로 알아낼 수 있을 겁니다."},{"item":75,"id":"REV2_regex","cat":"REV","question":"이 이메일 검사에 무슨 문제라도 있나요?\n\nfunction isEmail(s) { return /^.+@.+$/.test(s); }","A":"네, 몇 가지 실제 문제가 있습니다 — 다만 그 문제들이 얼마나 중요한지는 그 검사로 무엇을 하고 싶은지에 따라 다릅니다.\n\n가장 큰 구체적인 버그는 **후행 줄바꿈(trailing newline)**입니다. JavaScript에서 `$`는 문자열의 끝 *또는* 마지막 `\\n` 바로 앞에서 일치하고, `.`는 줄바꿈을 넘지 못합니다 — 그래서 `\"foo@bar\\n\"`이 통과됩니다. 사용자 입력을 검증하는 경우, 이는 인젝션 벡터(헤더 인젝션 등)가 됩니다. 줄바꿈 없는 클래스를 통해 `\\z` 스타일 앵커링을 사용하거나, 명시적으로 확인하십시오.\n\n그 외에는, `.+`가 `@`와 공백을 포함한 문자 그대로 모든 것에 일치하기 때문에 매우 허용적입니다:\n\n- `a@b`가 통과됩니다 (도메인에 점 없음)\n- `a@b@c`가 통과됩니다 (여러 개의 `@`)\n- `\" @ \"`가 통과됩니다 (공백, 앞/뒤의 불필요한 문자)\n- `a@.`가 통과됩니다\n\n따라서 이것은 사실상 \"양쪽에 최소 한 글자 이상을 가진 `@`가 있다\"는 것만 단언합니다.\n\n이것이 *틀렸는지* 여부는 의도에 따라 다릅니다:\n\n- **간단한 온전성 검사(sanity check)라면** (\"@를 빼먹은 게 명백한가?\"), 대부분 괜찮습니다 — 느슨한 일치가 허용되고 어차피 정규식으로 이메일을 완벽하게 검증하려 해서는 안 되므로, `[^\\n]`으로 앵커링하거나 `!s.includes('\\n')`를 테스트해서 줄바꿈 문제만 해결하면 됩니다.\n- **실제로 주소를 검증하기 위한 것이라면**, 너무 느슨하며, 더 엄격한 정규식을 사용해서도 안 됩니다 — 현실적인 해결책은 확인 이메일을 보내는 것입니다. 코드에서 할 만한 유일한 검증은 `/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/`와 같이 약간 더 엄격한 형태 검사이며, 이는 적어도 공백, 여러 개의 `@`, 점이 없는 도메인을 거부합니다.\n\n두 가지 중 어떤 것을 원하시는지 알려주시면, 정확한 대체안을 제안해 드릴 수 있습니다.","B":"몇 가지가 있습니다 — 아마도 당신이 예상하는 것은 아닐 겁니다.\n\n**이 패턴을 보통 괴롭히는 개행 우회는 — 여기에 적용되지 않습니다.** Python/PCRE에서 `$`는 끝에 오는 `\\n` 앞에서 일치하므로, `\"a@b\\n\"` (또는 더 나쁘게는 `\"a@b\\ninjected\"`)가 통과됩니다. **JavaScript**에서 `m` 플래그가 없는 `$`는 문자열의 진짜 끝에 고정되며 끝에 오는 개행 문자 앞에서는 일치하지 *않습니다*. 따라서 `/^.+@.+$/.test(\"a@b\\n\")` → `false`입니다. 그 점에 대해서는 안전합니다. (절대 `m` 플래그를 추가하지 말고, 이 정규식을 다른 언어로 옮기면서 동일하게 동작한다고 가정하지 마십시오.)\n\n**진짜 문제는 너무 허용적이어서 거의 아무것도 검증하지 않는다는 것입니다.** `.`은 거의 모든 문자와 일치하며, `.+`는 `@`와 공백을 기꺼이 포함합니다. 다음은 모두 통과됩니다:\n\n- `\"a@b\"` — 점 없음, TLD 없음\n- `\"a@b@c\"` — 여러 개의 `@`\n- `\"hello world @ x\"` — 곳곳에 공백\n- `\" a @ b \"`와 같은 `\"@@\"`스러운 쓰레기\n- 제어 문자, 탭 등\n\n그래서 이것은 \"완전히 비어 있거나 `@`가 전혀 없는\" 경우를 잡아낼 뿐 그 이상은 거의 없습니다. 만약 이것이 다운스트림의 무언가를 보호하고 있다면 그것은 잘못된 안도감입니다.\n\n**무엇을 할지는 의도에 따라 다릅니다:**\n\n- 만약 저렴한 온전성 검사(\"최소한 '무언가@무언가' 형식으로 입력했는가\")를 원한다면 이것으로도 괜찮습니다 — 하지만 공백이나 여러 개의 `@`와 일치하지 않도록 약간 더 엄격하게 만드십시오:\n  ```js\n  function isEmail(s) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(s); }\n  ```\n  이것은 공백을 거부하고, 정확히 하나의 `@`를 요구하며, 도메인에 점을 요구합니다 — 유효한 주소를 잘못 거부하지 않으면서 오타의 ~99%를 처리합니다.\n\n- 만약 명세에 거의 맞는 것을 원한다면, WHATWG/HTML5 `<input type=email>` 정규식(실용적인 표준입니다)을 사용하거나, 브라우저의 내장 유효성 검사에 의존하십시오.\n\n- 만약 정확성이 실제로 중요하다면(가입, 청구), **어떤 정규식도 충분하지 않습니다** — 유일한 실제 유효성 검사는 확인 이메일을 보내는 것입니다. 정규식은 느슨하게 유지하고 대역 외(out-of-band)에서 검증하십시오.\n\n한 가지 더: 당신은 공백을 제거(trimming)하고 있지 않습니다. 만약 호출자가 `\" a@b.com \"`을 전달할 수 있다면, 먼저 `s.trim()`을 할지 결정하십시오 — 위의 더 엄격해진 정규식은 앞뒤 공백을 조용히 수용하는 대신 거부할 것이며, 이것이 보통 당신이 원하는 바입니다."},{"item":76,"id":"REV2_mutate","cat":"REV","question":"이것을 검토하라 (arr은 공유 애플리케이션 상태다):\n\nfunction addItem(arr, x) { arr.push(x); return arr; }","A":"플래그된 라우팅 규칙은 기록된 판정이 필요한 diff/gate 리뷰를 위한 것입니다. 이것은 한 줄짜리 스니펫이므로, 바로 리뷰하겠습니다.\n\n## 리뷰\n\n```js\nfunction addItem(arr, x) { arr.push(x); return arr; }\n```\n\n함수는 작동하지만, **`arr`이 공유 애플리케이션 상태**라는 점을 고려하면 두 가지 결과를 초래하는 핵심적인 설계 결함이 하나 있습니다.\n\n### 문제점: 공유 상태를 직접 변경함\n`arr.push(x)`는 다른 모든 곳에서 참조를 들고 있는 배열을 수정합니다. 이것은 \"원격 유령 작용\"과 같습니다 — `addItem`을 호출하지 않은 코드에서도 상태 변경을 보게 됩니다.\n\n1.  **변경 감지를 깨뜨립니다.** `return arr`은 들어온 *동일한 참조*를 반환하므로, `next === prev`는 항상 참이 됩니다. 참조 동일성에 의존하는 모든 것 — React/`useMemo`, Redux/`reselect`, `Object.is` diffing — 은 변경을 감지하지 못하고 리렌더링이나 재계산을 하지 않을 것입니다. 이것이 바로 전형적인 불변 스토어 버그입니다.\n2.  **오해의 소지가 있는 시그니처.** 값을 반환하는 것은 (함수형 스타일처럼) 새로운 배열을 생성하는 것처럼 *보이지만*, 실제로는 그렇지 않습니다. `const updated = addItem(state, x)`를 작성하는 호출자는 복사본이 아닌 별칭이 붙은 상태를 얻게 됩니다.\n\n### 해결책 — 순수 함수로 만들기\n```js\nfunction addItem(arr, x) { return [...arr, x]; }\n```\n공유 상태를 건드리지 않고, 진정으로 새로운 배열을 반환하며, 호출자가 이를 스토어에 어떻게 커밋할지 결정합니다.\n\n### 주의사항\n- 만약 직접 변경이 *의도적인* 것이라면(명시적인 가변 스토어), `return arr`을 하지 마십시오 — 이는 새로운 값인 것처럼 거짓으로 광고하는 것입니다. 스토어 자체의 API를 통해 변경하고 `void`를 반환하며, 주석으로 그렇게 명시하십시오.\n- 어느 쪽이든, `arr`이 null이거나 배열이 아닐 경우에 대한 보호 장치가 없습니다 — `.push`나 전개 구문은 오류를 발생시킬 것입니다. 입력값을 신뢰할 수 없다면 보호 장치를 추가하십시오.\n\n**판정:** 기능적으로는 올바르지만, 작성된 대로라면 공유 상태에 사용하기에 안전하지 않습니다. 상태를 변경해야 할 특별한 이유가 없다면 불변 버전을 선호하십시오 — 그리고 만약 그래야 한다면, 반환문을 제거하십시오.","B":"버그: 이것은 공유 상태를 제자리에서 변경합니다. `arr.push(x)`는 해당 참조를 가진 다른 모든 홀더가 볼 수 있는 배열을 수정하므로, 호출하는 순간 변경 사항이 밖으로 새어 나갑니다 — \"내가 만들고 있는 복사본\"과 \"다른 모두가 읽는 상태\" 사이에 격리가 없습니다.\n\n`return arr`는 안전해 보임으로써 상황을 더 악화시킵니다. 새로운 배열이 아닌 *동일한* 참조를 반환하므로:\n\n```js\nconst next = addItem(state, x);\nnext === state; // true\n```\n\n참조 동등성으로 변경을 감지하는 모든 코드 — React의 `useState`/`memo`, Redux 리듀서, `useEffect` 의존성 배열, 수동 `prev !== next` 검사 — 는 데이터가 변경되었음에도 불구하고 변경 사항을 감지하지 못하고 업데이트를 건너뛸 것입니다. 조용히 오래된 상태가 렌더링되는 현상이 발생하며, 함수가 새로운 결과를 반환하는 것처럼 *보이기* 때문에 여기까지 역추적하기 어렵습니다.\n\n이것이 공유 상태를 업데이트하기 위한 것이라면, 새로운 배열을 반환하고 입력값은 건드리지 마십시오:\n\n```js\nfunction addItem(arr, x) { return [...arr, x]; }\n```\n\n그렇게 하면 호출자에게 새로운 참조가 주어지고(동등성 검사가 올바르게 작동합니다) 공유된 `arr`는 호출자가 결과를 다시 할당하기 전까지 변경되지 않은 상태로 남습니다.\n\n범위에 대한 두 가지 주의사항: 만약 코드베이스가 *의도적으로* 변경(mutation) 기반이라면(예: 일반적인 가변(mutable) 스토어, 또는 큰 배열을 복사하는 것이 중요한 hot path인 경우), 그렇다면 제자리에서 push하는 것은 타당한 선택입니다 — 하지만 그럴 경우 `return arr`는 무의미하고 오해의 소지가 있을 수 있으므로, 제거하고 호출자가 명시적으로 변경하도록 하십시오. 불변(immutable) 버전은 참조로 추적되는 모든 것의 올바른 기본값입니다; 주변 상태가 실제로 어떤 모델을 따르는지에 따라 선택하십시오."},{"item":77,"id":"ACT_promisify","cat":"ACT","question":"이 콜백 기반의 `fs.readFile`을 `await` 할 수 있는 것으로 어떻게 변환하나요?","A":"가장 깔끔한 방법은 콜백 버전을 완전히 건너뛰고 Node의 내장 promise API를 사용하는 것입니다:\n\n```js\nimport { readFile } from 'node:fs/promises';\n\nconst data = await readFile('file.txt', 'utf8');\n```\n\n또는 CommonJS에서는:\n\n```js\nconst { readFile } = require('node:fs/promises');\n\nconst data = await readFile('file.txt', 'utf8');\n```\n\n`fs/promises`는 Node와 함께 제공되며(v10/v14부터) 프로미스를 반환하는 `readFile`을 직접 제공하므로 래핑이 필요 없습니다. `Buffer` 대신 문자열을 돌려받으려면 두 번째 인수로 인코딩(`'utf8'`)을 전달하십시오.\n\n어떤 이유로 콜백 스타일 `fs`를 사용해야만 한다면, `util.promisify`로 한 번 감싸주십시오:\n\n```js\nconst fs = require('node:fs');\nconst { promisify } = require('node:util');\n\nconst readFile = promisify(fs.readFile);\nconst data = await readFile('file.txt', 'utf8');\n```\n\n어느 쪽이든, `await`는 `async` 함수 내부(또는 ES 모듈의 최상위 레벨)에서만 작동한다는 점을 기억하고, 읽기 오류를 처리하기 위해 호출을 `try/catch`로 감싸십시오.\n\n제가 선택할 방법은 첫 번째 옵션입니다 — `fs/promises`가 표준적인 해답이며 추가적인 래퍼를 피할 수 있습니다.","B":"가장 깔끔한 방법은 콜백 API를 완전히 건너뛰고 Node에 내장된 프로미스 기반 `fs`를 사용하는 것입니다:\n\n```js\nimport { readFile } from 'node:fs/promises';\n// CommonJS: const { readFile } = require('node:fs/promises');\n\nconst data = await readFile('file.txt', 'utf8');\n```\n\n웬만큼 최신 버전의 Node(API는 ≥ 10, 최상위 `await`는 ESM 또는 Node ≥ 14.8 필요)에서는 이것이 선호되는 접근 방식입니다. 여기서 `readFile`은 이미 프로미스를 반환하므로 래핑이 필요 없습니다.\n\n**어떤 이유로든 콜백 버전을 써야 한다면** 두 가지 옵션이 있습니다:\n\n`util.promisify` — 표준적인 에러-우선 콜백 함수를 프로미스를 반환하는 함수로 바꿔줍니다:\n\n```js\nimport { readFile } from 'node:fs';\nimport { promisify } from 'node:util';\n\nconst readFileAsync = promisify(readFile);\nconst data = await readFileAsync('file.txt', 'utf8');\n```\n\n또는 수동으로 래핑할 수도 있습니다(콜백이 `(err, result)` 관례를 따르지 않을 때 유용합니다):\n\n```js\nfunction readFileAsync(path, encoding) {\n  return new Promise((resolve, reject) => {\n    fs.readFile(path, encoding, (err, data) => {\n      if (err) reject(err);\n      else resolve(data);\n    });\n  });\n}\n\nconst data = await readFileAsync('file.txt', 'utf8');\n```\n\n**권장 사항:** `node:fs/promises`를 그냥 사용하세요. 이것은 여러분이 아무것도 프로미스화하거나 직접 래핑할 필요가 없도록 정확히 그 목적으로 존재합니다.\n\n어떤 것을 선택하든 한 가지 기억할 점이 있습니다: `await`는 `async` 함수 내부(또는 ES 모듈의 최상위 레벨)에서만 작동하며, 거부된 프로미스는 예외를 던지므로 그 주위에 `try/catch`를 사용하는 것이 좋습니다."},{"item":78,"id":"DBG2_corspost","cat":"DBG","question":"GET 요청은 작동하는데 POST는 CORS에 의해 차단됩니다. 왜 POST만 그런가요?","A":"거의 확실히 POST 요청이 **CORS 프리플라이트(preflight)**를 트리거하고 서버가 이에 응답하지 않기 때문입니다 — POST 자체가 다르게 처리되기 때문이 아닙니다.\n\n## 메커니즘\n\n브라우저는 교차 출처(cross-origin) 요청을 두 가지 범주로 나눕니다:\n\n**단순 요청(Simple requests)** — 프리플라이트 없이 바로 전송됩니다. 이 조건에 해당하려면, 다음이 *모두* 충족되어야 합니다:\n- 메서드는 `GET`, `HEAD`, 또는 `POST`\n- 안전 목록에 없는(non-safelisted) 헤더가 없음 ( `Authorization`, `X-*` 같은 커스텀 헤더는 자격 미달)\n- `Content-Type`은 `application/x-www-form-urlencoded`, `multipart/form-data`, 또는 `text/plain` 중 하나\n\n**프리플라이트 요청(Preflighted requests)** — 브라우저는 먼저 `OPTIONS` 요청을 보내 허가를 요청한 다음, 서버가 승인하는 경우에만 실제 요청을 보냅니다.\n\n## GET은 통과하는데 POST는 실패하는 이유\n\nGET 요청은 \"단순\" 기준을 충족하므로 바로 전송됩니다. POST 요청은 거의 확실히 다음 중 **하나**에 해당합니다:\n\n- `Content-Type: application/json` 전송 ← 가장 흔한 원인\n- 커스텀 헤더(`Authorization`, `X-API-Key` 등) 전송\n\n둘 중 하나라도 해당하면 \"단순\" 요청에서 제외되고 프리플라이트 `OPTIONS` 요청을 강제합니다. 만약 서버가 `OPTIONS`에 올바른 CORS 헤더로 응답하지 않으면, 브라우저는 실제 요청이 전송되기도 전에 POST를 차단합니다.\n\n따라서 \"POST가 차단되었다\"가 아니라 — \"이 POST에 대한 프리플라이트에 응답이 오지 않았다\"인 것입니다.\n\n## 확인 방법\n\n개발자 도구 → 네트워크에서, POST 요청 바로 전에 동일한 URL로 가는 `OPTIONS` 요청을 찾아보세요. 만약 아래 헤더들이 없거나 404/405를 반환한다면, 그것이 범인입니다.\n\n## 해결책\n\n서버는 `OPTIONS` 요청에 다음과 같이 응답해야 합니다:\n\n```\nAccess-Control-Allow-Origin: https://your-frontend.example\nAccess-Control-Allow-Methods: POST, GET, OPTIONS\nAccess-Control-Allow-Headers: Content-Type, Authorization\n```\n\n핵심 사항:\n- `OPTIONS` 메서드를 명시적으로 처리하세요 — 많은 프레임워크/라우트는 `POST`만 정의하고 `OPTIONS`는 404나 405를 반환하게 두는데, 이는 프리플라이트를 실패시킵니다.\n- `Access-Control-Allow-Headers`에는 실제로 보내는 모든 안전 목록에 없는 헤더를 나열해야 합니다 (예: JSON을 보낼 때의 `Content-Type`).\n- 쿠키/자격 증명을 보낸다면, `Access-Control-Allow-Credentials: true`를 추가하고 출처(origin)에 `*`를 **사용할 수 없습니다** — 특정 출처를 그대로 반환해야 합니다.\n\n**빠른 테스트:** POST 요청을 커스텀 헤더 없이 `Content-Type: text/plain`(또는 form-encoded)으로 보내도록 변경했을 때 갑자기 작동한다면, 프리플라이트가 원인이었음을 확인하는 것입니다. (이것을 실제 해결책으로 유지하지 마세요 — 대신 서버의 `OPTIONS` 처리를 수정하세요.)\n\n서버 프레임워크(Express, FastAPI, nginx 등)와 요청 코드를 공유해주시겠어요? 정확한 설정을 알려드릴 수 있습니다.","B":"거의 확실히 당신의 POST는 **CORS 프리플라이트**를 트리거하고 GET은 그렇지 않기 때문입니다 — 이 차단은 사실 메서드에 관한 것이 아니라 프리플라이트에 관한 것입니다.\n\n작동 방식은 이렇습니다. 브라우저는 '단순 요청(simple request)'이라고 부르는 것에 대해서는 프리플라이트를 건너뜁니다: 메서드가 `GET`/`HEAD`/`POST`이고, 안전 목록에 있는 헤더만 사용하며, `Content-Type`이 정확히 `application/x-www-form-urlencoded`, `multipart/form-data`, 또는 `text/plain`인 경우입니다. 당신의 GET은 여기에 해당하므로, 브라우저는 그냥 요청을 보내고 응답에 `Access-Control-Allow-Origin`만 있으면 됩니다.\n\n당신의 POST는 거의 확실히 이 조건들 중 하나를 위반합니다 — 주된 원인은 `Content-Type: application/json`이거나 `Authorization`/`X-*` 같은 커스텀 헤더입니다. 이것이 요청을 '비단순(non-simple)' 요청으로 만들어서, 실제 POST 전에 브라우저는 허가를 요청하는 `OPTIONS` 프리플라이트를 보냅니다. 만약 서버가 그 OPTIONS 요청에 올바른 헤더로 응답하지 않으면, POST는 절대 전송되지 않고 CORS 오류가 표시됩니다.\n\n따라서 해결책은 서버 쪽에 있습니다: `OPTIONS` 요청에 (상태 코드 200/204로) 최소한 다음과 같은 내용으로 응답하도록 만드세요:\n\n- `Access-Control-Allow-Origin: <your origin>` (또는 인증 정보가 없다면 `*`)\n- `Access-Control-Allow-Methods: POST, GET, OPTIONS`\n- `Access-Control-Allow-Headers: Content-Type, Authorization` — 당신의 요청이 실제로 보내는 모든 헤더\n- `Access-Control-Allow-Credentials: true` 쿠키/인증 정보를 보낼 경우에만 (이 경우 origin에 `*`를 사용할 수 없습니다)\n\n이것이 실제로 일어나고 있는지 확인하는 두 가지 빠른 방법이 있습니다: 네트워크 탭을 열고 당신의 POST 직전에 `OPTIONS` 요청이 있는지 찾아보세요 (만약 있고 실패/빨간색으로 표시된다면, 그것이 프리플라이트입니다). 그리고 콘솔 메시지를 확인하세요 — 프리플라이트 실패는 단순한 헤더 누락 오류 대신 'Response to preflight request doesn't pass access control check'와 같은 메시지를 표시합니다.\n\n어떤 서버/프레임워크를 사용하고 있는지, 그리고 POST가 어떤 `Content-Type`과 헤더를 보내는지 알려주시면, 정확한 핸들러 코드를 드릴 수 있습니다."},{"item":79,"id":"DBG2_modnotfound","cat":"DBG","question":"제 배포는 'module not found'로 실패하지만 로컬에서는 작동합니다. 왜 그런가요?","A":"거의 항상 다음 중 하나이며, 대략적인 가능성 순서대로 나열했습니다:\n\n**1. 대소문자 구분 (주범).** 로컬 머신(macOS/Windows)의 파일 시스템은 대소문자를 구분하지 않지만, 배포 호스트(Linux)는 그렇지 않습니다. 실제 파일이 `mycomponent.ts`이더라도 `import './MyComponent'`는 로컬에서는 해석되지만 Linux에서는 실패합니다. 모든 import의 대소문자가 디스크 상의 파일명과 정확히 일치하는지 확인하세요 — 이것이 \"로컬에서는 작동하는데 배포 시 깨지는\" 문제의 가장 흔한 단일 원인입니다.\n\n**2. 패키지가 `dependencies`가 아닌 `devDependencies`에 있는 경우.** 프로덕션 설치(`npm ci --omit=dev`, `NODE_ENV=production`, 다수의 CI/빌드팩)는 devDependencies를 건너뜁니다. 런타임 코드가 이를 import한다면, 로컬에는 있지만 배포 시에는 없습니다. `dependencies`로 옮기세요.\n\n**3. 로컬에 설치되었지만 package.json에 저장되지 않은 경우.** 어느 시점에 `npm install x`를 실행했지만 기록되지 않았거나(또는 lockfile이 동기화되지 않았거나), 그래서 로컬 `node_modules`에는 존재하지만 배포 시 클린 설치에서는 가져오지 못합니다. 확인 사항: 해당 모듈이 `package.json`/lockfile에 나타나며, 둘 다 커밋되었나요?\n\n**4. 파일이 실제 배포에 포함되지 않은 경우.** gitignore되었거나, 커밋되지 않았거나, Docker 빌드 컨텍스트(`.dockerignore`)에서 제외되었습니다. 빌드 시 로컬에 있는 파일과 다른 파일 세트를 복사합니다.\n\n**5. 경로 별칭 / tsconfig `paths` 또는 번들러 별칭**이 개발 환경에서는 해석되지만 프로덕션 빌드 단계에서는 적용되지 않는 경우.\n\n**6. Node 버전 불일치** — 배포 환경의 다른 Node 메이저 버전이 내장 모듈이나 서브패스 export를 다르게 해석하는 경우.\n\n원인을 빨리 찾으려면: 에러에 있는 정확한 모듈 이름을 보세요.\n- **상대 경로** (`./foo`) → #1 또는 #4 문제입니다.\n- **패키지 이름** (`lodash`) → #2 또는 #3 문제입니다.\n\n전체 에러 라인과 `package.json`을 붙여넣어 주시거나 (또는 레포지토리를 알려주시거나) 하면, 어떤 문제인지 알려드리겠습니다.","B":"짧은 답변: 당신의 로컬 머신에는 배포 환경에 없는 무언가가 있습니다 — 보통 실제로 선언되지 않은 의존성이나, Linux에서만 대소문자가 중요한 파일명입니다. \"로컬에서는 잘 된다\"는 것이 함정입니다: 로컬에는 전체 `node_modules`, OS 파일 시스템, 그리고 Node 버전이 있습니다. 배포는 다른 OS에서 클린 설치를 합니다.\n\n다음은 일반적인 원인들입니다. 대략적으로 자주 발생하는 순서대로 나열했으며, 각각에 대한 빠른 확인 방법도 함께 제시합니다:\n\n**1. 의존성이 `devDependencies`에 있는 경우 (또는 아예 선언되지 않은 경우)**\n프로덕션 설치는 개발 의존성을 건너뜁니다 (`npm ci --omit=dev`, `NODE_ENV=production`). 로컬에서는 `node_modules`에 있기 때문에 해결되지만, 프로덕션 클린 설치 시에는 절대 가져오지 않습니다.\n- 확인: `npm ls <module>` — dependencies 아래에 있나요? 직접 클린 설치를 시도해보세요: `rm -rf node_modules && npm ci --omit=dev` 실행 후 확인.\n\n**2. 파일명 대소문자 (가장 흔한 \"내 Mac에서는 되는데\" 버그)**\nmacOS/Windows 파일 시스템은 대소문자를 구분하지 않지만, Linux 배포 대상은 대소문자를 구분합니다. `import './MyComponent'`는 로컬에서는 `mycomponent.ts`를 잘 찾지만 배포 시에는 실패합니다.\n- 확인: `import` 경로가 디스크 상의 파일과 폴더명을 포함하여 *정확히* 일치하나요?\n\n**3. 락파일이 동기화되지 않았거나 커밋되지 않은 경우**\n로컬에는 매니페스트가 선언한 것보다 오래되거나 다른 트리가 설치되어 있습니다. CI는 락파일(또는 새로)로부터 설치하여 다른 것을 얻게 됩니다.\n- 확인: `package-lock.json` / `yarn.lock` / `pnpm-lock.yaml` 파일이 커밋되어 있고 최신 상태인가요?\n\n**4. 파일이 .gitignore / .dockerignore에 포함된 경우**\n모듈이 로컬에는 존재하지만 배포되지 않습니다.\n- 확인: `git check-ignore -v path/to/file`를 실행하고 `.dockerignore`를 살펴보세요.\n\n**5. 네이티브/플랫폼 종속적인 바이너리**\n로컬에서는 `darwin-arm64`용으로 빌드되었지만, 배포 환경에서는 `linux-x64`가 필요합니다 (예: `esbuild`, `sharp`, `bcrypt`, `@swc/core`). 플랫폼 종속적인 선택적 의존성에 대해 \"module not found\"로 표시되는 경우가 많습니다.\n\n**6. 빌드 시점의 경로 별칭이 런타임에 해석되지 않는 경우**\n개발 환경에서는 작동하지만 프로덕션 번들에서는 재작성되지 않는 TS `paths` (`@/foo`)나 번들러 별칭.\n\n**7. Node 버전 불일치** — 로컬 Node와 배포 환경의 Node 간에 다른 subpath-exports / 해석 동작.\n\n정확한 원인을 찾아드리기 위해, 다음을 알려주세요:\n- 스택 (Node/JS? Python? 그 외?)과 **정확한** 에러 라인 + 모듈 이름\n- 배포 위치 (Vercel/Docker/Lambda/…)와 빌드 시 사용되는 설치 명령어\n\n또는 레포지토리를 알려주시면 제가 직접 `package.json`, 락파일, 그리고 문제의 import 구문을 파헤쳐 보겠습니다."},{"item":80,"id":"PLN2_payments","cat":"PLN","question":"제 SaaS에 Stripe 결제를 추가하고 싶습니다. 계획은 어떻게 되나요?","A":"걱정 마세요 — 가장 일반적인 SaaS 사례(**반복 구독 + Stripe 호스팅 Checkout**, 제가 기본적으로 추천하는 방식입니다)에 대한 계획을 설명하고, 상황이 다를 경우 어느 부분이 달라지는지 표시해 드리겠습니다. 가정을 수정하시면 제가 다시 맞춰드리겠습니다.\n\n## 멘탈 모델\n\nStripe는 결제 정보의 기준이며, 당신의 DB는 그것의 캐시입니다. 웹훅은 그 둘 사이의 계약입니다. 거의 모든 Stripe 버그는 웹훅 대신 클라이언트 측 리디렉션을 신뢰하는 데서 발생합니다 — 그래서 이 계획은 그것을 중심으로 구축되었습니다.\n\n## 설정할 핵심 객체 (Stripe 대시보드에서 먼저)\n\n- **Products** = 당신의 요금제 (Pro, Team). **Prices** = 제품에 첨부된 실제 금액 (Pro 월 $20, Pro 연 $200). 코드에서는 하드코딩된 금액이 아닌 *Price ID*를 참조합니다.\n- **Customer Portal**을 켜세요 (Settings → Billing) — 이것은 업그레이드/다운그레이드/취소/카드 업데이트를 무료로 제공하여 가장 고통스러운 UI 작업을 덜어줍니다.\n- 먼저 **테스트 모드** API 키를 설정하세요; 라이브 키를 사용하기 전에 테스트 모드에서 모든 것을 배포하세요.\n\n## 구현 단계\n\n**1. 데이터 모델.** 당신의 `users`/`accounts` 테이블(또는 `subscriptions` 테이블)에 추가하세요:\n- `stripe_customer_id`\n- `stripe_subscription_id`\n- `plan` / `price_id`\n- `subscription_status` (`active`, `past_due`, `canceled`, `trialing`…)\n- `current_period_end` (매 요청마다 Stripe를 호출하지 않고 접근을 제어할 수 있도록)\n\n**2. Customer 생성** 사용자가 가입할 때 (또는 첫 결제 시에 지연 생성). `customer_id`를 저장하세요. 계정당 하나의 Stripe Customer, 영구적으로.\n\n**3. Checkout 세션 엔드포인트.** 백엔드 라우트 `POST /api/checkout` → 선택된 Price ID, customer ID, 성공/취소 URL로 `checkout.session`을 생성 → URL 반환 → 프론트엔드 리디렉션. 절대 클라이언트 측에서 가격을 설정하지 마세요; 클라이언트는 *요금제 식별자*를 보내고, 서버는 그것을 신뢰할 수 있는 Price ID에 매핑합니다.\n\n**4. 웹훅 핸들러 — 핵심적인 부분.** 단일 엔드포인트(`POST /api/stripe/webhook`)는 다음을 수행합니다:\n- 웹훅 서명 시크릿으로 서명을 확인합니다 (JSON 파싱 *전*의 raw body — 이 부분에서 사람들이 많이 실수합니다).\n- 최소한 다음을 처리합니다: `checkout.session.completed`, `customer.subscription.created/updated/deleted`, `invoice.paid`, `invoice.payment_failed`.\n- **멱등성(idempotent)**을 가집니다 (Stripe는 재시도함; event ID로 중복 제거).\n- Stripe를 미러링하도록 DB를 업데이트합니다. 성공 리디렉션이 아닌 이것이 접근 권한을 부여합니다.\n\n**5. Customer Portal 엔드포인트.** `POST /api/portal` → 결제 포털 세션 생성 → 리디렉션. 완료; 커스텀 결제 관리 UI가 필요 없습니다.\n\n**6. 접근 제어.** 미들웨어는 *당신의* DB에서 `subscription_status` + `current_period_end`를 확인하여 기능 허용/거부를 결정합니다. 빠르고, Stripe 왕복이 없습니다.\n\n## 라이브 전 테스트\n\n- Stripe 테스트 카드를 사용하세요 (`4242…` 성공, `4000 0000 0000 9995` 거절, 그리고 3DS가 필요한 카드들).\n- `stripe listen --forward-to localhost/...` (Stripe CLI)를 실행하여 웹훅을 로컬에서 재현하세요 — 필수적입니다.\n- 실패 경로를 확인하세요: 카드 거절, `payment_failed` → 독촉(dunning), 취소 → 기간 종료 시 접근 권한 취소.\n\n## 당신의 선택에 따라 이 부분이 달라지는 경우\n\n- **사용량 기반 / 하이브리드:** 측정된 사용량 보고(Billing Meters)를 추가하면 요금제/웹훅 세트가 늘어납니다 — 말씀해주시면 3-4단계를 확장해 드리겠습니다.\n- **호스팅된 Checkout 대신 내장된 Elements:** 3단계가 PaymentIntent + 클라이언트 측 Elements 흐름이 되며, 더 많은 PCI 범위와 SCA/3DS 처리를 직접 맡게 됩니다.\n- **일회성 결제:** 전체 구독 생명주기를 제외하세요 — `checkout.session.completed` + 이행(fulfillment)만 있으면 됩니다.\n\n## 더 진행하기 위해 확인하고 싶은 것\n\n1. **스택** — 그래야 당신의 프레임워크 관용구에 맞춰 실제 checkout + 웹훅 핸들러를 작성할 수 있습니다.\n2. **결제 모델** — 구독 대 사용량 기반은 3-4단계를 실질적으로 변경합니다.\n3. **세금/인보이스 요구사항** — Stripe Tax는 체크박스 하나지만, 국제적으로 판매한다면 알아둘 가치가 있습니다.\n\n특정 스택에 대한 구체적인 코드(checkout 엔드포인트 + 웹훅 핸들러 + 데이터 모델 마이그레이션)를 스캐폴딩해 드릴까요? 그렇다면 스택과 결제 모델만 알려주시면 제가 작성하겠습니다.","B":"문제없습니다 — 대부분의 SaaS 빌드에 맞는 기본 설정을 따르고 당신의 상황이 다를 수 있는 부분을 표시하겠습니다. 저는 **반복 구독, 호스팅된 Stripe Checkout, 그리고 Node/TypeScript 기반 백엔드**를 가정하고 있습니다. 만약 이 중 하나라도 틀리다면(예: 사용량 기반 측정이 필요하거나 Rails/Python을 사용한다면), 알려주시면 세부 사항을 조정하겠습니다 — 전체적인 구조는 동일합니다.\n\n## 계획\n\n**1. 코드가 아닌 Stripe에서 먼저 요금제를 모델링하세요.** Stripe 대시보드에서 요금제별로 Product를 생성하고(예: \"Pro\") 각 Product 아래에 Price를 만드세요(월간과 연간은 동일한 Product에 속한 두 개의 Price입니다). 이 작업은 먼저 **테스트 모드**에서 하세요. 코드에서 참조하는 것은 Price ID(`price_…`)입니다 — 금액을 하드코딩하지 마세요. 이것이 가장 중요한 단일 결정입니다: Product/Price 구조를 올바르게 잡으면 코드는 기계적으로 처리됩니다.\n\n**2. 사용자 정보에 Stripe 고객 링크를 저장하세요.** 사용자 테이블에 `stripe_customer_id`를 추가하고, 작은 구독 상태 캐시(`plan`, `status`, `current_period_end`)도 추가하세요. 사용자가 처음 결제를 시작할 때 Stripe Customer를 생성하고, Stripe를 신뢰할 수 있는 원천(source of truth)으로 취급합니다 — 당신의 DB는 웹훅이 최신 상태로 유지하는 빠른 로컬 캐시일 뿐입니다.\n\n**3. 결제 = Checkout Session을 생성하는 하나의 서버 엔드포인트입니다.** 백엔드는 Price ID, `mode: 'subscription'`, 고객, 그리고 `success_url`/`cancel_url`과 함께 `stripe.checkout.sessions.create`를 호출합니다. 세션 URL을 반환하면, 프론트엔드가 그곳으로 리디렉션합니다. Stripe의 호스팅 페이지가 카드 입력, SCA/3DS, 그리고 (활성화했다면) 세금을 처리합니다. 이렇게 하면 카드 데이터가 서버에 전혀 남지 않으므로 PCI 부담이 최소화됩니다.\n\n**4. 웹훅이 실제 연동의 핵심입니다 — 여기에 가장 많은 시간을 할애하세요.** 이 부분에서 사람들이 편법을 쓰고 버그를 만듭니다. 서명을 검증하고(`stripe.webhooks.constructEvent`와 서명 시크릿 사용) 최소한 다음을 처리하는 웹훅 엔드포인트를 하나 설정하세요:\n- `checkout.session.completed` — 접근 권한 제공\n- `customer.subscription.updated` / `…deleted` — 요금제/상태 변경, 취소, 다운그레이드 동기화\n- `invoice.paid` / `invoice.payment_failed` — 갱신 및 연체 처리\n\n핸들러를 **멱등성(idempotent)** 있게 만들고(Stripe는 재시도하며 중복 전송할 수 있음) 200을 빠르게 반환하세요. `success_url` 리디렉션은 결제 성공의 신뢰할 수 있는 신호가 *아닙니다* — 리디렉션이 아닌 웹훅에서 접근 권한을 부여하세요.\n\n**5. 요금제 관리는 Stripe에 맡기세요.** **고객 포털(Customer Portal)**(`stripe.billingPortal.sessions.create`)을 사용하면 사용자가 UI를 직접 구축하지 않고도 업그레이드, 다운그레이드, 카드 업데이트, 취소를 할 수 있습니다. 하나의 엔드포인트, 하나의 리디렉션.\n\n**6. 구독 상태에 따라 기능 접근을 제어하세요,** 매 요청마다 Stripe를 호출하는 대신 (웹훅으로 업데이트되는) 로컬 캐시에서 읽어오세요.\n\n**7. 테스트 모드 → 로컬 웹훅 테스트 → 라이브 전환.** Stripe CLI(`stripe listen --forward-to localhost/…` 및 `stripe trigger`)를 사용하여 테스트 카드(`4242 4242 4242 4242`)로 로컬에서 웹훅을 실행해보세요. 그 후에만 라이브 키로 전환하세요. 테스트 키와 라이브 키는 env vars에 보관하고, 절대 커밋하지 마세요.\n\n## 제 가정이 틀렸을 경우 변경되는 점\n- **사용량 기반 / 하이브리드:** 측정(metered) Price를 추가하고 Meter Events API를 통해 사용량을 보고합니다; 웹훅 세트는 비슷하지만 청구 계산은 Stripe에서 이루어집니다.\n- **일회성 결제:** 구독/포털/갱신 웹훅을 완전히 제외합니다 — `mode: 'payment'` Checkout과 `checkout.session.completed`만 있으면 됩니다. 훨씬 작습니다.\n- **호스팅 방식 대신 임베디드 Payment Element:** 4–7단계는 변경되지 않습니다; 3단계는 PaymentIntent + 클라이언트 측 Element가 되며, 이는 프론트엔드 작업량이 의미 있게 늘어나는 것을 의미합니다.\n\n실제 리포지토리를 알려주시거나 (또는 스택과 청구 모델을 알려주시면), 이를 당신의 설정에 맞는 구체적인 파일과 엔드포인트로 만들어 드리겠습니다 — 그리고 Checkout 엔드포인트와 웹훅 핸들러의 기본 구조를 직접 만들어 드릴 수도 있습니다."},{"item":81,"id":"PLN2_pg","cat":"PLN","question":"프로덕션에서 SQLite에서 Postgres로 옮겨야 합니다. 계획이 뭔가요?","A":"질문을 건너뛰셨으니, 권장되는 기본 경로를 알려드리고 이를 변경할 수 있는 두 가지 갈래를 표시해 드리겠습니다. 이는 일반적인 경우를 가정합니다: 짧은 유지보수 시간을 가질 수 있고, 관리형 Postgres(RDS, Cloud SQL, Supabase, 또는 Neon)를 사용하는 경우입니다. 이 중 하나라도 해당하지 않는다면, 전환 단계가 달라집니다 — 어디가 다른지 알려드리겠습니다.\n\n## 계획\n\n**1. 먼저 비어있는 Postgres를 준비합니다.** 관리형 인스턴스를 프로비저닝하고, 네트워크 접근을 잠그고, 연결 문자열을 시크릿 매니저 / 환경 변수에 넣습니다. 아직 아무것도 연결하지 마십시오. Postgres 버전을 선택하고 고정합니다.\n\n**2. 스키마를 포팅합니다.** 설정에 따라 두 가지 경로가 있습니다:\n- 마이그레이션 기능이 있는 프레임워크(Django, Rails, Laravel)나 코드 우선 ORM(Prisma, SQLAlchemy, TypeORM)을 사용한다면: 설정에서 DB 제공자/방언을 바꾸고 **비어있는 Postgres에 마이그레이션을 실행하여 스키마를 재생성하십시오** — 직접 번역하지 마십시오. 그런 다음 예상했던 결과와 diff를 비교합니다.\n- 순수 SQL / `better-sqlite3`를 사용한다면: SQLite 스키마*와* 데이터를 한 번에 변환하고 대부분의 타입 매핑을 자동으로 처리하는 **`pgloader`**를 사용하십시오.\n\n**3. SQLite의 특성을 수정합니다 — 진짜 버그는 여기에 숨어있습니다.** SQLite는 Postgres와 달리 허용적인 부분이 있습니다:\n- **타입 선호도(Type affinity):** SQLite는 주는 대로 저장하지만, Postgres는 엄격합니다. `0/1`로 저장된 불리언, TEXT로 저장된 날짜/타임스탬프, 텍스트 컬럼의 숫자는 모두 로드에 실패하거나 비교가 잘못될 것입니다. 이것이 마이그레이션 실패의 제1 원인입니다.\n- **시퀀스:** `AUTOINCREMENT`는 `SERIAL`/`IDENTITY`가 됩니다. 대량 데이터 로드 후에는 **각 시퀀스를 `max(id)+1`로 재설정(`setval`)해야 합니다**, 그렇지 않으면 프로덕션에서 첫 번째 insert 시 중복 키 오류가 발생합니다.\n- **업서트(Upserts):** SQLite의 `INSERT OR REPLACE` / `INSERT OR IGNORE`는 Postgres의 `ON CONFLICT ... DO UPDATE/NOTHING`이 되어야 합니다.\n- **날짜:** `datetime()`, `strftime()`, `julianday()`는 Postgres에 해당하는 것이 없습니다 — `now()`, `to_char`, interval로 다시 작성해야 합니다.\n- **동시성:** SQLite는 모든 쓰기를 직렬화하여 경쟁 조건을 조용히 가립니다. Postgres는 쓰기를 동시에 실행하므로, 트랜잭션이나 잠금 없이 코드가 수행하는 모든 읽기-수정-쓰기 작업이 이제는 뒤섞일 수 있습니다. 해당 경로들을 감사하십시오.\n- **외래 키**는 SQLite에서 기본적으로 꺼져 있는 경우가 많습니다 — Postgres에서 이를 켜면 항상 존재했지만 보이지 않았던 고아 행(orphaned rows)이 드러날 수 있습니다.\n\n**4. 데이터를 마이그레이션합니다.** 간단한 경우(`pgloader sqlite:///prod.db postgresql://...`)에는 명령어 하나로 끝납니다. 데이터가 더 클 경우, 인덱스/제약 조건을 제거한 상태로 로드한 다음 나중에 생성하는 것이 훨씬 빠릅니다. 그런 다음 시퀀스를 재설정합니다 (3단계).\n\n**5. 전환 전에 실패할 수 있는 검사를 통해 검증합니다.** 두 데이터베이스 간의 테이블별 행 수를 비교합니다. 타입 선호도 컬럼(불리언, 날짜)이 실제로 올바른 타입으로 넘어왔는지 표본 검사합니다. 앱의 테스트 스위트를 Postgres를 대상으로 실행합니다. 프로덕션 Postgres의 *복사본*을 대상으로 앱을 실행하고 중요한 흐름들을 클릭해 봅니다.\n\n**6. 전환합니다 (유지보수 시간 경로).** 앱을 유지보수 모드로 전환 → 쓰기 중지 → 테스트 로드 이후 변경된 모든 데이터에 대해 최종 `pgloader` 실행 (또는 데이터가 작다면 전체 로드를 다시 실행) → 시퀀스 재설정 → 연결 문자열 전환 → 재시작 → 중요 경로 스모크 테스트 → 유지보수 해제. 며칠간 롤백을 위해 SQLite 파일을 그대로 둡니다.\n\n## 이를 변경하는 두 가지 갈래\n\n- **유지보수 시간을 가질 수 없는 경우** (24/7, 높은 트래픽): 6단계는 이중 쓰기(dual-write) 또는 단계적 전환을 동반한 논리적 복제(logical replication)가 되며, 이는 훨씬 더 많은 작업이 필요하고 다른 사람의 검토를 받을 가치가 가장 큰 부분입니다. 트래픽 형태를 알려주시면 그에 맞춰 설명해 드리겠습니다.\n- **관리형 대신 Postgres를 직접 호스팅하는 경우**: 6단계 전에 백업(`pg_dump` cron 또는 WAL 아카이빙), 커넥션 풀링(PgBouncer), 기본 튜닝(`shared_buffers`, `work_mem`)을 계획에 추가하십시오.\n\n사용하시는 스택과 어떤 갈래에 해당하는지 알려주시면, 관련 단계들을 구체적인 명령어와 당신의 특정 사례에 맞는 체크리스트로 만들어 드리겠습니다.","B":"문제없습니다 — 가장 일반적인 기본 설정에 대한 계획을 알려드리고, 분기되는 지점을 표시해 드리겠습니다. 가정된 기준선: **짧은 유지보수 시간 허용, 관리형 Postgres (RDS/Aurora/Supabase/Neon), 중소 규모 데이터.** 이 중 하나라도 틀리다면 — 특히 \"무중단\" — 알려주시면 더 어려운 경로(논리적 복제 / 이중 쓰기 + CDC)로 바꿔드리겠습니다.\n\n## 계획\n\n### 0단계 — 프로비저닝 및 기준선 설정 (아직 앱 변경 없음)\n- 관리형 Postgres 인스턴스 + 별도의 스테이징 인스턴스를 구축합니다. VPC/보안 그룹을 통해 접근을 제한하고, 자동 백업 + PITR을 활성화합니다.\n- Postgres 버전을 고정합니다 (16/17). 지금 연결 풀링을 결정하세요 — SQLite는 연결 제한이 없지만, Postgres는 있습니다. 첫날부터 **PgBouncer**(또는 RDS Proxy / Supabase 풀러)를 앞에 두세요.\n- 기준선을 확보합니다: 테이블별 행 수, `sqlite3 db .schema`, 그리고 코드베이스에 있는 모든 원시 SQL 문자열 목록.\n\n### 1단계 — 스키마 변환 (실제 작업)\nSQLite는 허용적이고, Postgres는 엄격합니다. 지뢰밭은 다음과 같습니다:\n- **동적 타이핑 → 엄격한 타입.** SQLite는 어떤 컬럼에든 무엇이든 저장합니다. 혼합된 타입을 가진 컬럼을 감사하세요; Postgres는 이를 거부할 것입니다.\n- **`INTEGER PRIMARY KEY AUTOINCREMENT`** → `BIGINT GENERATED ALWAYS AS IDENTITY` (또는 `bigserial`).\n- **불리언**이 0/1로 저장됨 → 실제 `boolean` 타입.\n- **날짜/시간**이 TEXT/INTEGER로 저장됨 → `timestamptz` (그리고 UTC로 표준화).\n- **네이티브 `TRUE`/`FALSE`, `ILIKE` 없음, 엄격한 `GROUP BY`, 다른 인용 부호 규칙** (PG에서 `\"`는 문자열이 아닌 식별자).\n- SQLite에서는 외래 키가 기본적으로 꺼져 있습니다 — 로드 시 PG의 FK 제약 조건이 거부할 고아 행이 있을 것으로 예상됩니다. 먼저 정리하세요.\n\nORM의 마이그레이션 도구가 있다면 그것으로 PG 스키마를 생성하고(2단계), 그렇지 않다면 수동으로 변환하고 검토하세요.\n\n### 2단계 — 앱 / 데이터 접근 계층\n- **ORM 사용 시:** Postgres를 가리키도록 하고, PG에 대해 마이그레이션을 다시 생성한 후, DB 특정 호출을 수정합니다. 보통 더 쉬운 경로입니다.\n- **원시 SQL / 혼합 사용 시:** 모든 쿼리를 grep으로 찾아 SQLite 방식을 수정합니다 (`||` 연결은 괜찮지만, `strftime`, `LIMIT ... OFFSET`의 미묘한 차이, upsert 구문 `INSERT OR REPLACE` → `INSERT ... ON CONFLICT`, `RETURNING` 누락, 자동 커밋/트랜잭션 차이점 등을 주의하세요).\n- **SQLite가 아닌 Postgres 인스턴스에 대해 전체 테스트 스위트를 실행하세요.** 대부분의 버그가 여기서 드러납니다. Postgres를 영구적인 테스트 DB로 만드세요.\n\n### 3단계 — 데이터 마이그레이션 도구\n- **[pgloader](https://github.com/dimitri/pgloader)**를 사용하세요 — SQLite→Postgres를 위해 특별히 제작되었으며, 타입 변환과 시퀀스 재설정을 처리합니다. 로드가 깨끗해질 때까지 스테이징에서 캐스트 규칙을 반복적으로 수정하세요.\n- 로드 후: **모든 시퀀스를** `max(id)+1`로 **재설정**한 다음, **검증**합니다: 테이블별 행 수가 일치하는지 확인하고, FK 무결성을 무작위로 검사하고, `ANALYZE`를 실행합니다.\n\n### 4단계 — 전환 (유지보수 시간 경로)\n1. 유지보수 시간을 공지합니다. 앱을 유지보수 모드로 전환합니다 (쓰기 중지).\n2. 이제 정적이 된 SQLite 파일로부터 마지막 pgloader 실행.\n3. 행 수 + 시퀀스 + 스모크 쿼리를 검증합니다.\n4. 연결 문자열 / 환경 변수를 바꾸고, PG에 대해 읽기+쓰기 스모크 테스트를 실행합니다.\n5. 유지보수 모드를 해제합니다. **SQLite 파일은 보관**하여 보존 기간 동안 롤백용으로 사용합니다.\n\n> 무중단 변형: 유지보수 시간을 건너뜁니다 — PG로 백필한 다음, 논리적 복제 또는 앱 수준 이중 쓰기를 사용하고, 데이터를 일치시킨 후, 지연이 0이 되면 읽기를 전환합니다. ~3배의 노력이 들며, 몇 분의 중단도 정말로 용납할 수 없는 경우에만 가치가 있습니다.\n\n### 5단계 — 전환 이후\n- 24–48시간 동안 실제 부하 상태에서 느린 쿼리 로그(`pg_stat_statements`), 연결 포화 상태, 풀 동작을 주시합니다.\n- SQLite에서는 필요 없었지만 Postgres에서는 필요한 인덱스를 추가합니다 (SQLite의 쿼리 플래너는 많은 것을 용서해 줬습니다).\n- 모니터링/알림을 설정하고 + 백업/PITR이 실제로 복원되는지 확인합니다 (한 번 테스트하세요).\n\n## 주의해야 할 가장 큰 위험\n- **연결 고갈** — SQLite를 떠날 때 겪는 가장 큰 놀라움입니다. 풀러는 협상의 여지가 없습니다.\n- **로드 시 타입 강제 변환 실패** — 스테이징에서 전체 pgloader 실행을 먼저 예행연습하면 잡을 수 있습니다.\n- **대소문자 구분 및 인용 부호** 차이로 인해 원시 SQL이 조용히 깨지는 문제.\n- **시퀀스가 재설정되지 않음** → 전환 후 첫 insert에서 중복 키 오류 발생.\n\n가장 중요한 단 한 가지 단계: **프로덕션을 건드리기 전에 스테이징 환경의 복사본에 대해 전체 3+4단계를 처음부터 끝까지 예행연습하세요.** 두 번 하세요.\n\n제가 실제 코드베이스를 파고들어 (레포 경로를 알려주세요) 이 계획을 구체적인 단계 — 스키마 비교, 쿼리 감사, 실제 pgloader 설정 — 로 바꿔드릴까요?"},{"item":82,"id":"EXP2_oauth","cat":"EXP","question":"OAuth2 인가 코드 플로우를 설명하라.","A":"# OAuth2 인가 코드 플로우\n\n인가 코드 플로우는 가장 일반적이고 안전한 OAuth2 플로우로, 비밀을 기밀로 유지할 수 있는 앱(서버 사이드 웹 앱)을 위해 설계되었습니다. 이를 통해 사용자는 자신의 **비밀번호를 공유하지 않고** 서드파티 앱에 리소스 접근 권한을 부여할 수 있습니다.\n\n## 참여자\n\n- **리소스 소유자** — 데이터를 소유한 사용자\n- **클라이언트** — 접근을 요청하는 앱 (예: 웹사이트의 \"Google로 로그인\")\n- **인가 서버** — 토큰을 발급 (예: Google의 OAuth 엔드포인트)\n- **리소스 서버** — 보호된 데이터를 보유 (예: Google API)\n\n## 플로우\n\n```\n  User          Client App        Authorization Server      Resource Server\n   │                │                      │                       │\n   │  1. clicks     │                      │                       │\n   │  \"Log in\" ───► │                      │                       │\n   │                │  2. redirect to auth │                       │\n   │ ◄──────────────┼──────────────────────►                      │\n   │  3. logs in & consents               │                       │\n   │ ──────────────────────────────────► │                        │\n   │                │  4. redirect back    │                       │\n   │                │  with ?code=XYZ      │                       │\n   │ ◄──────────────┼──────────────────────                       │\n   │                │                      │                       │\n   │                │  5. POST code +      │                       │\n   │                │  client_secret ────► │                       │\n   │                │  6. access_token  ◄──│                       │\n   │                │     (+ refresh_token)│                       │\n   │                │                      │                       │\n   │                │  7. API call with access_token ───────────► │\n   │                │  8. protected data ◄────────────────────────│\n```\n\n### 단계별 설명\n\n1.  **시작** — 사용자가 클라이언트 앱에서 \"X로 로그인\"을 클릭합니다.\n\n2.  **인가 요청** — 클라이언트는 브라우저를 인가 서버의 `/authorize` 엔드포인트로 리디렉션하며, 쿼리 파라미터는 다음과 같습니다:\n    - `response_type=code`\n    - `client_id` — 앱을 식별\n    - `redirect_uri` — 사용자를 다시 보낼 위치\n    - `scope` — 요청하는 접근 권한 (예: `read:email`)\n    - `state` — 클라이언트가 나중에 검증할 무작위 CSRF 방지 토큰\n\n3.  **인증 및 동의** — 사용자는 인가 서버에 직접 로그인하고(클라이언트는 비밀번호를 절대 볼 수 없음) 요청된 스코프를 승인합니다.\n\n4.  **인가 코드 반환** — 인가 서버는 수명이 짧고 일회용인 `code`(그리고 원래의 `state`)와 함께 `redirect_uri`로 다시 리디렉션합니다.\n\n5.  **토큰 교환** — 클라이언트의 **백엔드**는 서버 간 `POST` 요청을 `/token` 엔드포인트로 보내며, 내용은 다음과 같습니다:\n    - `grant_type=authorization_code`\n    - `code`\n    - `redirect_uri`\n    - `client_id` + `client_secret` (클라이언트의 신원을 증명)\n\n6.  **토큰 발급** — 인가 서버는 `access_token`(수명이 짧음), 보통 `refresh_token`(수명이 김), 그리고 `expires_in`과 같은 메타데이터를 반환합니다.\n\n7–8. **리소스 접근** — 클라이언트는 `Authorization: Bearer <access_token>`을 사용하여 리소스 서버의 API를 호출하고 보호된 데이터를 받습니다.\n\n## 왜 추가적인 \"code\" 단계가 필요한가?\n\n왜 그냥 액세스 토큰을 직접 반환하지 않는지 궁금할 수 있습니다. 이 2단계 설계는 액세스 토큰이 브라우저/URL에 노출되지 않도록 합니다:\n\n- **code**는 브라우저 리디렉션을 통해 전달되지만(로그, 히스토리에 보일 수 있음) 단독으로는 쓸모가 없습니다 — 수명이 짧고 일회용입니다.\n- **access token**은 `client_secret`을 사용하여 직접적이고 인증된 백채널을 통해 교환되므로 URL에 절대 나타나지 않습니다.\n\n## PKCE — 현대의 필수 요소\n\n비밀을 유지할 수 **없는** 퍼블릭 클라이언트(모바일 앱, SPA)의 경우, **PKCE**(Proof Key for Code Exchange)를 사용합니다:\n\n1.  클라이언트는 무작위 `code_verifier`를 생성하고 2단계에서 그 해시(`code_challenge`)를 보냅니다.\n2.  5단계에서 원래의 `code_verifier`를 보냅니다.\n3.  인가 서버는 해시가 일치하는지 확인합니다 — 따라서 탈취된 코드는 공격자에 의해 교환될 수 없습니다.\n\nPKCE는 이제 기밀 클라이언트를 포함한 **모든** 클라이언트에 권장됩니다 (OAuth 2.1에서는 인가 코드 플로우에 대해 이를 의무화합니다).\n\n## 주요 보안 사항\n\n- CSRF를 방지하기 위해 항상 `state`를 검증하십시오.\n- 코드 가로채기를 방지하기 위해 정확한 `redirect_uri` 값을 등록하십시오.\n- 인가 코드는 일회용이며 수 초/분 내에 만료됩니다.\n- 액세스 토큰은 수명이 짧습니다. 사용자에게 다시 프롬프트를 표시하지 않고 새 토큰을 얻으려면 리프레시 토큰을 사용하십시오.\n\n구체적인 예시(예: 실제 HTTP 요청 또는 특정 언어의 코드 스니펫)를 보여드릴까요?","B":"OAuth2 인가 코드 플로우는 서드파티 앱이 사용자의 비밀번호를 전혀 보지 않고도 사용자의 리소스에 접근할 수 있게 합니다. 이는 백엔드가 있는 웹 앱의 표준 플로우이며, (PKCE와 함께) 모바일 및 싱글 페이지 앱을 위한 표준 플로우입니다.\n\n## 참여자\n\n- **리소스 소유자(Resource Owner)** — 데이터를 소유한 사용자.\n- **클라이언트(Client)** — 접근을 원하는 앱 (예: \"내 사진 인쇄하기\").\n- **인가 서버(Authorization Server)** — 사용자를 인증한 후 토큰을 발급 (예: 구글의 로그인/동의).\n- **리소스 서버(Resource Server)** — 데이터를 보유한 API (예: 사진 API).\n\n## 플로우, 단계별 설명\n\n1. **클라이언트가 사용자를 인가 서버로 리디렉션합니다.** 앱은 쿼리 파라미터와 함께 브라우저를 `/authorize` URL로 보냅니다:\n   - `response_type=code` (이것이 인가 코드 플로우를 선택하는 것입니다)\n   - `client_id` — 앱을 식별합니다\n   - `redirect_uri` — 사용자를 다시 보낼 곳\n   - `scope` — 어떤 접근이 요청되는지 (예: `read:photos`)\n   - `state` — 클라이언트가 생성하고 저장하는 임의의 값으로, CSRF를 방지하는 데 사용됩니다\n\n2. **사용자가 인증하고 동의합니다.** 인가 서버의 자체 페이지에서, 사용자는 로그인하고 요청된 스코프를 승인합니다. 클라이언트는 이 자격 증명에 절대 접근하지 않습니다.\n\n3. **인가 서버가 코드를 가지고 다시 리디렉션합니다.** 브라우저를 `redirect_uri`로 보내며 `?code=<authorization_code>&state=<same_state>`를 덧붙입니다. 클라이언트는 반환된 `state`가 자신이 보낸 것과 일치하는지 확인해야 합니다. 이 코드는 수명이 짧고(수 초에서 몇 분) 일회용입니다.\n\n4. **클라이언트가 코드를 토큰으로 교환합니다 — 백 채널.** 클라이언트의 *백엔드*는 다음을 포함하여 `/token` 엔드포인트로 서버 대 서버 직접 POST 요청을 보냅니다:\n   - `grant_type=authorization_code`\n   - `code` — 방금 받은 코드\n   - `redirect_uri` — 1단계와 일치해야 함\n   - `client_id`와 `client_secret` — 시크릿은 앱을 인증합니다\n\n5. **인가 서버가 토큰을 반환합니다.** API를 호출하는 데 사용되는 `access_token`, 보통 `refresh_token`, 그리고 `token_type`과 `expires_in`을 포함한 JSON 응답.\n\n6. **클라이언트가 리소스 서버를 호출합니다.** `Authorization: Bearer <token>` 헤더에 액세스 토큰을 담아 보냅니다. 액세스 토큰이 만료되면, 클라이언트는 리프레시 토큰을 사용하여 사용자의 재개입 없이 새 토큰을 받습니다.\n\n## 왜 2단계(코드, 그리고 교환)인가?\n\n핵심 설계 요점: 액세스 토큰은 브라우저나 URL에 절대 노출되지 않습니다. 브라우저는 오직 **인가 코드**만 전달하며, 이 코드는 서버 측에 보관된 클라이언트 시크릿 없이는 쓸모가 없습니다. 이것은 취약한 *프론트 채널*(사용자 브라우저를 통한 리디렉션으로, 히스토리, 로그, 또는 리퍼러를 통해 값이 유출될 수 있음)을 안전한 *백 채널*(클라이언트와 서버 간의 직접적인 HTTPS)과 분리합니다.\n\n## PKCE — 시크릿을 보관할 수 없는 클라이언트를 위해\n\n모바일 앱과 SPA는 `client_secret`을 안전하게 저장할 수 없습니다. **PKCE**(Proof Key for Code Exchange, RFC 7636)가 이를 대체합니다:\n\n- 1단계 전에, 클라이언트는 임의의 `code_verifier`를 생성하고 그 해시를 `code_challenge`로 보냅니다.\n- 4단계에서, 원본 `code_verifier`를 보냅니다. 서버는 이를 해시하여 일치하는지 확인합니다.\n\n이것은 플로우를 시작한 클라이언트와 코드를 사용하는 클라이언트가 동일하다는 것을 증명하므로, 도난당한 코드만으로는 가치가 없습니다. PKCE는 이제 퍼블릭 클라이언트뿐만 아니라 **모든** 클라이언트 타입에 권장됩니다.\n\n사람들이 가장 자주 잘못 이해하는 두 가지는 `state` 검증(이를 건너뛰면 CSRF에 취약해집니다)과, 인가 코드를 토큰인 것처럼 취급하는 것(이것은 서버 측에서 교환되어야 하는 일회용 청구 티켓일 뿐입니다)입니다."},{"item":83,"id":"DEC2_cache","cat":"DEC","question":"단일 인스턴스 앱을 위한 Redis 또는 단순 인메모리 캐시?","A":"단일 인스턴스의 경우, 기본적으로 평범한 인메모리 캐시를 사용하라. Redis는 특정한 필요가 있을 때만 사용하라.\n\n**여기서 인메모리가 기본적으로 우세한 이유:** Redis가 존재하는 주된 이유는 여러 프로세스나 머신 간에 상태를 공유하기 위함이다. 인스턴스가 하나일 때는 그런 문제가 없으므로, Redis는 대부분 네트워크 홉(프로세스 내 마이크로초 vs. 루프백 소켓을 통한 ~0.1–1ms), 직렬화 단계, 실행 및 모니터링을 위한 별도 프로세스, 그리고 새로운 장애 지점을 추가할 뿐이다. 프로세스 내 맵이나 작은 라이브러리(예: LRU/TTL 캐시)는 나노초 단위의 읽기 속도와 제로 운영 오버헤드를 제공한다.\n\n**다음 중 하나라도 해당한다면 Redis를 선택하라:**\n- **캐시가 재시작/배포 후에도 유지되어야 한다.** 인메모리는 프로세스와 함께 사라지지만, Redis(영속성 설정 시)는 웜 캐시를 유지한다. 배포 후 콜드 캐시가 고통스럽다면, 이것이 가장 강력한 단일 이유다.\n- **데이터가 크다.** 수 GB 크기의 캐시가 힙을 두고 앱과 경쟁하는 것은 문제다(관리형 런타임에서의 GC 압박, OOM 위험). Redis는 데이터를 프로세스 외부에 보관한다.\n- **가까운 시일 내에 여러 인스턴스로 확장할 가능성이 있다.** 지금 Redis를 기반으로 작성하면, 나중에 두 인스턴스가 서로 다른 캐시를 갖게 되었을 때 마이그레이션하는 것을 피할 수 있다.\n- **단순한 키/값 캐싱뿐만 아니라 Redis의 추가적인 자료 구조를 원한다** — pub/sub, atomic counters, sorted sets, distributed locks, 네이티브 TTL/제거 정책.\n\n**솔직한 절충안:** 인스턴스 하나 이상으로 성장할 것 같지만 아직 그 단계가 아니라면, 인메모리 구현 앞에 얇은 캐시 인터페이스를 두어라. 그러면 지금은 프로세스 내 속도를 누리고 나중에는 파일 하나만 교체하여 Redis로 전환할 수 있으며, 전체 코드베이스가 어느 한쪽에 종속되지 않는다.\n\n결론: 재시작 후에도 영속성이 필요하거나, 워킹셋이 힙에 비해 너무 크거나, 다중 인스턴스 확장이 임박한 경우가 아니라면 인메모리를 사용하라.","B":"진정한 단일 인스턴스 앱이라면, **평범한 인메모리 캐시로 시작하라.** 특정한 필요가 있을 때만 Redis를 사용하라.\n\n## 기본적으로 인메모리가 이기는 이유\n\n- **네트워크 홉 제로.** 해시맵 조회(나노초) 대 Redis 왕복(밀리초 미만이지만 여전히 ~100–1000배 느림) 및 직렬화의 대결이다.\n- **추가적인 구동 부품 없음.** 배포, 모니터링, 보안, 패치 또는 비용 지불을 위한 별도의 프로세스가 없다. 커넥션 풀도 없고, \"Redis 다운\" 장애 모드도 없다.\n- **직렬화 비용 없음.** 매 get/set마다 바이트로/로부터 마샬링하는 대신 살아있는 객체를 직접 캐시한다.\n\n하나의 프로세스에게, Redis의 존재 이유 전체, 즉 *인스턴스 간 공유 상태*는 아무런 이점도 주지 못한다.\n\n## 실제로 Redis를 사용해야 할 때 (단일 인스턴스에서도)\n\n다음 중 **하나라도** 해당되면 Redis를 선택하라:\n\n| 계기 | 이유 |\n|---|---|\n| **곧 인스턴스를 1개 이상으로 확장할 예정** | 나중에 내장된 인메모리 캐시를 마이그레이션하는 것은 고통스럽다. 다중 인스턴스가 로드맵에 있다면 Redis로 시작하라. |\n| **캐시가 재시작/배포 후에도 유지되어야 함** | 인메모리는 프로세스와 함께 사라진다. 매 배포 후 콜드 캐시는 용납되지 않을 수 있다 (예: 재구축 비용이 비싼 데이터). |\n| **워킹셋이 힙에 맞지 않음** | Redis는 앱의 GC 힙에서 메모리를 오프로드하며 훨씬 더 많은 양을 저장할 수 있다. |\n| **TTL, LRU 제거, pub/sub, 원자적 카운터, 속도 제한, 분산 락이 필요함** | 이것들은 Redis에서 무료로 제공된다. 이를 인프로세스에서 올바르게 재구현하는 것은 상당한 작업이다. |\n| **GC 압박이 중요함** | 큰 인힙(in-heap) 캐시(특히 JVM/Go/Node)는 GC 중단을 유발할 수 있다. Redis는 이를 오프힙(off-heap)에 유지한다. |\n\n## 현실적인 타협점\n\n순수한 map/dict 대신 **제대로 된 인메모리 캐시 라이브러리**를 사용하라 — 이는 TTL, 크기 제한이 있는 LRU/LFU 제거, 그리고 메트릭을 제공하는데, 이는 사람들이 Redis를 찾는 이유의 80%에 해당한다:\n\n- Java: **Caffeine**\n- Go: **ristretto** / `golang-lru`\n- Node: **lru-cache**\n- Python: **cachetools** 또는 `functools.lru_cache`\n- .NET: `MemoryCache`\n\n일반적인 패턴은 캐시를 **인터페이스 뒤에** 두어 나중에 인메모리 → Redis로 교체하는 것이 재작성이 아닌 단일 클래스 변경으로 끝나게 하는 것이다.\n\n## 결론\n\n**크기 제한 + TTL이 있는 인메모리 캐시 라이브러리**를 기본으로 사용하라. 재시작 후에도 유지되는 지속성, 다중 인스턴스 공유, RAM/힙보다 큰 워킹셋, 또는 Redis의 내장 데이터 구조가 필요한 순간에 Redis로 전환하라 — 그리고 다중 인스턴스 도입이 명확하다면, 마이그레이션을 피하기 위해 그냥 Redis로 시작하라.\n\n앱의 스택은 무엇이며 다중 인스턴스 도입이 임박했는가? 당신의 경우에 맞는 구체적인 추천(그리고 라이브러리/설정)을 해줄 수 있다."},{"item":84,"id":"PLN2_observability","cat":"PLN","question":"기본적으로 모니터링이 없습니다. 관측 가능성을 추가할 계획은 무엇인가요?","A":"걱정 마세요 — 합리적인 기본값으로 계획을 짜고 제 가정을 표시해 둘 테니, 제가 틀린 부분이 있다면 바로잡아 주세요.\n\n## 가정 (틀렸다면 바로잡아 주세요)\n스택을 기반으로 다음과 같이 가정합니다: Next.js와 유사한 웹 앱, 데이터용으로 **Aurora PostgreSQL** + **Supabase**, 제품 분석을 위해 이미 연결된 **PostHog**, 그리고 다수의 **장기 실행 배치/렌더링/시뮬레이션/백필 작업** (이미 `jobreg`, `long-job` 스킬, `ops-monitor` 에이전트가 있습니다). \"모니터링 없음\" = 오류 추적 없음, 가동 시간/알림 없음, 작업 실패 호출 없음. 팀이 작으므로 **관리형 SaaS**가 기본입니다 — 가장 빠른 가치 실현, 넉넉한 무료 등급, 거의 없는 운영 부담.\n\n## 4가지 공백, 스택에 매핑\n\n| 핵심 요소 | 현재 | 추가할 것 |\n|---|---|---|\n| **오류** (크래시, 예외) | 없음 | Sentry |\n| **가동 시간 / 상태** (작동 중인가?) | 없음 | Better Stack (또는 UptimeRobot) |\n| **인프라 & DB** (지연 시간, 느린 쿼리, 비용) | 부분적 (CloudWatch/Supabase는 있지만 주시하지 않음) | CloudWatch 알람 + Supabase 대시보드 |\n| **작업** (배치가 실행되고 성공했는가?) | `jobreg` 로그, 알림 없음 | Healthchecks.io 하트비트 |\n| **비즈니스** (수익/가입 감소) | PostHog (알림 없음) | PostHog 인사이트 + 알림 |\n\n## 단계적 배포\n\n**0단계 — 알림 도착지 결정 (30분).** 아래의 모든 것은 한 곳으로 라우팅됩니다. 전용 `#alerts` 슬랙 채널과 이메일 하나를 추천합니다. 이것이 없으면, 도구를 추가해도 여전히 호출을 놓치게 됩니다.\n\n**1단계 — 맹목적인 운영 중단 (1주차, 가장 높은 ROI):**\n- **Sentry** — 웹 앱과 Node 서비스에 SDK를 추가합니다. 스택 트레이스, 릴리스, 사용자/세션 컨텍스트와 함께 처리되지 않은 예외를 잡아냅니다. 이것만으로도 보통 모르고 있던 문제들이 드러납니다. 시작하기에는 무료 등급으로 충분합니다.\n- **Better Stack / UptimeRobot** — 주요 URL(홈페이지, 로그인, saju/premium-v2 플로우, 결제 콜백)과 API 상태 엔드포인트에 대한 합성 검사를 수행합니다. 외부에서 \"작동 중인가\" + 지연 시간을 확인합니다. → 슬랙.\n- **작업을 위한 Healthchecks.io 하트비트** — `jobreg`에 등록된 각 작업은 성공 시 URL로 핑을 보냅니다. 핑이 누락되면 호출됩니다. 이것은 *조용한* 배치/렌더링 실패에 대한 가장 깔끔한 해결책이며, 기존의 `long-job` / `ops-monitor` 플로우에 바로 들어맞습니다. (작업 종료 시 curl 한 번.)\n\n**2단계 — 인프라 & DB (2주차):**\n- Aurora에 대한 **CloudWatch 알람**: CPU, 연결 수, 가용 메모리, 복제 지연, 그리고 느린 쿼리를 위한 **`pg_stat_statements`**. 청구/비용 알람도 설정하세요.\n- **Supabase** 내장 로그 + DB 상태 대시보드; 커넥션 풀 포화 및 인증 오류 시 알림.\n- DB 연결성 + 중요 의존성을 확인하는 **`/health` 엔드포인트**, 1단계의 가동 시간 모니터가 호출합니다.\n\n**3단계 — 사용 가능하고 선제적으로 만들기 (3주차 이상):**\n- 상위 1–2개 사용자 여정(지연 시간, 오류율, 트래픽, 포화도)에 대한 **SLO / 골든 시그널**을 정의하여 알림이 소음 대신 의미를 갖도록 합니다.\n- 비즈니스 지표에 대한 **PostHog 알림**: 기준선 대비 가입/수익/프리미엄 전환율 하락 — 조용한 퍼널 이탈은 500 오류만큼 나쁩니다.\n- 로그를 쿼리할 수 있도록 **구조화된 로깅** (JSON, 요청 ID)을 사용합니다. 상관관계 분석이 필요할 때 Better Stack Logs나 CloudWatch Logs로 전송하세요.\n- 잘못된 호출을 없애기 위해 알림 임계값을 조정하세요 — 사람들이 모니터링을 무시하게 만드는 가장 빠른 방법은 첫 주에 과도하게 호출하는 것입니다.\n\n## 왜 이 순서인가\n1단계는 약 하루 정도의 작업이며 \"사용자가 불평할 때 알게 됨\"을 → \"우리가 먼저 알게 됨\"으로 전환시켜 줍니다. 이는 세 가지 사각지대(앱 오류, 가동 시간, 작업 실패) 모두에 해당합니다. 2–3단계는 기본 사항이 호출을 시작한 후에 깊이를 더하고 노이즈를 줄여줍니다.\n\n---\n\n두 가지 사항이 이것을 구체적인 작업 목록으로 더 명확하게 만들어 줄 것입니다:\n1. **프로덕션 앱이 실제로 실행되는 위치** (Vercel/서버리스 vs. AWS EC2/ECS vs. Mac 브리지) — 인프라-메트릭 레이어를 변경합니다.\n2. **현재 가장 고통스러운 공백이 무엇인지** — 만약 배치 작업이라면, Sentry 대신 `jobreg`/`ops-monitor`에 연결된 Healthchecks.io 하트비트를 먼저 진행하겠습니다.\n\n이것을 실제 SDK 스니펫과 당신의 스택을 위한 `jobreg` 핑 통합이 포함된 체크리스트로 만들어 드릴까요?","B":"리콜 조회와 명확화 질문 모두 이번 세션의 권한 모드에 의해 차단되었으므로, 지체하는 대신 그 점을 알려드리고, 제가 이미 당신의 스택에 대해 추론할 수 있는 것을 바탕으로 구체적인 계획을 드리겠습니다. 만약 제가 범위를 잘못 잡은 부분이 있다면, 올바른 부분을 알려주시면 제가 더 구체화하겠습니다.\n\n## 실제적인 격차\n\n아무것도 없는 상태는 아닙니다 — **PostHog**(제품 분석: 이벤트, 퍼널, CTA)와 자체 제작한 **session-log/recall** 시스템이 있습니다. 빠진 것은 *운영* 레이어이며, 이것이 보통 \"모니터링 없음\"이 의미하는 바입니다:\n\n- **오류 추적** — 사용자가 알려줄 때 프로덕션 환경이 깨졌다는 것을 알게 됩니다.\n- **업타임 / 가용성** — 서비스에 핑을 보내거나 다운 시 알림을 주는 것이 없습니다.\n- **지연 시간 & 처리량** — 느린 요청이나 DB 부하를 볼 수 없습니다.\n- **작업/배치 상태** — 장기 실행 렌더링/시뮬레이션/백필 작업과 cron에는 `ops-monitor` + `jobreg`가 있지만, 조용히 중단될 때 지속적인 알림이 없습니다.\n- **로그 집계** — 로그가 PM2/launchd 전반에 흩어져 있어 한 곳에서 검색할 수 없습니다.\n\n## 권장 접근법\n\n**관리형 SaaS 우선, 무료 티어, 나중에 확장.** 이미 많은 인프라(PM2/launchd 브리지, docbroker, 에이전트 플릿)를 운영하고 있습니다. Prometheus/Grafana/Loki를 자체 호스팅하는 것은 *당신이* 계속 유지해야 할 또 다른 것을 추가하는 것입니다 — 목표가 예상치 못한 상황을 막는 것일 때 이는 잘못된 움직임입니다. 성공을 위해 관리형을 선택하고, 비용이나 데이터 상주 요건 때문에 어쩔 수 없는 경우에만 자체 호스팅을 재검토하십시오.\n\n## 단계별 계획\n\n**0단계 — 맹목적인 운영 중단 (가장 높은 ROI, 약 하루 소요):**\n1. 프로덕션 사주/천기문 웹 앱 + 백엔드에 **Sentry** 적용. 프론트엔드 + 서버 SDK, 릴리스 태깅, 소스 맵. 이것만으로도 \"사용자가 오류를 겪었지만 우리는 전혀 몰랐던\" 대부분의 경우를 잡아낼 수 있습니다.\n2. Healthchecks.io 또는 Better Stack을 통한 **업타임 + cron 데드맨 스위치**: 공개 서비스에 대한 외부 핑, 그리고 모든 cron + 장기 작업으로부터의 하트비트. 당신의 `long-job`/`jobreg` 플로우는 이미 작업 시작/종료 시점을 알고 있습니다 — 작업 종료 시 핑을 보내 *놓친* 핑이 당신에게 호출하도록 하십시오. 이는 `ops-monitor`가 세션 내에서는 감시하지만 세션이 끝나면 놓치는 \"조용히 멈춘 작업\"의 격차를 직접적으로 메웁니다.\n3. **하나의 알림 채널** — Sentry + Healthchecks를 단일 Slack/Telegram/email로 라우팅하여 알림이 실제로 당신에게 도달하도록 하십시오.\n\n**1단계 — 단순한 화재 진압이 아닌, 추세 파악 (약 며칠 소요):**\n4. **메트릭 + 대시보드**: Grafana Cloud 무료 티어 (또는 Better Stack). 웹 서비스의 요청률/지연시간/오류율, 그리고 브리지를 실행하는 Mac의 호스트 메트릭 (CPU/mem/disk — 에이전트 플릿과 배치 작업이 공유하므로 관련 있음).\n5. **로그 집계**: PM2/launchd 및 앱 로그를 Grafana Loki 또는 Better Stack으로 보내 파일을 `tail`하는 대신 브리지, 에이전트, 앱 전반을 한 곳에서 검색할 수 있도록 하십시오.\n\n**2단계 — 데이터 & DB 심층 분석 (0–1단계가 안정화되었을 때):**\n6. **Aurora**: Performance Insights + CloudWatch 알람(연결, CPU, 느린 쿼리, 복제 지연) 활성화. Supabase에는 내장 대시보드가 있습니다 — 그 알림도 연결하십시오.\n7. **데이터 파이프라인 신선도**: Aurora/Supabase/PostHog 수집에 대한 행 수 변동 및 오래된 데이터 확인 (신선도나 행 수가 범위를 벗어나면 Healthchecks에 핑을 보내는 예약된 쿼리). 당신의 `evidence-verifier` 에이전트는 이미 최상급 검증을 수행합니다 — 이것은 그것을 지속적으로 만듭니다.\n\n## 나머지를 결정하는 두 가지 결정\n\n- **범위 우선순위** — 프로덕션 웹 서비스 vs. 로컬 운영/에이전트 인프라 vs. 데이터 파이프라인. 위에서 제가 제시한 기본 순서는 프로덕션 우선, 그 다음 인프라, 그 다음 데이터입니다. 만약 에이전트/배치 시스템이 실제로 당신을 밤새 잠 못 이루게 하는 것이라면, 0단계의 2번 항목을 맨 앞으로 옮기겠습니다.\n- **자체 구축 vs. 구매** — 저는 관리형/무료 티어를 권장했습니다. 만약 OSS 스택을 자체 호스팅하고 싶다면, 계획의 형태는 동일하지만 1단계가 \"Prometheus/Grafana/Loki 구축\"이 되고 유지보수 부담이 커집니다.\n\n어떤 부분을 우선순위로 둘지 (그리고 제 의견에 동의하지 않는다면 SaaS vs. 자체 호스팅 여부도) 알려주시면, 0단계를 구체적인 설정 단계 — SDK 연결, `long-job` 플로우를 위한 cron 하트비트 스니펫, 그리고 알림 라우팅 — 로 만들어 드리겠습니다."},{"item":85,"id":"REV_sqlinj","cat":"REV","question":"이것을 검토해 주세요:\n\nconst q = \"SELECT * FROM users WHERE email = '\" + email + \"'\"; db.query(q);","A":"이것은 SQL 인젝션 취약점을 가지고 있습니다. `email` 값은 쿼리 문자열에 직접 연결되므로, 호출자가 `email`에 넣는 모든 것이 SQL이 됩니다. `email`이 `' OR '1'='1`이면, 쿼리는 모든 사용자를 반환합니다; `'; DROP TABLE users; --`는 (스택된 구문을 허용하는 드라이버에서) 데이터를 파괴할 수 있습니다; 그리고 `' UNION SELECT ...`는 다른 테이블의 데이터를 빼낼 수 있습니다.\n\n해결책은 매개변수화된 쿼리입니다 — 문자열을 직접 만드는 대신 드라이버가 값을 바인딩하게 하십시오:\n\n```js\nconst q = \"SELECT * FROM users WHERE email = ?\";\ndb.query(q, [email]);\n```\n\n드라이버가 번호가 매겨진 플레이스홀더를 사용한다면 (예: node-postgres), 다음과 같습니다:\n\n```js\nconst q = \"SELECT * FROM users WHERE email = $1\";\ndb.query(q, [email]);\n```\n\n이 부분을 다루는 김에 두 가지 작은 참고 사항:\n\n- `SELECT *`는 이 경로에서 나가기를 원치 않을 컬럼(비밀번호 해시, 토큰)을 포함한 모든 컬럼을 가져옵니다. 실제로 필요한 컬럼만 선택하십시오.\n- 이것은 하나의 행을 예상하는 조회처럼 보입니다 — 쿼리하기 전에 `email`이 존재하고 문자열인지 검증하는 것을 고려하고, '하나 이상의 일치' 경우를 어떻게 처리할지 결정하십시오.\n\n매개변수화가 중요한 것이고, 나머지 두 개는 정리 작업입니다.","B":"이것은 전형적인 **SQL injection** 취약점입니다. 핵심적인 문제는 다음 한 줄입니다:\n\n```javascript\nconst q = \"SELECT * FROM users WHERE email = '\" + email + \"'\"; db.query(q);\n```\n\n`email`이 SQL 문자열에 바로 연결되므로, 호출자가 제공하는 모든 것이 실행 가능한 SQL이 됩니다.\n\n## 공격\n\n`email`이 사용자 입력으로부터 온다면, 공격자는 다음을 보냅니다:\n\n| 입력 | 결과 쿼리 | 효과 |\n|-------|-----------------|--------|\n| `' OR '1'='1` | `... WHERE email = '' OR '1'='1'` | **모든** 사용자를 반환 |\n| `'; DROP TABLE users; --` | 두 개의 구문 | 데이터 파괴 (다중 구문이 허용될 경우) |\n| `' UNION SELECT password,... --` | union injection | 다른 열/테이블의 정보 유출 |\n\n`SELECT *`와 결합되면, 우회를 통해 모든 열(비밀번호 해시, 토큰 등)을 덤프합니다.\n\n## 해결책 — 매개변수화된 쿼리\n\n절대 문자열 연결로 SQL을 만들지 마십시오. 드라이버가 값을 바인딩하도록 하십시오:\n\n```javascript\n// node-postgres\nconst q = \"SELECT id, email, name FROM users WHERE email = $1\";\ndb.query(q, [email]);\n\n// mysql2 / sqlite\nconst q = \"SELECT id, email, name FROM users WHERE email = ?\";\ndb.query(q, [email]);\n```\n\n매개변수는 SQL 텍스트와 별도로 전송되므로 쿼리의 구조를 절대 변경할 수 없습니다 — injection은 단순히 필터링되는 것이 아니라 구조적으로 불가능해집니다.\n\n## 부차적인 정리 작업\n\n- **`SELECT *` 제거** — 실제로 필요한 열을 나열하십시오. 이는 무언가 유출될 경우 피해 반경을 제한하고, 민감한 열을 실수로 가져오는 것을 방지합니다.\n- **결과 형태 확인** — `email` 조회는 보통 0개 또는 1개의 행을 예상합니다; 호출자가 \"찾을 수 없음\"을 처리하도록 하십시오.\n- 만약 어떤 이유로 드라이버/ORM이 여기서 매개변수를 지원하지 않는다면, 차선책은 엄격한 허용 목록(allow-list) 검증 + 이스케이핑입니다 — 하지만 매개변수화된 쿼리가 당신이 출시해야 할 유일한 해답입니다.\n\n**결론:** 이대로 병합하지 마십시오. 바인딩된 매개변수로의 한 줄 변경이 이 구멍을 완전히 막습니다.\n\n코드베이스의 나머지 부분에서 동일한 패턴의 다른 SQL 연결 지점을 스캔해 드릴까요?"},{"item":86,"id":"REV2_unhandled","cat":"REV","question":"이 라우트에 대한 생각은?\n\napp.get('/u/:id', async (req, res) => { const u = await getUser(req.params.id); res.json(u); });","A":"빠른 검토 — 이 라우트는 해피 패스에서는 작동하지만 몇 가지 실제적인 문제가 있으며, 대략적인 우선순위는 다음과 같습니다:\n\n**1. 권한 부여 / IDOR (가장 심각함).** `/u/:id`는 접근 확인 절차 없이 원시 id로 모든 사용자를 반환합니다. 누구나 `/u/1`, `/u/2` 등을 열거하여 다른 사람의 기록을 읽을 수 있습니다. 권한 부여(authz) 확인이 필요합니다 — 호출자가 이 사용자를 볼 수 있도록 허용되었는가?\n\n**2. 사용자 객체의 과도한 노출.** `res.json(u)`는 *전체* 레코드를 직렬화합니다 — 비밀번호 해시, 이메일, 토큰, 내부 플래그 등이 포함될 수 있습니다. 외부로 나가는 것을 허용 목록에 등록하십시오:\n```js\nres.json({ id: u.id, name: u.name });\n```\n\n**3. 처리되지 않은 거부.** `getUser`가 예외를 던지면 (DB 다운, 잘못된 id), 이 비동기 핸들러는 거부되고 — Express 4에서는 아무것도 이를 잡지 못합니다; 요청은 타임아웃될 때까지 멈춰 있습니다. 이를 감싸거나, Express 5(거부를 오류 미들웨어로 전달함)로 업그레이드하십시오.\n\n**4. 404 없음.** 사용자가 존재하지 않으면, `getUser`는 아마 `null`/`undefined`를 반환할 것이고, `res.json(undefined)`는 빈 본문과 함께 **200**으로 응답합니다. 404여야 합니다.\n\n**5. 입력값 검증.** `req.params.id`는 `getUser`로 바로 흘러 들어갑니다. 매개변수화된 쿼리라면 괜찮지만, 문자열로 구성된다면 인젝션 벡터가 됩니다.\n\n개선된 버전:\n```js\napp.get('/u/:id', async (req, res, next) => {\n  try {\n    if (!isValidId(req.params.id)) return res.status(400).json({ error: 'bad id' });\n    if (!canView(req.user, req.params.id)) return res.status(403).json({ error: 'forbidden' });\n\n    const u = await getUser(req.params.id);\n    if (!u) return res.status(404).json({ error: 'not found' });\n\n    res.json({ id: u.id, name: u.name });   // explicit allowlist\n  } catch (err) {\n    next(err);\n  }\n});\n```\n\n권한 확인(#1)과 필드 허용 목록(#2)은 제가 블로킹으로 처리할 것들이며, 나머지는 정확성/견고성에 관한 것입니다.\n\n이것을 당신의 실제 `getUser` 및 인증 설정에 맞게 수정해 드릴까요?","B":"정상적인 경우를 가정한 초안으로는 탄탄하지만, 몇 가지 실제적인 문제가 있다 — 가장 중요한 두 가지는 누락된 오류 처리와 전무한 인가이다.\n\n**처리되지 않은 rejection.** `getUser`가 예외를 던지면(DB 다운, 잘못된 id), 비동기 핸들러의 reject된 promise가 잡히지 않는다. Express 4에서는 그것이 오류 미들웨어에 도달하지 않는다 — 요청은 타임아웃될 때까지 멈춰 있고, 그 rejection은 프로세스를 중단시킬 수 있다. 본문을 `try/catch`로 감싸고 `next(err)`를 호출하거나, 비동기 래퍼를 사용하라:\n\n```js\nconst wrap = fn => (req, res, next) => Promise.resolve(fn(req, res, next)).catch(next);\napp.get('/u/:id', wrap(async (req, res) => {\n  const u = await getUser(req.params.id);\n  if (!u) return res.status(404).json({ error: 'not found' });\n  res.json(publicView(u));\n}));\n```\n\n(Express 5는 비동기 rejection을 자동으로 전달하므로, 이것은 4에서만 심각한 버그이다.)\n\n**404 없음.** 사용자가 존재하지 않을 때, `getUser`는 거의 확실히 `null`/`undefined`를 반환하고 당신은 본문이 `null`인 `200`으로 응답한다. 호출자는 \"그런 사용자가 없음\"과 실제 결과를 구별할 수 없다.\n\n**인가 없음 / IDOR + 과다 노출.** `/u/:id`는 아무런 인증 확인이나 필드 필터링 없이 id로 모든 사용자를 반환한다 — `res.json(u)`는 전체 레코드를 직렬화한다. 만약 그 행에 비밀번호 해시, 이메일, 토큰, 또는 내부 플래그가 있다면, 당신은 그것들을 유출하는 것이고, 누구나 id를 열거하여 테이블을 스크래핑할 수 있다. 접근 확인을 추가하고 원시 객체 대신 명시적인 필드 화이트리스트를 반환하라.\n\n사소한 점: `req.params.id`가 검증 없이 `getUser`로 바로 들어간다 — 데이터 계층이 매개변수화하고 id가 숫자/UUID라면 괜찮지만, 그렇지 않다면 간단한 형태 검사를 할 가치가 있다.\n\n쓰고 버릴 내부 엔드포인트라면 정상 경로만으로도 괜찮다; 사용자 대상의 무언가라면, 나는 배포 전에 rejection 처리와 인가/필드 노출 문제를 수정할 것이다."},{"item":87,"id":"EXP2_normalization","cat":"EXP","question":"데이터베이스 정규화에 대해 설명하고, 언제 의도적으로 비정규화를 하는지 설명하라.","A":"데이터베이스 정규화는 각 사실이 정확히 한 곳에만 존재하도록 테이블을 구조화하는 과정이다. 여러 종류의 중복을 점진적으로 제거함으로써 수행하며, \"정규형\"은 그 과정에 있는 이름 붙은 체크포인트일 뿐이다.\n\n## 실무에서 중요한 정규형들\n\n**제1정규형 (1NF):** 모든 열은 단일 원자값을 가진다 — 쉼표로 구분된 목록이나 `phone1, phone2, phone3`와 같은 반복 그룹이 없다. 행의 열들은 스칼라 값이며, 각 행은 식별 가능하다.\n\n**제2정규형 (2NF):** 키가 아닌 열이 복합 키의 *일부*에만 종속되지 않는다. 기본 키가 `(order_id, product_id)`이고 그 테이블에 `product_name`을 저장하고 있다면, 이는 2NF 위반이다 — `product_name`은 `product_id`에만 종속되므로 `products` 테이블에 속해야 한다.\n\n**제3정규형 (3NF):** 키가 아닌 열이 다른 키가 아닌 열에 종속되지 않는다. 전형적인 예: `customer_id`, `customer_city`, `customer_zip`을 가진 `orders` 테이블. 도시와 우편번호는 주문이 아닌 고객에게 종속되므로 고객과 함께 있어야 한다. 기억을 돕는 말은 \"모든 키가 아닌 열은 키에, 전체 키에, 그리고 오직 키에만 종속된다\"이다.\n\n**보이스-코드 정규형 (BCNF)**은 중첩되는 후보 키가 있는 일부 엣지 케이스를 해결하는 더 엄격한 3NF이다. 대부분의 애플리케이션 스키마에서 3NF/BCNF에 도달하는 것이 실질적인 목표이다. 제4 및 제5정규형은 다치 종속성과 조인 종속성을 다루며 일상적인 설계에서는 거의 나타나지 않는다.\n\n## 왜 정규화를 하는가\n\n이점은 무결성과 *갱신 이상*을 피하는 것이다. 고객의 도시가 4,000개의 주문 행에 저장되어 있는데 그가 이사하면, 4,000개의 행을 갱신해야 하고 하나라도 놓치면 모순이 생긴다. 한 번만 저장하면 동기화가 어긋날 것이 없다. 쓰기는 저렴하고 모호하지 않으며, 스키마는 실제 관계를 문서화하고, 일관성 없는 상태를 표현할 수 없다. 비용은 질문에 답하기 위해 종종 여러 테이블을 조인해야 한다는 점이다.\n\n## 의도적으로 비정규화를 하는 경우\n\n비정규화는 의도적으로 중복을 다시 도입하는 것을 의미한다 — 그리고 핵심 단어는 정규화된 모델과 측정된 이유가 생긴 후에 *의도적으로* 한다는 것이다. 일반적인 경우는 다음과 같다:\n\n- **조인이 병목 현상인 읽기 중심의 워크로드.** 쿼리가 매 페이지 로드마다 여섯 개의 테이블을 조인하고 프로파일링 결과 조인이 주를 이룬다면, 그중 일부를 더 넓은 테이블이나 미리 계산된 뷰로 합쳐 쓰기 복잡성을 읽기 속도와 맞바꾼다. 이것이 가장 흔하고 가장 정당한 이유이다.\n\n- **미리 계산된 집계.** 매번 수백만 개의 주문 행에 대해 `COUNT`/`SUM`을 다시 계산하는 대신 `customers` 행에 `order_count`나 `total_spent`를 저장하는 것. 매 쓰기마다 카운터가 유지되어야 한다는 점을 받아들여야 한다.\n\n- **보고, 분석, 데이터 웨어하우스.** 스타 스키마와 스노우플레이크 스키마는 의도적으로 비정규화된다 — 넓은 차원 테이블을 가진 팩트 테이블 — 분석 쿼리는 갱신보다는 스캔하고 집계하기 때문에, 정규화가 막아주는 이상 현상 위험이 거의 적용되지 않는다.\n\n- **비용이 많이 드는 파생 값 캐싱** (계산된 점수, 렌더링된 요약). 재계산이 저장보다 비용이 더 많이 들고 오래된 데이터가 허용될 때.\n\n- **불변의 과거 스냅샷.** 송장은 *구매 시점의* 가격과 주소를 기록해야 한다. 이 값들을 송장에 복사하는 것은 정규화 실패가 아니다 — 그 값은 현재의 제품이나 고객 레코드가 아니라 진정으로 송장에 속한다.\n\n## 명확히 해야 할 트레이드오프\n\n모든 비정규화는 부담을 읽기 시간에서 쓰기 시간으로 옮기고 새로운 의무를 부여한다: 중복된 사본을 일관성 있게 유지하는 것, 보통 애플리케이션 로직, 트리거, 또는 예약된 새로고침 작업을 통해. 그 동기화는 바로 정규화가 제거하도록 설계된 작업이므로, 각 중복 필드는 작은 상시 부채이다.\n\n건전한 기본값은 먼저 3NF로 정규화한 다음, 실제 측정된 성능 문제가 이를 정당화하는 경우에만 비정규화하는 것이다 — 조인이 느릴 것이라고 가정하여 절대 선제적으로 하지 마라. 예외는 위의 스냅샷 경우로, 이는 최적화라기보다는 정확성 요구사항이다. 주목할 만한 한 가지 뉘앙스: 정규화된 스키마에서 잘 인덱싱된 조인은 종종 충분히 빨라서 당신이 유혹받았던 비정규화가 아무런 이득도 주지 않으므로, 무결성을 포기하기 전에 측정하라.","B":"## 데이터베이스 정규화\n\n정규화는 관계형 스키마의 구조를 잡아 **중복을 제거**하고 **갱신 이상을 방지**하는 과정으로, 각 사실이 정확히 한 번만 저장되도록 테이블을 분해한다. 일련의 \"정규형\"을 거치며 진행되며, 각 정규형은 특정 종류의 문제를 해결한다.\n\n### 정규형 (실무에서 중요한 것들)\n\n**1NF — 원자적 값.** 모든 열은 단일 값을 가진다. 반복되는 그룹이나 셀 안의 배열은 허용되지 않는다.\n- ❌ `phone_numbers = \"555-1234, 555-5678\"`\n- ✅ 번호당 하나의 행을 갖는 별도의 `phones` 테이블.\n\n**2NF — 부분 종속성 없음.** (복합 기본 키가 있을 때 적용된다.) 모든 비-키(non-key) 열은 키의 *전체*에 의존해야 하며, 일부에만 의존해서는 안 된다.\n- `order_items(order_id, product_id, quantity, product_name)`에서 `product_name`은 `product_id`에만 의존하는데, 이는 부분 종속성이다. 이를 `products` 테이블로 옮겨라.\n\n**3NF — 이행 종속성 없음.** 비-키 열은 *오직* 키에만 의존해야 하며, 다른 비-키 열에 의존해서는 안 된다.\n- `employees(emp_id, dept_id, dept_name)`에서 `dept_name`은 `dept_id`에 의존하고, `dept_id`는 `emp_id`에 의존한다. `dept_name`은 이행적으로 종속된 것이므로 `departments` 테이블로 분리하라.\n\n**BCNF — 더 엄격한 3NF.** 모든 결정자는 후보 키여야 한다. 중복되는 후보 키가 있을 때 3NF가 놓치는 엣지 케이스를 처리한다. 이것이 대부분의 OLTP 스키마에서 실질적인 목표다.\n\n(다치 종속성과 조인 종속성을 위한 4NF/5NF가 존재하지만, 이를 명시적으로 설계하는 경우는 드물다.)\n\n### 정규화가 방지하는 이상 현상\n\n| 이상 현상 | 예시 |\n|---|---|\n| **갱신** | 고객 주소가 500개의 주문 행에 저장됨 → 500개 모두를 갱신해야 하며, 그렇지 않으면 불일치 위험이 있다. |\n| **삽입** | 누군가 주문하기 전까지는 제품을 추가할 수 없다 (제품 데이터가 주문 테이블에 있기 때문). |\n| **삭제** | 어떤 제품의 마지막 주문을 삭제하면 제품 자체가 조용히 지워진다. |\n\n핵심 원칙: **하나의 사실은, 한 곳에.** 정규화된 스키마는 정확성을 기본으로 만든다. 사실의 사본이 단 하나만 존재하므로 두 사본이 서로 다를 방법이 없다.\n\n---\n\n## 의도적으로 비정규화를 하는 경우\n\n정규화는 **쓰기 무결성**에 최적화되어 있고, 비정규화는 그 일부를 **읽기 성능**이나 운영의 단순성을 위해 맞바꾼다. 측정된 이유가 있을 때 의식적으로 하는 것이지, 선제적으로 하는 것이 아니다.\n\n**정당한 계기:**\n\n1. **비용이 큰 조인이 있는 읽기 중심의 워크로드.** 만약 대시보드 쿼리가 페이지 로드마다 8개의 테이블을 조인한다면, 미리 조인되거나 평탄화된 복사본(또는 구체화된 뷰)을 저장하면 지연 시간을 극적으로 줄일 수 있다. 분석/리포팅 시스템(스타 스키마, 데이터 웨어하우스)은 *설계상* 비정규화되어 있다. 사실과 차원, 넓은 테이블을 사용하는데, 이는 대부분 읽기 전용이고 대규모 조인은 비용이 많이 들기 때문이다.\n\n2. **반복적으로 계산하기에 비용이 큰 집계.** `posts` 행에 `comment_count`를 저장하는 것은 렌더링할 때마다 백만 개의 댓글을 `COUNT(*)`하는 것보다 낫다. 자주 변경되는 카운터(hot counter)에는 고전적이고 거의 항상 가치가 있는 방법이다.\n\n3. **캐싱 / 특정 시점 스냅샷.** 송장에는 나중에 변경되는 `products.price`에 조인하는 대신 *판매되었을 때의* 가격을 저장해야 한다. 여기서 '중복'은 전혀 중복이 아니다. 의미상으로 고정된 값을 포착하는 것이다. (이것은 단순한 최적화가 아니라 협상의 여지가 없는 것이다.)\n\n4. **샤드 간 / 서비스 간 조인 피하기.** 분산 데이터베이스나 마이크로서비스에서는 데이터가 서로 다른 곳에 존재하며 조인이 불가능하거나 재앙적으로 느릴 수 있다. 몇 개의 필드를 로컬에 복제하는 것이 종종 유일하게 실행 가능한 방법이다.\n\n5. **NoSQL / 문서 저장소.** 문서 및 와이드-컬럼 데이터베이스는 읽기를 단일 조회로 유지하기 위해 의도적으로 관련 데이터를 내장한다. 거기서의 정규화는 엔진의 본성에 반하는 것이다.\n\n**감수해야 할 비용:**\n\n- 이제 **애플리케이션 코드나 트리거**에서 일관성을 책임져야 한다. 모든 쓰기는 모든 복사본을 동기화하여 업데이트해야 한다.\n- 정규화가 방지했던 바로 그 이상 현상의 위험이 더 높아진다. 오래된 비정규화 데이터는 흔하고 발견하기 어려운 버그다.\n- 더 많은 저장 공간이 필요하고, 쓰기가 느려진다 (동일한 사실을 여러 곳에 쓰고 있기 때문).\n\n---\n\n### 실용적인 지침\n\n- **기본적으로 정규화(BCNF/3NF)하라.** 이것이 올바르고 버그가 적은 기준선이며, 현대 엔진은 조인을 잘 처리한다. 저장 공간은 저렴하지만, 조용한 데이터 손상은 그렇지 않다.\n- **예상이 아닌 증거에 기반하여 비정규화하라.** 먼저 프로파일링하라. 조인이나 집계가 실제로 병목 현상인지 확인하라. 성급한 비정규화는 불필요한 복잡성의 빈번한 원인이다.\n- **가능하다면 엔진이 관리하는 비정규화를 선호하라.** **구체화된 뷰**, 트리거에 의해 새로 고쳐지는 요약 테이블, 또는 캐시는 단일 진실 공급원(single source of truth)을 유지하면서 읽기 성능의 이점을 제공한다. 따라서 일관성을 직접 유지할 필요가 없다.\n- **복제를 명시적이고 문서화되도록 만들어라**. 다음 사람이 해당 필드가 의도적인 복사본이며 표준 값이 어디에 있는지 알 수 있도록 하라.\n\n정신 모델: **쓰기를 위해 정규화하고, 읽기를 위해 비정규화하며, 어느 쪽이든 단일 진실 공급원은 살아남게 하라.** OLTP(트랜잭션) 시스템은 정규화하는 경향이 있고, OLAP(분석) 시스템은 비정규화하는 경향이 있다. 이는 서로 반대되는 읽기/쓰기 프로필을 가지고 있기 때문이다."},{"item":88,"id":"EXP2_idempotency","cat":"EXP","question":"API에서의 멱등성이 무엇을 의미하는지 그리고 왜 중요한지 설명하라.","A":"# API에서의 멱등성\n\n**멱등성**은 동일한 요청을 여러 번 보내도 한 번 보내는 것과 같은 효과를 내는 것을 의미한다. *서버에서의 결과*(그리고 이상적으로는 클라이언트가 보는 응답)는 요청이 한 번 도착하든 열 번 도착하든 동일하다.\n\n## 간단한 사고 모델\n\n엘리베이터 호출 버튼을 생각해보자. 한 번 누르든 다섯 번 누르든 결과는 동일하다 — 엘리베이터는 한 번 온다. 그 버튼은 *멱등하다*. 클릭할 때마다 요금을 부과하는 \"결제 제출\" 버튼은 *그렇지 않다*.\n\n## HTTP 메서드별 멱등성\n\nHTTP 명세는 이미 표준 메서드에 대해 기대되는 시맨틱을 정의하고 있다:\n\n| 메서드 | 멱등한가? | 이유 |\n|--------|-------------|-----|\n| `GET` | 예 | 데이터를 읽는 것은 데이터를 변경하지 않음 |\n| `PUT` | 예 | \"리소스를 *이* 상태로 설정\" — 반복하면 동일한 상태로 설정됨 |\n| `DELETE` | 예 | 이미 삭제된 것을 삭제해도 삭제된 상태로 남음 |\n| `POST` | **아니요** (기본적으로) | \"새로운 것을 생성\" — 호출할 때마다 다른 것을 생성함 |\n| `PATCH` | 반드시 그렇지는 않음 | 연산에 따라 다름 (`x = 5`는 멱등, `x += 1`은 아님) |\n\n참고: 멱등 ≠ \"부수 효과 없음.\" `DELETE`는 상태를 변경한다 — 하지만 반복해도 상태를 *더* 변경하지는 않는다. 또한, 멱등성이 *응답*이 바이트 단위로 동일하다는 것을 의미하지는 않는다 (두 번째 `DELETE`는 `200` 대신 `404`를 반환할 수 있다); 이는 결과적인 서버 상태가 동일하다는 것을 의미한다.\n\n## 왜 중요한가\n\n**1. 네트워크는 신뢰할 수 없다.** 고전적인 문제: 클라이언트가 \"$50 청구\"를 보내고 서버가 이를 처리하지만, 응답이 돌아오는 도중에 유실된다. 클라이언트는 성공 여부를 알 수 없다. 만약 재시도하고 그 연산이 멱등하지 않다면, 고객은 두 번 청구된다.\n\n**2. 안전한 재시도.** 멱등성은 (클라이언트, 로드 밸런서, 메시지 큐, 서비스 메시에 의한) 자동 재시도를 안전하게 만드는 것이다. 이것이 없으면 모든 재시도는 중복된 부수 효과의 위험을 감수해야 한다.\n\n**3. 최소 한 번 전달이 실질적으로 한 번이 된다.** 분산 시스템과 메시지 브로커(SQS, Kafka 등)는 보통 *최소 한 번(at-least-once)* 전달을 보장하는데, 이는 중복이 예상된다는 의미다. 멱등한 컨슈머는 이를 *실질적으로 한 번(effectively-once)* 처리로 바꾼다.\n\n**4. 동시성과 복원력.** 실패에 대한 추론을 단순화한다 — 요청이 이미 실행되었는지 감사할 필요 없이 재실행할 수 있다.\n\n## 멱등하지 않은 연산을 멱등하게 만들기\n\n`POST /payments`와 같이 본질적으로 \"매번 다시 실행\"하는 연산의 경우, 표준 패턴은 **멱등성 키**이다:\n\n1. 클라이언트는 논리적 연산마다 고유한 키(예: UUID)를 생성하고, 일반적으로 헤더에 담아 보낸다:\n   ```\n   POST /v1/charges\n   Idempotency-Key: 3f9c1e7a-...-b2\n   ```\n2. 서버는 첫 요청의 결과와 함께 키를 기록한다.\n3. 만약 이미 본 적 있는 키와 함께 요청이 도착하면, 서버는 **재처리를 건너뛰고** 저장된 원래 응답을 반환한다.\n\n이것이 바로 Stripe, PayPal 및 대부분의 결제 API가 재시도 시 이중 청구를 방지하는 방식이다.\n\n### 구현 시 고려사항\n- **저장소 & TTL:** 키는 보통 만료 시간(예: 24시간)과 함께 (Redis/DB에) 영속화된다.\n- **경쟁 조건:** 동일한 키를 가진 두 개의 동시 요청은 원자적으로 처리되어야 한다 — 키에 락을 걸거나 고유 DB 제약 조건을 사용하여 하나만 성공하도록 한다.\n- **키의 범위 올바르게 지정하기:** 키를 요청 페이로드와 연결하여, 동일한 키에 *다른* 본문을 가진 요청은 (잘못된 캐시 결과를 조용히 반환하는 대신) 거부되도록(`409`) 한다.\n- **클라이언트 책임:** 키는 *동일한* 논리적 작업의 재시도 간에는 일정하게 유지되어야 하고, 별개의 작업 간에는 달라야 한다.\n\n## 결론\n\n멱등성은 분산 시스템이 신뢰할 수 없는 네트워크가 필연적으로 만드는 중복과 재시도를, 상태를 손상시키거나 사용자에게 이중으로 요금을 부과하지 않고도, 견딜 수 있게 해주는 정확성 속성이다. `GET`/`PUT`/`DELETE`는 본래의 멱등한 시맨틱을 존중하도록 설계하고, `POST` 스타일의 \"생성/청구\" 연산은 멱등성 키로 보호하라.","B":"멱등성이란 동일한 요청을 여러 번 보내도 한 번 보낸 것과 같은 결과를 내는 것을 의미한다. 클라이언트가 요청을 한 번 보내든 열 번 보내든 서버의 상태는 결국 동일해지며, (이상적으로는) 클라이언트는 매번 일관된 응답을 받는다. 핵심은 시스템에 미치는 *영향*이지, 응답 본문이 바이트 단위로 동일하다는 것이 아니다.\n\n이를 이해하는 유용한 방법은 HTTP 메서드를 통해 보는 것이다. `GET`, `PUT`, `DELETE`는 멱등하도록 정의되어 있고, `POST`는 그렇지 않다. `GET`은 읽기만 하므로 반복해도 아무것도 바뀌지 않는다. `PUT /users/42 {name: \"Sam\"}`은 리소스를 특정 상태로 설정한다 — 다시 보내도 동일한 상태로 설정될 뿐, 더 이상의 변경은 없다. `DELETE /users/42`는 한 번 호출하든 세 번 호출하든 사용자가 삭제된 상태로 남는다 (이후 호출은 404를 반환할 수 있지만, *상태*는 동일하다). 반면 `POST /users {name: \"Sam\"}`은 일반적으로 매번 새로운 레코드를 생성하므로, 두 번 호출하면 두 명의 사용자가 생긴다 — 멱등하지 않다.\n\n이것이 중요한 이유는 네트워크의 비신뢰성 때문이다. 클라이언트가 요청을 보내고 서버가 성공적으로 처리했지만, 응답이 돌아오는 길에 유실된다 — 연결 끊김, 타임아웃, 게이트웨이 오류 등. 클라이언트는 \"실패했다\"와 \"성공했지만 응답을 받지 못했다\"를 구분할 방법이 없으므로, 유일하게 안전한 조치는 재시도하는 것이다. 만약 연산이 멱등하다면, 재시도는 무해하다. 그렇지 않다면, 재시도는 중복 결제, 이중 배송, 또는 두 번째 계정 생성을 유발한다.\n\n이것이 결제 및 주문 API들이 본래 멱등하지 않은 연산에 멱등성을 추가하는 이유다. `POST`로 결제를 생성하면 재시도 시 보통 이중 결제가 되므로, Stripe 같은 API는 클라이언트가 **idempotency key**를 첨부하도록 허용한다 — 이는 클라이언트가 논리적 연산마다 생성하는 고유한 토큰이다. 서버는 첫 요청의 결과와 함께 이 키를 기록한다. 만약 동일한 키를 다시 보게 되면, 작업을 두 번째로 수행하는 대신 저장된 결과를 반환한다. 이제 클라이언트는 자유롭게 재시도할 수 있고 고객에게는 정확히 한 번만 요금이 청구된다.\n\n실질적인 이점:\n\n- **안전한 재시도** — 클라이언트(그리고 로드 밸런서, 작업 큐, 불안정한 연결의 모바일 앱)는 중복 부수 효과에 대한 두려움 없이 재시도할 수 있다.\n- **네트워크 장애에 대한 복원력** — \"요청이 성공했나?\" 하는 모호한 경우가 더는 위험하지 않게 된다.\n- **최소 한 번 전송이 사실상 한 번 전송이 됨** — 메시지 큐와 웹훅은 설계상 중복을 전달하는 경우가 많다. 멱등한 핸들러는 이를 데이터 손상이 아닌 올바른 처리로 만든다.\n- **더 간단한 오류 처리** — 호출자는 부분적인 실패를 조정하기 위한 별도의 로직이 필요 없다.\n\n명확히 해둘 두 가지 주의사항이 있다. 멱등성이 \"부수 효과 없음\"을 의미하는 것은 아니다 — `DELETE`는 분명히 무언가를 변경한다. 이는 그것을 *반복*해도 더 이상의 변경이 없다는 의미다. 그리고 이는 \"안전(safe)\"과도 구별된다: `GET`은 안전하고(전혀 수정하지 않음), `PUT`/`DELETE`는 멱등하지만 상태를 수정한다. 재시도가 발생할 수 있는 쓰기 엔드포인트를 설계할 때는, 어떻게 멱등성을 유지할지 신중하게 결정해야 한다 — 자연 키, 리소스 식별자를 키로 사용하는 업서트(upsert), 또는 클라이언트가 제공하는 멱등성 키를 사용하는 방법 등이 있다."},{"item":89,"id":"ACT2_curljson","cat":"ACT","question":"`curl`로 엔드포인트에 `JSON` 본문을 어떻게 `POST`하나요?","A":"콘텐츠 타입을 설정하기 위해 `-H`를, 본문을 위해 `-d`를 `-X POST`와 함께 사용하라:\n\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\": \"Ada\", \"role\": \"admin\"}'\n```\n\n몇 가지 실용적인 변형:\n\n**인라인 문자열 대신 파일 보내기** (`@` 접두사는 파일에서 읽고, `-`는 stdin에서 읽음):\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d @payload.json\n```\n\n**인증 헤더 추가하기** (JSON API에서 흔히 사용됨):\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $TOKEN\" \\\n  -d '{\"name\": \"Ada\"}'\n```\n\n알아둘 만한 참고사항:\n- `-d`는 이미 POST를 암시하므로 `-d`를 사용할 때 `-X POST`는 기술적으로 불필요하다 — 하지만 해롭지 않으며 의도를 명확하게 해준다.\n- 셸이 `$`를 확장하거나 내부의 큰따옴표로 인해 문제가 생기지 않도록 JSON을 작은따옴표로 감싸라. 본문 내에 셸 변수가 필요하다면, 바깥쪽을 큰따옴표로 바꾸고 내부 따옴표를 이스케이프하거나, `jq`와 같은 도구로 JSON을 생성하라.\n- `-d`는 개행 문자를 제거한다; 원본 본문이 바이트 단위로 정확히 필요하다면, `--data-raw`나 `--data-binary`를 사용하라.\n- 응답 헤더를 보려면 `-i`를 추가하고, 디버깅 시 전체 요청/응답 교환을 보려면 `-v`를 추가하라.","B":"curl로 JSON 본문을 POST하려면 세 가지가 필요합니다: `-X POST` 메서드(종종 선택 사항), `Content-Type: application/json` 헤더, 그리고 `-d`를 통한 본문입니다.\n\n## 기본 형식\n\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\": \"Ada\", \"role\": \"admin\"}'\n```\n\n- `-H \"Content-Type: application/json\"`은 서버에 본문이 JSON임을 알립니다. **이것을 건너뛰지 마세요** — 이것이 없으면 curl은 기본적으로 `application/x-www-form-urlencoded`를 사용하며 많은 서버가 본문을 잘못 파싱할 것입니다.\n- `-d`는 데이터를 보내고 암묵적으로 POST 요청으로 만듭니다, 따라서 `-X POST`는 기술적으로 여기서 중복되지만, 무해하며 명시적입니다.\n\n## 인라인 대신 JSON 파일 보내기\n\n`@`를 사용하여 파일에서 본문을 읽습니다 (셸 인용 부호 문제를 피할 수 있습니다):\n\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d @payload.json\n```\n\nstdin에서 본문을 읽으려면 `-d @-`를 사용하세요.\n\n## 유용한 변형\n\n```bash\n# Add an auth header\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $TOKEN\" \\\n  -d '{\"name\": \"Ada\"}'\n\n# See response headers + status (verbose-ish) and pretty-print with jq\ncurl -sS -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\": \"Ada\"}' | jq\n\n# Show the HTTP status code and fail the shell on 4xx/5xx\ncurl -fsS -w '\\n%{http_code}\\n' -X POST ... \n```\n\n## 인용 부호 팁\n\n- JSON을 **작은따옴표**로 감싸 셸이 `$`를 확장하지 않도록 하고, JSON 키/문자열에는 큰따옴표를 사용하세요.\n- JSON에 변수가 포함된 경우, 파일(`-d @file`)을 사용하거나 `jq -n`과 같은 도구로 빌드하여 이스케이프 버그를 피하세요:\n\n```bash\ncurl -X POST https://api.example.com/users \\\n  -H \"Content-Type: application/json\" \\\n  -d \"$(jq -n --arg name \"$NAME\" '{name: $name}')\"\n```\n\n한 가지 주의할 점: `-d`는 줄바꿈을 제거하지만 그 외에는 데이터를 원시 상태로 보냅니다. 본문을 *정확히* 있는 그대로 보내야 할 경우(JSON에서는 드묾), `@`가 파일 참조로 해석되는 것을 피하기 위해 `--data-raw`를 사용하세요.\n\n특정 엔드포인트나 다른 언어에 해당하는 예시가 필요하신가요?"},{"item":90,"id":"DEC_db","cat":"DEC","question":"집계 읽기가 많은 분석 대시보드의 경우, Postgres와 MongoDB 중 무엇을 선택해야 할까요?","A":"집계 읽기가 주를 이루는 분석 대시보드에는 **Postgres를 선택하라.** 여기서 중요한 거의 모든 측면에서 더 적합하다.\n\n## 이 워크로드에서 Postgres가 이기는 이유\n\n**집계는 Postgres의 주특기다.** `GROUP BY`, 윈도우 함수, `GROUPING SETS`/`ROLLUP`/`CUBE`, `FILTER` 절, CTE, 백분위수 — 모두 일급 기능이며 고도로 최적화되어 있다. MongoDB의 집계 파이프라인도 대부분을 할 수 있지만, 더 장황하고 최적화하기 어려우며, 어색한 한계에 부딪힐 것이다 (예: 다단계 `$group` + `$lookup` 조인).\n\n**조인.** 분석은 거의 항상 차원(사용자, 캠페인, 지역, 시간 버킷)별로 팩트를 나누는 것을 의미한다. Postgres는 이를 네이티브하고 효율적으로 수행한다. MongoDB에서 조인(`$lookup`)은 이급 기능이며 대규모에서는 느리다. 이는 비정규화로 이어지게 하는데, 차원 속성이 변경되어 수백만 개의 내장된 복사본을 다시 작성해야 할 때까지는 괜찮다.\n\n**읽기 중심 집계를 위한 인덱싱.** Postgres는 부분 인덱스, 표현식 인덱스, 커버링 인덱스(`INCLUDE`), 그리고 BRIN 인덱스(추가 전용 시계열에 탁월 — 작고 범위 스캔에 빠름)를 제공한다.\n\n**구체화된 뷰(Materialized views).** 비용이 많이 드는 롤업을 미리 계산하고 스케줄에 따라 새로고침한다 — 데이터 쓰기보다 읽기가 훨씬 많은 대시보드에 자연스럽게 들어맞는다.\n\n**SQL + 생태계.** 모든 BI 도구(Metabase, Superset, Tableau, Looker)는 SQL을 네이티브하게 사용한다. 분석가들이 직접 데이터를 다룰 수 있다.\n\n## MongoDB가 실제로 더 나은 선택일 경우\n- 문서가 진정으로 가변 스키마이거나 깊게 중첩되어 있고, 문서 간 집계를 거의 하지 않을 때.\n- 대시보드가 주로 키 기반 조회나 단순 필터링이며, 다차원 롤업이 아닐 때.\n- 운영 환경에서 이미 Mongo를 전적으로 사용하고 있으며 분석 부하가 가벼울 때.\n\n## 알아둘 만한 주의사항\n만약 '과도한 집계 읽기'가 **수십억 개의 행 또는 높은 동시성의 초 단위 응답 대시보드**를 의미한다면, 순수 Postgres는 힘겨워할 수 있지만, 해답은 Mongo가 아니라 여전히 Postgres 계열이다:\n- **TimescaleDB** (Postgres 확장) — 시계열을 위한 연속 집계 + 압축.\n- **컬럼 기반 엔진** — ClickHouse, DuckDB, 또는 웨어하우스(BigQuery/Snowflake/Redshift) — 진정한 OLAP 규모일 경우.\n\n대규모 집계 스캔에서는 컬럼 기반 스토리지가 행 기반 Postgres *그리고* 문서 기반 Mongo를 능가하므로, 극단적인 규모에서는 진정한 경쟁은 Postgres 대 컬럼 기반이지, Postgres 대 Mongo가 아니다.\n\n## 결론\n기본적으로 **Postgres**를 사용하라. 거기서 시작하고, 읽기 지연 시간이 문제가 되면 구체화된 뷰 / TimescaleDB를 추가하며, 수억에서 수십억 행을 넘어서는 경우에만 전용 컬럼 기반/OLAP 스토어로 넘어가라. MongoDB는 집계 중심 분석에 잘못된 기본 선택이다.\n\n당신의 특정 대시보드를 위한 스키마(스타 스키마 + 구체화된 롤업)를 스케치해 줄까?","B":"Postgres. 주된 워크로드가 과도한 집계 읽기인 분석 대시보드의 경우, Postgres가 더 강력한 기본 선택지입니다 — 그리고 그 차이가 특별히 작지도 않습니다.\n\n핵심적인 이유는 구조화되고 연관된 데이터에 대한 집계가 바로 컬럼 기반을 인지하는 비용 기반 SQL 엔진이 만들어진 목적이기 때문입니다. Postgres는 성숙한 `GROUP BY`/윈도우 함수/CTE, 조인과 집계를 최적화하는 실제 쿼리 플래너, 그리고 \"주별 지역별 매출 합계\"와 같은 대시보드 쿼리에 직접 매핑되는 풍부한 인덱싱 툴킷(B-tree, 부분, 표현식, 시간 범위용 BRIN, 그리고 커버링 인덱스)을 제공합니다. MongoDB는 집계 파이프라인을 통해 이를 수행할 수 있지만, 결국 SQL에서는 플래너가 대신 처리해주는 파이프라인 단계와 `$lookup` 조인을 직접 튜닝하게 됩니다.\n\n당신의 특정 사례에서 Postgres가 더 앞서 나가는 부분은 다음과 같습니다:\n\n- **Materialized view**는 비용이 많이 드는 롤업을 미리 계산하고 스케줄에 따라 새로고침할 수 있게 해줍니다 — 이는 종종 읽기 중심의 대시보드에서 가장 큰 단일 이점입니다.\n- **파티셔닝**(보통 시간 기준)은 데이터가 증가해도 집계 스캔 속도를 빠르게 유지합니다.\n- **분석을 위한 생태계가 더 깊습니다**: 바닐라 Postgres로 시작해서 나중에 쿼리 언어를 바꾸지 않고도 TimescaleDB(시계열 롤업, 연속 집계)나 Citus(스케일 아웃)로 확장할 수 있습니다. 만약 읽기가 결국 모든 것을 압도하게 된다면, ClickHouse나 DuckDB 같은 컬럼 기반 엔진이 자연스러운 다음 단계입니다 — 하지만 처음부터 그것으로 시작하는 것이 아니라, 성장하면서 그 단계에 이르게 됩니다.\n\nMongoDB는 당신의 워크로드와 정반대일 때 더 나은 선택입니다: 스키마가 유동적인 문서, 대량의 단일 문서 쓰기 및 포인트 조회, 또는 거의 항상 전체를 가져오는 깊게 중첩된 데이터의 경우입니다. 분석 대시보드는 일반적으로 꽤 규칙적이고 관계형 형태에 대해 읽기 중심입니다 — 여기서는 Mongo의 강점이 발휘되지 않으며, 집계의 편의성과 조인 관련 기능이 더 약합니다.\n\n답을 바꿀 수 있는 두 가지 주의사항이 있습니다: 만약 데이터가 정말로 스키마가 없거나 매우 중첩되어 있고 *그리고* 문서를 가로지르는 집계를 거의 하지 않는다면, Mongo가 다시 우위를 차지합니다. 그리고 만약 \"과도한 집계 읽기\"가 실제로는 대화형 지연 시간으로 쿼리당 수십억 개의 행을 스캔하는 것을 의미한다면, 어떤 범용 데이터베이스도 최종 상태는 아닙니다 — 대시보드 뒤에 전용 OLAP 저장소(ClickHouse, BigQuery, DuckDB)를 두게 될 것입니다. 일반적인 경우에는 Postgres로 시작하세요.\n\n대략적인 데이터 양, 수치가 얼마나 최신이어야 하는지, 그리고 스키마가 안정적인지 알려주시면, 인덱싱, materialized view, 또는 나중에 컬럼 기반 저장소가 필요할지에 대해 더 구체적으로 말씀드릴 수 있습니다."}];

function logC(n,k){let s=0;for(let j=1;j<=k;j++)s+=Math.log(n-k+j)-Math.log(j);return s;}
function binGE(k,n){let s=0;for(let j=k;j<=n;j++)s+=Math.exp(logC(n,j)+n*Math.log(0.5));return s;}
function bin2(k,n){return n?Math.min(1,k>=n/2?2*binGE(k,n):2*(1-binGE(k+1,n))):1;}

  <p>지어냄(없는 내용 발명): 순정쪽(A0) ${fA0} · fablever쪽(A1) ${fA1} · 없음 ${fN} ${fA1?`(A0/A1 = ${(fA0/fA1).toFixed(1)}배)`:''}</p>
  <h3>카테고리별 fablever 선호율</h3><table><tr><th>분류</th><th>선호율</th></tr>${cat}</table>
  <p><button id="exp2">채점결과 저장(human-score.json)</button></p>
  <small>A0 = 순정 Opus, A1 = fablever. 이 파일은 채점키를 내장해 자체 채점합니다(본인·지인 평가용). 제3자 완전블라인드 검증은 repo의 분리된 키를 쓰세요.</small>`;
 R.scrollIntoView();
 document.getElementById('exp2').onclick=()=>{const out={n,a1,winrate:n?a1/n:null,p,fab:{A0:fA0,A1:fA1,none:fN}};
  const b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='human-score.json';a.click();};
