<script>
const DATA = [{"item":1,"id":"DBG_dockerslow","cat":"DBG","question":"제 Docker 빌드가 코드를 변경할 때마다 정말 느립니다. 무엇을 먼저 해야 할까요?","A":"이 리포지토리에는 Dockerfile이 없으므로, 빌드가 있는 곳 어디에나 적용할 수 있는 구체적인 해결책을 알려드립니다.\n\n가장 먼저 할 일은 의존성 설치를 소스 복사와 분리하여 의존성을 위로 올리는 것입니다. '변경할 때마다 느려지는' 문제를 해결하는 순서는 다음과 같습니다 (Node 예시 — 어떤 생태계든 동일한 형태):\n\n```dockerfile\n# 1. Copy ONLY the dependency manifests first\nCOPY package.json package-lock.json ./\n\n# 2. Install deps — this layer is now cached until the manifests change\nRUN npm ci\n\n# 3. Copy source LAST\nCOPY . .\n\n# 4. Build\nRUN npm run build\n```\n\n이것이 작동하는 이유: Docker는 각 레이어를 캐시하고 해당 레이어의 입력이 변경될 때까지 재사용합니다. 만약 `COPY . .`가 설치 *전에* 오면, 모든 소스 수정이 그 아래 설치 레이어의 캐시를 무효화하므로, 매 빌드마다 모든 것을 재설치하게 됩니다. 매니페스트 파일만 먼저 복사함으로써, 비용이 많이 드는 `npm ci` / `pip install` / `go mod download` 레이어는 실제 의존성이 변경될 때만 다시 실행됩니다 — 코드 수정 시에는 즉시 재사용됩니다.\n\n1단계를 당신의 스택에 맞게 변환하세요: pip는 `requirements.txt`, Go는 `go.mod`/`go.sum`, Rust는 `Cargo.toml`/`Cargo.lock`, Maven은 `pom.xml`.\n\n이것을 먼저 하세요. 순서 한 번 바꾸는 것만으로 보통 변경당 시간의 대부분을 없애주기 때문입니다. 이후에도 여전히 느리다면, 다음 수단은 좋은 `.dockerignore` 파일(그래서 `COPY . .`가 `node_modules`, `.git`, 빌드 결과물을 끌어오지 않도록), 패키지 캐시에 `--mount=type=cache`를 사용하기 위한 BuildKit 활성화(`DOCKER_BUILDKIT=1`), 그리고 최종 이미지를 가볍게 유지하기 위한 다단계 빌드입니다 — 하지만 그것들을 시도하기 전에 순서 변경부터 해보세요.\n\n실제 Dockerfile을 붙여넣어 주시면, 옮겨야 할 정확한 줄을 알려드리겠습니다.","B":"이 리포지토리에는 Dockerfile이 없어서, 일반적인 답변을 드리겠습니다 — 하지만 이 조언은 \"코드를 변경할 때마다 느려지는\" 경우의 약 90%에 효과가 있습니다.\n\n## 가장 먼저 할 일: 레이어 캐시 순서 수정하기\n\n빌드가 *코드를 변경할 때마다* 느린 이유는 코드 복사 단계가 비용이 큰 단계(의존성 설치) **위에** 있기 때문입니다. 그래서 한 줄만 수정해도 그 아래에 있는 모든 것의 캐시가 무효화됩니다. Docker는 매번 설치를 다시 실행합니다.\n\n해결책은 의존성 명세 파일을 복사하고, 설치한 **다음**, 나머지 소스를 복사하는 것입니다:\n\n```dockerfile\n# ❌ 느림: 코드를 변경할 때마다 설치를 다시 실행\nCOPY . .\nRUN npm install\n\n# ✅ 빠름: 의존성이 변경될 때만 설치를 다시 실행\nCOPY package.json package-lock.json ./\nRUN npm install\nCOPY . .          # 코드 변경은 여기서부터 아래 캐시만 무효화\n```\n\n어떤 스택이든 동일한 패턴입니다 — `requirements.txt`/`poetry.lock` (pip), `go.mod`/`go.sum` (Go), `Gemfile.lock`, `Cargo.toml` 등. 락파일을 복사하고, 설치한 다음, 소스를 복사하세요.\n\n## 그 다음, 간단한 개선 두 가지\n\n1.  **`.dockerignore`를 추가하세요.** 이게 없으면 `COPY . .`가 `node_modules`, `.git`, 빌드 결과물, 그리고 로컬의 잡다한 파일들을 빌드 컨텍스트로 보내는데, 이는 전송 속도를 늦추고 캐시를 깨뜨립니다. 최소한 다음 내용은 포함하세요:\n    ```\n    node_modules\n    .git\n    dist\n    *.log\n    ```\n\n2.  **BuildKit이 켜져 있는지 확인하세요** (최신 Docker에서는 기본값이지만, 확인은 필요합니다). BuildKit은 병렬 스테이지와 더 나은 캐싱을 제공합니다: `DOCKER_BUILDKIT=1 docker build ...` 또는 Docker 데몬 설정에서 `\"features\": { \"buildkit\": true }`로 설정하세요.\n\n## 무엇을 고쳐야 할지 아는 법\n\n레이어들의 시간을 측정해서 실제로 무엇이 느린지 확인하세요:\n```bash\nDOCKER_BUILDKIT=1 docker build --progress=plain -t myapp . 2>&1 | grep -E 'DONE|CACHED'\n```\n코드를 변경하지 않았는데도 `CACHED` 대신 `DONE 45.3s`라고 나오는 단계가 범인입니다 — 그리고 거의 항상 소스 복사 아래에 있는 의존성 설치 단계가 문제입니다.\n\n---\n\nDockerfile을 붙여넣어 주시거나 (또는 Dockerfile이 있는 리포지토리를 알려주시면), 당신의 스택에 맞는 정확한 순서 변경을 알려드리겠습니다. 무엇을 빌드하고 계신가요 — Node, Python, Go, 아니면 다른 것인가요?"},{"item":2,"id":"REV2_await","cat":"REV","question":"이것을 검토하세요:\n\nasync function loadAll(ids) { const out = []; for (const id of ids) { out.push(await fetch(id)); } return out; }","A":"핵심 문제: **fetch가 병렬이 아니라 순차적으로 실행된다**는 점입니다.\n\n`await`가 루프 안에 있기 때문에, 각 `fetch(id)`는 다음 것을 시작하기 전에 이전 것이 완전히 resolve되기를 기다립니다. N개의 독립적인 요청에 대해, 총시간은 *최댓값* 대신 모든 지연 시간의 *합*이 됩니다. 이것은 거의 확실히 당신이 원하는 바가 아닐 것입니다.\n\n## 해결책\n\n```js\nasync function loadAll(ids) {\n  return Promise.all(ids.map(id => fetch(id)));\n}\n```\n\n이 코드는 모든 요청을 동시에 발생시키고 결과 배열에서 입력 순서를 보존합니다.\n\n## 부차적인 사항들\n\n1.  **오류 처리** — 원본 코드와 `Promise.all`은 요청 중 *하나라도* 실패하면 즉시 reject하여 성공한 결과들을 버립니다. 부분적인 결과를 원한다면 `Promise.allSettled`를 사용하십시오:\n    ```js\n    const results = await Promise.allSettled(ids.map(id => fetch(id)));\n    ```\n\n2.  **제한 없는 동시성** — `ids`가 클 수 있다면, `Promise.all`은 *모든* 연결을 한 번에 열어 서버에 과부하를 주거나 사용량 제한에 걸리게 할 수 있습니다. 큰 입력값에 대해서는 동시성을 제한하십시오 (예: `p-limit` 또는 청크 단위 배치 루프). 원래의 순차 코드는 우연히 이를 피했으므로, 실제로 어떤 동작이 필요한지 확인해야 합니다.\n\n3.  **`fetch`는 데이터가 아닌 `Response`를 반환합니다** — 이것이 전역 `fetch`라면, 호출자는 본문이 아닌 `Response` 객체를 받게 됩니다. 아마도 `r => fetch(id).then(r => r.json())` (그리고 상태 확인)을 원할 것입니다. 여기서 `fetch`가 직접 만든 래퍼라면 이 점은 무시하십시오.\n\n4.  **입력값 보호 부재** — `loadAll(undefined)`는 순회 시 오류를 발생시킵니다. 사소한 문제지만, 호출자가 nullish 값을 전달할 수 있다면 기본값(`ids = []`)을 설정할 가치가 있습니다.\n\n## 결론\n\n기능적으로는 올바르지만, 순차적 I/O는 \"이것들을 독립적으로 로드하라\"는 흔한 경우에 실제적인 성능 버그입니다. 한 줄짜리 `Promise.all` 재작성이 적용해야 할 변경 사항입니다 — 그런 다음 `ids`가 얼마나 커질 수 있는지에 따라 오류 처리 방식과 동시성 제한을 의식적으로 결정하십시오.\n\n한 가지 참고사항: 당신의 전역 설정은 diff 리뷰를 `adversarial-review` 스킬을 통해 라우팅합니다. 저는 이것이 repo/diff가 없는 단일 붙여넣기 스니펫이므로(이 디렉터리는 git repo가 아님) 인라인으로 검토했습니다 — 한 줄짜리 코드에 대해 전체 red→blue→purple 게이트를 실행하는 것은 과도할 것입니다. 그래도 해당 파이프라인을 통해 실행하기를 원하시면 말씀해주십시오.","B":"한 가지 진짜 문제는 루프 안의 `await`가 fetch를 직렬화한다는 점입니다. 각 반복은 다음 반복을 시작하기 전에 이전 `fetch`가 완전히 완료되기를 기다리므로, 총 지연 시간은 가장 느린 요청 하나가 아니라 모든 요청의 *합*이 됩니다. 100개의 id에 대해서는 필요 이상으로 100배 느려집니다.\n\n해결책 — 동시에 실행하고 함께 기다립니다:\n\n```js\nasync function loadAll(ids) {\n  return Promise.all(ids.map(id => fetch(id)));\n}\n```\n\n이것은 순서를 보존하므로(`Promise.all`은 어느 것이 먼저 완료되는지와 상관없이 입력 순서를 유지합니다), 결과는 병렬이라는 점을 제외하면 동일합니다.\n\n의도에 따라 결정해야 할 두 가지 사항이 있으며, 이는 그 자체로 버그는 아닙니다:\n\n- **실패 시 의미론.** `Promise.all`은 fetch 중 하나라도 실패하면 즉시 거부하고, 성공한 결과는 버립니다. 만약 \"성공한 것은 무엇이든 다 줘\"를 원한다면, 대신 `Promise.allSettled(...)`를 사용하고 결과를 나누세요.\n- **동시성 한도.** 완전한 병렬은 소수의 id에는 괜찮지만, 큰 목록에 대한 무제한 `map`은 모든 연결을 한 번에 열어 서버에 과부하를 주거나 속도 제한에 걸릴 수 있습니다. `ids`가 클 수 있다면, 배치로 처리하세요 (예: 한 번에 N개씩 풀로 묶기).\n\n만약 순차적 동작이 *의도된* 것이었다면 — 가령 각 요청이 이전 요청에 의존하거나, 의도적으로 스로틀링하는 경우 — 그렇다면 원본이 맞고 누락된 오류 처리만 살펴볼 가치가 있습니다. 하지만 코드 조각에는 그것을 암시하는 내용이 전혀 없으므로, 저는 직렬화를 버그로 간주하겠습니다."},{"item":3,"id":"EXP_gc","cat":"EXP","question":"JavaScript나 Go와 같은 언어에서 가비지 컬렉션은 어떻게 작동하는가?","A":"두 언어 모두 **도달 가능성(reachability)**을 추적하여 메모리를 자동으로 해제합니다. 객체는 프로그램이 \"루트(roots)\"(호출 스택, 전역 변수, 레지스터) 집합으로부터 참조를 따라 여전히 도달할 수 있는 동안 살아남습니다. 더 이상 도달할 수 없는 것은 쓰레기가 되어 회수됩니다. 핵심 아이디어는 \"쓰레기\"가 \"사용되지 않음\"을 의미하는 것이 아니라 \"도달할 수 없음\"을 의미한다는 것입니다. 다시는 건드리지 않을 무언가에 대한 참조를 여전히 가지고 있다면, 가비지 컬렉터는 그것을 계속 살려둡니다 (이것이 GC 언어에서 메모리 누수가 발생하는 일반적인 원인입니다).\n\n각 언어가 실제로 어떻게 하는지는 다음과 같습니다.\n\n## 핵심 알고리즘: mark-and-sweep\n\nV8(자바스크립트)과 Go 모두 **mark-and-sweep**을 기반으로 합니다:\n\n1.  **표시(Mark)** — 루트에서 시작하여 모든 참조를 순회하며, 도달 가능한 각 객체를 \"살아있음\"으로 표시합니다.\n2.  **수거(Sweep)** — 힙을 훑으며 표시되지 않은 것은 죽은 것으로 간주하고, 그 메모리를 재사용을 위해 할당자에게 반환합니다.\n\n이 알고리즘의 단순한 버전은 \"stop-the-world\"입니다. 컬렉터가 실행되는 동안 프로그램이 완전히 멈추므로, 순회 중간에 누구도 참조를 변경하지 못합니다. 현대 컬렉터의 모든 진화는 그 멈춤을 *피하는* 것에 관한 것입니다. (참조 카운팅 — 객체의 카운트가 0이 되는 순간 해제하는 것 — 은 또 다른 고전적인 접근 방식이지만, V8이나 Go 모두 이를 주된 메커니즘으로 사용하지 않습니다. 부분적으로는 참조 순환을 스스로 회수할 수 없기 때문입니다.)\n\n## 자바스크립트(V8): 세대별(generational)\n\nV8은 **세대 가설(generational hypothesis)**에 의존합니다. 대부분의 객체는 젊을 때 죽고(함수 내의 임시 객체, 루프의 중간값), 한동안 살아남은 객체는 계속 살아남는 경향이 있습니다. 그래서 힙을 나눕니다:\n\n-   **영 제너레이션(nursery)** — 작고, 빠른 *복사(copying)* 컬렉터(Scavenger)로 매우 자주 수집됩니다. 살아남은 객체는 두 번째 공간으로 복사되며, 몇 라운드를 살아남은 후에는 올드 제너레이션으로 승격됩니다. 죽은 영 객체는 개별적으로 해제되는 대신 그냥 버려지기 때문에, 너서리 수집은 비용이 저렴합니다.\n-   **올드 제너레이션** — 더 크고, mark-sweep과 가끔씩의 **압축(compaction)**(단편화를 막기 위해 살아있는 객체들을 함께 미는 것)으로 덜 자주 수집됩니다.\n\nV8은 또한 이 작업의 상당 부분을 **점진적으로(incrementally)**(코드와 번갈아 가며 작은 조각으로) 그리고 **동시적으로(concurrently)**(백그라운드 스레드에서) 수행하므로, 메인 스레드를 오랫동안 멈춰야 하는 경우가 거의 없습니다. 이는 자바스크립트의 메인 스레드가 UI 렌더링도 담당하기 때문에 중요합니다.\n\n## Go: 동시적, 비세대별(non-generational)\n\nGo의 컬렉터는 **동시적 3색 mark-and-sweep(concurrent tri-color mark-and-sweep)**이며, 무엇보다도 **낮은 지연 시간(low latency)**에 맞춰져 있습니다. 즉, 순수 처리량을 극대화하기보다는 멈춤 시간을 짧게(밀리초 미만) 유지합니다.\n\n-   **3색 마킹(Tri-color marking)** — 객체는 개념적으로 흰색(방문 안 함), 회색(방문했지만 자식은 아직 스캔 안 함), 또는 검은색(완전히 스캔함)입니다. 컬렉터는 회색 집합에 아무것도 남지 않을 때까지 작업하며, 여전히 흰색인 것은 쓰레기입니다. 이 색칠 방식 덕분에 표시(marking) 작업이 프로그램과 *동시적으로* 실행될 수 있습니다.\n-   **쓰기 장벽(Write barriers)** — 프로그램이 컬렉터가 표시 작업을 하는 *동안에도* 계속해서 포인터를 변경하기 때문에, Go는 포인터 쓰기 시 작은 코드 조각을 삽입합니다. 이 장벽은 검은색 객체가 흰색 객체를 가리키기 시작하는 경우를 포착하여, 살아있는 객체가 잘못 수집되는 것을 방지합니다. 이것이 동시성의 대가입니다.\n-   **비세대별(Non-generational)** — Go는 현재 객체 나이로 분리하지 않습니다. 대신, 컴파일 타임의 **탈출 분석(escape analysis)**을 통해 많은 단기 생존 객체를 **스택**에 배치합니다. 이 객체들은 함수가 반환될 때 비용 없이 해제되며 GC에 전혀 부담을 주지 않습니다. 이는 세대별 너서리의 필요성을 줄여줍니다.\n\n주로 `GOGC`(컬렉션을 트리거하기 전에 힙이 얼마나 커질지 — 높을수록 더 적고 더 큰 컬렉션을 의미)와 메모리 제한 손잡이를 통해 조정합니다.\n\n## 두 언어 모두가 관리하는 트레이드오프\n\n모든 컬렉터는 긴장 관계에 있는 세 가지, 즉 **멈춤 시간(pause time)**(지연 시간), **처리량(throughput)**(코드 실행 대비 수집에 사용되는 CPU), 그리고 **메모리 오버헤드(memory overhead)**(컬렉터가 효율적이려면 여유 공간이 필요함) 사이에서 균형을 맞춥니다. V8의 세대별 설계는 지연 시간에 민감한 메인 스레드에서 대부분 단기 생존 객체로 이루어진 워크로드의 처리량을 최적화합니다. Go는 꼬리 지연 시간(tail latency)이 가장 중요한 서버를 대상으로 하므로, 일관되게 짧은 멈춤 시간을 위해 의도적으로 일부 처리량과 메모리를 희생합니다. 둘 다 메모리가 쓰레기가 되는 즉시 해제하지 않습니다. 둘 다 죽은 객체가 쌓이도록 내버려 둔 다음 일괄적으로 회수하는데, 이는 일괄 처리가 자동 메모리 관리를 가치 있게 만들 만큼 저렴하게 만드는 방법이기 때문입니다.\n\n원하신다면, 쓰기 장벽, 탈출 분석, GC에도 불구하고 누수가 발생하는 방식, 또는 각 런타임에서 GC 추적을 읽는 방법 등 어느 한 부분에 대해 더 깊이 들어갈 수 있습니다.","B":"가비지 컬렉션(GC)은 자동 메모리 관리입니다: 런타임이 프로그램이 할당했지만 더 이상 사용할 수 없는 메모리를 회수하므로, `free()`를 수동으로 호출하지 않아도 됩니다. JavaScript와 Go는 모두 GC를 사용하지만, 설계가 다릅니다. 작동 방식은 다음과 같습니다.\n\n## 핵심 아이디어: 도달 가능성\n\nGC는 실제로 '가비지'를 추적하는 것이 아니라, 여전히 **도달 가능한** 것을 추적합니다. 컬렉터는 **루트**(전역 변수, 현재 호출 스택, CPU 레지스터) 집합에서 시작하여 도달할 수 있는 모든 포인터/참조를 따라갑니다. 도달 가능한 모든 것은 살아있고, 그 외의 모든 것은 가비지이며 해제될 수 있습니다.\n\n이것이 일반적인 경우에 참조 카운팅(객체를 가리키는 것의 수를 세는 것)만으로는 불충분한 이유입니다: 서로를 가리키는 두 객체는 다른 어떤 것도 참조하지 않을 때조차 영원히 0이 아닌 카운트를 유지하는 순환을 형성합니다. 도달 가능성 기반('추적') 컬렉터는 도달할 수 없는 순환은 루트에서 결코 방문되지 않기 때문에 순환을 자연스럽게 처리합니다.\n\n## Mark-and-sweep, 기본 알고리즘\n\n두 언어 모두 근본적으로 추적 컬렉터입니다:\n\n1.  **Mark** — 루트에서부터 객체 그래프를 순회하며 도달할 수 있는 모든 객체를 표시합니다.\n2.  **Sweep** — 힙을 스캔하여 표시되지 않은 모든 것을 회수합니다.\n\n단순한 버전은 **stop-the-world (STW)** 중단을 필요로 합니다 — 컬렉터가 실행되는 동안 모든 프로그램 스레드가 멈추므로, 그 아래에서 객체 그래프가 변경되지 않습니다. GC 엔지니어링의 전체 역사는 그 중단 시간을 줄이는 것에 관한 것입니다.\n\n## JavaScript (V8, Chrome/Node의 엔진)\n\nV8은 핵심적인 경험적 관찰('세대 가설')에 기반한 **세대별** 컬렉터를 사용합니다: **대부분의 객체는 일찍 죽는다**. 그래서 힙을 분할합니다:\n\n-   **Young generation (nursery)** — 새로운 객체가 할당되는 작은 공간. **Scavenger**라고 불리는 복사(copying) 컬렉터(Cheney 스타일의 semi-space 알고리즘)에 의해 매우 자주 수집됩니다. 이것은 살아남은 객체를 한쪽 절반('from-space')에서 다른 쪽('to-space')으로 복사합니다. 복사되지 않은 것은 죽은 것이고 from-space 전체가 한 번에 회수됩니다. 몇 번의 scavenge에서 살아남은 객체는 old generation으로 **승격**됩니다.\n-   **Old generation** — 더 크고, **mark-sweep-compact**로 덜 자주 수집됩니다. 압축(Compaction)은 살아있는 객체들을 함께 이동시켜 단편화(해제된 객체가 남긴 공간)를 해결합니다.\n\n긴 중단을 피하기 위해, V8(GC는 **Orinoco**라고 불림)은 다음과 같이 작동합니다:\n-   **Incremental** — 마킹(marking)이 작은 조각으로 나뉘어 프로그램 실행과 번갈아 수행됩니다.\n-   **Concurrent** — JS가 계속 실행되는 동안 마킹과 스위핑(sweeping)이 백그라운드 스레드에서 실행됩니다.\n-   **Parallel** — 여러 GC 스레드가 작업을 공유합니다.\n\n동시성 마킹이 실행되는 *동안* 프로그램이 객체를 변경하기 때문에, V8은 **쓰기 장벽(write barriers)**을 사용합니다: 컴파일러가 포인터 쓰기 주변에 삽입하는 작은 기록용 코드 조각으로, 이를 통해 GC는 이미 스캔된 객체에 대한 참조를 생성할 때 이를 인지하고 놓치지 않게 됩니다.\n\n## Go\n\nGo는 **동시성, 3색, mark-and-sweep** 컬렉터를 사용하며, 이는 **비세대별(non-generational)**이고 **이동하지 않는(non-moving)** 방식입니다 (객체는 재배치되지 않는데, 부분적으로는 Go가 내부 포인터를 가지고 있고 단순함과 낮은 지연 시간을 유지하기를 원하기 때문입니다).\n\n**3색 추상화**는 프로그램이 실행되는 동안 안전하게 마킹하는 방법입니다:\n-   **White** — 아직 방문하지 않음 (가비지 후보).\n-   **Grey** — 도달했지만, 그 자식들은 아직 스캔되지 않음.\n-   **Black** — 도달했고 완전히 스캔됨.\n\n컬렉터는 객체를 white → grey → black으로 이동시킵니다. 반드시 유지해야 하는 불변 조건은 다음과 같습니다: **어떤 black 객체도 white 객체를 가리켜서는 안 된다**, 단 그 white 객체가 어떤 grey 객체를 통해 도달 가능하지 않은 경우에 한해서. Go는 마킹 중에 **쓰기 장벽**으로 이를 강제합니다. 마킹이 끝나면, 여전히 white인 모든 것은 가비지이며 스윕됩니다 (스위핑도 지연/동시적으로 발생합니다).\n\nGo의 설계 우선순위는 **낮은 지연 시간**입니다 — 밀리초 미만의 STW 중단을 목표로 합니다. 쓰기 장벽을 켜고 마킹을 끝내기 위해 단 두 번만 잠시 세상을 멈추고, 마킹의 대부분을 동시적으로 수행합니다. 그 절충안은 더 많은 CPU를 사용하고 메모리를 압축하지 않는다는 것입니다.\n\n조정 손잡이:\n-   **`GOGC`** (기본값 100) — 마지막 수집 이후 힙이 100% 증가했을 때 다음 GC를 트리거합니다. 높을수록 = GC 빈도 감소, 메모리 사용량 증가; 낮을수록 = 빈도 증가, 메모리 감소.\n-   **`GOMEMLIMIT`** — 접근할수록 GC가 더 열심히 작동하게 만드는 소프트 메모리 상한선.\n\n## JavaScript vs. Go, 나란히 비교\n\n| | JavaScript (V8) | Go |\n|---|---|---|\n| 알고리즘 | 세대별 + mark-sweep-compact | 3색 mark-and-sweep |\n| 세대별? | 예 | 아니요 (단일 힙) |\n| 객체 이동? | 예 (복사 + 압축) | 아니요 |\n| 주된 목표 | 처리량 + 반응성 | 낮은 지연 시간 (짧은 중단) |\n| 동시성/점진적 | 예 | 예 |\n| 쓰기 장벽 | 예 | 예 |\n\n## 실용적인 결론\n\n-   **GC가 *언제* 실행될지는 제어할 수 없지만**, *얼마나 많은 일*을 할지에는 영향을 줄 수 있습니다. 더 적고 오래 사는 객체를 할당하고 불필요한 가비지를 피하는 것이 두 언어 모두에서 GC 부담을 줄여줍니다.\n-   **'메모리 누수'는 여전히 발생합니다** — 잊어버린 `free()` 때문이 아니라, 우발적인 도달 가능성 때문입니다: 전역 캐시, 제거되지 않은 이벤트 리스너, 또는 의도보다 더 많이 캡처하는 클로저가 객체를 계속 살아있게 만듭니다. GC는 여전히 도달 가능한 것을 해제할 수 없습니다.\n-   **Go에서는**, 버퍼 재사용(`sync.Pool`), 포인터보다 값 선호, 슬라이스 크기 미리 지정하기 같은 선택이 할당을 줄입니다. **JS에서는**, 빈번하게 실행되는 루프에서 객체를 재사용하고 오래 지속되는 구조체에 참조를 유지하지 않는 것(또는 GC 친화적인 참조를 원할 때 `WeakMap`/`WeakRef` 사용)이 도움이 됩니다.\n\n이 중 하나에 대해 더 깊이 들어가 볼까요 — 예를 들어, V8의 Scavenger 내부 구조, Go의 GC pacer, 또는 실제 세계의 누수를 진단하는 방법 같은 것들 말이죠?"},{"item":4,"id":"REV_trycatch","cat":"REV","question":"다음 오류 처리를 검토하라.\n\n```\ntry { await doWork(); } catch (e) { /* ignore */ }\n```","A":"이것은 전형적인 \"모든 것을 삼키는\" 안티패턴입니다. `try/await/catch` 메커니즘은 올바르지만, 빈 catch가 문제입니다. 무엇이 잘못되었고 어떻게 고쳐야 하는지 여기 설명합니다.\n\n## 문제점\n\n1.  **보이지 않는 실패.** 아무것도 기록되지 않으므로, 프로덕션에서 `doWork()`가 실패할 때 아무런 신호도 받지 못합니다. 실패가 흔적을 남기지 않기 때문에 디버깅은 추측이 됩니다.\n\n2.  **예상된 오류만이 아니라 *모든 것을* 잡습니다.** 오타로 인한 `TypeError`, 메모리 부족, 취소된 요청으로 인한 `AbortError` — 모두 사소한 네트워크 문제와 똑같이 조용히 버려집니다. 프로그래머의 버그는 드러나는 대신 숨겨집니다.\n\n3.  **제어 흐름이 거짓말을 합니다.** 작업이 성공한 것처럼 실행이 계속됩니다. `doWork()`의 부수 효과(행이 쓰여졌거나, 파일이 존재하거나, 상태가 변경되었음)가 발생했다고 가정하는 모든 후속 코드는 이제 잘못된 전제 위에서 실행됩니다.\n\n4.  **`e`가 포착되었지만 사용되지 않습니다** — 대부분의 린터(`no-unused-vars`, `no-empty`)는 어쨌든 이것을 지적할 것입니다.\n\n## 더 나은 선택지\n\n진정으로 실패를 용납하고 싶다면, **명시적으로 표현하고 흔적을 남기십시오**:\n\n```javascript\ntry {\n  await doWork();\n} catch (e) {\n  logger.warn('doWork failed, continuing', { error: e });\n}\n```\n\n오직 *특정* 실패만 허용된다면, 범위를 좁히고 나머지는 다시 던지십시오:\n\n```javascript\ntry {\n  await doWork();\n} catch (e) {\n  if (e.name !== 'NotFoundError') throw e;  // tolerate missing, surface everything else\n}\n```\n\n작업이 진정한 fire-and-forget이라면, 의도적으로 만들고 여전히 오류를 관찰하십시오:\n\n```javascript\nvoid doWork().catch(e => logger.warn('background doWork failed', { error: e }));\n```\n\n## 경험 법칙\n\n빈 catch는 **세 가지 모두**가 해당될 때만 정당화될 수 있습니다: 오류가 *예상되고*, *완전히 복구 가능하며*, *의도적으로 무시되는* 경우 — 그리고 그럴 때조차도 *왜* 안전한지 설명하는 한 줄 주석을 추가하십시오 (예: `// best-effort cache warm; stale cache is fine`). `/* ignore */`는 \"이것을 숨기고 있다\"는 뜻이지, \"이것은 건너뛰어도 안전하다\"는 뜻이 아닙니다. 그 정당성을 작성할 수 없다면, catch는 비워두어서는 안 됩니다.\n\n실제 인스턴스들을 분류할 수 있도록 이 패턴(비어 있거나 주석만 있는 catch 블록)에 대해 실제 코드베이스를 스캔해 드릴까요?","B":"이것은 모든 실패를 조용히 삼켜버립니다 — 그것이 핵심 문제이며, 거의 항상 여러분이 원하는 바가 아닙니다.\n\n실제로 잘못하는 점은 다음과 같습니다:\n\n- **실제 버그를 숨깁니다.** catch는 구별하지 않습니다. 오타로 인한 `TypeError`, null 역참조, 메모리 부족 — 모두 예상된 네트워크 문제처럼 똑같이 잡혀서 버려집니다. 무언가 잘못되었다는 신호를 잃게 됩니다.\n- **기록이 없습니다.** 아무것도 기록되지 않으면, 실패는 보이지 않습니다. 프로덕션에서 `doWork()`가 멈추면, 디버깅할 흔적이 없습니다.\n- **호출자에게 거짓말을 합니다.** 작업이 성공한 것처럼 블록을 지나 실행이 계속됩니다. `doWork()`의 효과에 의존하는 모든 코드는 이제 잘못된 가정 하에 실행되며, 그래서 실패는 나중에, 관련 없는 곳에서, 진단하기 훨씬 더 어렵게 드러납니다.\n\n비어있는 듯한 catch가 정당한 경우: 작업이 진정으로 최선 노력(best-effort) 방식이고 그 실패가 다운스트림에 아무런 변화를 주지 않을 때입니다 — 원격 측정, 캐시 워밍업, 중요하지 않은 정리 작업 같은 경우입니다. 그럴 때조차도 전면적으로 무시하기보다는 디버그 수준으로 로그를 남기고 잡는 대상을 좁혀야 합니다.\n\n더 방어적인 형태:\n\n```javascript\ntry {\n  await doWork();\n} catch (e) {\n  // 실패가 이 흐름에 정말로 치명적이지 않은 경우에만:\n  logger.warn(\"doWork failed; continuing\", { error: e });\n  // 그렇지 않으면: 다시 던지거나, 특정 예상 오류를 처리하고 나머지는 전파되도록 둡니다\n}\n```\n\n여러분이 실제로 내려야 할 결정은 이것입니다: 여기서의 실패가 복구 가능한가, 아닌가? 만약 그렇다면, *특정* 예상 오류를 처리하고 로그를 남기십시오. 만약 아니라면, 아예 잡지 마십시오 — 반응할 수 있는 누군가에게 전파되도록 두십시오. 비어있는 `/* ignore */`는 거의 항상 잘못된 유일한 선택지입니다, 왜냐하면 그것은 \"어느 쪽도 아닌\" 것을 선택하고 이에 대해 침묵하기 때문입니다.\n\n한 가지 주의할 점 — 만약 `e`가 사용되지 않고 린터가 이를 지적한다면, 최신 JS에서는 바인딩 없이 `catch {`라고 쓸 수 있습니다. 그것은 외관상의 문제일 뿐이며, 중요한 것은 위의 내용입니다."},{"item":5,"id":"DEC2_test","cat":"DEC","question":"새로운 TypeScript 프로젝트에 Jest 또는 Vitest?","A":"**Vitest.** 오늘날 새로 시작하는 TypeScript 프로젝트라면, 이것이 더 나은 기본 선택입니다.\n\n결정적인 요인들:\n\n- **TypeScript와 ESM이 별도 설정 없이 작동합니다.** Vitest는 테스트 파일을 앱과 동일한 Vite/esbuild 변환 파이프라인으로 실행하므로, `ts-jest`/`babel-jest` 설정, `transform` 블록, ESM을 위한 별도의 `tsconfig` 저글링이 없습니다. Jest는 여전히 트랜스포머가 필요하고 ESM 지원은 여전히 미흡한 부분으로 남아있습니다.\n- **속도.** esbuild 기반 변환과 스마트한 watch-mode 재실행은 내부 루프를 눈에 띄게 더 빠르게 만듭니다, 특히 더 큰 스위트에서 그렇습니다.\n- **Jest 호환 API.** `describe/it/expect`, 모의(mock), 스냅샷이 Jest를 거의 그대로 반영하므로, 멘탈 모델과 대부분의 기존 예제가 그대로 이전됩니다. 어느 방향으로든 마이그레이션 비용이 저렴합니다.\n- **내장 기능.** 커버리지(v8 또는 istanbul), UI 모드, 소스 내 테스팅, 벤치마킹이 기본으로 제공됩니다.\n\n구체적인 이유가 있을 때만 대신 **Jest**를 선택하세요: React Native 프로젝트에 있거나(RN/Metro 툴링은 Jest를 가정합니다), 성숙한 Jest 전용 플러그인에 의존하거나, 팀/모노레포가 이미 Jest로 표준화되어 있어 일관성이 이점보다 더 중요한 경우입니다.\n\n한 가지 실용적인 참고사항: 빌드 도구로 Vite를 사용한다면, Vitest는 앱과 하나의 설정 파일을 공유하는데, 이것이 가장 깔끔한 구성입니다. 만약 Vite를 전혀 사용하지 않는다면(예: 순수 `tsc` 라이브러리 또는 esbuild/tsup 빌드), Vitest는 여전히 독립적으로 잘 작동합니다 — 단지 Vite를 dev dependency로 가져올 뿐입니다.\n\nJest 레거시가 없는 신규 TS 프로젝트라면 Vitest를 선택하세요.","B":"새로운 TypeScript 프로젝트에는 **Vitest를 사용하라.** 이유는 다음과 같다:\n\n## 왜 Vitest인가\n\n**TypeScript와 ESM이 별도 설정 없이 바로 작동한다.** Vitest는 변환에 Vite/esbuild를 사용하므로 `.ts` 파일, ESM, 경로 별칭이 그냥 실행된다. Jest에서는 `ts-jest`나 `babel-jest`를 연결하고, `transform` 설정을 다루고, 아직 실험적 기능으로 표시된 ESM 지원과 씨름해야 한다.\n\n**속도.** Vitest는 esbuild 기반 변환으로 테스트를 병렬 실행하며, 정말 좋은 watch 모드(HMR 스타일 — 영향을 받는 테스트만 다시 실행)를 갖추고 있다. 대부분의 테스트 스위트에서 눈에 띄게 빠르다.\n\n**Jest 호환 API.** `describe`/`it`/`expect`, 모의(mock), 스냅샷 — 거의 모두 그대로 사용 가능하다. 멘탈 모델이 그대로 이전되며, 필요할 경우를 대비해 마이그레이션 가이드도 존재한다.\n\n**적은 설정.** 만약 당신(혹은 당신의 스택)이 이미 Vite를 사용한다면, 테스트는 하나의 `vite.config.ts`를 공유한다. Vite가 없더라도 설정은 최소한이다.\n\n## Jest가 여전히 합리적인 경우\n\n- **React Native** — 생태계가 여전히 Jest 중심이다.\n- **기존 Jest에 대한 큰 투자** — 커스텀 변환기, 특수 리포터, 깊은 `jest.mock` 사용. (당신의 경우는 아니다 — 이것은 새 프로젝트다.)\n- **조직 표준화** — 당신의 팀/CI가 이미 Jest를 의무화하고 있다.\n\n## 빠른 시작\n\n```bash\nnpm i -D vitest\n```\n\n```ts\n// vitest.config.ts\nimport { defineConfig } from 'vitest/config'\n\nexport default defineConfig({\n  test: {\n    globals: true,        // 선택 사항: import 없이 describe/it/expect 사용\n    environment: 'node',  // 또는 브라우저 유사 테스트를 위해 'jsdom' / 'happy-dom'\n  },\n})\n```\n\n```jsonc\n// package.json\n\"scripts\": {\n  \"test\": \"vitest\",            // watch 모드\n  \"test:run\": \"vitest run\",    // 단일 실행 (CI)\n  \"coverage\": \"vitest run --coverage\"\n}\n```\n\n**결론:** 새로 시작하는 TS 프로젝트의 경우, Vitest는 본질적으로 동일한 API로 더 나은 TS/ESM 사용 편의성과 속도를 제공한다 — React Native를 사용하거나 기존 Jest 설정에 제약이 있는 경우가 아니라면 그것을 선택하라."},{"item":6,"id":"DBG2_doublepost","cat":"DBG","question":"폼이 가끔 두 번 제출됩니다. 원인을 어떻게 추적하나요?","A":"좋은 소식입니다: 이 버그는 가장 진단하기 쉬운 버그 중 하나입니다. 요청의 *타이밍*과 *횟수*가 문제의 위치를 거의 정확하게 알려주기 때문입니다. 이 순서대로 진행하세요.\n\n## 1단계 — 분류: 요청이 두 번 전송되었는가, 아니면 한 번의 요청이 두 번 처리되었는가?\n\nDevTools → **Network 탭**을 열고, 문제를 재현한 후, 폼 엔드포인트로 가는 POST 요청 수를 세어보세요.\n\n- **HTTP 요청이 두 개** → **클라이언트 측** 문제입니다 (이중 발생). 2단계로 가세요.\n- **HTTP 요청은 한 개, 효과는 두 번** (DB에 두 개의 행, 이메일 두 통) → **서버 측** 문제입니다 (재시도 또는 미들웨어 재실행). 3단계로 가세요.\n\n이 관찰 하나만으로도 검색 범위의 절반을 제거할 수 있으니, 건너뛰지 마세요.\n\n## 2단계 — 클라이언트 측 이중 발생\n\nNetwork 탭에서 두 요청 사이의 **시간 간격**을 보세요 — 이것이 원인을 바로 가리킵니다:\n\n| 간격 | 유력한 원인 |\n|---|---|\n| **~50ms 미만, 거의 동시** | 리스너가 두 번 바인딩되었거나, JS 클릭 핸들러*와* 네이티브 폼 제출이 둘 다 발생함 |\n| **100–500ms** | 버튼 비활성화나 디바운스 없는 상태에서 더블 클릭 / Enter+클릭 |\n| **수 초 간격** | 클라이언트 재시도 로직, 또는 타임아웃으로 인한 두 번째 시도 발생 |\n\n원인을 찾으려면, 핸들러에 코드를 추가하세요:\n\n```js\nfunction onSubmit(e) {\n  console.count('submit-fired');\n  console.trace();        // 호출 스택을 보여줌 — 리스너가 하나인가, 두 개인가?\n  // ...\n}\n```\n\n- 상호작용당 `console.count`가 2씩 증가 → **리스너가 두 번 이상 연결됨**. SPA(정리(cleanup) 없이 리렌더링하며 리바인딩), HMR/Fast Refresh, 또는 개발 환경에서 React **StrictMode**가 이펙트를 이중 호출하는 경우에 매우 흔함. 리스너를 제거하거나 이펙트를 정리(clean up)하는지, 그리고 루프나 리렌더링 내부에서 바인딩하고 있지 않은지 확인하세요.\n- 두 개의 *다른* 스택 트레이스 → `onclick`/AJAX 핸들러**와** 네이티브 `<form>` 제출이 **둘 다** 발생하고 있음. 고전적인 해결책: 핸들러에서 `e.preventDefault()`를 호출하여 브라우저가 추가로 제출하지 않도록 함.\n- 동일한 핸들러가 빠르게 두 번 발생 → **버튼에 보호 장치가 없음**. 첫 제출 시 비활성화(`button.disabled = true`)하거나 디바운스를 적용하세요.\n\n## 3단계 — 서버 측 이중 처리 (요청은 한 번만 전송됨)\n\n- **느린 응답에 대한 클라이언트/프록시 재시도:** 서버가 느리면 `fetch`/axios 타임아웃, 로드 밸런서, 또는 서비스 워커가 재전송할 수 있음. axios 인터셉터, 재시도 라이브러리, SW `fetch` 핸들러를 확인하세요.\n- **미들웨어/라우트가 두 번 등록됨:** 핸들러의 가장 첫 부분에서 요청 ID를 로그로 남기세요 — 로그는 한 번 찍히지만 쓰기 작업이 두 번 실행된다면, 미들웨어나 훅이 이중으로 연결된 것입니다.\n- **새로고침/뒤로가기 시 폼 재-POST:** 브라우저가 POST를 다시 제출함. **Post/Redirect/Get** 패턴으로 해결하세요.\n\n## 4단계 — 추적하는 동안 재현 가능하게 만들기\n\n간헐적으로 발생하는 버그는 숨어버립니다. 조건을 강제로 만드세요:\n\n- **네트워크 속도 조절** (DevTools → Slow 3G). 대부분의 이중 제출은 응답이 충분히 느려서 두 번째 트리거가 끼어들 수 있을 때만 나타납니다.\n- **빠르게 더블 클릭**하고, **Enter 후 클릭**을 시도해보세요.\n- 개발 모드뿐만 아니라 **프로덕션 모드**에서 테스트하세요 — StrictMode/HMR 관련 문제는 프로덕션에서 사라지고, 실제 재시도가 나타납니다.\n\n## 영구적인 해결책\n\n원인이 무엇이든, 견고한 방어책은 **멱등성(idempotency)**입니다: 폼이 렌더링될 때 고유한 토큰(nonce)을 생성하고, 제출 시 함께 전송하며, 서버는 이미 본 토큰을 거부하도록 하세요. 그러면 두 번째 제출은 그 원인이 클라이언트 이중 발생이든, 재시도든, 새로고침이든 상관없이 아무런 작업을 수행하지 않게(no-op) 됩니다. 좋은 UX를 위해 첫 클릭 시 제출 버튼을 비활성화하는 것과 병행하세요.\n\n사용하는 스택(React/Vue/plain JS, 어떤 백엔드)과 Network 탭에 요청이 하나인지 두 개인지 알려주시면, 가장 유력한 원인과 해결책을 정확히 짚어드릴 수 있습니다.","B":"이 문제를 해결하는 가장 빠른 방법은 먼저 중복이 발생하는 지점을 이분법으로 찾는 것입니다: **브라우저 네트워크 탭을 열고, 재현한 뒤, 나가는 요청 수를 세어보세요.** 그 관찰 하나만으로 문제가 절반으로 나뉩니다.\n\n**브라우저에서 요청이 두 개 나감 → 클라이언트 측 문제입니다.** 흔한 원인들:\n\n- *핸들러가 두 번 바인딩된 경우.* 개발자 도구 콘솔에서 `getEventListeners(formEl)`(Chrome)을 실행해 보세요 — 만약 `submit`에 항목이 두 개 있다면, 무언가가 리스너를 두 번 이상 붙인 것입니다: 컴포넌트가 다시 마운트되거나, 핫 리로딩 잔여물이 남았거나, 스크립트가 두 번 포함된 경우입니다. React 18 StrictMode 또한 개발 환경에서만 이펙트/핸들러를 두 번 호출하므로, 프로덕션 빌드에서도 재현되는지 확인하세요.\n- *두 경로가 모두 제출하는 경우.* 폼 안에 있으면서 자체 `onClick`/`onSubmit`도 가지고 있는 `type=\"submit\"` 버튼이거나, `e.preventDefault()`를 잊어서 JS 요청이 발생하고 네이티브 폼도 전송되는 AJAX 제출의 경우입니다.\n- *실제 더블 클릭.* 느린 네트워크에서 사용자가 버튼이 비활성화되기 전에 두 번 탭하는 경우입니다. 단서: 한 번의 제스처에서 100–300ms 간격으로 두 개의 요청이 발생합니다.\n\n이것들을 구분하려면, 다른 무엇보다 먼저 핸들러에 코드를 심으세요:\n\n```js\nform.addEventListener('submit', (e) => {\n  console.log('submit', performance.now(), e.isTrusted);\n});\n```\n\n클릭 한 번당: 몇 ms 간격의 로그 두 개 = 이중 바인딩; 로그 한 개 = JS에서는 한 번 발생하지만 기본 동작이 방지되지 않음; 둘 중 하나에 `isTrusted: false` = 어딘가에서 합성/프로그래밍 방식의 제출이 있음. 두 번의 실제 클릭과 함께 더 큰 간격(>100ms) = 디바운스/비활성화 문제.\n\n**브라우저에서는 요청이 하나 나가지만 서버에는 두 개가 기록됨 → 서버 측 문제입니다.** `fetch`/`axios`의 재시도 설정(타임아웃 시 재시도 설정은 첫 응답이 느릴 경우 재전송합니다), 프록시나 로드 밸런서의 재시도, 서비스 워커의 재실행, 또는 엔드포인트 뒤에 큐가 있다면 최소 한 번 메시지 재전송 등을 살펴보세요.\n\n원인과 관계없이 추가할 만한 두 가지가 있는데, 진단에도 도움이 됩니다: 각 폼 렌더링 시 고유한 nonce를 찍어 제출과 함께 보내세요 — 두 요청의 nonce가 동일하면 같은 제스처가 중복된 것이고, nonce가 다르면 두 개의 진짜 제출입니다. 그리고 첫 제출 시 버튼을 비활성화하세요. 이는 더블 클릭 사례를 해결하고 바인딩/재시도 사례가 로그에 명확하게 드러나게 합니다.\n\n스택(바닐라 JS, React, 서버 프레임워크)을 알려주시거나 제출 코드를 붙여넣어 주시면, 제가 특정 줄을 짚어드릴 수 있습니다."},{"item":7,"id":"EXP2_bigo","cat":"EXP","question":"실제로 마주칠 만한 예시로 빅오 표기법을 설명하라.","A":"Big-O는 입력이 커짐에 따라 알고리즘의 비용이 어떻게 증가하는지를 설명한다. 상수와 작은 항들은 무시하고 지배적인 요소만 남기는데, 규모가 커질 때 중요한 것은 정확한 연산 횟수가 아니라 증가의 *모양*이기 때문이다. '비용'은 보통 시간(단계 수)이지만 메모리일 수도 있다.\n\n다음은 실제로 마주칠 수 있는 상황과 함께 흔한 각 클래스를 소개한다.\n\n**O(1) — 상수.** 작업량이 입력 크기에 의존하지 않는다. 해시 맵이나 딕셔너리에서 키를 찾거나, `array[5]`를 가져오는 경우다. 백만 개 요소의 딕셔너리와 열 개 요소의 딕셔너리에서 키 하나를 읽는 데는 동일한 시간이 걸린다.\n\n```python\nuser = users_by_id[user_id]   # 사용자 수에 상관없이 동일한 속도\n```\n\n**O(log n) — 로그.** 각 단계에서 남은 데이터의 절반을 버린다. 정렬된 리스트에서의 이진 탐색, 대부분의 데이터베이스 인덱스 조회(B-trees)가 그렇다. 데이터가 두 배로 늘어나도 단계는 하나만 추가된다. 정렬된 항목 100만 개를 검색하는 데 약 20번의 비교가, 10억 개는 약 30번의 비교가 필요하다. 이것이 테이블이 커져도 인덱싱된 쿼리가 빠른 속도를 유지하는 이유다.\n\n**O(n) — 선형.** 각 항목을 한 번씩 거친다. 리스트 합산, 최댓값 찾기, 데이터에 대한 단일 `for` 루프, 또는 배열 필터링이 해당된다. 데이터가 열 배면, 시간도 열 배다.\n\n```python\ntotal = sum(order.amount for order in orders)   # 한 번 순회\n```\n\n**O(n log n) — 선형 로그.** 범용 정렬에 있어 현실적인 하한선이다. 파이썬의 `sorted()`, 자바스크립트의 `Array.sort()`, 병합 정렬(merge sort), 퀵 정렬(quicksort)이 있다. 큰 리스트에 대해 정렬을 호출할 때 당신이 지불하는 비용이다. 선형보다 약간 더 나쁠 뿐이라 저렴한 것으로 간주된다.\n\n**O(n²) — 제곱.** 동일한 데이터에 대한 중첩 루프. 즉, 각 항목에 대해 다른 모든 항목을 스캔한다. 이것이 당신을 조용히 죽이는 주범이다. 고전적인 함정: 모든 쌍을 비교하여 중복을 확인하는 것이다.\n\n```python\n# O(n²) — 느림: 항목 10,000개 = 비교 100,000,000번\nfor a in items:\n    for b in items:\n        if a is not b and a == b: ...\n```\n\n테스트 환경의 항목 100개에서는 잘 실행되다가 운영 환경의 50,000개에서는 멈춰버린다. 해결책은 거의 항상 해시 셋(hash set)을 사용해 시간과 메모리를 맞바꾸는 것이다:\n\n```python\n# O(n) — set을 사용해 한 번 순회\nseen = set()\nfor x in items:\n    if x in seen: ...   # set에 대한 'in' 연산은 O(1)\n    seen.add(x)\n```\n\n이러한 전환, 즉 중첩 루프를 set/dict 조회로 바꾸는 것이 현실 세계에서 가장 흔한 Big-O 최적화다.\n\n**O(2ⁿ)와 O(n!) — 지수 / 팩토리얼.** 모든 조합을 시도하는 것이다. 단순한 재귀 피보나치, 모든 부분 집합에 대한 무차별 대입(brute-forcing), 또는 한 경로의 모든 순열을 생성하는 것 등이 있다. 이것들은 아주 작은 입력(n=40이면 이미 수십억 단계)을 넘어서면 사용할 수 없다. 이런 경우를 본다면, 더 똑똑한 알고리즘(캐싱, 동적 프로그래밍)이나 근사치가 필요하다.\n\n사람들이 잘못 아는 두 가지:\n\nBig-O는 *성장률*에 관한 것이지 절대적인 속도가 아니다. 항목당 작업이 무거운 O(n) 알고리즘은 작은 입력에서는 O(n²) 알고리즘에 질 수 있다. Big-O는 입력이 커질 때 누가 이기는지를 알려주는데, 이는 쉽게 테스트할 수 없는 경우다.\n\n숨겨진 비용을 조심하라. `if x in my_list`는 리스트를 스캔하기 때문에 O(n)이다. 이것을 루프 안에 넣으면 자신도 모르게 O(n²)을 만든 셈이다. set이나 dict에 대한 동일한 확인은 O(1)이다. 우발적인 성능 저하의 상당수는 다른 루프 안에 숨어있는 선형 연산 때문이다.\n\n실용적인 결론: 동일한 대규모 데이터셋에 대한 중첩 루프는 해시 맵을 사용하라는 신호이며, 인덱싱/정렬된 조회는 데이터가 증가해도 속도를 빠르게 유지하는 비결이다.","B":"# Big-O 표기법\n\nBig-O는 **입력이 커짐에 따라 알고리즘의 비용이 어떻게 증가하는지**를 설명한다. 상수와 작은 항들은 버리고 지배적인 요인만 남긴다 — 왜냐하면 중요한 것은 `n`이 커질 때의 곡선 형태이지, 작은 입력에 대해 3ms가 걸리는지 5ms가 걸리는지가 아니기 때문이다.\n\n멘탈 모델: *\"입력을 10배로 늘리면, 작업량은 어떻게 될까?\"*\n\n---\n\n## 일반적인 것들, 좋은 순서에서 나쁜 순서로\n\n### O(1) — 상수\n작업량이 입력 크기에 의존하지 않는다. 10개 항목이든 1,000만 개 항목이든 비용이 동일하다.\n\n```python\nusers[0]              # 배열 인덱스\ncache[key]            # dict/해시맵 조회\nlen(my_list)          # 파이썬은 길이를 추적하며, 세지 않음\nstack.append(x)       # 리스트 끝에 push\n```\n**마주치는 경우:** 해시 맵 조회가 대표적이다. 이것이 리스트를 스캔하는 대신 `dict`/`Set`을 사용하는 *이유*다.\n\n### O(log n) — 로그\n각 단계에서 남은 작업의 절반을 버린다. 입력을 두 배로 늘려도 *한* 단계만 추가될 뿐이다.\n\n```python\n# 정렬된 리스트에서의 이진 탐색\nbisect.bisect_left(sorted_prices, target)\n```\n**마주치는 경우:** 이진 탐색, 균형 트리 연산, 그리고 데이터베이스의 **B-트리 인덱스 조회**. 컬럼에 인덱스가 있어 쿼리가 빠른 경우 — 그것이 n 대신 log n인 경우다.\n\n### O(n) — 선형\n각 항목을 한 번씩 본다.\n\n```python\ntotal = sum(transactions)            # 한 번의 패스\nif \"admin\" in users_list:            # 찾을 때까지 리스트 스캔  ← 주의: set이 아닌 list\nmax_price = max(products)\nfor line in open(\"file.txt\"): ...    # 파일 읽기\n```\n**마주치는 경우:** 데이터에 대한 단일 루프. 보통 괜찮고 종종 피할 수 없다 — 데이터를 처리하려면 읽어야 하기 때문이다.\n\n### O(n log n) — \"좋은 정렬\"\n선형 작업을 log-n 번 수행한다. **이것이 범용 정렬의 실질적인 하한선이다.**\n\n```python\nsorted(orders, key=lambda o: o.date)   # 파이썬의 Timsort\ndf.sort_values(\"revenue\")              # pandas\n```\n**마주치는 경우:** 호출하는 모든 `.sort()`. 좋은 소식은 — 만약 당신의 알고리즘이 정렬에 의해 지배된다면, 상태가 아주 좋은 것이다.\n\n### O(n²) — 이차 ⚠️\n각 항목에 대해, 다른 모든 항목과 관련된 작업을 수행한다. **이것이 바로 전형적인 \"개발 환경에서는 잘 됐는데, 프로덕션에서는 죽는\" 버그다.** 동일한 데이터에 대한 중첩 루프.\n\n```python\n# 중복 이메일 찾기 — 느린 방식\nfor i in range(len(users)):\n    for j in range(len(users)):\n        if i != j and users[i].email == users[j].email:\n            ...\n```\n사용자 100명 → 비교 10,000번. 사용자 10,000명 → **100,000,000**번. 해결책은 거의 항상 해시 셋이다:\n\n```python\n# O(n) 버전\nseen = set()\nfor u in users:\n    if u.email in seen: ...        # O(1) 멤버십 확인\n    seen.add(u.email)\n```\n\n더 교묘한 버전 — 깔끔해 보이는 코드 뒤에 숨어있는 **우발적인 O(n²)**:\n\n```python\nresult = []\nfor item in items:\n    if item not in result:   # LIST에 대한 `in`은 O(n) → 전체는 O(n²)\n        result.append(item)\n```\n\n### O(2ⁿ) / O(n!) — 지수 / 팩토리얼 💀\n요소가 하나 추가될 때마다 비용이 대략 두 배(또는 그 이상)가 된다. 아주 작은 `n`에 대해서만 실행 가능하다.\n\n```python\n# 순진한 재귀적 피보나치 — 모든 것을 재계산함\ndef fib(n):\n    return n if n < 2 else fib(n-1) + fib(n-2)\n```\n**마주치는 경우:** 모든 부분집합/순열에 대한 브루트포스, 메모이제이션 없는 순진한 재귀, 외판원 문제를 완전 탐색으로 푸는 경우. `fib(50)`은 당신의 컴퓨터를 멈추게 할 것이다; 캐시를 추가하면 O(n)이 된다.\n\n---\n\n## 실제로는 어떻게 느껴지는가\n\n구체적인 연산 횟수는 곡선을 직관적으로 느끼게 해준다:\n\n| n | O(1) | O(log n) | O(n) | O(n log n) | O(n²) |\n|------|------|----------|---------|------------|----------------|\n| 10 | 1 | 3 | 10 | 33 | 100 |\n| 1,000 | 1 | 10 | 1,000 | 10,000 | 1,000,000 |\n| 1,000,000 | 1 | 20 | 1,000,000 | 20,000,000 | **1,000,000,000,000** |\n\n저 마지막 칸이 O(n²)이 100개 행에 대한 테스트는 조용히 통과하고 실제 데이터셋에서는 무너지는 이유다.\n\n---\n\n## 사람들이 잘못 아는 것들\n\n- **속도가 아니라 증가율에 관한 것이다.** O(n²) 알고리즘이 작은 입력에서는 (상수가 더 작아서) O(n) 알고리즘을 이길 수 있다. Big-O는 *결국* 누가 이기는지만을 말해준다.\n- **상수는 의도적으로 버려진다.** 두 개의 루프를 연달아 실행하는 것은 `O(2n)` = **O(n)**이다. Big-O는 정확한 횟수가 아니라 곡선의 모양에 관한 것이다.\n- **최악의 경우 vs. 평균.** 해시 조회는 *평균* O(1)이지만 최악의 경우(모두 충돌) O(n)이다. 퀵소트는 평균 O(n log n), 최악 O(n²)이다. 대표적인 숫자는 보통 평균/일반적인 경우다.\n- **\"순진해 보이는\" 호출에 숨겨진 비용을 조심하라.** `x in a_list`는 O(n)이다. `x in a_set`은 O(1)이다. 같은 문법이지만, 스케일링은 엄청나게 다르다 — 이것이 실제 세계에서 가장 흔한 단일 함정이다.\n\n---\n\n## 실용적인 결론\n\n규모가 커졌을 때 무언가 느리다면, 먼저 이 두 가지 패턴을 찾아보라:\n1. **동일한 데이터에 대한 중첩 루프** → 해시 맵으로 바꿀 수 있는가? (n² → n)\n2. **루프 안에서 리스트에 대한 멤버십 테스트 (`in`)** → `set`으로 만들어라. (n² → n)\n\n이 두 가지 수정이 당신이 실제로 마주칠 \"이게 왜 이렇게 느리지\" 하는 순간의 대다수를 해결해 준다.\n\n특정 사례를 더 파고들어 볼까요 — 당신이 가진 코드의 복잡도를 분석하거나, 이것이 데이터베이스 쿼리 / pandas / 특정 언어에서 어떻게 나타나는지요?"},{"item":8,"id":"EXP2_rest","cat":"EXP","question":"무엇이 실제로 API를 'RESTful'하게 만드는지 설명하라.","A":"좋은 질문입니다 — 그리고 '실제로(actually)'라는 단어가 핵심입니다. 왜냐하면 사람들이 'RESTful'이라고 부르는 대부분의 API는 원래 정의에 따르면 그렇지 않기 때문입니다.\n\n## 짧은 버전\n\nREST는 Roy Fielding이 2000년 박사 학위 논문에서 정의한 **아키텍처 스타일**입니다. API는 특정 **제약 조건** 집합을 만족할 때 RESTful합니다 — 단순히 HTTP 동사를 사용하고 보기 좋은 URL에서 JSON을 반환한다고 해서가 아닙니다. 그러한 일반적인 해석은 더 정확하게는 'HTTP API' 또는 'JSON-RPC-ish' API라고 불립니다.\n\n## 실제로 REST를 정의하는 제약 조건들\n\nREST는 이들의 총합입니다. 하나라도 빠지면 REST가 아닙니다.\n\n1.  **클라이언트-서버** — 관심사의 분리. UI/클라이언트는 데이터 저장소/서버와 분리되어 각각 독립적으로 발전할 수 있습니다.\n\n2.  **무상태성(Statelessness)** — 모든 요청은 처리에 필요한 모든 것을 포함합니다. 서버는 요청 간에 클라이언트 세션 상태를 저장하지 않습니다. (인증 토큰은 각 요청에 포함되며, 서버는 당신이 작업 중이라는 것을 '기억'하지 않습니다.)\n\n3.  **캐시 가능성(Cacheability)** — 응답은 캐시 가능한지 여부를 명시적으로 밝혀야 합니다. 이것이 HTTP 캐싱 시맨틱(`Cache-Control`, `ETag`)이 중요한 이유입니다.\n\n4.  **계층화된 시스템(Layered system)** — 클라이언트는 원본 서버와 통신하는지, 아니면 중간 매체(프록시, 로드 밸런서, 게이트웨이)와 통신하는지 알 수 없습니다. 이를 통해 확장 및 보안 계층을 투명하게 추가할 수 있습니다.\n\n5.  **균일한 인터페이스(Uniform interface)** — *이것이 가장 중요하며*, 네 가지 하위 요소로 구성됩니다:\n    -   **리소스 식별** — 리소스는 URI(`/users/42`)를 통해 이름이 지정됩니다.\n    -   **표현을 통한 조작** — 리소스 자체가 아닌 리소스의 *표현*(예: JSON 문서)에 대해 동작합니다.\n    -   **자기 서술적 메시지** — 각 메시지는 자신을 처리하기에 충분한 정보(메서드, 미디어 타입 등)를 담고 있습니다.\n    -   **HATEOAS** (Hypermedia As The Engine Of Application State) — 거의 모든 사람이 건너뛰는 부분입니다. ⬇️\n\n6.  **주문형 코드(Code-on-demand)** *(선택 사항)* — 서버는 클라이언트에 실행 가능한 코드(예: JavaScript)를 보낼 수 있습니다. 유일한 선택적 제약 조건입니다.\n\n## 모두가 무시하는 부분: HATEOAS\n\n이것이 'RESTful' API를 일반적인 HTTP API와 *실제로* 구분하는 것입니다. 아이디어는 이렇습니다: **클라이언트는 사전에 URL을 알지 못한 채 웹사이트를 탐색하는 것과 같은 방식으로, 순전히 서버가 응답으로 제공하는 하이퍼링크를 따라 애플리케이션을 탐색합니다**.\n\n진정으로 RESTful한 응답은 *다음에 무엇을 할 수 있는지*에 대해 자기 서술적입니다:\n\n```json\n{\n  \"id\": 42,\n  \"status\": \"pending\",\n  \"total\": 99.50,\n  \"_links\": {\n    \"self\":   { \"href\": \"/orders/42\" },\n    \"cancel\": { \"href\": \"/orders/42/cancel\", \"method\": \"POST\" },\n    \"pay\":    { \"href\": \"/orders/42/payment\", \"method\": \"POST\" }\n  }\n}\n```\n\n클라이언트는 `/orders/42/cancel`를 하드코딩해서는 안 됩니다. 응답으로부터 그것을 발견해야 합니다. 이는 서버가 클라이언트를 망가뜨리지 않고 URI 구조를 변경할 수 있음을 의미합니다 — 이것이 바로 이 제약 조건의 핵심입니다.\n\n## 그렇다면 왜 모든 곳의 \"REST API\"가 이것을 위반할까요?\n\n왜냐하면 Fielding이 정의한 순수한 REST는 일반적인 기계 대 기계 API에 있어서 **어렵고 종종 그럴 만한 가치가 없기** 때문입니다:\n\n-   클라이언트는 일반적인 하이퍼미디어 에이전트가 아니라 문서를 읽는 개발자에 의해 작성되므로, HATEOAS의 발견 가능성은 거의 이점이 없습니다.\n-   양쪽 끝을 모두 제어할 때는 알려진 URI에 대한 강한 결합이 허용됩니다.\n\nFielding 자신도 이것에 대해 불평했습니다 — 그가 API는 하이퍼텍스트 기반이 아니면 REST가 아니라고 말한 [유명한 2008년 블로그 게시물](https://roy.gbiv.com/untangle/2008/rest-apis-must-be-hypertext-driven)이 있습니다.\n\n## 현실적인 결론\n\nAPI가 실제로 얼마나 'RESTful'한지를 보여주는 성숙도 스펙트럼(**Richardson 성숙도 모델**)이 있습니다:\n\n| 레벨 | 내용 |\n|-------|-------------|\n| 0 | HTTP를 터널로 사용 (하나의 엔드포인트, 모든 것을 POST) — \"POX의 늪\" |\n| 1 | 리소스 (개체별로 고유한 URI) |\n| 2 | HTTP 동사 + 상태 코드를 올바르게 사용 (GET/POST/PUT/DELETE, 200/404/201) |\n| 3 | 하이퍼미디어 컨트롤 (HATEOAS) — *진정한 REST* |\n\n**실제 사용되는 대부분의 \"REST API\"는 레벨 2입니다.** 이는 보통 완벽하게 합리적인 엔지니어링 선택입니다 — 다만 업계에서 사용하는 'RESTful'과 Fielding이 정의한 'RESTful'이 다르다는 것만 알아두세요. 레벨 2 API를 'RESTful'이라고 부르는 것은 모두가 동의한 편리한 거짓말입니다.\n\n이 중 어떤 것에 대해 더 깊이 들어가 볼까요 — 예를 들어, 무상태성이 인증과 어떻게 상호 작용하는지, 또는 HAL이나 JSON:API와 같은 실제 HATEOAS 형식은 어떤 모습인지 같은 것들 말입니다.","B":"API를 RESTful하게 만드는 것은 `/users/123`에 HTTP 동사와 JSON을 사용하는 것이 아니다 — 그것은 널리 알려진 체크리스트일 뿐이며, 원래 정의에 따르면 대부분 핵심에서 벗어난다. REST는 Roy Fielding이 2000년 박사 논문에서 일련의 *제약 조건*으로 정의한 아키텍처 스타일이다. API는 이 제약 조건을 만족하는 만큼 RESTful하며, 거의 모두가 건너뛰는 한 가지는 Fielding이 협상 불가능하다고 여겼던 것이다.\n\n## 실제 제약 조건\n\n**1. 클라이언트-서버 분리.** 클라이언트(UI 관련)와 서버(데이터/저장소 관련)는 독립적으로 발전하며, 오직 균일한 인터페이스를 통해서만 통신한다. 거의 모두가 이를 따른다.\n\n**2. 무상태성(Statelessness).** 모든 요청은 서버가 그 요청을 처리하는 데 필요한 모든 것을 담고 있다. 서버는 요청 간에 클라이언트 세션 상태를 유지하지 않는다. 이것이 REST가 확장하기 좋은 이유이며 — 어떤 서버든 어떤 요청이든 처리할 수 있다 — 또한 서버 측 세션에 로그인 상태를 두는 것이 엄밀히 말해 위반인 이유다. (각 요청에 전송되는 인증 토큰은 괜찮다; 이는 요청을 독립적으로 만든다.)\n\n**3. 캐시 가능성(Cacheability).** 응답은 스스로 캐시 가능 여부를 명시해야 한다(`Cache-Control`, `ETag` 같은 헤더를 통해). 앱뿐만 아니라 프로토콜도 캐싱에 참여한다.\n\n**4. 균일한 인터페이스(Uniform interface).** 이것이 REST의 핵심이며, 네 가지 하위 요소로 구성된다:\n- **리소스 식별** — URI는 행위가 아닌 *리소스*(사용자, 주문)의 이름을 지정한다. `/getUser?id=123`이 아닌 `/users/123`이다.\n- **표현을 통한 조작** — 리소스에 직접 행위를 가하는 것이 아니라, 리소스의 표현을 교환한다 (GET으로 받은 JSON은 상태의 표현이며, 이를 수정하여 다시 PUT할 수 있다).\n- **자기 서술적 메시지** — 각 메시지는 자신을 처리하기에 충분한 정보를 담고 있다: 메서드의 의미, 미디어 타입(`Content-Type`), 캐싱 지시어 등. 요청을 읽는 서버는 대역 외(out-of-band) 지식이 필요 없어야 한다.\n- **HATEOAS** (Hypermedia as the Engine of Application State) — 응답은 클라이언트가 다음에 무엇을 할 수 있는지 알려주는 링크를 포함한다. 클라이언트는 외워둔 URL을 입력하는 대신 링크를 클릭하여 웹사이트를 탐색하는 것과 같은 방식으로, 서버가 제공하는 링크를 따라 API를 탐색한다.\n\n**5. 계층형 시스템(Layered system).** 클라이언트는 자신이 원 서버와 통신하는지, 아니면 중간 서버(프록시, 게이트웨이, CDN)와 통신하는지 알 수 없다. 이를 통해 로드 밸런서와 캐시를 투명하게 삽입할 수 있다.\n\n**6. 주문형 코드(Code-on-demand)** (선택 사항) — 서버가 클라이언트에 실행 가능한 코드(예: JavaScript)를 보낼 수 있다. 유일한 선택적 제약 조건이다.\n\n## 모두가 건너뛰는 부분, 그리고 그것이 중요한 이유\n\n유행어 \"REST\"와 아키텍처로서의 REST를 구분하는 제약 조건은 **HATEOAS**이다. Fielding은 이 점에 대해 명확하고 다소 짜증 섞인 태도를 보였다: 만약 API 문서가 클라이언트에게 특정 리소스에 대한 URI를 어떻게 구성해야 하는지 알려준다면, 그것은 REST가 아니라 HTTP 동사로 치장한 RPC일 뿐이다.\n\n진정으로 RESTful한 API에서 클라이언트는 단 하나의 진입 URI만 안다. 그 외 모든 것 — 어떤 작업을 할 수 있는지, 다음에는 어디로 가야 하는지 — 은 응답에 담긴 하이퍼미디어 링크로부터 온다:\n\n```json\n{\n  \"id\": 123,\n  \"status\": \"pending\",\n  \"_links\": {\n    \"self\":   { \"href\": \"/orders/123\" },\n    \"cancel\": { \"href\": \"/orders/123/cancel\", \"method\": \"POST\" },\n    \"pay\":    { \"href\": \"/orders/123/payment\", \"method\": \"POST\" }\n  }\n}\n```\n\n클라이언트는 \"취소하려면 `/orders/{id}/cancel`에 POST하라\"고 하드코딩하지 않는다. 클라이언트는 `cancel` 링크를 찾는다. 만약 주문을 취소할 수 없다면 서버는 그 링크를 생략하며, 서버는 나중에 클라이언트를 망가뜨리지 않고 엔드포인트를 옮길 수 있다. 바로 그 디커플링 — 서버가 제공하는 상태 전환에 따라 움직이는 클라이언트 — 이 이름의 핵심이다: \"상태 전송(state transfer)\"이 바로 여기서 유래했다.\n\n## 솔직하고 현실적인 답변\n\n이 정의에 따르면 거의 모든 유명 \"REST API\"(GitHub, Stripe, Twitter)는 완전히 RESTful하지 않다 — 이들은 보통 Leonard Richardson의 **성숙도 모델**에서 Level 2라고 부르는 단계에 머물러 있다: 리소스 + 적절한 HTTP 동사 + 상태 코드, 하지만 하이퍼미디어(Level 3)는 없음. 그리고 이는 보통 옹호할 만한 공학적 선택이다 — 완전한 HATEOAS는 어차피 고정되고 문서화된 계약에 맞춰 작성된 클라이언트에 실질적인 복잡성을 더하기 때문이다.\n\n그래서 실제로는, 사람들이 \"RESTful\"이라고 말할 때 거의 항상 다음을 의미한다:\n- 리소스 지향 URI (동사가 아닌 명사)\n- 의미에 맞게 사용된 HTTP 메서드 (GET은 안전하고 멱등, PUT/DELETE는 멱등, POST는 아님)\n- 의미 있는 상태 코드 (`200/201/404/409/422`…)\n- 무상태성\n- JSON 표현\n\n이는 완벽하게 유용한 관례다 — 다만 이것이 Fielding이 의도한 것이 아니라 \"Level 2 / HTTP 기반 API\"라는 점을 알아두라. 엄격한 의미에서 API를 *실제로* RESTful하게 만드는 것은 균일한 인터페이스, 특히 애플리케이션 상태를 이끄는 하이퍼미디어다. 일상적인 의미에서 RESTful하게 만드는 것은 일관된 리소스 모델링과 HTTP 시맨틱의 올바른 사용이다."},{"item":9,"id":"ACT2_squash","cat":"ACT","question":"마지막 3개 커밋을 하나로 어떻게 squash하나요?","A":"두 가지 주요 옵션이 있습니다.\n\n**Interactive rebase** (가장 일반적):\n```bash\ngit rebase -i HEAD~3\n```\n이렇게 하면 3개의 커밋(가장 오래된 것이 맨 위)을 나열하는 편집기가 열립니다. 첫 번째 것은 `pick`으로 두고, 나머지 두 개는 `squash`(또는 `s`)로 변경하십시오. 저장하고 닫으면, 통합된 커밋 메시지를 작성할 두 번째 편집기가 열립니다.\n\n**Soft reset** (새 메시지 하나만 원할 경우 더 간단함):\n```bash\ngit reset --soft HEAD~3\ngit commit -m \"your combined message\"\n```\n이렇게 하면 브랜치 포인터를 3 커밋만큼 되돌리지만 모든 변경 사항은 스테이징된 상태로 유지하며, 그 후 단일 새 커밋을 만듭니다.\n\n둘 다 히스토리를 변경하므로, 이 커밋들을 이미 푸시했다면 이후에 강제 푸시(`git push --force-with-lease`)가 필요합니다 — 브랜치에서 다른 사람이 작업하고 있지 않을 경우에만 그렇게 하십시오.\n\n개별 메시지를 보존하는 데 신경 쓰지 않는다면 soft reset이 보통 가장 쉽습니다. 각 메시지의 일부를 선택적으로 유지하고 싶다면 interactive rebase를 사용하십시오.","B":"마지막 3개의 커밋을 하나로 합치는 두 가지 일반적인 방법입니다.\n\n## 옵션 1: 대화형 리베이스 (모든 것을 수정할 수 있음)\n\n```bash\ngit rebase -i HEAD~3\n```\n\n에디터에 다음과 비슷한 내용이 열립니다:\n\n```\npick a1b2c3d First commit\npick e4f5g6h Second commit\npick i7j8k9l Third commit\n```\n\n첫 번째 `pick`은 그대로 두고, **두 번째와 세 번째** `pick`을 `squash`(또는 `s`)로 변경하세요:\n\n```\npick   a1b2c3d First commit\nsquash e4f5g6h Second commit\nsquash i7j8k9l Third commit\n```\n\n저장하고 닫으세요. 그러면 Git이 커밋 메시지들을 합치기 위해 두 번째 에디터를 엽니다 — 하나의 메시지로 수정한 후 저장하면 완료됩니다.\n\n> 팁: 두 번째/세 번째 메시지를 **버리고** 첫 번째 메시지만 남기고 싶을 때, 두 번째 에디터 프롬프트 없이 진행하려면 `squash` 대신 `fixup`(`f`)을 사용하세요.\n\n## 옵션 2: 소프트 리셋 (가장 빠름, 새 메시지를 작성)\n\n```bash\ngit reset --soft HEAD~3\ngit commit -m \"Your new combined message\"\n```\n\n이것은 브랜치 포인터를 3 커밋 뒤로 되돌리지만 모든 변경 사항은 스테이징된 상태로 유지하며, 그 후 하나의 새 커밋을 만듭니다. 원본 메시지에 신경 쓰지 않고 완전히 새로운 메시지를 원할 때 더 간단합니다.\n\n## ⚠️ 한 가지 주의사항\n두 방법 모두 **히스토리를 변경합니다**. 이 커밋들을 이미 푸시했다면, 강제 푸시해야 합니다:\n\n```bash\ngit push --force-with-lease\n```\n\n다른 사람들이 작업하는 공유 브랜치에는 강제 푸시를 피하세요. 자신만의 기능 브랜치라면 `--force-with-lease`는 안전합니다 (그 사이에 다른 사람이 푸시했다면 덮어쓰기를 거부합니다).\n\n이 중 하나를 실행해 드릴까요? 레포지토리가 어느 디렉터리에 있는지 알려주세요 — 현재 디렉터리(`/private/tmp`)는 git 레포지토리가 아닙니다."},{"item":10,"id":"DBG2_logout","cat":"DBG","question":"사용자들이 몇 분 후에 무작위로 로그아웃됩니다. 저희는 JWTs를 사용합니다. 무엇이 잘못되었을 가능성이 높을까요?","A":"JWT에서 \"몇 분 후 랜덤으로\" 발생하는 문제는 거의 항상 두 가지 뚜렷한 실패 유형 중 하나입니다. 가장 빠른 진단 방법은 어느 쪽인지 알아내는 것입니다.\n\n## 로그아웃이 로그인 후 *일정한* 시간에 발생하나요, 아니면 정말로 *무작위*인가요?\n\n**일정함 (~X분마다) → 액세스 토큰의 `exp`가 짧고 리프레시가 없거나 고장 났습니다.**\n이것이 첫 번째 원인입니다. 액세스 토큰은 수명이 짧도록(5–15분) 만들어졌습니다. 리프레시 토큰 플로우가 없거나, 자동 리프레시가 실패하면, 사용자는 `exp`에 도달하는 순간 쫓겨납니다 — 매번, 시계처럼 정확하게.\n- 실제 토큰을 디코드해서(jwt.io / `jwt decode`) `exp - iat`를 보세요. 만약 ~5분이라면, 그것이 바로 타이머입니다.\n- 리프레시 엔드포인트가 존재하고 만료 전에 실제로 호출되는지 확인하세요. 흔한 버그: 리프레시 토큰이 전송되지 않거나(잘못된 쿠키 `path`/`SameSite`), 리프레시가 조용히 401을 반환하거나, 클라이언트가 페이지 로드 시에만 리프레시하는 경우.\n\n**정말로 무작위 (고정된 간격 없음) → 토큰 검증이 간헐적으로 실패하며, 보통 여러 인스턴스에 걸친 키 문제입니다.** 주요 용의자는 다음과 같습니다:\n\n1.  **서버 인스턴스 간 서명 시크릿 불일치.** 각 인스턴스가 다른 `JWT_SECRET`을 가진 로드 밸런싱된 클러스터 (예: 공유 환경 변수/시크릿 매니저에서 읽는 대신 `crypto.randomBytes`로 부팅 시 생성). 인스턴스 A에서 서명된 토큰이 인스턴스 B에서 검증 실패 → 요청이 라운드 로빈되면서 검증이 무작위로 실패합니다. 이것이 바로 전형적인 \"프로덕션에서는 무작위 로그아웃, 개발 환경(단일 인스턴스)에서는 절대 발생 안 함\" 문제입니다.\n\n2.  **재시작 시 시크릿 재생성 + 크래시 루프 / 오토스케일링 서버.** 위와 근본 원인은 같지만 인스턴스 간이 아닌 시간의 흐름에 따른 문제입니다. 모든 재시작은 기존의 모든 토큰을 무효화합니다. \"몇 분 후\" = 재시작 사이의 평균 시간.\n\n3.  **서버 간 클럭 스큐.** 만약 `exp`/`nbf`/`iat`가 머신 간에 시간이 어긋나는 클럭에 대해 검증된다면, 한 서버에서 발급된 토큰이 다른 서버에서는 만료되었거나 아직 유효하지 않은 것으로 보일 수 있습니다. 작은 `clockTolerance`를 추가하고 NTP를 동기화하세요.\n\n## 가장 빠른 확인 방법\n- **모든** 인스턴스에서 `echo $JWT_SECRET` (또는 그에 상응하는 명령어) 실행 — 모두 동일하고 시작 시에 생성되지 않는지 확인.\n- 401 발생 시 JWT 검증 *에러 원인*을 로그로 남기세요 (`TokenExpiredError` vs `JsonWebTokenError`/`invalid signature`). 만료됨 → `exp`/리프레시 경로 문제입니다. 유효하지 않은 서명 → 키/인스턴스 문제입니다.\n- 인증 서비스의 재시작 빈도 / 배포 주기를 확인하세요.\n\n로그아웃이 시계처럼 규칙적인지 아니면 불규칙적인지 — 그리고 서버 인스턴스를 하나 이상 실행하는지 알려주시면 — 원인을 하나로 좁힐 수 있습니다. 그리고 레포지토리를 알려주시면, 제가 직접 토큰 TTL, 서명 설정, 리프레시 플로우를 살펴보겠습니다.","B":"가장 가능성이 높은 원인: 액세스 토큰의 만료 시간(`exp`)이 몇 분으로 짧고, 갱신 경로가 실제로는 작동하지 않는 경우입니다. 그래서 토큰이 만료되면 자동으로 갱신할 방법이 없어 사용자는 로그인 화면으로 돌아가게 됩니다. '몇 분'은 거의 항상 토큰에 설정한 `exp` 값입니다.\n\n두 번째로 가능성이 높고, 로그아웃이 시계처럼 일정하기보다 *무작위*로 느껴진다면 더 적합한 원인입니다: **서명 시크릿이 백엔드 전반에 걸쳐 안정적이지 않은 경우입니다.** 이 문제의 두 가지 흔한 형태는 다음과 같습니다 —\n\n- **여러 인스턴스, 일치하지 않는 시크릿.** 로드 밸런서 뒤에서 하나 이상의 백엔드 인스턴스를 실행하고, JWT 시크릿이 하나의 env var에서 공유되는 대신 부팅 시 생성되거나(또는 다른 설정에서 가져오는 경우), A 인스턴스에서 서명된 토큰은 B 인스턴스에서 검증에 실패합니다. LB가 다른 인스턴스로 전환할 때마다 401 오류가 발생하는데, 이는 정확히 '몇 분 후 무작위 로그아웃'처럼 느껴집니다.\n- **재시작 시 시크릿 재생성.** 시크릿이 영구 저장되지 않고 시작 시 생성된다면, 모든 배포, 충돌, 또는 오토스케일 이벤트가 모든 활성 토큰을 한 번에 무효화합니다.\n\n빠르게 구분하는 방법:\n\n1. **토큰을 디코딩하여** (jwt.io에 붙여넣거나 중간 세그먼트를 `base64 -d`로) `exp` - `iat` 값을 확인합니다. 이 간격이 약 5-15분이라면, 짧은 TTL/갱신 문제입니다. 간격은 길지만 더 일찍 로그아웃된다면, 만료 문제가 아니라 검증 문제(시크릿/클럭)입니다.\n2. **백엔드 인스턴스 수를 세고 시크릿이 어디서 오는지 확인합니다.** 모든 인스턴스에 걸쳐 하드코딩된 하나의 공유 env var = 괜찮음; 인스턴스별 무작위 시크릿 = 원인을 찾았습니다.\n3. **로그아웃이 배포/재시작 시점에 집중되는지** (→ 부팅 시 시크릿 재생성) **아니면 트래픽/부하에 따라 증가하는지** (→ 다중 인스턴스 시크릿 불일치) **확인합니다.**\n\n위 사항들이 명확하다면 살펴볼 만한, 확률이 낮은 원인들: 서버 간 클럭 스큐로 인한 `exp`/`nbf` 검증 실패; 두 동시 요청이 모두 갱신을 시도하여 하나가 다른 하나를 무효화하는 리프레시 토큰 순환 경쟁 조건; 또는 쿠키 문제(너무 짧은 `Max-Age`, 또는 `Secure`/`SameSite`/도메인 설정으로 인해 토큰 쿠키가 간헐적으로 전송되지 않는 경우).\n\n토큰이 어떻게 저장되는지(쿠키 vs. localStorage), `exp` 값, 그리고 실행 중인 백엔드 인스턴스 수를 공유해주시면, 원인을 하나로 좁힐 수 있습니다."},{"item":11,"id":"ACT2_truncate","cat":"ACT","question":"프로세스가 아직 파일을 열고 있는 동안, 삭제하지 않고 큰 로그 파일을 비우려면 어떻게 해야 합니까?","A":"파일을 삭제하고 다시 만드는 대신 제자리에서 잘라내라. 가장 간단한 방법:\n\n```bash\n: > /path/to/logfile      # or  > /path/to/logfile\n```\n\n이렇게 하면 동일한 inode가 유지되므로, 프로세스의 열린 파일 디스크립터가 유효한 상태로 남고 이제 비워진 파일에 계속해서 쓰게 된다. 동등한 옵션들:\n\n```bash\ntruncate -s 0 /path/to/logfile\ncat /dev/null > /path/to/logfile\n```\n\n`rm`을 쓰지 않는 이유: 파일을 삭제하더라도, 프로세스는 여전히 열린 inode를 잡고 있으므로 해당 프로세스가 디스크립터를 닫거나 종료될 때까지 디스크 공간은 **해제되지 않는다** — 파일은 연결되지 않은 inode로 계속 존재한다. 같은 이름으로 새로 만드는 파일은 다른 inode를 갖게 되고, 프로세스는 보이지 않는 예전 파일에 계속해서 쓰게 된다. 그래서 \"파일이 사라진\" 것처럼 보이지만 디스크는 계속 꽉 차 있는 상태가 된다.\n\n두 가지 주의사항:\n\n- **추가 모드 대 탐색 오프셋.** 프로세스가 `O_APPEND`로 로그를 열었다면(대부분의 로거가 그렇듯), 잘라내기는 깔끔하게 처리된다 — 다음 쓰기는 오프셋 0으로 간다. 만약 추가 모드 *없이* 열었고 자체 오프셋을 추적한다면, 파일은 비어 있는 것처럼 보이지만 프로세스는 예전 오프셋에 계속 쓰게 되어 수 기가바이트의 구멍이 있는 희소 파일(sparse file)을 남긴다. 그래도 디스크를 낭비하지는 않지만(구멍은 할당되지 않음), `ls -l`은 예전의 큰 크기를 보여줄 것이다. 이 경우 올바른 해결책은 `copytruncate`를 이용한 로그 로테이션이거나, 프로세스에 신호를 보내 로그를 다시 열도록 하는 것이다.\n\n- **리디렉션은 셸에서 실행되므로**, 셸 사용자가 파일에 대한 쓰기 권한이 필요하다; 파일이 root 소유라면 `sudo tee`/`sudo truncate`를 사용하라:\n\n```bash\nsudo truncate -s 0 /path/to/logfile\n```\n\n이것이 반복되는 문제라면, `copytruncate` 지시어를 사용한 `logrotate`가 (또는, 더 좋게는, 데몬이 지원한다면 `HUP`을 보내 다시 열게 하는 핸들러가) 영구적인 해답이다.","B":"핵심은 파일을 삭제하는 대신 **제자리에서 잘라내는 것**입니다. `rm`으로 파일을 삭제하면, 프로세스는 열려 있는 파일 디스크립터를 통해 이제 연결이 끊긴 inode에 계속해서 씁니다 — 디스크 공간은 프로세스가 파일을 닫을 때(보통 재시작)까지 해제되지 않으며, 그동안 \"새로운\" 파일에는 아무것도 쓰이지 않습니다. 잘라내기는 프로세스가 쓰고 있는 동일한 inode를 유지하므로, (이제 비어 있는) 시작 지점 뒤에 계속해서 추가하기만 합니다.\n\n## 가장 간단한 방법\n\n```bash\n: > /var/log/big.log\n# 또는 동일하게\ntruncate -s 0 /var/log/big.log\n```\n\n두 방법 모두 inode를 유지하고 크기를 즉시 0으로 재설정합니다. 파일의 소유자가 아니라면 `sudo`를 사용하십시오:\n\n```bash\nsudo truncate -s 0 /var/log/big.log\n```\n\n> ⚠️ `sudo : > file`이라고 쓰지 마십시오 — 리디렉션은 `sudo`가 실행되기 전에 *당신의* 셸에 의해 수행되므로 루트 권한을 갖지 못합니다. 대신 다음 중 하나를 사용하십시오:\n> ```bash\n> sudo truncate -s 0 /var/log/big.log\n> sudo sh -c ': > /var/log/big.log'\n> sudo tee /var/log/big.log < /dev/null    # tee는 파일을 루트로 엽니다\n> ```\n\n## 한 가지 중요한 주의사항: O_APPEND 대 seek 기반 쓰기\n\n- **프로세스가 `O_APPEND`로 로그를 열었다면** (대부분의 로거, `>>` 리디렉션, syslog 스타일 데몬), 모든 쓰기는 파일의 현재 끝으로 갑니다. 잘라낸 후 파일은 다시 0부터 커집니다. ✅ 이것이 일반적이고 안전한 경우입니다.\n\n- **프로세스가 고정된 쓰기 오프셋을 유지한다면** (append 없이 열리고 자체 위치를 추적하는 경우), 파일을 0으로 잘라낸 후에도 오프셋은 여전히, 예를 들어 5GB입니다. 다음 쓰기는 5GB 오프셋에 위치하고 커널은 그 간격을 **희소 \"구멍\"**으로 채웁니다 — `ls -l`은 다시 5GB를 보여주지만, `du`는 실제 디스크 사용량이 거의 없음을 보여줍니다. 성가시지만 데이터 손실은 아닙니다.\n\n희소 파일 문제를 피하려면 파일을 유지하되 크기가 자연스럽게 줄어들도록 내용을 버릴 수 있습니다 — 예를 들어, 파일을 임시 파일로 tail하고 다시 복사합니다:\n\n```bash\ntail -c 10M /var/log/big.log > /tmp/keep && cat /tmp/keep > /var/log/big.log\n```\n\n이 방법은 최근 라인을 보존하고 겉보기 크기를 재설정하며, 역시 inode를 변경하지 않습니다.\n\n## 올바른 장기적 해결책: copytruncate를 사용한 logrotate\n\n이것이 반복되는 문제라면 `logrotate`가 처리하도록 하십시오. `copytruncate` 지시어는 파일을 복사한 다음 원본을 제자리에서 잘라냅니다 — 바로 위에서 설명한 안전한 작업입니다 — 따라서 프로세스는 아무것도 다시 열 필요가 없습니다:\n\n```\n/var/log/big.log {\n    weekly\n    rotate 4\n    compress\n    missingok\n    notifempty\n    copytruncate\n}\n```\n\n(`copytruncate`에는 복사와 잘라내기 사이에 쓰인 라인이 손실될 수 있는 아주 작은 경쟁 조건 창이 있습니다. 만약 데몬이 신호(예: `SIGHUP`)를 받아 로그를 다시 여는 것을 지원한다면 `create` + `postrotate ... kill -HUP` 패턴이 더 깔끔합니다. 하지만 프로세스가 파일을 다시 열도록 할 수 없을 때는 `copytruncate`가 최선의 선택입니다.)\n\n**결론:** 프로세스가 파일을 열고 있는 동안에는 `rm`을 절대 사용하지 말고 `truncate -s 0`(또는 `: >`)을 사용하십시오."},{"item":12,"id":"DBG2_slowquery","cat":"DBG","question":"테이블이 2백만 행으로 늘어난 후 API 엔드포인트 하나가 느려졌습니다. 어디를 먼저 봐야 할까요?","A":"200만 행은 작은 규모다 — 이것이 핵심적인 통찰이다. 200만 행에 대해 제대로 인덱싱된 쿼리는 여전히 한 자릿수 밀리초여야 한다. 따라서 \"200만에서 느려졌다\"는 말은 거의 항상 인덱스를 사용하지 않고 **무언가가 전체 테이블을 스캔하고 있다**는 의미다. 내가 살펴볼 순서는 다음과 같다:\n\n## 1. DB 문제인지 확인하기 (앱/직렬화 문제가 아닌)\n엔드포인트와 비교하여 쿼리만 단독으로 시간을 측정하라. 순수 SQL은 빠르지만 엔드포인트가 느리다면, 문제는 테이블이 아니라 N+1 쿼리, 직렬화, 또는 응답 크기다. 먼저 APM/로그에서 요청당 쿼리 수를 확인하라; 이것은 30초면 할 수 있는 확인 작업으로, 엉뚱한 계층을 최적화하는 것을 막아준다.\n\n## 2. 의심스러운 쿼리에 EXPLAIN ANALYZE 실행하기\n이것이 단일 단계 중 가장 가치가 높다. 실행해서 다음을 찾아보라:\n- 큰 테이블에 대한 **`Seq Scan`** → 인덱스가 없거나 사용되지 않음 (가장 유력한 원인)\n- **예상 행 수 vs. 실제 행 수**가 엄청나게 다름 → 오래된 통계 정보 (테이블에 `ANALYZE` 실행)\n- **`Sort` / `Hash`가 디스크로 넘어감** → `work_mem`이 너무 낮거나, 거대한 집합을 정렬하고 있음\n- 수백만 번 실행되는 중첩 루프 → 잘못된 조인 계획\n\n## 3. 가능성 순으로 본 일반적인 용의자들\n\n| 원인 | 징후 | 해결책 |\n|---|---|---|\n| 인덱스 부재 | `Seq Scan`, 인덱스 없는 컬럼에 대한 필터/조인 | WHERE/JOIN/ORDER BY 컬럼에 인덱스 추가 |\n| N+1 쿼리 | 요청당 동일한 쿼리가 많음 | 즉시 로딩 / 배치 / JOIN |\n| `OFFSET` 페이지네이션 | 깊은 페이지에서만 느림 | 키셋 (seek) 페이지네이션 |\n| `SELECT *` + 팻 로우(fat rows) | 큰 페이로드, TOAST 컬럼 | 필요한 컬럼만 선택 |\n| 지원하는 인덱스 없는 `ORDER BY` | 실행 계획의 `Sort` 노드 | 정렬과 일치하는 복합 인덱스 |\n| 데이터 증가 후 오래된 통계 정보 | 예상치가 100배 이상 차이 남 | `ANALYZE table` |\n\n## 내가 실제로 가장 먼저 할 일\n1. 로그/APM에서 엔드포인트의 쿼리 수와 총 DB 시간을 본다.\n2. 가장 느린 쿼리에 `EXPLAIN ANALYZE`를 실행한다.\n3. 200만 행 테이블에서 `Seq Scan`이 보인다면 — 80%의 경우 그것이 답이다.\n\n엔드포인트의 쿼리(그리고 테이블의 인덱스, 또는 `EXPLAIN ANALYZE` 출력)를 붙여넣어 주면, 내가 정확히 집어주겠다. 데이터베이스는 무엇인가 — Postgres, MySQL, 아니면 다른 것인가?","B":"엔드포인트가 실행하는 실제 SQL을 다음 순서로 살펴보십시오:\n\n**1. 추측하지 말고, 느린 쿼리부터 찾으십시오.** 느린 쿼리 로깅을 켜거나 APM/DB 통계(Postgres의 `pg_stat_statements`, MySQL의 slow query log)를 확인하십시오. 엔드포인트는 여러 쿼리를 실행할 수 있습니다. 시간이 급증한 특정 쿼리를 찾아야 합니다. 단서는 행 수에 따라 지연 시간이 확장되는 쿼리입니다. 바로 그 쿼리가 200만 행에서 인덱스 커버리지를 잃은 것입니다.\n\n**2. 해당 쿼리에 `EXPLAIN ANALYZE`를 실행하십시오.** 답은 거의 항상 여기에 있습니다. 인덱스를 예상했던 큰 테이블에서 **순차/전체 테이블 스캔** (Postgres의 `Seq Scan`)을 찾고 있는 것입니다. 5만 행에서는 seq scan이 눈에 띄지 않지만, 200만 행에서는 성능 저하의 원인 전체가 됩니다. 일반적인 원인:\n- `WHERE`, `JOIN`, 또는 `ORDER BY` 절의 열에 인덱스가 없는 경우.\n- 인덱스는 있지만 사용할 수 없는 경우 — 열에 함수나 형 변환을 사용(`WHERE lower(email) = ...`), 선행 와일드카드(`LIKE '%foo'`), 또는 타입 불일치.\n- 열 순서가 쿼리의 필터/정렬과 일치하지 않는 복합 인덱스.\n\n**3. 인덱스뿐만 아니라 접근의 형태를 확인하십시오.** \"인덱스가 있다\"는 조건을 통과하지만 크기에 따라 여전히 성능이 저하되는 두 가지 패턴:\n- **N+1 쿼리** — 엔드포인트가 목록의 각 행마다 쿼리를 한 번씩 실행합니다. 20개 행에서는 괜찮지만, 관련 집합이 커지면 치명적입니다. 쿼리당 시간이 아닌, 요청당 쿼리 *수*를 보십시오.\n- **`OFFSET` 기반 페이지네이션** — `LIMIT 20 OFFSET 100000`는 건너뛴 모든 행을 여전히 탐색합니다. 깊은 페이지는 선형적으로 느려집니다.\n\n가장 가능성 있는 결과: 하나의 쿼리가 인덱스 스캔에서 seq 스캔으로 바뀌었고, 잘 선택된 단일 인덱스(종종 필터 + 정렬과 일치하는 복합 인덱스)가 이 문제를 해결합니다.\n\n가장 빠른 방법은 실제 파라미터 값을 사용한 실제 쿼리에 `EXPLAIN ANALYZE`를 실행하는 것입니다 — 그 결과를 붙여넣어 주시면 무슨 일이 일어나고 있는지 정확히 알려드릴 수 있습니다."},{"item":13,"id":"DBG_loop","cat":"DBG","question":"이것은 영원히 반복됩니다, 무엇이 잘못되었나요?\n\nfor (let i = 0; i < arr.length; i--) { console.log(arr[i]); }","A":"`i--`는 카운터를 증가시키는 대신 감소시킵니다. `i`는 0에서 시작하여 -1, -2, -3 등으로 계속됩니다 — 항상 `arr.length`보다 작은 상태를 유지하므로, `i < arr.length`는 절대 false가 되지 않고 루프는 절대 끝나지 않습니다. (부수 효과로, 모든 음수 인덱스에 대해 `arr[i]`는 `undefined`가 됩니다.)\n\n`i--`를 `i++`로 변경하십시오:\n\n```js\nfor (let i = 0; i < arr.length; i++) { console.log(arr[i]); }\n```","B":"감소입니다. `i--`는 매 반복마다 `i`를 *감소*시킵니다 (0, -1, -2, …), 따라서 `i < arr.length` 조건은 항상 참이 됩니다 — `i`는 절대 `arr.length`에 도달하지 못합니다. 첫 번째 요소 이후에는 `undefined`를 로깅하며 무한 루프에 빠집니다.\n\n`i++`로 변경하십시오:\n\n```js\nfor (let i = 0; i < arr.length; i++) { console.log(arr[i]); }\n```"},{"item":14,"id":"PLN_realtime","cat":"PLN","question":"제 웹 앱에 실시간 알림을 추가하고 싶습니다. 계획은 무엇인가요?","A":"문제없습니다. 적용할 수 있는 실용적이고 스택에 구애받지 않는 계획을 드리겠습니다. (다시 한번 알려드립니다: 이 디렉터리에는 웹 앱이 없으므로, 이것은 일반적인 청사진이지 현재 리포지토리에 연결할 수 있는 것이 아닙니다. 실제 리포지토리의 경로를 알려주시면 실제 프레임워크/백엔드에 맞춰 조정해 드리겠습니다.)\n\n## 실시간 알림 — 계획\n\n### 1. 전송 방식 선택 (모든 것을 결정하는 단 하나의 선택)\n\n| 필요 | 사용 | 이유 |\n|------|-----|-----|\n| **탭이 열려 있는 동안** 실시간 업데이트 (토스트, 배지, 피드) | **SSE** (서버-전송 이벤트) | 단방향 서버→클라이언트, 매우 간단함, 자동 재연결 내장, 일반 HTTP에서 작동. 가장 좋은 기본값. |\n| 양방향 / 채팅 / 접속 상태 / 입력 중 표시 | **WebSocket** | 전이중. 더 많은 인프라 필요 (스티키 세션 또는 pub/sub 계층). |\n| **탭이 닫혔거나 앱이 열려 있지 않을 때** 알림 | **Web Push** (Service Worker + Push API + VAPID) | 닫힌 탭에서도 유지됨; 사용자 권한 필요. |\n| 중요 / 대역 외 | **이메일 또는 SMS** | 사용자에게 반드시 도달해야 하는 것들을 위한 다른 채널. |\n\n**추천:** **인앱 실시간 알림에는 SSE** + **오프라인 도달에는 Web Push**로 시작하세요. 클라이언트→서버 스트리밍이 정말로 필요하지 않다면 WebSocket은 건너뛰세요. 이 조합은 최소한의 인프라로 \"실시간 알림\" 요구사항의 약 90%를 충족합니다.\n\n### 2. 아키텍처\n\n```\n[이벤트 소스: DB 쓰기 / 작업 완료 / 다른 사용자 행동]\n        │\n        ▼\n  알림 발생  ──►  행 영속화 (notifications 테이블)\n        │                  id, user_id, type, payload, read_at, created_at\n        ▼\n   pub/sub 팬아웃  (서버 1대일 경우 인-프로세스 emitter;\n        │            여러 대일 경우 Redis pub/sub 또는 Postgres LISTEN/NOTIFY)\n        ├──► SSE 스트림 → 열려 있는 브라우저 탭 (실시간 토스트 + 배지)\n        └──► Web Push → 닫힌 탭의 기기 (저장된 푸시 구독을 통해)\n```\n\n나중에 고통을 줄여주는 두 가지 설계 규칙:\n- **먼저 영속화하고, 두 번째로 전달하라.** DB 행이 진실의 원천(source of truth)입니다. SSE/Push는 최선 노력(best-effort) 전달 방식입니다. 재연결 시 클라이언트는 DB에서 읽지 않은 알림을 다시 가져오므로 소켓 연결이 끊어져도 아무것도 잃지 않습니다.\n- **서버 프로세스가 1개 이상이 되면 팬아웃(fan-out)에는 pub/sub가 필요합니다.** 단일 인스턴스 → 인메모리 EventEmitter로 충분합니다. 다중 인스턴스/서버리스 → Redis pub/sub 또는 Postgres `LISTEN/NOTIFY`.\n\n### 3. 데이터 모델 (최소)\n\n- `notifications` — `id, user_id, type, title, body, data(jsonb), read_at, created_at`\n- `push_subscriptions` — `id, user_id, endpoint, keys(p256dh, auth), created_at` (기기/브라우저당 하나의 행)\n\n### 4. 단계적 구현\n\n1. **영속성 + REST** — 테이블, `GET /notifications?unread=1`, `POST /notifications/:id/read`. 폴링하는 종 모양 아이콘을 배포합니다. 지루하지만 올바른 방법이며, 모든 것이 이것을 기반으로 구축됩니다.\n2. **SSE 실시간 계층** — `GET /notifications/stream`은 열린 응답을 유지합니다. 서버는 사용자의 연결된 탭으로 새로운 행을 푸시합니다. 클라이언트는 토스트를 표시하고 배지 숫자를 증가시킵니다. 하트비트와 자동 재연결을 추가합니다.\n3. **Web Push** — Service Worker를 등록하고, 권한을 요청하고, 구독 정보를 저장한 후, 사용자가 열린 SSE 연결이 없을 때 VAPID(예: `web-push` 라이브러리)를 통해 전송합니다.\n4. **다듬기** — 모두 읽음으로 표시, 그룹화/디바운싱(토스트 50개를 쏘지 않기), 환경설정(유형별 수신 거부), 그리고 속도 제한.\n\n### 5. 미리 계획해야 할 함정\n\n- **스트림 인증** — SSE/WS 연결은 세션을 반드시 전달해야 합니다. 다른 사용자의 이벤트가 유출되지 않도록 하세요.\n- **재연결 및 누락된 이벤트** — SSE의 `Last-Event-ID`를 사용하거나 재연결 시 읽지 않은 알림을 다시 가져오세요.\n- **Web Push 권한 UX** — 페이지 로드 시 절대 권한을 요청하지 마세요. 의미 있는 행동 후에 요청해야 합니다. 그렇지 않으면 영원히 차단됩니다.\n- **서버리스 주의사항** — 오래 지속되는 SSE/WS 연결은 대부분의 서버리스 플랫폼에서 작동하지 않습니다. 관리형 실시간 서비스(Pusher/Ably/Supabase Realtime)나 전용 장기 실행 프로세스가 필요할 것입니다.\n\n---\n\n**실제 웹 앱의 경로**와 대략적인 스택(예: Next.js, Rails, Django, 순수 Node)을 알려주시면, 이를 적절한 라이브러리, 정확한 엔드포인트, 그리고 서버리스 대 서버 결정까지 포함된 구체적인 계획으로 만들어 드리겠습니다. 리포지토리가 무엇인가요?","B":"문제없습니다 — 대부분의 웹 앱에 추천할 만한 접근법으로 시작하는, 스택에 구애받지 않는(stack-agnostic) 계획을 알려드립니다. 몇 가지 분기점을 명시했으니, 당신의 스택을 알게 되면 조정할 수 있습니다.\n\n## 추천 기본값: 인앱(in-app)은 Server-Sent Events (SSE), 백그라운드는 Web Push\n\n일반적인 경우 — 로그인한 사용자가 사이트를 열어 둔 상태에서 토스트/배지(toast/badge)를 받는 경우 — **SSE가 올바른 기본값입니다**. 단방향(서버→클라이언트)이고, 일반 HTTP를 사용하며, 브라우저에서 자동으로 재연결되고, 별도의 프로토콜이 필요 없습니다. 클라이언트 또한 지속적인 스트림을 *전송*해야 하는 경우(채팅, 협업 편집, 접속 상태 표시)에만 WebSockets를 사용하세요. 대부분의 \"알림\" 기능은 그렇지 않습니다.\n\n탭이 **닫혔을** 때도 알림이 도착해야 한다면, 그것은 별개의 메커니즘입니다: **Web Push API + 서비스 워커(service worker) + VAPID 키**. 이는 부가적인 기능으로, 먼저 인앱(in-app) 기능을 출시하고 나중에 푸시를 추가할 수 있습니다.\n\n## 계획 순서\n\n1.  **트리거 소스를 결정합니다.** 어떤 이벤트가 알림을 생성하나요? (새 메시지, 작업 완료, 누군가 당신을 언급함.) 이것은 DB 쓰기 훅(write hook), 큐 워커(queue worker), 또는 API 핸들러 중 어디에서 이벤트를 발생시킬지 결정합니다.\n\n2.  **알림 저장소를 추가합니다.** `notifications` 테이블 (`id`, `user_id`, `type`, `payload`, `read_at`, `created_at`). 사용자가 놓친 것을 보고 읽음으로 표시할 수 있도록 영속성이 필요합니다 — 순수한 라이브 스트림은 오프라인 상태에서 전송된 모든 것을 잃게 됩니다.\n\n3.  **전달 채널을 구축합니다.**\n    - *인앱 (SSE):* 인증된 사용자별로 연결을 열어두고 새 행을 스트리밍하는 `GET /events` 같은 엔드포인트 하나. 연결된 사용자를 메모리(단일 서버) 또는 Redis pub/sub(다중 서버 — 이것이 주된 확장 시의 함정입니다)를 통해 추적합니다.\n    - *백그라운드 (Web Push):* VAPID 키를 생성하고, 서비스 워커(service worker)를 등록하고, 각 브라우저의 푸시 구독 정보를 사용자에 대해 저장한 뒤, 이벤트가 발생하면 푸시 서비스로 POST 요청을 보냅니다.\n\n4.  **클라이언트를 연결합니다.** SSE를 위해 `EventSource`를 사용하고(자동으로 재연결됩니다), 토스트(toast)를 렌더링하고 읽지 않은 배지(badge) 수를 증가시키며, 알림을 열었을 때 `mark-read` 엔드포인트를 호출합니다.\n\n5.  **실제로 문제가 되는 엣지 케이스를 처리합니다:** 오래 지속되는 연결에 대한 인증, 재연결/재전송(재연결하는 클라이언트가 이벤트를 놓치지 않도록 `Last-Event-ID`를 전송), 그리고 여러 서버 인스턴스에 걸친 fan-out(Redis 또는 관리형 서비스 사용).\n\n## 직접 구현(DIY)을 건너뛸 경우\n\n만약 당신이 serverless/edge (Vercel, Firebase, Supabase) 환경이라면 SSE 연결을 유지할 오래 지속되는 서버가 없으므로, **관리형 실시간 서비스**(Supabase Realtime, Pusher, Ably, 또는 푸시를 위한 Firebase Cloud Messaging)를 사용하는 것이 보통 직접 구현하는 것보다 수고가 덜하고 더 안정적입니다.\n\n두 가지 사항이 여전히 이 계획을 의미 있게 좌우합니다: **당신의 스택**(SSE 방식과 관리형 서비스 방식 중 선택 및 fan-out 방식을 결정)과 **\"실시간\"의 범위에 탭이 닫혔을 때의 전달이 포함되는지 여부**(Web Push도 필요한지 결정). 이 두 가지를 알려주세요 — 가급적 실제 repo를 알려주시면 — 당신의 환경에 맞는 구체적인 단계와 코드로 바꿔드리겠습니다."},{"item":15,"id":"REV_nplus1","cat":"REV","question":"여기서 개선할 점이 있나요?\n\nconst orders = await Order.findAll();\nfor (const o of orders) { o.user = await User.findById(o.userId); }","A":"네 — 주된 문제는 순차적으로 실행되는 N+1 쿼리입니다. 하나의 `findAll`을 실행한 다음, 주문마다 `findById`를 하나씩 실행하는데, 다음 것이 시작되기 전에 각각을 await합니다. 주문이 100개라면 종단 간 101번의 왕복이 발생합니다.\n\nid를 키로 하는 단일 쿼리로 모든 사용자를 가져온 다음, 메모리에서 연결하는 것이 더 좋습니다:\n\n```js\nconst orders = await Order.findAll();\nconst userIds = [...new Set(orders.map(o => o.userId))];\nconst users = await User.findAll({ where: { id: userIds } });\nconst usersById = new Map(users.map(u => [u.id, u]));\nfor (const o of orders) o.user = usersById.get(o.userId);\n```\n\n주문 수에 관계없이 쿼리가 두 번이며, `Set`을 통한 중복 제거는 여러 주문이 한 사용자를 공유할 때 동일한 사용자를 다시 가져오는 것을 방지합니다.\n\n몇 가지 주목할 점이 있습니다:\n- 만약 `Order`와 `User`가 ORM 연관 관계(API가 시사하는 Sequelize 스타일)라면, 관용적인 해결책은 ORM이 조인하도록 하는 것입니다: `Order.findAll({ include: User })` — 쿼리 한 번으로, 수동 매핑이 필요 없습니다.\n- 주문별 조회를 유지해야 한다면, 적어도 `for` 루프 안에서 `await`하는 대신 `Promise.all(orders.map(...))`로 동시에 실행하세요 — 하지만 위에서 설명한 일괄 단일 쿼리 방식이 N번이 아닌 한 번의 DB 호출이기 때문에 여전히 더 좋습니다.\n- 사소한 점: limit 없는 `findAll()`은 전체 테이블을 메모리에 로드합니다. 작은 테이블에서는 괜찮지만, 주문이 늘어나면 문제가 됩니다 — 대규모 데이터셋에서 실행된다면 페이지네이션을 고려하세요.\n\n이것들이 연관된 모델이라면 `include`/조인 방식을 사용하겠고, 그렇지 않다면 일괄-Map 버전을 사용하겠습니다.","B":"네 — 이것은 고전적인 **N+1 query** 문제이며, **순차적**이라서 더 나쁩니다. N개의 주문에 대해 1 + N개의 쿼리를 실행하게 되며, 각각을 한 번에 하나씩 기다립니다 (왕복 × N).\n\n두 가지 해결책이 있으며, 더 좋은 것부터 소개합니다:\n\n**1. 단일 일괄 쿼리 (최선)** — 모든 사용자를 한 번에 가져와 메모리에서 매핑합니다:\n\n```js\nconst orders = await Order.findAll();\nconst userIds = [...new Set(orders.map(o => o.userId))];\nconst users = await User.findAll({ where: { id: userIds } });\nconst byId = new Map(users.map(u => [u.id, u]));\nfor (const o of orders) o.user = byId.get(o.userId);\n```\n\n주문 수에 관계없이 총 2개의 쿼리입니다. `Set`은 공유된 사용자도 중복 제거합니다.\n\n**2. 소스에서 즉시 로딩 / 조인 (ORM이 지원한다면 훨씬 더 좋음)** — Sequelize인 것 같군요:\n\n```js\nconst orders = await Order.findAll({ include: [{ model: User }] });\n// 각 주문에 이미 order.User가 채워져 있음 — 1개의 쿼리 (JOIN)\n```\n\n`Order`에 연관 관계가 정의되어 있다면 이것이 가장 깔끔합니다.\n\n---\n\n정말로 주문별 조회를 해야 한다면, 적어도 직렬화하지는 마십시오:\n\n```js\nawait Promise.all(orders.map(async o => { o.user = await User.findById(o.userId); }));\n```\n\n이렇게 하면 N+1 쿼리는 유지되지만 연속적이 아니라 동시에 실행됩니다. 여전히 일괄/조인 방식보다는 못합니다 — 그 방법들을 선호하고, N이 크다면 커넥션 풀을 주시하세요.\n\n이게 어떤 ORM인가요? Sequelize/TypeORM/Prisma라면 정확한 `include`/`relations`/`with` 구문을 알려드릴 수 있습니다."},{"item":16,"id":"REV2_floatloop","cat":"REV","question":"이 루프에 대한 생각은?\n\nfor (let x = 0; x !== 1; x += 0.1) { tick(x); }","A":"무한 루프입니다. 🐛\n\n문제는 엄격한 동등 비교 `x !== 1`이 부동소수점 누적과 결합된 것입니다. `0.1`은 IEEE 754 배정밀도에서 정확하게 표현될 수 없으므로, 누적 합계가 조금씩 벗어나 **절대 정확히 `1.0`이 되지 않습니다**:\n\n```\n0\n0.1\n0.2\n0.30000000000000004\n0.4\n0.5\n0.6\n0.7\n0.7999999999999999\n0.8999999999999999\n0.9999999999999999   ← \"1\"이 되어야 할 단계지만, === 1이 아님\n1.0999999999999999   ← 목표를 지나침; 조건은 여전히 참\n...\n```\n\n루프는 1을 그냥 지나쳐 영원히 실행됩니다 (음, `x`가 너무 커져서 `x += 0.1`이 2^53 근처에서 값을 바꾸지 못할 때까지는요. 그 시점에서는 *정말로* 멈추게 됩니다).\n\n**해결책, 대략적인 선호도 순:**\n\n1.  **정수로 반복하고, 내부에서 스케일 조정:**\n    ```js\n    for (let i = 0; i < 10; i++) { tick(i * 0.1); }\n    ```\n    가장 깔끔합니다 — 루프 변수가 정확하고, *조건*에 오차가 없습니다. (`i * 0.1`에는 여전히 부동소수점 반올림이 있지만, 횟수는 정확합니다.)\n\n2.  **부동소수점 누산기를 유지한다면 `!==` 대신 `<` 경계 사용**:\n    ```js\n    for (let x = 0; x < 1; x += 0.1) { tick(x); }\n    ```\n    종료됩니다 — 하지만 조심하세요, 이것은 **10번** 실행되며(마지막 `x ≈ 0.9999...`), 아주 작은 양의 오차로 인해 마지막 반복이 누락될 수 있습니다. 정수 카운팅은 그런 모호함을 피합니다.\n\n3.  **엡실론 비교**는 정말로 \"대략 1\"이 필요한 경우에만 사용:\n    ```js\n    for (let x = 0; Math.abs(x - 1) > 1e-9; x += 0.1)\n    ```\n    작동은 하지만 가장 불안정하고 보기 흉한 옵션입니다.\n\n일반적인 규칙: **누적되는 부동소수점에 `===`/`!==`를 루프 종료 조건으로 절대 사용하지 마세요.** 정수로 루프를 돌리고 매 반복마다 부동소수점을 파생시키세요.","B":"이것은 무한 루프입니다. `x`는 절대 `1`과 정확히 같아지지 않으므로, `x !== 1` 조건은 절대 false가 되지 않습니다.\n\n이유는 부동 소수점입니다: `0.1`은 정확한 이진 표현을 갖지 않으므로, 이를 누적해도 `1.0`에 깔끔하게 도달하지 않습니다. `0 += 0.1`을 열 번 실행하면 `0.9999999999999999`가 되고, 다음 단계에서는 `1.0999999999999999`로 점프하여, `x`는 `1`과 같아지지 않은 채 지나쳐 버립니다. 그러면 루프는 영원히 실행됩니다 (음 — `x`가 `Infinity`로 오버플로될 때까지인데, `Infinity !== 1`은 여전히 true이므로, 진정으로 영원히 실행됩니다).\n\n단순히 이 경우를 넘어 두 가지 점이 이것을 위험하게 만듭니다:\n- **부동 소수점 누산기에 대해 정확한 `!==`/`===` 비교를 하는 것이 핵심적인 실수입니다.** 2의 거듭제곱이 아닌 단계(0.1, 0.3 등)는 목표값을 놓칠 수 있습니다.\n- **조용히 발생합니다** — 오류 없이, 그냥 멈춤 현상만 있습니다.\n\n만약 10번의 틱을 실행하고 싶다면, 더 견고한 해결책은 정수를 순회하며 부동 소수점을 파생시키거나, `<` 경계를 사용하는 것입니다:\n\n```javascript\nfor (let i = 0; i < 10; i++) { tick(i * 0.1); }   // integer counter, exact termination\nfor (let x = 0; x < 1; x += 0.1) { tick(x); }      // < instead of !==, runs 10 times\n```\n\n정수 카운터 버전이 더 좋습니다 — 이 방법은 `tick`에 전달되는 값에서 누적된 반올림 오차를 피할 수도 있습니다 (`x += 0.1`을 사용하면 나중 값들이 약간 벗어납니다, 예: `0.30000000000000004`)."},{"item":17,"id":"PLN2_auth","cat":"PLN","question":"제 앱에 로그인과 회원가입을 추가해야 합니다. 계획이 어떻게 되나요?","A":"질문 프롬프트에 답변하는 대신 닫아버린 것 같네요. 괜찮습니다. 그냥 제게 바로 알려주세요:\n\n1.  **앱이 어디에 있나요?** 디렉터리를 알려주세요(절대 경로가 가장 좋습니다). `/private/tmp`나 `/tmp` 아래에는 없으니까요.\n2.  **어떤 스택**인가요 (Next.js, React + 별도 API, 모바일, Rails/Django 같은 서버 렌더링 등)?\n3.  **어떤 인증**을 원하시나요 — 이메일+비밀번호, 소셜/OAuth 로그인, 매직 링크, 아니면 Clerk/Auth0/Supabase/Auth.js 같은 관리형 서비스에 위임하는 방식인가요?\n\n코드를 보고 그 정보들을 알게 되면, 일반적인 체크리스트 대신 구체적인 단계별 계획을 드리겠습니다. 원하신다면, 경로를 알려주시는 즉시 제가 직접 살펴보고 스택을 추론할 수도 있습니다.","B":"걱정 마세요 — 메뉴는 건너뛰어도 됩니다. 당신의 말로 설명해주시면 제가 알아서 처리하겠습니다:\n\n- **앱이 있는 위치** (project path), 그리고\n- **무엇으로 만들어졌는지** (framework + database, 대략적으로).\n\n코드를 볼 수 있게 되면, 다음을 포함하는 구체적이고 스택에 특화된 계획을 만들어 드리겠습니다:\n\n1. **접근 방식** — 관리형 인증 제공자 (Clerk/Auth0/Supabase/Firebase) vs. 자체 구축 (Auth.js/Lucia/Devise/Django auth), *당신의* 스택에 대한 추천 포함.\n2. **데이터 모델** — users 테이블/컬렉션, 비밀번호 해싱 (argon2/bcrypt), 그리고 무엇을 저장하고 위임할지.\n3. **흐름** — signup, login, logout, 이메일 인증, 비밀번호 재설정.\n4. **세션** — 쿠키 기반 세션 vs. JWT, CSRF, 그리고 보안 쿠키 설정.\n5. **라우트/UI** — 추가할 페이지와 엔드포인트, 그리고 라우트 보호/미들웨어.\n6. **보안 기준** — rate limiting, lockout, secrets 처리, HTTPS 전용 쿠키.\n7. **배포** — migrations, env vars, 그리고 테스트 체크리스트.\n\n이 기본 구조를 실제 단계로 바꾸기 위해 필요한 것은 당신의 스택에 대한 한 줄 설명뿐입니다. 어떤 환경에서 작업하고 계신가요?"},{"item":18,"id":"ACT_uncommit","cat":"ACT","question":"마지막 git 커밋을 되돌리되, 변경 사항은 스테이징된 상태로 유지하려면 어떻게 해야 하나요?","A":"**soft reset**을 사용하라:\n\n```bash\ngit reset --soft HEAD~1\n```\n\n이것은 `HEAD`를 한 커밋 뒤로 옮기지만 워킹 트리와 인덱스는 건드리지 않는다 — 그래서 해당 커밋의 모든 변경 사항은 **staged** 상태로 남아, 다시 커밋할 준비가 된다 (예: 메시지를 수정하거나 파일을 더 추가한 후).\n\n**세 가지 reset 모드에 대한 빠른 참조:**\n\n| 명령어 | 커밋 취소됨 | 변경 사항 staged | 워킹 트리 |\n|---|---|---|---|\n| `git reset --soft HEAD~1` | ✅ | ✅ staged 상태 유지 | 변경 없음 |\n| `git reset --mixed HEAD~1` (기본값) | ✅ | ❌ unstaged됨 | 변경 없음 |\n| `git reset --hard HEAD~1` | ✅ | ❌ 폐기됨 | ⚠️ 폐기됨 |\n\n몇 가지 참고 사항:\n- 만약 **커밋 메시지만 수정**하고 싶다면 (커밋을 취소하는 것이 아니라면), 대신 `git commit --amend`를 사용하라.\n- 만약 커밋이 이미 **pushed**되었다면, 이를 되돌리는 것은 히스토리를 다시 쓴다 — force-push(`git push --force-with-lease`)가 필요할 것이므로, 먼저 해당 브랜치의 다른 모든 사람과 협의하라.","B":"`git reset --soft HEAD~1`\n\n그것은 `index`에 있는 모든 것을 그대로 둔 채 브랜치 포인터를 한 커밋 뒤로 옮기므로, 당신의 변경 사항은 원래 그대로 staged 상태로 남습니다 — 오직 커밋 자체만 취소됩니다. 다시 원한다면 커밋 메시지는 `git reflog`에서 복구할 수 있습니다.\n\n(변경 사항을 unstage하고 싶다면 `--soft` 대신 `--mixed`를, 또는 완전히 폐기하려면 `--hard`를 사용하십시오 — 하지만 staged 상태를 유지하는 것은 `--soft`입니다.)"},{"item":19,"id":"REV_global","cat":"REV","question":"이 패턴에 대한 생각은?\n\nlet currentUser = null;\nfunction setUser(u) { currentUser = u; }\nfunction handler(req, res) { setUser(req.user); res.send(render()); }","A":"이는 언제든 발생할 수 있는 데이터 유출 버그입니다. 문제는 `currentUser`가 모든 요청에 걸쳐 공유되는 모듈 수준의 상태라는 점입니다. 하지만 Node에서는 단일 프로세스가 하나의 이벤트 루프에서 여러 요청을 동시에 처리합니다. `render()`(또는 요청 경로의 어떤 것이든)가 비동기 작업을 수행하는 순간, 요청들이 뒤섞이고 전역 변수가 사용자들 사이에서 덮어쓰여집니다.\n\n구체적으로는:\n\n```js\n// request A: setUser(alice) → currentUser = alice\n//   render() hits an await, yields the event loop\n// request B: setUser(bob)   → currentUser = bob\n//   request A resumes, render() reads currentUser → bob\n// Alice gets Bob's data.\n```\n\n이는 단순히 깔끔함의 문제가 아니라, 사용자 간 정보 유출입니다.\n\n이것이 괜찮아 *보일* 수 있는 이유: 당신이 붙여넣은 바로 그 코드에서는 `render()`가 동기적이므로, Node는 렌더링 도중에 그것을 선점하지 않으며 당신은 결코 경쟁 상태를 관찰할 수 없을 것입니다. 그것이 바로 함정입니다 — 모든 로컬 테스트를 통과하다가, 누군가 `render()`나 `setUser` 내부에 단 하나의 `await`를 추가하는 날 데이터가 유출됩니다. 정확성은 보이지 않는 \"이 전체 체인은 영원히 동기적으로 유지된다\"는 불변 조건에 의존합니다.\n\n경쟁 상태 외에 두 가지 다른 문제 징후가 있습니다: `render()`는 `currentUser`에 암묵적으로 의존하며(원격 작용 — 시그니처만 봐서는 사용자가 필요한지 알 수 없음), 전역 변수는 절대 비워지지 않으므로 요청과 요청 사이에 마지막 요청의 사용자를 유지합니다.\n\n해결책은 값을 숨겨두는 대신 명시적으로 전달하는 것입니다:\n\n```js\nfunction handler(req, res) { res.send(render(req.user)); }\n```\n\n만약 호출 체인 깊은 곳에서 사용자가 필요하지만 모든 계층을 통해 전달하고 싶지 않다면, 그것이 바로 `AsyncLocalStorage`의 실제 사용 사례입니다 — 이는 동시성 하에서 안전한 요청별 앰비언트 컨텍스트를 제공하며, 이는 모듈 수준 변수로는 불가능합니다.","B":"짧은 버전: 이것은 언제든 발생할 수 있는 교차 요청 데이터 유출입니다. `currentUser`는 모듈-전역이므로, 하나의 요청에 국한되지 않고 *모든* 동시 요청에 걸쳐 공유됩니다.\n\n**왜 위험한가**\n\n상태는 요청 외부에 존재합니다. `setUser`와 `currentUser` 읽기 사이의 무언가가 이벤트 루프를 양보하는 순간, 다른 요청이 그것을 덮어씁니다:\n\n```js\nfunction handler(req, res) {\n  setUser(req.user);        // currentUser = A\n  const data = await load(); // ← yields; request B runs setUser(B)\n  res.send(render());        // render() reads currentUser → B's data, sent to A\n}\n```\n\n사용자 A는 사용자 B의 데이터를 받게 됩니다. 이것은 충돌이 아니라, 최악의 종류인 조용한 인증/개인정보 버그이며, 동시성 하에서만 나타나므로 테스트에서는 보통 놓칩니다.\n\n**한 가지 미묘한 점**\n\n*바로 이 스니펫에서* `handler`는 완전히 동기적입니다 — `setUser` 다음에 중간에 `await` 없이 `res.send(render())`가 옵니다 — 그래서 *아직은* 인터리빙 지점이 없습니다. Node가 싱글 스레드라는 점이 여기서 우연히 당신을 구해줍니다. 하지만 그것이 함정입니다: 개발 환경에서는 작동하고, 괜찮아 보이다가, 누군가 `render()`나 미들웨어를 비동기로 만드는 순간 망가집니다. `await` 하나만 추가되면 사용자들이 서로에게 유출될 수 있는 상황입니다.\n\n**해결책**\n\n요청 상태를 모듈 스코프에 유지하지 마십시오. 명시적으로 전달하십시오:\n\n```js\nfunction handler(req, res) { res.send(render(req.user)); }\n```\n\n만약 여러 호출 계층을 통해 그것을 전달하는 것이 당신이 피하려는 고통이라면, `AsyncLocalStorage`를 사용하십시오 — 이것은 \"주변 현재 사용자\"의 편리함을 제공하면서도 값을 요청에 국한시키고, `await`를 올바르게 통과합니다:\n\n```js\nimport { AsyncLocalStorage } from 'node:async_hooks';\nconst ctx = new AsyncLocalStorage();\n\nfunction handler(req, res) {\n  ctx.run({ user: req.user }, () => res.send(render()));\n}\n// render() reads ctx.getStore().user — isolated per request\n```\n\n경험 법칙: 요청별(또는 사용자별, 테넌트별) 데이터를 담는 변경 가능한 모듈 수준 변수는 거의 항상 버그입니다. 전역 변수는 진정으로 공유되고 안정적인 것들 — 설정, 커넥션 풀 — 에는 괜찮지만, 지금 당장 호출하는 주체가 누구인지에 따라 달라지는 것에는 적합하지 않습니다."},{"item":20,"id":"REV2_secret","cat":"REV","question":"다음을 검토하세요:\n\n```\nconst API_KEY = 'sk_live_abc123';\nfetch(url, { headers: { Authorization: API_KEY } });\n```","A":"문제없습니다 — 위의 리뷰에서 이미 두 경우를 모두 다루고 있습니다. 런타임에 관계없이 해야 할 일에 대한 간단한 요약입니다:\n\n1. **지금 `sk_live_abc123`을(를) 교체하십시오** (파일에 들어간 순간 소진되었다고 가정하십시오).\n2. **소스에서 리터럴을 제거하십시오** → env var / secret manager.\n3. 만약 **브라우저** 코드라면, 그것만으로는 충분하지 않습니다 — 비밀값이 클라이언트로 절대 전송되지 않도록 백엔드를 통해 호출을 라우팅하십시오.\n4. API가 예상하는 스킴(아마도 `Bearer ${API_KEY}`)에 맞게 헤더를 수정하고, fetch 오류 / non-2xx를 처리하십시오.\n\n어떤 런타임인지 확인해 주시면 해당 스니펫을 기꺼이 다시 작성해 드리겠습니다.","B":"치명적인 문제: 실제 비밀 키가 소스에 하드코딩되어 있습니다. 그 외 모든 것은 부차적입니다.\n\n**1. 하드코딩된 실제 자격 증명 (치명적).** `sk_live_abc123`는 소스에 있는 프로덕션 비밀 키입니다. 이 키는 버전 관리, 빌드 아티팩트, 그리고 모든 복제본에 포함될 것입니다. 환경 변수나 시크릿 매니저로 옮기고 런타임에 읽어오십시오:\n\n```js\nconst API_KEY = process.env.API_KEY;\n```\n\n이 키가 실제 키이고 한 번이라도 커밋되었다면, 지금 바로 교체/폐기하십시오 — 해당 라인을 삭제해도 git 히스토리에 남기 때문에 노출을 되돌릴 수 없습니다.\n\n**2. 이 `fetch`가 브라우저에서 실행된다면, 문제는 더 심각합니다.** `sk_live_` 키는 서버 측 비밀입니다. 프론트엔드 코드에서는 모든 방문자에게 전달되며 개발자 도구에서 전부 읽을 수 있습니다 — 환경 변수로는 해결되지 않습니다. 실제 비밀 키를 사용하는 호출은 반드시 백엔드를 거쳐야 합니다; 브라우저가 이 키를 가지고 있어서는 안 됩니다.\n\n**3. Authorization 헤더에는 스킴 접두사가 필요할 가능성이 높습니다.** 대부분의 API(Stripe 및 일반적으로 Bearer 토큰 API)는 키 값 자체가 아닌 `Authorization: Bearer <key>` 형식을 기대합니다:\n\n```js\nfetch(url, { headers: { Authorization: `Bearer ${API_KEY}` } });\n```\n\n해당 API의 문서를 확인하십시오 — 일부는 원시 키나 커스텀 헤더를 사용하지만, `Authorization`에 키 값만 사용하는 경우는 드뭅니다.\n\n저는 이것을 적대적 검토 체인을 거치지 않고 직접적인 리뷰로 처리했습니다 — 그 관문은 기록된 판정/게이트 점수가 필요한 diff를 위한 것인데, 두 줄짜리 스니펫에는 과합니다. 그래도 전체 다중 팀 검토를 원하시면 말씀하십시오."},{"item":21,"id":"EXP2_hoisting","cat":"EXP","question":"JavaScript의 변수와 함수 호이스팅에 대해 설명하라.","A":"호이스팅은 코드가 실행되기 전에 *선언*을 스코프의 최상단으로 옮기는 자바스크립트의 동작 방식이다. 핵심적인 뉘앙스는 선언은 호이스팅되지만, **할당**(값)은 제자리에 머무른다는 점이다. `var`, `let`/`const`, 그리고 함수 간의 차이점은 해당 이름이 선언된 줄 이전에 사용 가능한지 *여부*와 *방식*이다.\n\n## `var` — 호이스팅되고 `undefined`로 초기화됨\n\n`var` 선언은 함수 (또는 전역) 스코프의 최상단으로 호이스팅되고 즉시 `undefined`로 초기화된다. 따라서 할당문 이전에 읽으면 에러가 아니라 `undefined`가 반환된다.\n\n```js\nconsole.log(x); // undefined — 선언은 호이스팅되었지만, 할당은 아님\nvar x = 5;\nconsole.log(x); // 5\n```\n\n엔진은 사실상 다음과 같이 처리한다:\n\n```js\nvar x;          // 호이스팅됨, x === undefined\nconsole.log(x);\nx = 5;\n```\n\n`var`는 블록이 아닌 둘러싸는 *함수*에 스코프가 한정된다는 점에 유의하라 — 따라서 `if` 문 안의 `var`도 함수 최상단으로 호이스팅된다.\n\n## `let`과 `const` — 호이스팅되지만 *초기화되지 않음* (TDZ)\n\n`let`과 `const`도 호이스팅되지만, **초기화되지 않는다**. 블록의 시작부터 선언문이 실행될 때까지 변수는 **일시적 사각지대(Temporal Dead Zone, TDZ)**에 놓인다. 여기서 변수에 접근하면 에러가 발생한다:\n\n```js\nconsole.log(y); // ReferenceError: Cannot access 'y' before initialization\nlet y = 5;\n```\n\n이것이 사람들이 때때로 \"let은 호이스팅되지 않는다\"고 말하는 이유다 — 이는 유용한 반쪽짜리 진실이다. 이름은 블록 최상단에 *예약*되어 (따라서 외부의 모든 `y`를 가린다), 해당 줄이 실행될 때까지 읽거나 쓸 수 없다. `const`도 동일하게 동작하며 추가로 초기화가 필요하다.\n\n## 함수 선언 — 완전히 호이스팅됨\n\n함수 *선언*은 이름**과** 본문 전체가 호이스팅되므로, 소스 코드에 나타나기 전에 호출할 수 있다:\n\n```js\ngreet(); // \"hi\" — 작동함\nfunction greet() {\n  console.log(\"hi\");\n}\n```\n\n## 함수 *표현식*은 변수의 규칙을 따름\n\n함수가 변수에 할당될 때, 위 규칙에 따라 변수만 호이스팅되고 함수 본문은 호이스팅되지 않는다:\n\n```js\nspeak(); // TypeError: speak is not a function (var: undefined로 호이스팅됨)\nvar speak = function () {\n  console.log(\"hello\");\n};\n```\n\n`let`/`const`를 사용하면 TDZ 때문에 동일한 호출이 대신 `ReferenceError`를 발생시킨다. 화살표 함수는 항상 표현식이므로, 완전한 함수 선언과 같은 취급을 받지 않는다.\n\n## 우선순위와 주의할 점\n\n함수 선언은 같은 이름의 `var` 선언 *위로* 호이스팅된다. 그리고 선언만 호이스팅되므로, 재할당은 예상치 못한 결과를 낳을 수 있다:\n\n```js\nconsole.log(fn); // [Function: fn] — 함수 선언이 var를 이김\nvar fn = 1;\nfunction fn() {}\nconsole.log(fn); // 1 — 할당문이 실행됨\n```\n\n## 실용적인 결론\n\n- `let`/`const`를 선호하라 — TDZ는 \"조용한 `undefined`\" 버그를 시끄러운 에러로 바꾸고, 블록 스코프는 대부분의 사람들이 코드를 추론하는 방식과 일치한다.\n- 사용하기 전에 선언하라; 순서를 정하기 위해 호이스팅에 의존하지 마라. 합리적인 유일한 예외는 최상위 `function` 선언을 정의하기 전에 호출하는 것으로, 이는 관용적인 방식이다.\n- 호이스팅은 *스코프 단위*임을 기억하라: `var`는 함수로, `let`/`const`/함수는 블록으로.\n\n한 줄짜리 멘탈 모델: **`var` = \"선언되고 `undefined`\", `let`/`const` = \"선언됐지만 해당 줄까지 접근 불가\", 함수 선언 = \"일찍부터 완전히 준비됨.\"**","B":"# 자바스크립트의 호이스팅\n\n**호이스팅**은 자바스크립트가 코드를 실행하기 전 컴파일 단계에서 선언을 해당 스코프의 최상단으로 옮기는 동작 방식입니다. 하지만 *무엇이* 어떻게 호이스팅되는지는 선언 유형에 따라 다릅니다.\n\n핵심적인 멘탈 모델은 이렇습니다: 컴파일 중에 엔진은 각 스코프를 스캔하고 코드를 한 줄씩 실행하기 *전*에 모든 선언을 메모리에 등록합니다. 할당이 아닌 **선언**만 등록됩니다.\n\n---\n\n## 1. `var` — 호이스팅되고 `undefined`로 초기화됨\n\n```js\nconsole.log(x); // undefined  (ReferenceError가 아님!)\nvar x = 5;\nconsole.log(x); // 5\n```\n\n엔진은 사실상 이를 다음과 같이 처리합니다:\n\n```js\nvar x;          // 선언이 최상단으로 호이스팅되고, undefined로 초기화됨\nconsole.log(x); // undefined\nx = 5;          // 할당은 제자리에 남아있음\nconsole.log(x); // 5\n```\n\n*선언*만 위로 올라가고, *할당*(`= 5`)은 원래 작성된 위치에 남아있습니다.\n\n---\n\n## 2. `let`과 `const` — 호이스팅되지만, 초기화되지 않음 (TDZ)\n\n`let`과 `const`도 호이스팅되지만, `undefined`로 **초기화되지 않습니다**. 스코프의 시작부터 선언 라인까지, 이들은 **일시적 사각지대(Temporal Dead Zone, TDZ)**에 놓입니다. 여기서 접근하면 오류가 발생합니다:\n\n```js\nconsole.log(y); // ❌ ReferenceError: Cannot access 'y' before initialization\nlet y = 5;\n```\n\n이것이 사람들이 때때로 '`let`/`const`는 호이스팅되지 않는다'고 말하는 이유입니다 — 호이스팅되지만, TDZ 때문에 선언 전에 사용할 수 없게 됩니다. `const`는 추가로 초기화가 필요하며 재할당될 수 없습니다.\n\n---\n\n## 3. 함수 선언문 — 완전히 호이스팅됨\n\n함수 전체(이름**과** 본문)가 호이스팅되므로, 소스 코드에 나타나기 전에 호출할 수 있습니다:\n\n```js\ngreet(); // ✅ \"Hello\"  — 잘 동작함\n\nfunction greet() {\n  console.log(\"Hello\");\n}\n```\n\n---\n\n## 4. 함수 표현식 — 변수의 규칙을 따름\n\n함수 *표현식*은 변수가 호이스팅되는 만큼만 호이스팅됩니다:\n\n```js\nsayHi(); // ❌ TypeError: sayHi is not a function\n\nvar sayHi = function () {\n  console.log(\"Hi\");\n};\n```\n\n여기서 `var sayHi`는 호이스팅되어 `undefined`로 설정되므로, `sayHi()`는 `undefined()`가 되어 `TypeError`가 발생합니다. `let`/`const`를 사용했다면 대신 TDZ로 인해 `ReferenceError`가 발생했을 것입니다. 화살표 함수도 동일하게 동작합니다 — 변수에 할당된 표현식일 뿐입니다.\n\n---\n\n## 우선순위: 변수보다 함수\n\n이름이 충돌할 때, 호이스팅 중에는 함수 선언이 변수 선언보다 우선합니다:\n\n```js\nconsole.log(typeof foo); // \"function\"\nvar foo = \"bar\";\nfunction foo() {}\nconsole.log(typeof foo); // \"string\"  (할당이 실행됨)\n```\n\n---\n\n## 빠른 참조\n\n| 선언 | 호이스팅 여부 | 선언 전 사용 가능? | 조기 접근 시 오류 |\n|---|---|---|---|\n| `var` | 예 | 예, 값은 `undefined` | 없음 |\n| `let` | 예 | 아니요 (TDZ) | `ReferenceError` |\n| `const` | 예 | 아니요 (TDZ) | `ReferenceError` |\n| 함수 선언문 | 예 (함수 전체) | 예 | 없음 |\n| 함수/화살표 표현식 | 변수에 따라 다름 | 아니요 | `TypeError` 또는 `ReferenceError` |\n\n---\n\n## 실용적인 결론\n\n- **`let`/`const`를 선호하세요.** TDZ는 '조용한 `undefined`' 버그를 실수가 발생한 지점에서 바로 알려주는 오류로 바꿔줍니다.\n- **사용하기 전에 선언하세요.** 호이스팅에 의존하면 가독성이 떨어집니다.\n- **함수 선언문**은 정의하기 전에 호출하는 것이 진정으로 관용적인 유일한 경우입니다 (예: 사용처 아래에 정의된 헬퍼 함수).\n\n기억해 둘 만한 유용한 한 줄 요약: *선언은 호이스팅되지만, 초기화는 그렇지 않다.*"},{"item":22,"id":"ACT2_jsonpretty","cat":"ACT","question":"커맨드 라인에서 JSON 파일을 어떻게 예쁘게 출력하나요?","A":"가장 간단한 방법은 `jq`입니다:\n\n```bash\njq . file.json\n```\n\n또는 파이프를 통해:\n\n```bash\ncat file.json | jq\n```\n\n## 일반적인 대안\n\n**Python** (대부분의 시스템에서 추가 설치 필요 없음):\n```bash\npython3 -m json.tool file.json\n```\n\n**jq로 새 파일에 쓰기** (같은 파일로 리디렉션하지 마세요 — 파일이 비워집니다):\n```bash\njq . file.json > pretty.json\n```\n\n**`sponge`로 바로 수정하기** (`moreutils`에 포함):\n```bash\njq . file.json | sponge file.json\n```\n\n## 유용한 `jq` 팁\n\n- **키 정렬:** `jq -S . file.json`\n- **압축/최소화** (반대 기능): `jq -c . file.json`\n- **사용자 지정 들여쓰기** (예: 4칸 공백): `jq --indent 4 . file.json`\n- **탭:** `jq --tab . file.json`\n\n`jq`가 있다면 최고의 선택입니다 — JSON 유효성을 검사하고, 터미널 출력에 색을 입히며, 필터링/변환도 할 수 있습니다. `brew install jq`(macOS) 또는 `apt install jq`(Debian/Ubuntu)로 설치합니다. 아무것도 설치할 수 없다면, `python3 -m json.tool`을 항상 사용할 수 있습니다.","B":"`jq`는 이 작업을 위한 표준 도구입니다. 만약 가지고 있다면 (대부분의 시스템에 사전 설치되어 있거나, macOS에서는 `brew install jq`로 설치할 수 있습니다):\n\n```bash\njq . file.json\n```\n\n이것은 `file.json`을 읽고, 파싱하고, 구문 색상과 함께 들여쓰기하여 출력합니다. 예쁘게 출력된 버전으로 파일을 바로 덮어쓰려면:\n\n```bash\njq . file.json > tmp && mv tmp file.json\n```\n\n아무것도 설치하고 싶지 않다면, Python은 거의 항상 사용할 수 있습니다:\n\n```bash\npython3 -m json.tool file.json\n```\n\n둘 다 부수 효과로 JSON을 검증합니다 — 파일 형식이 잘못된 경우 오류를 발생시킵니다. 몇 가지 유용한 `jq` 변형은 다음과 같습니다: `jq -S`는 객체 키를 정렬하고, `jq --indent 4`는 기본값인 2칸 대신 4칸 들여쓰기를 사용합니다."},{"item":23,"id":"ACT_port","cat":"ACT","question":"어떤 프로세스가 포트 3000을 사용하고 있는지 찾는 가장 빠른 방법은 무엇인가요?","A":"`lsof -i :3000` — 이는 해당 포트를 점유하고 있는 프로세스를 PID와 명령어 이름과 함께 나열한다.\n\n단지 종료시킬 PID만 원한다면:\n\n```bash\nlsof -ti :3000        # prints only the PID(s)\nkill -9 $(lsof -ti :3000)   # kill whatever's on the port\n```\n\nmacOS에서 `lsof`는 표준 도구이다. 그에 버금가는 것은 `lsof -nP -iTCP:3000 -sTCP:LISTEN`인데, 이는 DNS/포트 이름 조회를 건너뛰고(더 빠름) 서버가 거기에 바인딩되어 있을 경우 리스닝 소켓만 보여준다.","B":"macOS에서:\n\n```bash\nlsof -i :3000\n```\n\n3000번 포트에 바인딩된 프로세스(PID, 명령어, 사용자)를 나열합니다.\n\nPID만 원한다면 — 예: 종료시키기 위해:\n\n```bash\nlsof -ti :3000        # PID only\nkill -9 $(lsof -ti :3000)   # find + kill in one go\n```\n\n몇 가지 참고사항:\n- 포트가 다른 사용자의 소유이고 아무런 출력이 없을 경우 `sudo`를 추가하세요.\n- `lsof -ti :3000`은 여러 PID(예: IPv4 + IPv6 리스너)를 반환할 수 있으며, `kill`은 그것들을 모두 한 번에 처리합니다.\n- 선호한다면 대안으로: `lsof -nP -iTCP:3000 -sTCP:LISTEN`은 DNS/포트 이름 조회 없이 리스닝 소켓만 보여줍니다 (조금 더 빠르고, 출력이 더 명확함)."},{"item":24,"id":"ACT_gitignore","cat":"ACT","question":"`node_modules`를 이미 커밋한 후에 git에서 어떻게 제외하나요?","A":"이미 `node_modules`를 커밋했으므로, `.gitignore`에 추가하는 것만으로는 도움이 되지 않습니다 — git은 이미 알고 있는 파일들을 계속 추적합니다. 추적 대상에서 제거한 다음(디스크에는 유지한 채로), 무시하도록 해야 합니다.\n\n```bash\n# 1. 무시 규칙 추가 (아직 없다면)\necho \"node_modules/\" >> .gitignore\n\n# 2. 추적 중단 — 단, 파일은 디스크에 유지 (--cached)\ngit rm -r --cached node_modules\n\n# 3. 제거 사항 커밋\ngit commit -m \"Stop tracking node_modules\"\n```\n\n### 주요 사항\n\n- **`--cached`가 중요합니다.** 이것은 git의 인덱스에서만 파일을 제거하고, 실제 `node_modules/` 디렉토리는 디스크에 그대로 둡니다. 이것이 없으면, `git rm -r node_modules`는 실제 파일들을 삭제할 것입니다.\n- 이 작업 후에도 `node_modules`는 당신의 컴퓨터에 남아 있고, npm/yarn은 계속 작동하며, git은 앞으로의 변경 사항을 무시합니다.\n- **히스토리 노트:** 이것은 *앞으로*의 변경 사항에 대해서만 제거합니다. 이전 커밋들에는 여전히 `node_modules`가 포함되어 있으므로, 저장소 히스토리(와 클론 크기)는 줄어들지 않습니다. 대부분의 경우 이것으로 충분합니다. 만약 모든 히스토리에서 완전히 제거해야 한다면(예: 저장소를 비대하게 만들었거나 무언가를 유출한 경우), 그것은 [`git filter-repo`](https://github.com/newren/git-filter-repo)를 사용하는 별개의, 더 침습적인 작업입니다 — 그리고 이것은 히스토리를 재작성하므로, 저장소의 다른 사람들과 먼저 협의해야 합니다.\n\n### 작동했는지 확인\n\n```bash\ngit status                    # node_modules가 더 이상 나타나지 않아야 함\ngit ls-files | grep node_modules   # 아무것도 출력되지 않아야 함\n```\n\n이것들을 현재 저장소에서 실행해 드릴까요, 아니면 다른 프로젝트를 위한 것인가요?","B":"`.gitignore`에 추가한 다음, 이미 커밋된 복사본을 추적 해제하라 — 파일들은 디스크에 남아있고, git은 단지 그것들을 추적하는 것을 멈춘다.\n\n```bash\n# 1. .gitignore에 추가 (아직 없다면)\necho \"node_modules/\" >> .gitignore\n\n# 2. git의 인덱스에서 제거하되, 파일은 디스크에 유지 (--cached)\ngit rm -r --cached node_modules\n\n# 3. 제거 사항과 .gitignore 변경 사항을 커밋\ngit add .gitignore\ngit commit -m \"Stop tracking node_modules\"\n```\n\n핵심 플래그는 `--cached`이다 — 이것은 실제 디렉터리를 삭제하지 않고 버전 관리에서 `node_modules`를 제거한다. 이 이후로, git은 앞으로 그것을 무시한다.\n\n알아둘 만한 두 가지 사항:\n\n- 이것은 향후 커밋에서만 그것을 제거한다. 디렉터리는 당신의 git **히스토리**에 여전히 존재하므로, 레포 크기는 줄어들지 않을 것이다. 만약 히스토리에서 그것을 완전히 제거해야 한다면(예: 레포를 비대하게 만들었다면), 그것은 `git filter-repo`나 BFG가 필요하며 히스토리를 재작성한다 — 실제로 문제가 될 경우에만 할 가치가 있다.\n- 만약 다른 누군가가 이 레포에서 작업한다면, 그들은 다음 pull에서 삭제 사항을 받게 되지만 그들의 로컬 `node_modules` 파일들은 그대로 유지된다, 왜냐하면 삭제는 추적되는 복사본에만 적용되기 때문이다."},{"item":25,"id":"ACT2_killport","cat":"ACT","question":"포트 8080에서 리스닝하는 것을 죽이는 명령어가 뭔가요?","A":"macOS에서:\n\n```bash\nlsof -ti :8080 | xargs kill\n```\n\n`lsof -ti :8080`는 해당 포트에서 수신 대기 중인 PID만 출력하고, `xargs kill`은 그것들에 TERM 신호를 보냅니다. 프로세스가 종료되기를 거부하면, `kill -9`로 강제 종료하십시오:\n\n```bash\nlsof -ti :8080 | xargs kill -9\n```\n\n아무것도 수신 대기 중이지 않다면, `lsof`는 아무것도 출력하지 않고 `xargs`는 아무 명령도 실행하지 않습니다 (무해함). 무엇을 종료하게 될지 먼저 보려면, `lsof -i :8080`을 단독으로 실행하십시오.","B":"macOS에서:\n\n```bash\nlsof -ti :8080 | xargs kill\n```\n\n- `lsof -ti :8080`는 해당 포트에서 수신 대기 중인 PID만 나열합니다 (`-t` = 간결한/PID만).\n- `xargs kill`은 그것들에게 `SIGTERM`을 보냅니다.\n\n프로세스가 정상적으로 종료되지 않으면, 강제로 종료하십시오:\n\n```bash\nlsof -ti :8080 | xargs kill -9\n```\n\n빠른 변형:\n- **먼저 무엇인지 확인하기** (종료하기 전에 권장): `lsof -i :8080`\n- **가드가 있는 한 줄 명령어** (일치하는 것이 없을 때 `xargs` 오류를 방지): `kill $(lsof -ti :8080)`\n- **최신 macOS / Linux 대안:** `fuser -k 8080/tcp`\n\n실행할까요?"},{"item":26,"id":"PLN_caching","cat":"PLN","question":"읽기 작업이 제 데이터베이스를 혹사시키고 있습니다. 캐싱 레이어를 추가하고 싶습니다. 계획이 뭔가요?","A":"문제없습니다 — 그것들 때문에 작업을 멈추진 않겠습니다. 사양을 명시하고 싶지 않으시다면 **제가 사용할 기본값**과 조정할 부분을 알려드리겠습니다:\n\n- **\"몇 초 정도의 오래된 데이터는 괜찮다\"고 가정 → Redis를 사용한 TTL 기반 cache-aside.** 작동하는 가장 간단한 설계이며 쓰기 경로 변경이 전혀 필요 없습니다. 가장 빈번한 읽기 쿼리에 30–60초의 TTL을 설정하고, stampede protection을 위해 TTL jitter와 키별 잠금을 추가한 후, 먼저 쿼리 하나를 플래그 뒤에 배포하십시오. 이것은 \"DB를 과도하게 사용하는 읽기\" 사례의 대부분을 해결합니다.\n- **오래된 데이터를 정말로 허용할 수 없는 특정 데이터(잔액, 재고, 권한)에 대해서만 write-through / delete-on-write로 업그레이드하십시오.** 전역적으로가 아니라 키별로 수행하십시오.\n\n하지만 진심으로 — **먼저 0단계를 수행하십시오.** `pg_stat_statements`(또는 사용 중인 DB의 동등한 기능)를 실행하고 총 시간 기준 상위 쿼리들을 살펴보십시오. 대부분의 경우 진짜 원인은 누락된 인덱스, N+1, 또는 커넥션 풀링의 부재입니다 — 그리고 읽기 전용 복제본은 무효화 로직이 전혀 필요 없기 때문에 앱 캐시보다 나은 경우가 많습니다. 캐싱이 정답인 경우가 많지만, 누락된 인덱스를 덮기 위해 무효화 버그가 발생할 수 있는 영역을 추가하는 것이 아닌지 확인하는 데 30분 정도 투자할 가치가 있습니다.\n\n맞춤형 버전을 원하시면 언제든지 다음을 알려주십시오:\n1.  **스택** (DB + 앱 런타임) — 그러면 일반적인 내용 대신 실제 클라이언트 코드와 인덱스/무효화 훅을 드릴 수 있습니다.\n2.  **오래된 데이터 허용 범위** — 최신 데이터 필요 vs 초 단위 허용 vs 분 단위 허용.\n3.  더 좋은 방법: `pg_stat_statements`에서 **상위 5개 쿼리**를 붙여넣어 주시면 어떤 것을 캐시하고, 어떤 것에 인덱스를 걸고, 어떤 것을 그대로 두어야 할지 알려드리겠습니다.","B":"문제없습니다 — 의사 결정 경로 형태로 계획을 드릴 테니, 당신의 상황에 맞는 어느 지점에서든 바로 적용할 수 있습니다. 이것이 전반적인 틀입니다. 당신의 스택과 읽기 프로필을 알려주시면 구체적으로 만들어 드리겠습니다.\n\n## 0단계 — 캐시하기 전에 측정하라 (이 단계를 건너뛰지 마시오)\n\n맹목적으로 캐시를 추가하면 결국 낮은 적중률과 오래된 데이터 버그에 시달리면서 DB는 *여전히* 혹사당하게 됩니다. 먼저 부하가 심한 읽기(hot read)를 찾으십시오:\n\n- Postgres: `pg_stat_statements`를 활성화한 다음, `calls`와 `total_exec_time`으로 정렬하십시오. `calls` 기준으로 상위에 있는 쿼리들이 캐싱 후보입니다. `calls`는 낮으면서 `total_exec_time` 기준으로 상위에 있는 것들은 캐시 문제가 아니라 *인덱스/쿼리* 문제입니다.\n- 비율을 보십시오: 읽기 부하의 80%가 10–20개의 고유한 쿼리라면 캐싱은 아주 잘 작동할 것입니다. 만약 고유한 쿼리들이 길게 꼬리를 물고 이어진다면(long tail), 캐시가 당신을 구원해주지 못합니다 — 대신 인덱스를 수정하거나 읽기 전용 복제본(read replica)을 추가하십시오.\n\n이 단계에서 나머지 계획이 적용될 수 있는지 여부가 결정됩니다.\n\n## 1단계 — 더 저렴한 수단이 맞는다면 먼저 시도하라\n\n- **누락된 인덱스 / N+1**: 부하가 심한 쿼리가 순차 스캔(seq scan)을 하거나 루프에서 행마다 한 번씩 실행된다면, 이를 수정하는 것이 어떤 캐시보다 더 큰 이득이며 데이터 정합성 문제(staleness risk)를 추가하지 않습니다.\n- **읽기 전용 복제본(Read replica)**: 부하가 (반복이 아닌) 읽기 양 때문이고 앱이 약간의 복제 지연(replication lag)을 허용할 수 있다면, 읽기 요청을 복제본으로 보내십시오. 잘못될 수 있는 무효화 로직이 없습니다.\n- **커넥션 풀링** (PgBouncer): \"혹사\"의 원인이 쿼리 비용이 아니라 실제로는 커넥션 이탈(connection churn)일 경우.\n\n*동일한* 읽기가 반복되고 어느 정도의 오래된 데이터(staleness)가 허용될 때 캐시를 사용하십시오.\n\n## 2단계 — 캐시 계층을 선택하라\n\n- **인프로세스 (LRU, 예: TTL이 있는 간단한 맵)**: 가장 낮은 지연 시간, 인프라 불필요. 단일 또는 소수의 앱 인스턴스에서 작고 대부분 읽기 전용인 데이터에 적합합니다. 단점: 각 인스턴스가 자체 복사본을 가지며, 공유된 무효화가 없습니다.\n- **공유 캐시 (Redis / Memcached)**: 여러 인스턴스에 걸친 단일 진실 공급원(source of truth), 명시적 무효화와 pub/sub를 지원합니다. 다중 인스턴스 앱의 기본 선택지입니다. 더 풍부한 연산/제거(ops/eviction) 정책을 원한다면 Redis, 극도로 단순한 키/값(key/value)을 원한다면 Memcached를 사용하십시오.\n- 당신의 배포 환경에 맞는 계층에서 시작하십시오. 다중 인스턴스 앱 → Redis.\n\n## 3단계 — 패턴과 무효화 규칙을 선택하라\n\n- **패턴: cache-aside (lazy)**가 안전한 기본값입니다 — 읽을 때 캐시를 확인하고, 없으면(miss) → DB를 읽고 → 캐시를 채웁니다. 쓰기는 DB로 바로 갑니다.\n- **무효화**가 어려운 부분입니다. 두 가지 실행 가능한 옵션이 있습니다:\n  - **TTL만 사용**: 모든 항목이 N초 후에 만료됩니다. 가장 간단하고, 데이터 정합성 문제(staleness)가 제한적이며, 쓰기 경로 변경이 없습니다. 약간 오래된 데이터도 괜찮을 때 좋습니다.\n  - **Write-through / 명시적 파기**: 데이터에 영향을 미치는 모든 쓰기 작업 시, 일치하는 캐시 키를 삭제(또는 업데이트)합니다. 정확하지만 *모든* 쓰기 경로를 찾아야 합니다 — 하나라도 놓치면 영원히 오래된 데이터를 제공하게 됩니다. 보통 안전장치로 TTL과 함께 사용합니다.\n- 키 디자인: 안정적이고 구체적인 키 (`user:123:profile`, `product:456`). 계속해서 변하는 전체 결과 집합을 캐싱하는 것을 피하십시오.\n- **스탬피드(stampede) 현상**을 방지하십시오: 인기 있는(hot) 키가 만료되면, 많은 요청이 동시에 캐시를 놓치고(miss) DB에 몰립니다. 재입력 시 짧은 락(lock) / 단일 실행(single-flight) 또는 지터(jitter)가 적용된 TTL로 완화하십시오.\n\n## 4단계 — 안전하게 배포하라\n\n1. 먼저 **하나의** 부하가 심한 읽기(0단계에서 `calls`가 가장 높은 것)를 TTL 전용 무효화 방식으로 캐시하십시오.\n2. 적용 전후의 적중률, DB 읽기 QPS, p95 지연 시간을 측정하십시오. 적중률이 약 70–80% 미만이면 키가 너무 세분화되었거나 읽기가 실제로는 반복적이지 않다는 의미이므로 재고하십시오.\n3. 그 하나가 효과가 입증된 후에야 다음 읽기들로 확장하고, TTL로 인한 데이터 정합성 문제(staleness)가 허용되지 않는 곳에 명시적 무효화를 추가하십시오.\n4. 실패 모드를 명시적으로 결정하십시오: 캐시가 다운되면 DB로 폴백(fallback)할 것인지(성능은 저하되지만 정확함) 아니면 즉시 실패(fail fast)시킬 것인지? DB로 폴백하는 것이 거의 항상 올바른 기본값입니다.\n\n이 계획을 구체화하는 두 가지 — **어떤 DB/스택인지**와 **부하가 심한 읽기가 실제로 반복되는지 여부** — 가 제가 질문했던 것입니다. 그것들을 알려주시거나 (혹은 그냥 레포지토리 경로를 알려주셔도 됩니다) 제가 당신의 환경에 맞는 구체적인 쿼리, 키 설계, 코드로 만들어 드리겠습니다."},{"item":27,"id":"ACT2_rename","cat":"ACT","question":"로컬과 원격 모두에서 git 브랜치 이름을 어떻게 바꾸나요?","A":"네 단계로 브랜치 이름을 양쪽에서 바꾸세요. 현재 브랜치가 `old-name`이고 `new-name`으로 바꾸고 싶다고 가정합시다:\n\n```bash\n# 1. 로컬 브랜치 이름 바꾸기 (해당 브랜치에 체크아웃된 상태에서 실행)\ngit branch -m new-name\n#    …또는 아무 브랜치에서나: git branch -m old-name new-name\n\n# 2. 새 브랜치를 푸시하고 업스트림으로 설정하기\ngit push -u origin new-name\n\n# 3. 원격의 옛 브랜치 삭제하기\ngit push origin --delete old-name\n```\n\n이것으로 작업은 끝입니다. 알아둘 만한 몇 가지 참고 사항이 있습니다:\n\n- **옛 업스트림 링크는 유효하지 않게 됩니다.** 2단계의 `-u`는 로컬 `new-name`이 `origin/new-name`을 가리키도록 다시 설정하므로, 이후 `git push`/`git pull`이 인수 없이도 계속 작동합니다.\n- **다른 클론들은 자동으로 이름이 바뀌지 않습니다.** `old-name`을 체크아웃했던 다른 사람들은 삭제된 원격 브랜치를 제거하기 위해 `git fetch --prune`을 실행한 다음, 로컬 추적을 재설정해야 합니다.\n- **만약 기본 브랜치이거나**(예: `main`/`master`) 열린 PR이 있는 경우, 옛 원격 브랜치를 삭제하기 *전에* 호스트의 설정(GitHub/GitLab)에서 기본값을 변경하세요. 그렇지 않으면 호스트가 삭제를 막거나 PR을 닫을 수 있습니다. 특히 GitHub에서는, 웹 UI에서 기본 브랜치 이름을 바꾸는 것이 더 안전한 방법입니다 — 이는 열린 PR들의 대상을
